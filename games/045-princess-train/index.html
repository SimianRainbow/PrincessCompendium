<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Princess Number Train 🚂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #f3e5f5 0%, #fce4ec 50%, #e8f5e9 100%);
      min-height:100vh; width:100vw; overflow:hidden;
      font-family:'Fredoka One', Georgia, serif; user-select:none; position:relative;
      display:flex; flex-direction:column; align-items:center;
    }

    .bg-gem { position:fixed; pointer-events:none; animation:floatUp linear infinite; opacity:.13; font-size:clamp(16px,4.5vw,26px); }
    @keyframes floatUp { 0%{transform:translateY(110vh) rotate(0deg)} 100%{transform:translateY(-15vh) rotate(360deg)} }

    #header {
      position:fixed; top:0; left:0; right:0; z-index:10;
      padding:clamp(8px,2vw,14px) clamp(12px,3vw,20px);
      display:flex; justify-content:space-between; align-items:center;
    }
    #tier-badge { font-size:clamp(13px,3.4vw,18px); padding:5px 15px; border-radius:20px; font-weight:bold; }
    .tier-easy   { background:linear-gradient(135deg,#a5d6a7,#66bb6a); color:#1b5e20; }
    .tier-medium { background:linear-gradient(135deg,#ffe082,#ffd54f); color:#5a3000; }
    .tier-hard   { background:linear-gradient(135deg,#ce93d8,#ab47bc); color:#fff; }
    #round-lbl { font-size:clamp(14px,3.5vw,20px); color:#6a1b9a; font-weight:bold; }

    #progress-wrap {
      position:fixed; top:clamp(48px,11vw,70px); left:0; right:0;
      padding:0 clamp(14px,4vw,24px); z-index:10;
    }
    #progress-track { background:rgba(171,71,188,.2); border-radius:20px; height:clamp(10px,2.5vw,14px); overflow:hidden; }
    #progress-fill  { height:100%; border-radius:20px; background:linear-gradient(90deg,#e040fb,#f48fb1); transition:width .35s ease; width:0%; box-shadow:0 0 8px rgba(224,64,251,.3); }

    #title-lbl { font-size:clamp(20px,5vw,32px); color:#6a1b9a; text-align:center;
                 padding:0 16px; margin-top:clamp(74px,17vw,102px); }

    #loco { font-size:clamp(44px,12vw,80px); text-align:center; margin-top:clamp(6px,1.5vw,12px); line-height:1; }

    #carriages {
      display:flex; gap:clamp(8px,2.5vw,14px); justify-content:center; align-items:stretch;
      margin-top:clamp(4px,1vw,8px); padding:0 clamp(12px,3vw,20px); width:100%;
    }
    .carriage {
      flex:1; min-width:0; max-width:clamp(90px,28vw,140px);
      border-radius:18px; border:4px solid rgba(180,80,220,.4);
      background:linear-gradient(160deg,#fff 0%,#f3e5f5 100%);
      box-shadow:0 4px 16px rgba(150,50,200,.18);
      display:flex; align-items:center; justify-content:center;
      min-height:clamp(88px,25vw,128px);
      position:relative; overflow:hidden;
    }
    .carriage::after {
      content:''; position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
      width:80%; height:4px; background:rgba(180,80,220,.25); border-radius:4px;
    }
    .carriage::before {
      content:'⚙️'; position:absolute; bottom:-8px; left:10px;
      font-size:clamp(14px,3.5vw,22px); opacity:.35;
    }
    .carriage.missing {
      background:linear-gradient(160deg,#fce4ec,#f8bbd0);
      border-color:rgba(233,30,99,.45);
      border-style:dashed;
    }
    @keyframes shimmer { 0%,100%{opacity:.6} 50%{opacity:1} }
    .carriage.missing .num { animation:shimmer 1.1s ease-in-out infinite; color:#ad1457; }
    .num { font-weight:bold; }

    #track {
      width:calc(100% - clamp(24px,6vw,40px)); height:18px; position:relative;
      margin:clamp(2px,0.5vw,4px) auto 0;
    }
    #track::before, #track::after {
      content:''; position:absolute; left:0; right:0; height:5px;
      border-radius:4px; background:rgba(120,60,180,.35);
    }
    #track::before { top:0; }
    #track::after  { bottom:0; }

    #prompt {
      font-size:clamp(18px,4.5vw,26px); color:#6a1b9a; text-align:center;
      margin-top:clamp(10px,2.5vw,18px); padding:0 16px;
    }

    #choices {
      display:flex; gap:clamp(10px,2.5vw,18px); justify-content:center;
      margin-top:clamp(14px,3.5vw,24px); padding:0 clamp(12px,3vw,20px); width:100%;
    }
    .choice-btn {
      flex:1; min-width:0; max-width:clamp(90px,28vw,140px);
      min-height:clamp(90px,24vw,120px);
      border-radius:20px; border:none;
      background:linear-gradient(135deg,#e040fb,#ab47bc);
      color:#fff; font-size:clamp(30px,8vw,56px); font-weight:bold;
      font-family:inherit; cursor:pointer; touch-action:manipulation;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 5px 18px rgba(160,50,210,.35);
      transition:transform .1s, box-shadow .1s;
    }
    .choice-btn:active { transform:scale(.93); box-shadow:0 2px 8px rgba(160,50,210,.25); }
    .choice-btn.shake { animation:shake .4s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }

    .sparkle { position:fixed; pointer-events:none; z-index:50; border-radius:50%; animation:spkOut .7s ease-out forwards; }
    @keyframes spkOut { 0%{transform:scale(0);opacity:1} 100%{transform:scale(1.7);opacity:0} }
    .sparkle-em { position:fixed; pointer-events:none; z-index:51; font-size:clamp(18px,4.5vw,24px); animation:sFloat .9s ease-out forwards; }
    @keyframes sFloat { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(0);opacity:0} }
    .confetti { position:fixed; pointer-events:none; z-index:100; border-radius:3px; animation:cfFall linear forwards; }
    @keyframes cfFall { 0%{top:-20px;opacity:1;transform:rotate(0deg)} 100%{top:110vh;opacity:.2;transform:rotate(720deg)} }

    .overlay {
      position:fixed; inset:0; background:rgba(250,240,255,.94);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .4s;
    }
    .overlay.show { opacity:1; pointer-events:all; }
    .ov-emoji { font-size:clamp(60px,16vw,100px); }
    .ov-title { font-size:clamp(24px,6.5vw,46px); color:#6a1b9a; text-align:center; padding:0 20px; }
    .ov-sub   { font-size:clamp(14px,3.8vw,22px); color:#7b1fa2; text-align:center; padding:0 20px; opacity:.85; }
    .btn-next {
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px);
      border-radius:50px; border:none; background:linear-gradient(135deg,#e040fb,#ab47bc);
      color:#fff; font-weight:bold; cursor:pointer; font-family:inherit;
      min-height:64px; min-width:180px; touch-action:manipulation;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="tier-badge" class="tier-easy">🌱 Easy</div>
  <div id="round-lbl">🌸 1 / 9</div>
</div>
<div id="progress-wrap">
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<div id="title-lbl">🚂 Princess Number Train</div>
<div id="loco">🚂</div>

<div id="carriages">
  <div class="carriage" id="car-0"><span class="num" id="num-0">1</span></div>
  <div class="carriage" id="car-1"><span class="num" id="num-1">2</span></div>
  <div class="carriage" id="car-2"><span class="num" id="num-2">?</span></div>
</div>
<div id="track"></div>

<div id="prompt">Which number is missing? 🌟</div>

<div id="choices"></div>

<div class="overlay" id="tier-overlay">
  <div class="ov-emoji" id="t-emoji">🎉</div>
  <div class="ov-title" id="t-title">Round complete!</div>
  <div class="ov-sub"   id="t-sub">Get ready for the next round!</div>
  <button class="btn-next" id="t-btn">Next Round ➡️</button>
</div>

<div class="overlay" id="win-overlay">
  <div class="ov-emoji">👑</div>
  <div class="ov-title">Number Champion! 🚂✨</div>
  <div class="ov-sub">You filled every carriage! Amazing!</div>
  <button class="btn-next" onclick="startGame()">Play Again 🌸</button>
</div>

<script>
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
  function tone(f, type, d, v) {
    v = v || .18;
    try {
      var c = getCtx(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(v, c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, c.currentTime + d);
      o.start(); o.stop(c.currentTime + d);
    } catch(e) {}
  }
  function playCorrect()  { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ tone(f,'sine',.18,.22); },i*65); }); }
  function playWrong()    { tone(280,'sawtooth',.16,.13); setTimeout(function(){ tone(240,'sawtooth',.14,.11); },160); }
  function playTierWin()  { [523,659,784,1047,1319].forEach(function(f,i){ setTimeout(function(){ tone(f,'triangle',.28,.22); },i*80); }); }
  function playFinalWin() { [523,659,784,1047,784,1047,1319].forEach(function(f,i){ setTimeout(function(){ tone(f,'sine',.32,.22); },i*90); }); }

  var POOL = [
    { nums:[1,2,null], ans:3,  prompt:'What comes after 2? 🌸',       tier:0 },
    { nums:[2,3,null], ans:4,  prompt:'What comes after 3? 💎',        tier:0 },
    { nums:[3,4,null], ans:5,  prompt:'What comes after 4? ⭐',        tier:0 },
    { nums:[4,5,null], ans:6,  prompt:'What comes after 5? 🌟',        tier:0 },
    { nums:[null,2,3], ans:1,  prompt:'What comes before 2? 👑',       tier:0 },
    { nums:[1,null,3], ans:2,  prompt:"What's hiding here? 🚂",        tier:0 },
    { nums:[4,null,6], ans:5,  prompt:'What is hiding? 🌟',            tier:1 },
    { nums:[null,7,8], ans:6,  prompt:'What comes before 7? 👑',       tier:1 },
    { nums:[5,null,7], ans:6,  prompt:'Which number fits? ✨',          tier:1 },
    { nums:[8,9,null], ans:10, prompt:'What comes after 9? 💫',        tier:1 },
    { nums:[null,6,7], ans:5,  prompt:'What comes before 6? 🌸',       tier:1 },
    { nums:[7,null,9], ans:8,  prompt:"What's missing? 🌟",             tier:1 },
    { nums:[null,10,11], ans:9,  prompt:'What comes before 10? 🦄',    tier:2 },
    { nums:[8,null,10],  ans:9,  prompt:'Which number fits? 🔮',       tier:2 },
    { nums:[11,12,null], ans:13, prompt:'What comes after 12? 💫',     tier:2 },
    { nums:[14,null,16], ans:15, prompt:'Which number fits? ✨',        tier:2 },
    { nums:[null,13,14], ans:12, prompt:'What comes before 13? 🌟',    tier:2 },
    { nums:[16,17,null], ans:18, prompt:'What comes after 17? 👑',     tier:2 },
  ];

  var TIER_LABELS  = ['🌱 Easy', '🌸 Medium', '⭐ Hard'];
  var TIER_CLASSES = ['tier-easy', 'tier-medium', 'tier-hard'];
  var TOTAL = 9;

  var ROUNDS = [], roundIdx = 0, locked = false;

  function shuffle(a) {
    var b = a.slice();
    for (var i=b.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var t=b[i]; b[i]=b[j]; b[j]=t;
    }
    return b;
  }

  function buildRounds() {
    var r0 = shuffle(POOL.filter(function(r){ return r.tier===0; })).slice(0,3);
    var r1 = shuffle(POOL.filter(function(r){ return r.tier===1; })).slice(0,3);
    var r2 = shuffle(POOL.filter(function(r){ return r.tier===2; })).slice(0,3);
    return r0.concat(r1).concat(r2);
  }

  function getWrongAnswers(r) {
    var used = {};
    r.nums.forEach(function(n){ if(n!==null) used[n]=true; });
    used[r.ans] = true;
    var cands = [];
    for (var d=1;d<=4;d++) {
      if (r.ans-d>0 && !used[r.ans-d]) cands.push(r.ans-d);
      if (!used[r.ans+d]) cands.push(r.ans+d);
    }
    return shuffle(cands).slice(0,2);
  }

  function makeBgGems() {
    var g = ['💫','✨','🌟','⭐','💎','🌸','🚂','👑','🌺','🎀','🪄','🎵'];
    for (var i=0;i<12;i++) {
      var el=document.createElement('div'); el.className='bg-gem';
      el.textContent=g[i%g.length];
      el.style.left=(5+Math.random()*90)+'vw';
      el.style.animationDuration=(10+Math.random()*14)+'s';
      el.style.animationDelay=-(Math.random()*14)+'s';
      document.body.appendChild(el);
    }
  }

  function showRound(idx) {
    locked = false;
    var r = ROUNDS[idx];

    var badge = document.getElementById('tier-badge');
    badge.textContent = TIER_LABELS[r.tier];
    badge.className   = TIER_CLASSES[r.tier];

    document.getElementById('round-lbl').textContent = '🌸 '+(idx+1)+' / '+TOTAL;
    document.getElementById('progress-fill').style.width = (idx/TOTAL*100)+'%';
    document.getElementById('prompt').textContent = r.prompt;

    for (var i=0;i<3;i++) {
      var car   = document.getElementById('car-'+i);
      var numEl = document.getElementById('num-'+i);
      var val   = r.nums[i];
      if (val===null) {
        car.className = 'carriage missing';
        numEl.textContent = '?';
        numEl.style.fontSize = '';
      } else {
        car.className = 'carriage';
        numEl.textContent = String(val);
        numEl.style.fontSize = val>=10 ? 'clamp(26px,7vw,48px)' : '';
      }
    }

    var wrong   = getWrongAnswers(r);
    var choices = shuffle([r.ans].concat(wrong));
    var choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    choices.forEach(function(val) {
      var btn = document.createElement('button');
      btn.className   = 'choice-btn';
      btn.textContent = String(val);
      btn.dataset.val = val;
      btn.addEventListener('pointerdown', function(){ pick(btn); });
      choicesEl.appendChild(btn);
    });
  }

  function pick(btn) {
    if (locked) return;
    var r   = ROUNDS[roundIdx];
    var val = Number(btn.dataset.val);

    if (val===r.ans) {
      locked = true;
      playCorrect();
      for (var i=0;i<3;i++) {
        if (r.nums[i]===null) {
          var car = document.getElementById('car-'+i);
          var numEl = document.getElementById('num-'+i);
          car.className = 'carriage';
          numEl.textContent = String(r.ans);
          numEl.style.fontSize = r.ans>=10 ? 'clamp(26px,7vw,48px)' : '';
        }
      }
      burstAt(btn);
      setTimeout(function(){ advanceRound(); }, 700);
    } else {
      btn.classList.add('shake');
      playWrong();
      setTimeout(function(){ btn.classList.remove('shake'); }, 420);
    }
  }

  function advanceRound() {
    var r       = ROUNDS[roundIdx];
    var nextIdx = roundIdx+1;
    var lastInTier = nextIdx>=TOTAL || ROUNDS[nextIdx].tier!==r.tier;

    if (nextIdx>=TOTAL) {
      document.getElementById('progress-fill').style.width='100%';
      playFinalWin();
      confetti(60); setTimeout(function(){ confetti(40); },600);
      document.getElementById('win-overlay').classList.add('show');
    } else if (lastInTier) {
      playTierWin();
      confetti(42);
      var nextTier = ROUNDS[nextIdx].tier;
      var tierNames = ['Easy','Medium','Hard'];
      document.getElementById('t-emoji').textContent = ['🌸','⭐','👑'][r.tier]||'🎉';
      document.getElementById('t-title').textContent = tierNames[r.tier]+' complete! ✨';
      document.getElementById('t-sub').textContent   = 'Next: '+TIER_LABELS[nextTier]+' round!';
      document.getElementById('t-btn').onclick = function() {
        document.getElementById('tier-overlay').classList.remove('show');
        roundIdx = nextIdx;
        showRound(roundIdx);
      };
      document.getElementById('tier-overlay').classList.add('show');
    } else {
      roundIdx = nextIdx;
      showRound(roundIdx);
    }
  }

  function startGame() {
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('tier-overlay').classList.remove('show');
    ROUNDS = buildRounds();
    roundIdx = 0;
    showRound(0);
  }

  function burstAt(el) {
    var rect = el.getBoundingClientRect();
    var cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
    var cols   = ['#e040fb','#ffd700','#fff','#f48fb1','#ab47bc','#80deea','#a5d6a7'];
    var emojis = ['✨','💫','🌟','🚂','💎','⭐'];
    for (var i=0;i<18;i++) {
      var a   = Math.random()*Math.PI*2;
      var d   = 30+Math.random()*75;
      var el2 = document.createElement('div');
      if (i<6) {
        el2.className   = 'sparkle-em';
        el2.textContent = emojis[i%emojis.length];
        el2.style.left  = (cx+Math.cos(a)*d)+'px';
        el2.style.top   = (cy+Math.sin(a)*d)+'px';
        el2.style.animationDelay = (Math.random()*.2)+'s';
      } else {
        el2.className = 'sparkle';
        var sz = 7+Math.random()*10;
        el2.style.cssText='left:'+(cx+Math.cos(a)*d-sz/2)+'px;top:'+(cy+Math.sin(a)*d-sz/2)+'px;width:'+sz+'px;height:'+sz+'px;background:'+cols[i%cols.length];
      }
      document.body.appendChild(el2);
      setTimeout(function(e){ return function(){ e.remove(); }; }(el2), 950);
    }
  }

  function confetti(n) {
    var cols=['#e040fb','#ffd700','#fff','#f48fb1','#ce93d8','#b2ebf2','#a5d6a7','#ff8a65'];
    for (var i=0;i<n;i++){
      var el=document.createElement('div'); el.className='confetti';
      var sz=6+Math.random()*10;
      el.style.cssText='left:'+Math.random()*100+'vw;width:'+sz+'px;height:'+sz+'px;background:'+cols[i%cols.length]+';animation-duration:'+(1.4+Math.random()*2)+'s;animation-delay:'+(Math.random()*.5)+'s';
      document.body.appendChild(el);
      setTimeout(function(e){ return function(){ e.remove(); }; }(el), 3500);
    }
  }

  makeBgGems();
  startGame();
</script>
</body>
</html>
