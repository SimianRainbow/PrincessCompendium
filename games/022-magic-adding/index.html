<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magic Adding ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #4e0d3a 0%, #c2185b 45%, #f8bbd0 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Fredoka One', Georgia, serif; overflow:hidden; user-select:none;
      padding:8px;
    }
    #tier-badge {
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      font-size:clamp(14px,3.5vw,18px); background:rgba(255,255,255,.2);
      border-radius:20px; padding:4px 16px; color:#fff;
      border:1px solid rgba(255,255,255,.4); z-index:10; white-space:nowrap;
    }
    #round-counter {
      position:fixed; top:14px; right:16px;
      font-size:clamp(14px,3.5vw,18px); color:rgba(255,255,255,.9);
      z-index:10; white-space:nowrap; background:rgba(255,255,255,.15);
      border-radius:20px; padding:4px 12px; border:1px solid rgba(255,255,255,.3);
    }
    #title {
      font-size:clamp(20px,5.5vw,32px); color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.4);
      margin-top:58px; margin-bottom:16px; text-align:center;
    }

    #problem-area {
      display:flex; align-items:center; justify-content:center;
      gap:clamp(6px,2vw,14px); margin-bottom:28px; flex-wrap:nowrap;
    }
    .operand-box {
      background:rgba(255,255,255,.18); border-radius:20px;
      border:2px solid rgba(255,255,255,.35);
      padding:10px 8px;
      min-width:clamp(76px,20vw,118px); min-height:clamp(76px,20vw,118px);
      display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
      gap:3px; box-shadow:0 4px 16px rgba(0,0,0,.2);
    }
    .operand-box span { font-size:clamp(22px,6vw,34px); line-height:1.1; }
    .operator {
      font-size:clamp(26px,6.5vw,40px); color:#ffd700;
      text-shadow:0 0 12px rgba(255,215,0,.6); font-weight:bold;
      flex-shrink:0;
    }
    .question-mark {
      font-size:clamp(34px,8.5vw,52px); color:#fff;
      text-shadow:0 0 16px rgba(255,255,255,.5); font-weight:bold;
      flex-shrink:0;
    }

    #answers {
      display:flex; gap:clamp(10px,3vw,18px); flex-wrap:wrap; justify-content:center;
    }
    .ans-btn {
      width:clamp(92px,24vw,128px); height:clamp(92px,24vw,128px);
      border-radius:22px; border:none; cursor:pointer;
      background:rgba(255,255,255,.18);
      box-shadow:0 4px 16px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.25);
      display:flex; align-items:center; justify-content:center;
      transition:transform .1s; font-family:'Fredoka One', Georgia, serif;
    }
    .ans-btn:active { transform:scale(.9); }
    .ans-btn .ans-num {
      font-size:clamp(36px,10vw,56px); color:#fff;
      font-weight:bold; text-shadow:0 2px 8px rgba(0,0,0,.4); line-height:1;
    }
    .ans-btn.correct-flash { animation:correctPulse .5s ease-out; background:rgba(100,255,130,.35); }
    .ans-btn.wrong-flash { animation:wrongShake .4s ease-out; }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.2);box-shadow:0 0 40px rgba(255,255,255,.7)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 60%{transform:translateX(12px)} }

    #tier-toast {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
      background:rgba(255,215,0,.96); border-radius:24px; padding:18px 32px;
      font-size:clamp(20px,5.5vw,34px); color:#5d2e00;
      text-align:center; z-index:200; pointer-events:none;
      box-shadow:0 8px 32px rgba(0,0,0,.3);
      transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    #tier-toast.show { transform:translate(-50%,-50%) scale(1); }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-text { font-size:clamp(28px,7.5vw,54px); color:#fff; text-shadow:0 0 20px #ffd700; text-align:center; padding:0 20px; }
    #celebrate-sub { font-size:clamp(20px,5vw,34px); color:#ffe082; text-align:center; }
    #next-btn { padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(18px,5vw,26px); border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800); color:#5d2e00; font-weight:bold; cursor:pointer; font-family:'Fredoka One',inherit; box-shadow:0 4px 16px rgba(255,180,0,.5); }

    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
    .sparkle { position:fixed; pointer-events:none; z-index:101; font-size:clamp(18px,4.5vw,28px); animation:sparklePop .75s ease-out forwards; }
    @keyframes sparklePop { 0%{opacity:1;transform:scale(0) rotate(0)} 60%{opacity:1;transform:scale(1.3) rotate(20deg)} 100%{opacity:0;transform:scale(1.8) rotate(40deg)} }
  </style>
</head>
<body>
  <div id="tier-badge">⭐ Easy</div>
  <div id="round-counter">1 / 9</div>
  <div id="tier-toast"></div>
  <div id="title">Magic Adding ✨</div>

  <div id="problem-area">
    <div class="operand-box" id="op1"></div>
    <div class="operator">+</div>
    <div class="operand-box" id="op2"></div>
    <div class="operator">=</div>
    <div class="question-mark">?</div>
  </div>

  <div id="answers"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text"></div>
    <div id="celebrate-sub"></div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const ICONS = ['👑','💎','⭐','💖','🌸','🦋','🌺','✨'];

  const EASY_POOL  = [[1,1],[1,2],[2,1],[2,2],[1,3],[3,1]];
  const MED_POOL   = [[2,2],[2,3],[3,2],[1,4],[4,1],[3,3],[2,4],[4,2],[1,5],[5,1]];
  const HARD_POOL  = [[3,3],[2,4],[4,2],[3,4],[4,3],[2,5],[5,2],[4,4],[3,5],[5,3]];

  const TIER_META = [
    { label:'⭐ Easy',    pool:EASY_POOL  },
    { label:'⭐⭐ Good',   pool:MED_POOL   },
    { label:'⭐⭐⭐ Wow!', pool:HARD_POOL  },
  ];

  let tierProblems, round=0;
  const TOTAL=9;

  function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }

  function initGame(){
    tierProblems=TIER_META.map(t=>shuffle([...t.pool]).slice(0,3));
  }

  function getTierIndex(r){ return r<=3?0:r<=6?1:2; }
  function getProblemAndTier(r){
    const ti=getTierIndex(r);
    const pi=ti===0?r-1:ti===1?r-4:r-7;
    return {tier:TIER_META[ti], prob:tierProblems[ti][pi]};
  }

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCorrect(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18),i*90)); }
  function playWrong(){ tone(200,'sawtooth',.2,.09); }
  function playCelebrate(){ [523,587,659,698,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*70)); }

  function sparkleBurst(x,y){
    const emojis=['✨','💫','⭐','🌟','💖','🌸','👑','🎉'];
    for(let i=0;i<14;i++){
      const el=document.createElement('div'); el.className='sparkle';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      const angle=Math.random()*360, dist=50+Math.random()*110;
      el.style.left=(x+Math.cos(angle*Math.PI/180)*dist)+'px';
      el.style.top=(y+Math.sin(angle*Math.PI/180)*dist)+'px';
      el.style.animationDelay=(Math.random()*.3)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),1050);
    }
  }

  function showTierToast(msg){
    const t=document.getElementById('tier-toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1900);
  }

  let currentAnswer=0, currentA=0, currentB=0;

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    if(round>=TOTAL){ endGame(); return; }
    round++;

    if(round===4) showTierToast('Level Up! ⭐⭐ Good!');
    if(round===7) showTierToast('Amazing! ⭐⭐⭐ Wow!');

    document.getElementById('round-counter').textContent=`${round} / ${TOTAL}`;

    const {tier,prob}=getProblemAndTier(round);
    document.getElementById('tier-badge').textContent=tier.label;

    const icon=ICONS[(round-1)%ICONS.length];
    const [a,b]=prob;
    currentA=a; currentB=b; currentAnswer=a+b;

    const op1=document.getElementById('op1');
    const op2=document.getElementById('op2');
    op1.innerHTML=Array.from({length:a},()=>`<span>${icon}</span>`).join('');
    op2.innerHTML=Array.from({length:b},()=>`<span>${icon}</span>`).join('');

    const sum=currentAnswer;
    const candidates=[];
    for(let d=-3;d<=3;d++){
      const v=sum+d;
      if(v>=1&&v<=12&&v!==sum) candidates.push(v);
    }
    const dist=shuffle(candidates).slice(0,2);
    const choices=shuffle([sum,...dist]);

    const answers=document.getElementById('answers');
    answers.innerHTML='';
    choices.forEach(n=>{
      const btn=document.createElement('button');
      btn.className='ans-btn';
      btn.innerHTML=`<span class="ans-num">${n}</span>`;
      btn.addEventListener('pointerdown',()=>handleTap(btn,n));
      answers.appendChild(btn);
    });
  }

  function handleTap(btn,n){
    if(n===currentAnswer){
      btn.classList.add('correct-flash'); playCorrect();
      const r=btn.getBoundingClientRect();
      sparkleBurst(r.left+r.width/2, r.top+r.height/2);
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        const eq=`${currentA} + ${currentB} = ${currentAnswer}`;
        const msgs=[`${eq}! 🎉`,`Yes! ${eq}! ✨`,`${eq}! Amazing! 💖`,`${eq}! 👑`];
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-sub').textContent='';
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      },500);
    } else {
      btn.classList.add('wrong-flash'); playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'),400);
    }
  }

  function endGame(){
    document.getElementById('celebrate-text').textContent='Adding Star! 👑✨';
    document.getElementById('celebrate-sub').textContent='Amazing adding! 🌟';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{
      round=0; initGame();
      document.getElementById('celebrate-overlay').classList.remove('show');
      nextRound();
    };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<35;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*.4)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),2700);
    }
  }

  initGame();
  nextRound();
</script>
</body>
</html>
