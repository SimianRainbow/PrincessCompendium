<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Feeling Friends 🌈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #4A148C 0%, #7B1FA2 50%, #CE93D8 100%);
      min-height:100vh; width:100vw; overflow:hidden;
      font-family:'Fredoka One', Georgia, serif; user-select:none; position:relative;
    }

    #header {
      position:fixed; top:0; left:0; right:0; z-index:10;
      padding:clamp(10px,2.5vw,16px) clamp(14px,4vw,24px);
      display:flex; justify-content:space-between; align-items:center;
    }
    #tier-badge {
      font-size:clamp(14px,3.5vw,20px); padding:6px 18px;
      border-radius:20px; font-weight:bold;
    }
    .tier-easy   { background:linear-gradient(135deg,#a5d6a7,#66bb6a); color:#1b5e20; }
    .tier-medium { background:linear-gradient(135deg,#ffe082,#ffd54f); color:#5a3000; }
    .tier-hard   { background:linear-gradient(135deg,#ce93d8,#ab47bc); color:#fff; }
    #round-counter {
      font-size:clamp(14px,3.5vw,20px); color:rgba(255,255,255,.9);
      text-shadow:0 1px 4px rgba(0,0,0,.3);
    }

    #progress-wrap {
      position:fixed; top:clamp(52px,12vw,76px); left:0; right:0;
      padding:0 clamp(14px,4vw,24px); z-index:10;
    }
    #progress-track { background:rgba(0,0,0,.2); border-radius:20px; height:clamp(10px,2.5vw,14px); overflow:hidden; }
    #progress-fill  { height:100%; border-radius:20px; background:linear-gradient(90deg,#ffd700,#ff9800); transition:width .35s ease; width:0%; box-shadow:0 0 8px rgba(255,215,0,.5); }

    #prompt-wrap {
      position:fixed; top:clamp(74px,16vw,100px); left:0; right:0; z-index:10;
      text-align:center; padding:clamp(8px,2vw,14px) 16px;
    }
    #prompt { font-size:clamp(20px,5vw,32px); color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.3); }

    #scene-wrap {
      position:fixed; left:0; right:0; top:clamp(118px,27vw,162px);
      display:flex; justify-content:center; z-index:5;
    }
    #scene-card {
      background:rgba(255,255,255,.18); border-radius:28px;
      border:3px solid rgba(255,255,255,.3);
      padding:clamp(10px,3vw,18px) clamp(16px,5vw,28px);
      display:flex; flex-direction:column; align-items:center; gap:5px;
      box-shadow:0 4px 24px rgba(0,0,0,.18);
      min-width:clamp(150px,40vw,220px);
    }
    #scene-emoji { font-size:clamp(56px,15vw,88px); line-height:1; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
    #scene-context { font-size:clamp(14px,3.5vw,20px); color:#fff; font-weight:bold; text-shadow:0 1px 4px rgba(0,0,0,.35); text-align:center; }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

    #grid-wrap {
      position:fixed; left:0; right:0; bottom:clamp(10px,3vw,24px);
      display:flex; justify-content:center; z-index:5;
      padding:0 8px;
    }
    #emotion-grid {
      display:grid;
      gap:clamp(8px,2.2vw,14px); padding:4px;
    }
    .emotion-btn {
      border-radius:22px; border:none; cursor:pointer;
      background:rgba(255,255,255,.22);
      box-shadow:0 4px 16px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.25);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      transition:transform .1s;
      width:clamp(110px,26vw,145px); height:clamp(110px,26vw,145px);
    }
    .emotion-btn:active { transform:scale(.9); }
    .btn-face  { font-size:clamp(40px,10vw,58px); line-height:1; }
    .btn-label { font-size:clamp(12px,3vw,16px); color:#fff; font-weight:bold; text-shadow:0 1px 3px rgba(0,0,0,.5); }
    .emotion-btn.correct-flash { animation:correctPulse .5s ease-out; background:rgba(255,255,190,.7); }
    .emotion-btn.wrong-flash   { animation:wrongShake .4s ease-out; background:rgba(255,100,100,.35); }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.18);box-shadow:0 0 40px rgba(255,255,255,.75)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }

    .sparkle-dot { position:fixed; pointer-events:none; z-index:50; border-radius:50%; animation:sparkleOut .7s ease-out forwards; }
    @keyframes sparkleOut { 0%{transform:scale(0);opacity:1} 100%{transform:scale(1.5);opacity:0} }
    .sparkle-emoji { position:fixed; font-size:clamp(18px,4.5vw,26px); pointer-events:none; z-index:51; animation:sparkleFloat .9s ease-out forwards; }
    @keyframes sparkleFloat { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-90px) scale(0);opacity:0} }

    .overlay {
      position:fixed; inset:0; background:rgba(250,240,255,.93);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .4s;
    }
    .overlay.show { opacity:1; pointer-events:all; }
    .ov-emoji { font-size:clamp(64px,18vw,110px); }
    .ov-title { font-size:clamp(24px,6.5vw,44px); color:#6a1b9a; text-align:center; padding:0 20px; }
    .ov-emotion { font-size:clamp(28px,7.5vw,52px); color:#ab47bc; font-weight:bold; text-align:center; }
    .ov-sub   { font-size:clamp(16px,4.5vw,24px); color:#7b1fa2; text-align:center; padding:0 20px; opacity:.85; }
    .btn-next {
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px);
      border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit;
      min-height:64px; min-width:180px;
    }
    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>

  <div id="header">
    <div id="tier-badge" class="tier-easy">🌱 Easy</div>
    <div id="round-counter">1 / 9</div>
  </div>
  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
  <div id="prompt-wrap"><div id="prompt">How does Princess feel? 👸</div></div>

  <div id="scene-wrap">
    <div id="scene-card">
      <div id="scene-emoji"></div>
      <div id="scene-context"></div>
    </div>
  </div>

  <div id="grid-wrap"><div id="emotion-grid"></div></div>

  <div class="overlay" id="round-overlay">
    <div class="ov-emoji" id="ov-emoji">🌸</div>
    <div class="ov-title" id="ov-title">She feels…</div>
    <div class="ov-emotion" id="ov-emotion"></div>
    <div class="ov-sub"    id="ov-sub"></div>
    <button class="btn-next" id="round-btn">Next ➡️</button>
  </div>

  <div class="overlay" id="end-overlay">
    <div class="ov-emoji">👑</div>
    <div class="ov-title">Feelings Champion! 🎉</div>
    <div class="ov-sub">You know all the feelings! ✨</div>
    <button class="btn-next" onclick="startGame()">Play Again 🌸</button>
  </div>

<script>
  const EMOTIONS = [
    { emoji:'😊', name:'Happy',     audio:c=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(c,f,'sine',.2,.12),i*80));} },
    { emoji:'😢', name:'Sad',       audio:c=>{[440,392,349,294].forEach((f,i)=>setTimeout(()=>tone(c,f,'sine',.28,.1),i*130));} },
    { emoji:'😠', name:'Angry',     audio:c=>{tone(c,150,'sawtooth',.32,.14); setTimeout(()=>tone(c,120,'sawtooth',.22,.11),360);} },
    { emoji:'😲', name:'Surprised', audio:c=>{sweep(c,400,920,.22,.12); setTimeout(()=>tone(c,880,'sine',.15,.08),260);} },
    { emoji:'😨', name:'Scared',    audio:c=>{[300,275,255].forEach((f,i)=>setTimeout(()=>tone(c,f,'triangle',.22,.08),i*110));} },
    { emoji:'😄', name:'Excited',   audio:c=>{[523,659,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(c,f,'sine',.15,.12),i*55));} },
    { emoji:'😴', name:'Sleepy',    audio:c=>{sweep(c,420,210,.65,.1); setTimeout(()=>sweep(c,390,180,.5,.08),750);} },
    { emoji:'🤣', name:'Silly',     audio:c=>{[620,720,520,820,470].forEach((f,i)=>setTimeout(()=>tone(c,f,'sine',.12,.1),i*65));} },
  ];

  const SCENARIOS = [
    { scene:'🎁', context:'Got a gift!',            emotion:'Happy'     },
    { scene:'🌈', context:'A rainbow!',              emotion:'Happy'     },
    { scene:'🍰', context:'Birthday cake!',          emotion:'Happy'     },
    { scene:'🦋', context:'A butterfly!',            emotion:'Happy'     },
    { scene:'💐', context:'Pretty flowers!',         emotion:'Happy'     },
    { scene:'🎠', context:'Riding the carousel!',    emotion:'Happy'     },
    { scene:'💔', context:'Lost her crown',          emotion:'Sad'       },
    { scene:'🌧️',context:'It is raining',           emotion:'Sad'       },
    { scene:'😿', context:'Kitty is hurt',           emotion:'Sad'       },
    { scene:'👋', context:'Said goodbye…',           emotion:'Sad'       },
    { scene:'🚫', context:'That is not fair!',       emotion:'Angry'     },
    { scene:'💢', context:'She is cross!',           emotion:'Angry'     },
    { scene:'😤', context:'Stomping her foot!',      emotion:'Angry'     },
    { scene:'🎉', context:'Surprise party!',         emotion:'Surprised' },
    { scene:'🎊', context:'A gift appeared!',        emotion:'Surprised' },
    { scene:'🐣', context:'A baby chick hatched!',   emotion:'Surprised' },
    { scene:'👻', context:'A spooky ghost!',         emotion:'Scared'    },
    { scene:'⚡', context:'Loud thunder!',           emotion:'Scared'    },
    { scene:'🦁', context:'A big lion!',             emotion:'Scared'    },
    { scene:'🎡', context:'Going to the fair!',      emotion:'Excited'   },
    { scene:'🦄', context:'A unicorn arrived!',      emotion:'Excited'   },
    { scene:'🎪', context:'The circus is here!',     emotion:'Excited'   },
    { scene:'🌙', context:'Time for sleep',          emotion:'Sleepy'    },
    { scene:'💤', context:'So very tired…',          emotion:'Sleepy'    },
    { scene:'🛏️',context:'Cozy in bed!',            emotion:'Sleepy'    },
    { scene:'🤪', context:'Being goofy!',            emotion:'Silly'     },
    { scene:'🃏', context:'Playing tricks!',         emotion:'Silly'     },
    { scene:'🎭', context:'Making funny faces!',     emotion:'Silly'     },
  ];

  const EASY_POOL = ['Happy','Sad'];
  const MED_POOL  = ['Happy','Sad','Angry','Surprised'];

  const TIERS = [
    { label:'🌱 Easy',   cls:'tier-easy',   rounds:[1,3], opts:2, pool:EASY_POOL },
    { label:'🌸 Medium', cls:'tier-medium', rounds:[4,6], opts:3, pool:MED_POOL  },
    { label:'⭐ Hard',   cls:'tier-hard',   rounds:[7,9], opts:4, pool:null      },
  ];
  const TOTAL = 9;

  let audioCtx = null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(ctx,f,type,dur,vol=.12){
    try{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type=type; o.frequency.value=f;
      g.gain.setValueAtTime(vol,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
      o.start(); o.stop(ctx.currentTime+dur);
    }catch(e){}
  }
  function sweep(ctx,f1,f2,dur,vol=.1){
    try{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(f1,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(f2,ctx.currentTime+dur);
      g.gain.setValueAtTime(vol,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);
      o.start(); o.stop(ctx.currentTime+dur);
    }catch(e){}
  }

  function playCorrect(){ const c=getAudio(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(c,f,'sine',.18,.18),i*65)); }
  function playWrong(){   const c=getAudio(); tone(c,200,'sawtooth',.2,.09); }
  function playRoundWin(){ const c=getAudio(); [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(c,f,'triangle',.3,.2),i*85)); }
  function playFinalWin(){ const c=getAudio(); [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(c,f,'sine',.32,.22),i*95)); }

  let targetEmotion, round=0, usedScenarios=[], locked=false;

  function getTier(r){ return TIERS.find(t=>r>=t.rounds[0]&&r<=t.rounds[1]) || TIERS[2]; }
  function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }

  function startGame(){
    document.getElementById('end-overlay').classList.remove('show');
    document.getElementById('round-overlay').classList.remove('show');
    round=0; usedScenarios=[]; locked=false;
    nextRound();
  }

  function nextRound(){
    document.getElementById('round-overlay').classList.remove('show');
    if(round >= TOTAL){ endGame(); return; }
    round++;
    locked = false;
    updateHUD();

    const tier = getTier(round);
    const validScenes = tier.pool ? SCENARIOS.filter(s=>tier.pool.includes(s.emotion)) : SCENARIOS;
    const fresh = validScenes.filter(s=>!usedScenarios.includes(s));
    const pool = fresh.length ? fresh : validScenes;
    const scenario = pool[Math.floor(Math.random()*pool.length)];
    usedScenarios.push(scenario);
    if(usedScenarios.length > Math.floor(SCENARIOS.length/2)) usedScenarios = usedScenarios.slice(-6);

    targetEmotion = EMOTIONS.find(e=>e.name===scenario.emotion);

    const emotionPool = tier.pool ? EMOTIONS.filter(e=>tier.pool.includes(e.name)) : EMOTIONS;
    const distractors = shuffle(emotionPool.filter(e=>e.name!==targetEmotion.name)).slice(0,tier.opts-1);
    const opts = shuffle([targetEmotion,...distractors]);

    const se = document.getElementById('scene-emoji');
    se.textContent = scenario.scene;
    se.style.animation='none'; void se.offsetWidth; se.style.animation='';
    document.getElementById('scene-context').textContent = scenario.context;

    const prompts = ['How does Princess feel? 👸','What feeling is this? 💭','How does she feel? 🌸','Tap the right feeling! ✨'];
    document.getElementById('prompt').textContent = prompts[round % prompts.length];

    setTimeout(()=>{ if(targetEmotion.audio) targetEmotion.audio(getAudio()); }, 350);

    const grid = document.getElementById('emotion-grid');
    grid.style.gridTemplateColumns = tier.opts===3 ? 'repeat(3,1fr)' : 'repeat(2,1fr)';
    grid.innerHTML = '';
    opts.forEach(em=>{
      const btn = document.createElement('button');
      btn.className = 'emotion-btn';
      btn.innerHTML = `<span class="btn-face">${em.emoji}</span><span class="btn-label">${em.name}</span>`;
      btn.addEventListener('pointerdown', ()=>handleTap(btn,em));
      grid.appendChild(btn);
    });
  }

  function updateHUD(){
    const tier = getTier(round);
    const badge = document.getElementById('tier-badge');
    badge.textContent = tier.label;
    badge.className = tier.cls;
    document.getElementById('round-counter').textContent = round + ' / ' + TOTAL;
    document.getElementById('progress-fill').style.width = ((round-1)/TOTAL*100) + '%';
  }

  function handleTap(btn, em){
    if(locked) return;
    if(em.name === targetEmotion.name){
      locked = true;
      btn.classList.add('correct-flash');
      playCorrect();
      burst(btn);
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        showRoundOverlay();
      }, 550);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'), 400);
    }
  }

  function showRoundOverlay(){
    const titles = ['She feels…','Princess feels…','Yes! She feels…','Correct! 🎉'];
    document.getElementById('ov-emoji').textContent = targetEmotion.emoji;
    document.getElementById('ov-title').textContent = titles[Math.floor(Math.random()*titles.length)];
    document.getElementById('ov-emotion').textContent = targetEmotion.name + '!';
    document.getElementById('ov-sub').textContent = '';

    if(round < TOTAL){
      document.getElementById('round-btn').textContent = 'Next ➡️';
      document.getElementById('round-btn').onclick = ()=>{ playRoundWin(); confettiBurst(); nextRound(); };
    } else {
      document.getElementById('round-btn').textContent = 'Finish 🌸';
      document.getElementById('round-btn').onclick = ()=>endGame();
    }
    document.getElementById('round-overlay').classList.add('show');
    confettiBurst();
  }

  function burst(btn){
    const r = btn.getBoundingClientRect();
    const cx = r.left+r.width/2, cy = r.top+r.height/2;
    const cols = ['#e040fb','#f48fb1','#ffd700','#fff','#ab47bc','#ff8a65','#80deea'];
    for(let i=0;i<16;i++){
      const el = document.createElement('div'); el.className='sparkle-dot';
      const a = Math.random()*Math.PI*2;
      const dist = 28+Math.random()*70;
      const sz = 6+Math.random()*10;
      el.style.cssText = `left:${cx+Math.cos(a)*dist-sz/2}px;top:${cy+Math.sin(a)*dist-sz/2}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]}`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 780);
    }
    const icons = ['✨','💫','⭐','💖','🌟'];
    for(let i=0;i<7;i++){
      const el = document.createElement('div'); el.className='sparkle-emoji';
      el.textContent = icons[i%icons.length];
      el.style.left = (cx+(Math.random()-.5)*100)+'px';
      el.style.top  = (cy+(Math.random()-.5)*80)+'px';
      el.style.animationDelay = (Math.random()*.2)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 1100);
    }
  }

  function endGame(){
    document.getElementById('round-overlay').classList.remove('show');
    document.getElementById('end-overlay').classList.add('show');
    playFinalWin();
    confettiBurst();
    setTimeout(confettiBurst, 600);
  }

  function confettiBurst(){
    const cols = ['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6','#ffe082'];
    for(let i=0;i<42;i++){
      const el = document.createElement('div'); el.className='confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.background = cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration = (1.2+Math.random()*1.8)+'s';
      el.style.animationDelay = (Math.random()*.5)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 3200);
    }
  }

  startGame();
</script>
</body>
</html>
