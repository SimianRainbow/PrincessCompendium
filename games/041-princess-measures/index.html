<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Princess Measures 📏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      min-height:100vh; background:linear-gradient(155deg,#4a148c 0%,#7b1fa2 50%,#e91e63 100%);
      font-family:'Fredoka One',Georgia,serif;
      display:flex; flex-direction:column; align-items:center;
      overflow:hidden; user-select:none; padding-bottom:16px;
    }

    /* ── BG sparkles ── */
    .bg-gem { position:fixed; pointer-events:none; animation:floatUp linear infinite; opacity:.1; font-size:clamp(14px,3.5vw,22px); }
    @keyframes floatUp { 0%{transform:translateY(110vh) rotate(0)} 100%{transform:translateY(-15vh) rotate(360deg)} }

    /* ── Header ── */
    #header {
      width:100%; display:flex; justify-content:space-between; align-items:center;
      padding:clamp(10px,3vw,16px) clamp(14px,4vw,22px) 0;
      position:relative; z-index:10; flex-shrink:0;
    }
    #tier-badge { font-size:clamp(13px,3.5vw,18px); padding:5px 15px; border-radius:20px; font-weight:bold; }
    .tier-easy   { background:linear-gradient(135deg,#a5d6a7,#66bb6a); color:#1b5e20; }
    .tier-medium { background:linear-gradient(135deg,#ffe082,#ffd54f); color:#5a3000; }
    .tier-hard   { background:linear-gradient(135deg,#ce93d8,#ab47bc); color:#fff; }
    #round-label { font-size:clamp(13px,3.2vw,17px); color:rgba(255,255,255,.9); text-shadow:0 1px 4px rgba(0,0,0,.3); }

    /* ── Progress bar ── */
    #progress-wrap { width:100%; padding:6px clamp(14px,4vw,22px) 0; position:relative; z-index:10; flex-shrink:0; }
    #progress-track { background:rgba(255,255,255,.2); border-radius:20px; height:clamp(8px,2vw,12px); overflow:hidden; }
    #progress-fill  { height:100%; border-radius:20px; background:linear-gradient(90deg,#ffd700,#e040fb); transition:width .35s ease; width:0%; box-shadow:0 0 8px rgba(255,215,0,.5); }

    /* ── Prompt ── */
    #prompt-wrap {
      width:100%; max-width:460px;
      padding:clamp(8px,2.5vw,14px) 16px 0;
      text-align:center; flex-shrink:0;
    }
    #prompt-text {
      font-size:clamp(18px,5vw,28px); color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.4); line-height:1.2;
    }
    #concept-badge {
      display:inline-block; margin-top:6px;
      font-size:clamp(12px,3vw,16px);
      background:rgba(255,255,255,.2); border-radius:20px;
      padding:3px 12px; color:rgba(255,255,255,.9);
    }

    /* ── Item cards area ── */
    #cards-area {
      flex:1; display:flex; align-items:flex-end; justify-content:center;
      gap:clamp(16px,5vw,36px);
      padding:clamp(10px,3vw,18px) clamp(12px,4vw,24px);
      width:100%; max-width:500px; min-height:0;
    }

    .item-card {
      flex:1; max-width:clamp(140px,40vw,195px);
      border-radius:26px; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
      padding:clamp(12px,3vw,18px) clamp(8px,2vw,14px) clamp(10px,3vw,16px);
      background:rgba(255,255,255,.18);
      border:3px solid rgba(255,255,255,.38);
      box-shadow:0 6px 24px rgba(0,0,0,.28);
      transition:transform .1s; touch-action:manipulation; position:relative;
    }
    .item-card:active { transform:scale(.93); }
    .item-card.wobble { animation:wobble .4s ease-out; }
    @keyframes wobble { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-13px)} 60%{transform:translateX(13px)} 80%{transform:translateX(-7px)} }
    .item-card.correct-pop { animation:correctPop .45s ease-out; }
    @keyframes correctPop { 0%{transform:scale(1)} 45%{transform:scale(1.12);box-shadow:0 0 40px rgba(255,215,0,.7)} 100%{transform:scale(1)} }
    .item-card.locked { pointer-events:none; opacity:.5; }

    .card-emoji { line-height:1; display:block; transition:font-size .3s ease; pointer-events:none; }
    .card-emoji.size-big   { font-size:clamp(72px,20vw,110px); }
    .card-emoji.size-mid   { font-size:clamp(58px,16vw,86px); }
    .card-emoji.size-small { font-size:clamp(40px,11vw,60px); }

    .card-drops { font-size:clamp(16px,4.5vw,24px); margin-top:4px; min-height:1.5em; line-height:1; pointer-events:none; }
    .card-label { font-size:clamp(13px,3.5vw,18px); color:#fff; margin-top:6px; text-shadow:0 1px 4px rgba(0,0,0,.4); pointer-events:none; }

    .item-card.card-tall   { min-height:clamp(190px,50vw,260px); }
    .item-card.card-medium { min-height:clamp(155px,40vw,210px); }
    .item-card.card-short  { min-height:clamp(115px,30vw,155px); }

    /* ── Sparkles ── */
    .sparkle { position:fixed; pointer-events:none; z-index:50; animation:sFly ease-out forwards; }
    @keyframes sFly { 0%{transform:translate(0,0) scale(1.1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(.05);opacity:0} }
    .sparkle-dot { position:fixed; pointer-events:none; z-index:50; border-radius:50%; animation:sOut .75s ease-out forwards; }
    @keyframes sOut { 0%{transform:scale(0);opacity:1} 100%{transform:scale(1.6);opacity:0} }

    /* ── Celebrate overlay ── */
    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.58);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .35s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-emoji { font-size:clamp(60px,17vw,100px); }
    #celebrate-text {
      font-size:clamp(22px,6vw,40px); color:#fff;
      text-shadow:0 0 24px #ffd700; text-align:center; padding:0 20px; white-space:pre-line;
    }
    #next-btn {
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size:clamp(20px,5vw,28px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer;
      font-family:'Fredoka One',Georgia,serif;
      box-shadow:0 4px 18px rgba(255,180,0,.55); touch-action:manipulation;
    }

    /* ── Tier overlay ── */
    #tier-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.72);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
      z-index:98; opacity:0; pointer-events:none; transition:opacity .4s;
    }
    #tier-overlay.show { opacity:1; pointer-events:all; }
    #tier-ov-icon  { font-size:clamp(60px,16vw,96px); }
    #tier-ov-title { font-size:clamp(24px,6.5vw,44px); color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,.7); text-align:center; padding:0 20px; }
    #tier-ov-sub   { font-size:clamp(15px,4vw,22px); color:rgba(255,255,255,.9); text-align:center; padding:0 24px; }
    #tier-ov-btn {
      padding:clamp(14px,4vw,20px) clamp(36px,9vw,60px); font-size:clamp(18px,4.8vw,26px);
      border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit;
      box-shadow:0 4px 20px rgba(255,180,0,.5); touch-action:manipulation;
    }

    /* ── Win overlay ── */
    #win-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.8);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:100; opacity:0; pointer-events:none; transition:opacity .4s;
    }
    #win-overlay.show { opacity:1; pointer-events:all; }
    .win-icon  { font-size:clamp(72px,18vw,110px); animation:wBob 1.2s ease-in-out infinite; }
    @keyframes wBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    .win-title { font-size:clamp(26px,7vw,46px); color:#ffd700; text-shadow:0 0 24px rgba(255,215,0,.7); text-align:center; padding:0 20px; }
    .win-sub   { font-size:clamp(15px,4vw,22px); color:rgba(255,255,255,.9); text-align:center; padding:0 24px; }
    .win-btn {
      padding:clamp(14px,4vw,20px) clamp(36px,9vw,60px); font-size:clamp(18px,4.8vw,26px);
      border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#e040fb);
      color:#fff; font-weight:bold; cursor:pointer; font-family:inherit;
      box-shadow:0 4px 22px rgba(255,215,0,.5); touch-action:manipulation;
    }

    /* ── Confetti ── */
    .confetti-piece {
      position:fixed; border-radius:50%;
      animation:cFall linear forwards; pointer-events:none; z-index:101;
    }
    @keyframes cFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>

  <div id="header">
    <div id="tier-badge" class="tier-easy">🌱 Easy</div>
    <div id="round-label">1 / 9</div>
  </div>
  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="prompt-wrap">
    <div id="prompt-text">Which is TALLER? ⬆️</div>
    <div id="concept-badge">Tall &amp; Short</div>
  </div>

  <div id="cards-area">
    <div class="item-card" id="card-left"  onclick="handleAnswer(true)">
      <span class="card-emoji size-big" id="emoji-left">🦒</span>
      <span class="card-drops" id="drops-left"></span>
      <span class="card-label" id="label-left">Giraffe</span>
    </div>
    <div class="item-card" id="card-right" onclick="handleAnswer(false)">
      <span class="card-emoji size-small" id="emoji-right">🐕</span>
      <span class="card-drops" id="drops-right"></span>
      <span class="card-label" id="label-right">Dog</span>
    </div>
  </div>

  <!-- Correct answer celebration overlay -->
  <div id="celebrate-overlay">
    <div id="celebrate-emoji">🌟</div>
    <div id="celebrate-text">Amazing!</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

  <!-- Tier transition overlay -->
  <div id="tier-overlay">
    <div id="tier-ov-icon">🌸</div>
    <div id="tier-ov-title">New Challenge!</div>
    <div id="tier-ov-sub">Get ready!</div>
    <button id="tier-ov-btn" onclick="resumeAfterTier()">Let's go! ➡️</button>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay">
    <div class="win-icon">👑</div>
    <div class="win-title">Measurement Master! 📏✨</div>
    <div class="win-sub">You know tall, short, heavy, light, full & empty! 🌟</div>
    <button class="win-btn" onclick="restartGame()">Play Again 🌸</button>
  </div>

<script>
  /* ── Audio ───────────────────────────────────────────── */
  let audioCtx = null;
  function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f, t, d, v=0.14) {
    try {
      const c=getAudio(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=t||'sine'; o.frequency.value=f;
      g.gain.setValueAtTime(v, c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, c.currentTime+d);
      o.start(); o.stop(c.currentTime+d);
    } catch(e){}
  }
  function playCorrect()   { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18,.18),i*65)); }
  function playWrong()     { tone(220,'sawtooth',.18,.1); }
  function playCelebrate() { [523,659,784,880,1047,1175,1319].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22,.17),i*65)); }
  function playTierUp()    { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.28,.18),i*80)); }
  function playFinalWin()  { [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.32,.22),i*90)); }

  /* ── Pool (18 rounds — 6 per tier) ──────────────────── */
  const POOL = [
    // Tier 0 — Tall & Short
    { tier:0, question:'Which is TALLER? ⬆️', concept:'Tall & Short', leftIsAnswer:true,
      left:{emoji:'🦒',sizeClass:'size-big',cardClass:'card-tall',label:'Giraffe',drops:''},
      right:{emoji:'🐕',sizeClass:'size-small',cardClass:'card-short',label:'Dog',drops:''} },
    { tier:0, question:'Which is SHORTER? ⬇️', concept:'Tall & Short', leftIsAnswer:false,
      left:{emoji:'🌴',sizeClass:'size-big',cardClass:'card-tall',label:'Palm Tree',drops:''},
      right:{emoji:'🌷',sizeClass:'size-small',cardClass:'card-short',label:'Flower',drops:''} },
    { tier:0, question:'Which is TALLER? ⬆️', concept:'Tall & Short', leftIsAnswer:true,
      left:{emoji:'🏰',sizeClass:'size-big',cardClass:'card-tall',label:'Castle',drops:''},
      right:{emoji:'🏠',sizeClass:'size-small',cardClass:'card-short',label:'House',drops:''} },
    { tier:0, question:'Which is TALLER? ⬆️', concept:'Tall & Short', leftIsAnswer:true,
      left:{emoji:'⛰️',sizeClass:'size-big',cardClass:'card-tall',label:'Mountain',drops:''},
      right:{emoji:'🍄',sizeClass:'size-small',cardClass:'card-short',label:'Mushroom',drops:''} },
    { tier:0, question:'Which is SHORTER? ⬇️', concept:'Tall & Short', leftIsAnswer:false,
      left:{emoji:'🌲',sizeClass:'size-big',cardClass:'card-tall',label:'Big Tree',drops:''},
      right:{emoji:'🌸',sizeClass:'size-small',cardClass:'card-short',label:'Blossom',drops:''} },
    { tier:0, question:'Which is TALLER? ⬆️', concept:'Tall & Short', leftIsAnswer:true,
      left:{emoji:'🚀',sizeClass:'size-big',cardClass:'card-tall',label:'Rocket',drops:''},
      right:{emoji:'🐜',sizeClass:'size-small',cardClass:'card-short',label:'Ant',drops:''} },

    // Tier 1 — Heavy & Light
    { tier:1, question:'Which is HEAVIER? 🏋️', concept:'Heavy & Light', leftIsAnswer:true,
      left:{emoji:'🐘',sizeClass:'size-big',cardClass:'card-tall',label:'Elephant',drops:''},
      right:{emoji:'🦋',sizeClass:'size-small',cardClass:'card-short',label:'Butterfly',drops:''} },
    { tier:1, question:'Which is LIGHTER? 🪶', concept:'Heavy & Light', leftIsAnswer:false,
      left:{emoji:'🪨',sizeClass:'size-big',cardClass:'card-medium',label:'Big Rock',drops:''},
      right:{emoji:'🪶',sizeClass:'size-small',cardClass:'card-short',label:'Feather',drops:''} },
    { tier:1, question:'Which is HEAVIER? 🐋', concept:'Heavy & Light', leftIsAnswer:true,
      left:{emoji:'🐋',sizeClass:'size-big',cardClass:'card-tall',label:'Whale',drops:''},
      right:{emoji:'🐟',sizeClass:'size-small',cardClass:'card-short',label:'Fish',drops:''} },
    { tier:1, question:'Which is HEAVIER? 🚗', concept:'Heavy & Light', leftIsAnswer:true,
      left:{emoji:'🚗',sizeClass:'size-big',cardClass:'card-medium',label:'Car',drops:''},
      right:{emoji:'🍃',sizeClass:'size-small',cardClass:'card-short',label:'Leaf',drops:''} },
    { tier:1, question:'Which is HEAVIER? 🍉', concept:'Heavy & Light', leftIsAnswer:true,
      left:{emoji:'🍉',sizeClass:'size-big',cardClass:'card-medium',label:'Watermelon',drops:''},
      right:{emoji:'🍓',sizeClass:'size-small',cardClass:'card-short',label:'Strawberry',drops:''} },
    { tier:1, question:'Which is LIGHTER? 🎈', concept:'Heavy & Light', leftIsAnswer:false,
      left:{emoji:'🪨',sizeClass:'size-big',cardClass:'card-medium',label:'Rock',drops:''},
      right:{emoji:'🎈',sizeClass:'size-small',cardClass:'card-short',label:'Balloon',drops:''} },

    // Tier 2 — Full/Empty + Long/Short
    { tier:2, question:'Which bucket is FULL? 💧', concept:'Full & Empty', leftIsAnswer:true,
      left:{emoji:'🪣',sizeClass:'size-mid',cardClass:'card-medium',label:'Full',drops:'💧💧💧'},
      right:{emoji:'🪣',sizeClass:'size-mid',cardClass:'card-short',label:'Empty',drops:''} },
    { tier:2, question:'Which is LONGER? 📏', concept:'Long & Short', leftIsAnswer:true,
      left:{emoji:'🐍',sizeClass:'size-big',cardClass:'card-tall',label:'Long Snake',drops:''},
      right:{emoji:'🐛',sizeClass:'size-small',cardClass:'card-short',label:'Short Worm',drops:''} },
    { tier:2, question:'Which is SHORTER? ✂️', concept:'Long & Short', leftIsAnswer:false,
      left:{emoji:'📏',sizeClass:'size-big',cardClass:'card-tall',label:'Long Ruler',drops:''},
      right:{emoji:'✏️',sizeClass:'size-small',cardClass:'card-short',label:'Short Pencil',drops:''} },
    { tier:2, question:'Which cup is EMPTY? 🫗', concept:'Full & Empty', leftIsAnswer:false,
      left:{emoji:'🥛',sizeClass:'size-mid',cardClass:'card-medium',label:'Full Cup',drops:'💧💧💧'},
      right:{emoji:'🥛',sizeClass:'size-mid',cardClass:'card-short',label:'Empty Cup',drops:''} },
    { tier:2, question:'Which is LONGER? 🚂', concept:'Long & Short', leftIsAnswer:true,
      left:{emoji:'🚂',sizeClass:'size-big',cardClass:'card-tall',label:'Train',drops:''},
      right:{emoji:'🚗',sizeClass:'size-small',cardClass:'card-short',label:'Car',drops:''} },
    { tier:2, question:'Which is LONGER? 🐊', concept:'Long & Short', leftIsAnswer:true,
      left:{emoji:'🐊',sizeClass:'size-big',cardClass:'card-tall',label:'Crocodile',drops:''},
      right:{emoji:'🐸',sizeClass:'size-small',cardClass:'card-short',label:'Frog',drops:''} },
  ];

  const TIER_LABELS = ['🌱 Easy', '🌸 Medium', '⭐ Hard'];
  const TIER_CLS    = ['tier-easy', 'tier-medium', 'tier-hard'];

  const TIER_OVERLAYS = [
    null, // No overlay before tier 0
    { icon:'🌸', title:'Medium Measurements! 🌸', sub:'Now we compare HEAVY & LIGHT! 🏋️' },
    { icon:'⭐', title:'Hard Measurements! ⭐',   sub:'Full & Empty, Long & Short — you can do it! 📏' },
  ];

  const TOTAL = 9;
  let roundIdx = -1, locked = false;
  let shuffledRounds = [];

  /* Build order: pick 3 from each tier's 6-item pool */
  function buildRoundOrder() {
    const t0 = shuffle(POOL.filter(r=>r.tier===0)).slice(0,3);
    const t1 = shuffle(POOL.filter(r=>r.tier===1)).slice(0,3);
    const t2 = shuffle(POOL.filter(r=>r.tier===2)).slice(0,3);
    shuffledRounds = [...t0, ...t1, ...t2];
  }

  function shuffle(a) {
    const b=[...a];
    for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
    return b;
  }

  /* ── HUD ────────────────────────────────────────────── */
  function updateHUD(idx) {
    const r = shuffledRounds[idx];
    const badge = document.getElementById('tier-badge');
    badge.textContent = TIER_LABELS[r.tier];
    badge.className   = TIER_CLS[r.tier];
    document.getElementById('round-label').textContent = (idx+1) + ' / ' + TOTAL;
    document.getElementById('progress-fill').style.width = (idx/TOTAL*100) + '%';
  }

  /* ── Render round ────────────────────────────────────── */
  function renderRound(r) {
    locked = false;

    const flip = Math.random() < 0.5;
    const leftData  = flip ? r.right : r.left;
    const rightData = flip ? r.left  : r.right;
    const leftIsAnswer = flip ? !r.leftIsAnswer : r.leftIsAnswer;

    document.getElementById('card-left').dataset.answer  = leftIsAnswer  ? '1' : '0';
    document.getElementById('card-right').dataset.answer = leftIsAnswer  ? '0' : '1';

    function applyCard(prefix, data) {
      const card  = document.getElementById('card-' + prefix);
      const emoji = document.getElementById('emoji-' + prefix);
      const drops = document.getElementById('drops-' + prefix);
      const label = document.getElementById('label-' + prefix);
      card.className  = 'item-card ' + data.cardClass;
      emoji.className = 'card-emoji ' + data.sizeClass;
      emoji.textContent = data.emoji;
      drops.textContent = data.drops;
      label.textContent = data.label;
      card.classList.remove('wobble','correct-pop','locked');
    }
    applyCard('left',  leftData);
    applyCard('right', rightData);

    document.getElementById('prompt-text').textContent   = r.question;
    document.getElementById('concept-badge').textContent = r.concept;
  }

  /* ── Answer ──────────────────────────────────────────── */
  function handleAnswer(isLeft) {
    if (locked) return;
    const card  = document.getElementById(isLeft ? 'card-left' : 'card-right');
    const other = document.getElementById(isLeft ? 'card-right' : 'card-left');
    const correct = card.dataset.answer === '1';

    if (correct) {
      locked = true;
      card.classList.add('correct-pop');
      playCorrect();
      sparkleBurst(card);
      other.classList.add('locked');
      setTimeout(showCelebration, 550);
    } else {
      card.classList.add('wobble');
      playWrong();
      setTimeout(() => card.classList.remove('wobble'), 440);
    }
  }

  /* ── Celebration ─────────────────────────────────────── */
  function showCelebration() {
    const r = shuffledRounds[roundIdx];
    const celebs = [
      { emoji:'🌟', text:'Amazing!' },
      { emoji:'👑', text:"That's right!" },
      { emoji:'💎', text:'Perfect!' },
      { emoji:'🦄', text:'Brilliant!' },
      { emoji:'🎀', text:'You got it!' },
    ];
    const c = celebs[Math.floor(Math.random() * celebs.length)];
    document.getElementById('celebrate-emoji').textContent = c.emoji;
    document.getElementById('celebrate-text').textContent  = c.text + '\n' + r.concept + '! ✨';

    const btn = document.getElementById('next-btn');
    if (roundIdx >= TOTAL - 1) {
      btn.textContent = 'Finish 👑';
      btn.onclick = showWin;
    } else {
      btn.textContent = 'Next ➡️';
      btn.onclick = nextRound;
    }
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  /* ── Next round ──────────────────────────────────────── */
  function nextRound() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    const prevTier = roundIdx >= 0 ? shuffledRounds[roundIdx].tier : -1;
    roundIdx++;
    if (roundIdx >= TOTAL) { showWin(); return; }

    const r = shuffledRounds[roundIdx];
    updateHUD(roundIdx);

    if (r.tier > prevTier && prevTier >= 0) {
      showTierOverlay(r.tier);
    } else {
      renderRound(r);
    }
  }

  /* ── Tier overlay ────────────────────────────────────── */
  function showTierOverlay(tIdx) {
    const ov = TIER_OVERLAYS[tIdx];
    document.getElementById('tier-ov-icon').textContent  = ov.icon;
    document.getElementById('tier-ov-title').textContent = ov.title;
    document.getElementById('tier-ov-sub').textContent   = ov.sub;
    document.getElementById('tier-overlay').classList.add('show');
    playTierUp();
    confettiBurst();
  }

  function resumeAfterTier() {
    document.getElementById('tier-overlay').classList.remove('show');
    renderRound(shuffledRounds[roundIdx]);
  }

  /* ── Win ─────────────────────────────────────────────── */
  function showWin() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('win-overlay').classList.add('show');
    playFinalWin();
    confettiBurst();
    setTimeout(confettiBurst, 700);
  }

  function restartGame() {
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('celebrate-overlay').classList.remove('show');
    document.getElementById('tier-overlay').classList.remove('show');
    document.getElementById('progress-fill').style.width = '0%';
    roundIdx = -1;
    buildRoundOrder();
    nextRound();
  }

  /* ── Sparkle burst ───────────────────────────────────── */
  function sparkleBurst(card) {
    const r  = card.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const icons = ['✨','🌸','⭐','💫','💎','🌟','💖','🎀'];
    const cols  = ['#ffd700','#f48fb1','#ce93d8','#80deea','#a5d6a7','#fff176'];
    for (let i = 0; i < 16; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = icons[i % icons.length];
      const a = (i / 16) * Math.PI * 2;
      const d = 55 + Math.random() * 80;
      el.style.setProperty('--tx', Math.cos(a) * d + 'px');
      el.style.setProperty('--ty', Math.sin(a) * d + 'px');
      el.style.left = (cx - 10) + 'px';
      el.style.top  = (cy - 10) + 'px';
      el.style.fontSize = 'clamp(13px,3.5vw,20px)';
      el.style.animationDuration = (.45 + Math.random() * .45) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div'); el.className = 'sparkle-dot';
      const a = Math.random() * Math.PI * 2, d = 30 + Math.random() * 70, sz = 6 + Math.random() * 10;
      el.style.cssText = `left:${cx+Math.cos(a)*d-sz/2}px;top:${cy+Math.sin(a)*d-sz/2}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]}`;
      document.body.appendChild(el); setTimeout(() => el.remove(), 800);
    }
  }

  /* ── Confetti ────────────────────────────────────────── */
  function confettiBurst() {
    const cols = ['#ffd700','#ff69b4','#ff99cc','#c0a0ff','#7fff00','#00cfff','#fff','#ffb347'];
    for (let i = 0; i < 42; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const sz = 8 + Math.random() * 8;
      el.style.width  = sz + 'px'; el.style.height = sz + 'px';
      el.style.left   = Math.random() * 100 + 'vw';
      el.style.background = cols[Math.floor(Math.random() * cols.length)];
      el.style.animationDuration = (1.2 + Math.random() * 1.6) + 's';
      el.style.animationDelay    = (Math.random() * 0.4) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }
  }

  /* ── BG decoration ───────────────────────────────────── */
  function makeBgGems() {
    document.querySelectorAll('.bg-gem').forEach(e => e.remove());
    const gems = ['💫','✨','🌟','⭐','💎','🌸','📏','🌙','🎀','👑'];
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div'); el.className = 'bg-gem';
      el.textContent = gems[i % gems.length];
      el.style.left = (4 + Math.random() * 90) + 'vw';
      el.style.animationDuration = (9 + Math.random() * 13) + 's';
      el.style.animationDelay    = -(Math.random() * 13) + 's';
      document.body.appendChild(el);
    }
  }

  makeBgGems();
  buildRoundOrder();
  nextRound();
</script>
</body>
</html>
