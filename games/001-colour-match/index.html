<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magic Gems 💎</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(160deg, #2d0057 0%, #7b1fa2 50%, #f48fb1 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    #tier-badge {
      position: fixed;
      top: 14px;
      left: 16px;
      font-size: clamp(18px, 5vw, 26px);
      background: rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 4px 12px;
      color: #fff;
      letter-spacing: 2px;
    }

    #crown-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    #prompt-text {
      font-size: clamp(20px, 5.5vw, 34px);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    #crown-display {
      width: clamp(100px, 27vw, 155px);
      height: clamp(100px, 27vw, 155px);
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 32px rgba(255,255,255,0.3), 0 0 0 12px rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(46px, 13vw, 76px);
      transition: background 0.3s;
    }

    #gems-grid {
      display: grid;
      gap: clamp(12px, 3.5vw, 22px);
      padding: 8px;
    }
    #gems-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    #gems-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

    .gem-btn {
      width: clamp(100px, 26vw, 148px);
      height: clamp(100px, 26vw, 148px);
      border-radius: 24px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(46px, 11.5vw, 68px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35), inset 0 2px 0 rgba(255,255,255,0.25);
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: visible;
    }
    .gem-btn:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

    .gem-btn.correct-flash { animation: correctPulse 0.5s ease-out; }
    .gem-btn.wrong-flash   { animation: wrongShake 0.4s ease-out; }

    @keyframes correctPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); box-shadow: 0 0 44px rgba(255,255,255,0.8); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    /* sparkle particles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 98;
      border-radius: 50%;
      animation: sparklePop ease-out forwards;
    }
    @keyframes sparklePop {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    #celebrate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #celebrate-overlay.show { opacity: 1; pointer-events: all; }
    #celebrate-text {
      font-size: clamp(34px, 9.5vw, 68px);
      color: #fff;
      text-shadow: 0 0 20px #ffd700, 0 2px 8px rgba(0,0,0,0.5);
      text-align: center;
      padding: 0 16px;
    }
    #stars-row { font-size: clamp(38px, 11vw, 68px); letter-spacing: 8px; }
    #next-btn {
      margin-top: 12px;
      padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(20px,5vw,28px);
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ffd700, #ff9800);
      color: #5d2e00;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      font-family: inherit;
      letter-spacing: 1px;
    }

    #score-row {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: clamp(20px, 5.5vw, 30px);
      letter-spacing: 2px;
    }

    .confetti-piece {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 50%;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes confettiFall {
      0%   { top: -20px; opacity: 1; }
      100% { top: 110vh; opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div id="tier-badge">⭐</div>
  <div id="score-row"></div>

  <div id="crown-area">
    <div id="prompt-text">Find this colour! 👑</div>
    <div id="crown-display"></div>
  </div>

  <div id="gems-grid" class="cols-2"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">Amazing! 🌟</div>
    <div id="stars-row">⭐⭐⭐</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  // Easy tier: 6 distinct, saturated colours — 4 choices
  // Medium tier: adds orange, teal, brown — 5 choices
  // Hard tier: adds white, grey, dark-blue — 6 choices (some near-neighbours)
  const TIER_COLOURS = [
    [
      { name:'red',    bg:'#e53935', gem:'❤️',  crown:'🔴' },
      { name:'blue',   bg:'#1e88e5', gem:'💙',  crown:'🔵' },
      { name:'yellow', bg:'#fdd835', gem:'💛',  crown:'🟡' },
      { name:'green',  bg:'#43a047', gem:'💚',  crown:'🟢' },
      { name:'pink',   bg:'#e91e8c', gem:'🩷',  crown:'🎀' },
      { name:'purple', bg:'#8e24aa', gem:'💜',  crown:'🟣' },
    ],
    [
      { name:'red',    bg:'#e53935', gem:'❤️',  crown:'🔴' },
      { name:'blue',   bg:'#1e88e5', gem:'💙',  crown:'🔵' },
      { name:'yellow', bg:'#fdd835', gem:'💛',  crown:'🟡' },
      { name:'green',  bg:'#43a047', gem:'💚',  crown:'🟢' },
      { name:'pink',   bg:'#e91e8c', gem:'🩷',  crown:'🎀' },
      { name:'purple', bg:'#8e24aa', gem:'💜',  crown:'🟣' },
      { name:'orange', bg:'#fb8c00', gem:'🧡',  crown:'🟠' },
      { name:'teal',   bg:'#00897b', gem:'🩵',  crown:'🫐' },
      { name:'brown',  bg:'#6d4c41', gem:'🤎',  crown:'🟤' },
    ],
    [
      { name:'red',    bg:'#e53935', gem:'❤️',  crown:'🔴' },
      { name:'blue',   bg:'#1e88e5', gem:'💙',  crown:'🔵' },
      { name:'yellow', bg:'#fdd835', gem:'💛',  crown:'🟡' },
      { name:'green',  bg:'#43a047', gem:'💚',  crown:'🟢' },
      { name:'pink',   bg:'#e91e8c', gem:'🩷',  crown:'🎀' },
      { name:'purple', bg:'#8e24aa', gem:'💜',  crown:'🟣' },
      { name:'orange', bg:'#fb8c00', gem:'🧡',  crown:'🟠' },
      { name:'teal',   bg:'#00897b', gem:'🩵',  crown:'🫐' },
      { name:'brown',  bg:'#6d4c41', gem:'🤎',  crown:'🟤' },
      { name:'white',  bg:'#f5f5f5', gem:'🤍',  crown:'⚪' },
      { name:'grey',   bg:'#757575', gem:'🩶',  crown:'🔘' },
      { name:'navy',   bg:'#283593', gem:'🫙',  crown:'🌑' },
    ],
  ];

  const TIER_OPTIONS  = [4, 5, 6];   // number of gem choices per tier
  const TIER_COLS     = [2, 3, 3];   // grid columns
  const TIER_ROUNDS   = [3, 3, 3];   // rounds per tier
  const TIER_LABELS   = ['⭐', '⭐⭐', '⭐⭐⭐'];
  const TOTAL_ROUNDS  = 9;

  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, dur, vol) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function playCorrect() {
    playTone(523,'sine',0.12);
    setTimeout(() => playTone(659,'sine',0.12), 100);
    setTimeout(() => playTone(784,'sine',0.25), 200);
  }
  function playWrong() { playTone(200,'sawtooth',0.2,0.1); }
  function playCelebrate() {
    [523,587,659,698,784,880].forEach((f,i) =>
      setTimeout(() => playTone(f,'sine',0.22), i*80));
  }

  let target=null, score=0, round=0;

  function shuffle(arr) {
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }

  function getTier() {
    if (round <= 3) return 0;
    if (round <= 6) return 1;
    return 2;
  }

  function updateScore() {
    document.getElementById('score-row').innerHTML = Array.from({length:score},()=>'⭐').join('');
  }
  function updateTier() {
    const t = getTier();
    document.getElementById('tier-badge').textContent = TIER_LABELS[t];
  }

  function sparkleAt(btn) {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    const colours = ['#ffd700','#ff69b4','#00cfff','#ff6347','#da70d6','#7fff00','#fff'];
    for (let i=0; i<18; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      const size = 8 + Math.random()*10;
      el.style.cssText = `
        width:${size}px; height:${size}px;
        left:${cx}px; top:${cy}px;
        background:${colours[Math.floor(Math.random()*colours.length)]};
        --tx:${(Math.random()-0.5)*160}px;
        --ty:${(Math.random()-0.5)*160}px;
        animation-duration:${0.45+Math.random()*0.35}s;
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 900);
    }
  }

  function nextRound() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    if (round >= TOTAL_ROUNDS) { endGame(); return; }
    round++;
    updateTier();

    const tier = getTier();
    const pool = shuffle(TIER_COLOURS[tier]);
    target = pool[0];
    const options = shuffle(pool.slice(0, TIER_OPTIONS[tier]));

    document.getElementById('crown-display').style.background = target.bg;
    document.getElementById('crown-display').textContent = target.crown;

    const grid = document.getElementById('gems-grid');
    grid.className = 'cols-' + TIER_COLS[tier];
    grid.innerHTML = '';
    options.forEach(col => {
      const btn = document.createElement('button');
      btn.className = 'gem-btn';
      btn.style.background = col.bg;
      btn.textContent = col.gem;
      btn.setAttribute('aria-label', col.name);
      btn.addEventListener('pointerdown', () => handleTap(btn, col));
      grid.appendChild(btn);
    });
  }

  function handleTap(btn, col) {
    if (col.name === target.name) {
      btn.classList.add('correct-flash');
      playCorrect();
      sparkleAt(btn);
      score++;
      updateScore();
      setTimeout(() => {
        btn.classList.remove('correct-flash');
        if (round >= TOTAL_ROUNDS) { endGame(); return; }
        showCelebrate();
      }, 520);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'), 400);
    }
  }

  function showCelebrate() {
    const msgs = ['Amazing! 🌟','Yes!! 🎉','You did it! 💖','Brilliant! ✨','Wow! 🌈','Super! 👑'];
    document.getElementById('celebrate-text').textContent = msgs[Math.floor(Math.random()*msgs.length)];
    document.getElementById('stars-row').textContent = '⭐'.repeat(Math.min(score,9));
    document.getElementById('next-btn').textContent = 'Next ➡️';
    document.getElementById('next-btn').onclick = nextRound;
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  function endGame() {
    document.getElementById('celebrate-text').textContent = `You got ${score} stars! 👑`;
    document.getElementById('stars-row').textContent = '⭐'.repeat(Math.min(score,9))||'🌸';
    document.getElementById('next-btn').textContent = 'Play Again! 🔄';
    document.getElementById('next-btn').onclick = () => { score=0; round=0; updateScore(); updateTier(); nextRound(); };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  function confettiBurst() {
    const colours=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<32;i++){
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=colours[Math.floor(Math.random()*colours.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*0.4)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    }
  }

  nextRound();
</script>
</body>
</html>
