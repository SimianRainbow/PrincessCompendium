<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Magic Gems 💎</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(160deg, #2d0057 0%, #7b1fa2 50%, #f48fb1 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    #crown-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    #prompt-text {
      font-size: clamp(22px, 6vw, 36px);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    #crown-display {
      width: clamp(100px, 28vw, 160px);
      height: clamp(100px, 28vw, 160px);
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 32px rgba(255,255,255,0.3), 0 0 0 12px rgba(255,255,255,0.08);
      transition: background 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(50px, 14vw, 80px);
    }

    #gems-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(14px, 4vw, 24px);
      padding: 8px;
    }

    .gem-btn {
      width: clamp(110px, 28vw, 160px);
      height: clamp(110px, 28vw, 160px);
      border-radius: 24px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(52px, 13vw, 74px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35), inset 0 2px 0 rgba(255,255,255,0.25);
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
    }

    .gem-btn:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

    .gem-btn.correct-flash {
      animation: correctPulse 0.5s ease-out;
    }
    .gem-btn.wrong-flash {
      animation: wrongShake 0.4s ease-out;
    }

    @keyframes correctPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); box-shadow: 0 0 40px rgba(255,255,255,0.7); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    #celebrate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #celebrate-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    #celebrate-text {
      font-size: clamp(36px, 10vw, 72px);
      color: #fff;
      text-shadow: 0 0 20px #ffd700, 0 2px 8px rgba(0,0,0,0.5);
      text-align: center;
      padding: 0 16px;
    }
    #stars-row {
      font-size: clamp(40px, 12vw, 72px);
      letter-spacing: 8px;
    }
    #next-btn {
      margin-top: 12px;
      padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(20px,5vw,28px);
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ffd700, #ff9800);
      color: #5d2e00;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      font-family: inherit;
      letter-spacing: 1px;
    }

    #score-row {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 4px;
      font-size: clamp(22px, 6vw, 32px);
    }

    .confetti-piece {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes confettiFall {
      0%   { top: -20px; opacity: 1; }
      100% { top: 110vh; opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div id="score-row"></div>

  <div id="crown-area">
    <div id="prompt-text">Find this colour! 👑</div>
    <div id="crown-display"></div>
  </div>

  <div id="gems-grid"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">Amazing! 🌟</div>
    <div id="stars-row">⭐⭐⭐</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const COLOURS = [
    { name: 'red',    bg: '#e53935', gem: '❤️',  crown: '🔴' },
    { name: 'blue',   bg: '#1e88e5', gem: '💙',  crown: '🔵' },
    { name: 'yellow', bg: '#fdd835', gem: '💛',  crown: '🟡' },
    { name: 'green',  bg: '#43a047', gem: '💚',  crown: '🟢' },
    { name: 'pink',   bg: '#e91e8c', gem: '🩷',  crown: '🎀' },
    { name: 'purple', bg: '#8e24aa', gem: '💜',  crown: '🟣' },
  ];

  // Audio context for simple tones
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, dur, vol) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function playCorrect() {
    playTone(523, 'sine', 0.12);
    setTimeout(() => playTone(659, 'sine', 0.12), 100);
    setTimeout(() => playTone(784, 'sine', 0.25), 200);
  }
  function playWrong() {
    playTone(220, 'sawtooth', 0.2, 0.1);
  }
  function playCelebrate() {
    [523,587,659,698,784,880].forEach((f,i) => {
      setTimeout(() => playTone(f, 'sine', 0.2), i * 80);
    });
  }

  let target = null;
  let options = [];
  let score = 0;
  let round = 0;
  const TOTAL_ROUNDS = 6;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function updateScore() {
    const el = document.getElementById('score-row');
    el.innerHTML = Array.from({length: score}, () => '⭐').join('');
  }

  function nextRound() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    if (round >= TOTAL_ROUNDS) {
      endGame(); return;
    }
    round++;
    const shuffled = shuffle(COLOURS);
    target = shuffled[0];
    options = shuffle(shuffled.slice(0, 4));

    document.getElementById('crown-display').style.background = target.bg;
    document.getElementById('crown-display').textContent = target.crown;

    const grid = document.getElementById('gems-grid');
    grid.innerHTML = '';
    options.forEach(col => {
      const btn = document.createElement('button');
      btn.className = 'gem-btn';
      btn.style.background = col.bg;
      btn.textContent = col.gem;
      btn.setAttribute('aria-label', col.name);
      btn.addEventListener('pointerdown', () => handleTap(btn, col));
      grid.appendChild(btn);
    });
  }

  function handleTap(btn, col) {
    if (col.name === target.name) {
      btn.classList.add('correct-flash');
      playCorrect();
      score++;
      updateScore();
      setTimeout(() => {
        btn.classList.remove('correct-flash');
        showCelebrate();
      }, 500);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(() => btn.classList.remove('wrong-flash'), 400);
    }
  }

  function showCelebrate() {
    if (round >= TOTAL_ROUNDS) {
      endGame(); return;
    }
    const messages = ['Amazing! 🌟', 'Yes!! 🎉', 'You did it! 💖', 'Brilliant! ✨', 'Wow! 🌈', 'Super! 👑'];
    document.getElementById('celebrate-text').textContent = messages[Math.floor(Math.random()*messages.length)];
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  function endGame() {
    document.getElementById('celebrate-text').textContent = `You got ${score} stars! 👑`;
    document.getElementById('stars-row').textContent = Array.from({length: score}, () => '⭐').join('') || '🌸';
    document.getElementById('next-btn').textContent = 'Play Again! 🔄';
    document.getElementById('next-btn').onclick = () => { score = 0; round = 0; updateScore(); nextRound(); document.getElementById('celebrate-overlay').classList.remove('show'); };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  function confettiBurst() {
    const colours = ['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colours[Math.floor(Math.random()*colours.length)];
      el.style.animationDuration = (1.2 + Math.random()*1.6) + 's';
      el.style.animationDelay = (Math.random()*0.4) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }
  }

  // Start
  nextRound();
</script>
</body>
</html>
