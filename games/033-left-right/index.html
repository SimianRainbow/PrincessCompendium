<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Left &amp; Right 👈👉</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #1a0a3e 0%, #6a1b9a 50%, #f8bbd0 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Fredoka One', Georgia, serif; overflow:hidden; user-select:none;
      padding:8px;
    }

    #tier-badge {
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      font-size:clamp(14px,3.5vw,18px); background:rgba(255,255,255,.2);
      border-radius:20px; padding:4px 16px; color:#fff;
      border:1px solid rgba(255,255,255,.4); z-index:10; white-space:nowrap;
    }
    #round-counter {
      position:fixed; top:14px; right:16px;
      font-size:clamp(14px,3.5vw,18px); color:rgba(255,255,255,.9);
      z-index:10; white-space:nowrap; background:rgba(255,255,255,.15);
      border-radius:20px; padding:4px 12px; border:1px solid rgba(255,255,255,.3);
    }

    #title {
      font-size:clamp(20px,5.5vw,34px); color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.4);
      margin-top:56px; margin-bottom:4px; text-align:center;
    }

    #princess-deco {
      font-size:clamp(44px,11vw,68px); margin-bottom:4px;
      display:block; text-align:center;
      animation:floatBob 2.8s ease-in-out infinite;
    }
    @keyframes floatBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    #question {
      font-size:clamp(18px,4.8vw,30px); color:#ffd700;
      text-shadow:0 2px 8px rgba(0,0,0,.4);
      text-align:center; margin-bottom:18px; padding:0 12px;
      min-height:2.4em; display:flex; align-items:center; justify-content:center;
      line-height:1.2;
    }

    #items-row {
      display:flex; gap:clamp(10px,2.5vw,18px);
      justify-content:center; align-items:flex-start;
    }

    .item-col {
      display:flex; flex-direction:column; align-items:center; gap:8px;
    }

    .item-btn {
      width:clamp(96px,25vw,136px); height:clamp(96px,25vw,136px);
      border-radius:24px; border:3px solid rgba(255,255,255,.4);
      background:rgba(255,255,255,.18);
      box-shadow:0 6px 20px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(38px,9.5vw,60px); cursor:pointer;
      transition:transform .1s; user-select:none; -webkit-user-select:none;
    }
    .item-btn:active { transform:scale(.87); }
    .item-btn.correct-flash {
      animation:correctPulse .55s ease-out;
      background:rgba(100,255,130,.4);
    }
    .item-btn.wrong-flash { animation:wrongShake .4s ease-out; }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.18);box-shadow:0 0 40px rgba(255,255,255,.7)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)} 60%{transform:translateX(14px)} }

    .dir-label {
      font-size:clamp(14px,3.8vw,22px); color:rgba(255,255,255,.95);
      text-align:center; min-height:1.4em; transition:opacity .3s;
    }
    .dir-label.small { font-size:clamp(11px,2.8vw,16px); color:rgba(255,255,255,.6); }
    .dir-label.hidden { opacity:0; pointer-events:none; }

    #tier-toast {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
      background:rgba(255,215,0,.96); border-radius:24px; padding:18px 34px;
      font-size:clamp(20px,5.5vw,34px); color:#5d2e00;
      text-align:center; z-index:200; pointer-events:none;
      box-shadow:0 8px 32px rgba(0,0,0,.3);
      transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    #tier-toast.show { transform:translate(-50%,-50%) scale(1); }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.65);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-text { font-size:clamp(28px,7.5vw,56px); color:#fff; text-shadow:0 0 20px #ffd700; text-align:center; padding:0 20px; }
    #celebrate-sub { font-size:clamp(18px,5vw,32px); color:#ffe082; text-align:center; }
    #next-btn {
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size:clamp(18px,5vw,26px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer;
      font-family:'Fredoka One',inherit;
      box-shadow:0 4px 16px rgba(255,180,0,.5);
    }

    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
    .sparkle { position:fixed; pointer-events:none; z-index:101; font-size:clamp(18px,4.5vw,28px); animation:sparklePop .75s ease-out forwards; }
    @keyframes sparklePop { 0%{opacity:1;transform:scale(0) rotate(0)} 60%{opacity:1;transform:scale(1.3) rotate(20deg)} 100%{opacity:0;transform:scale(1.8) rotate(40deg)} }
  </style>
</head>
<body>
  <div id="tier-badge">⭐ Easy</div>
  <div id="round-counter">1 / 9</div>
  <div id="tier-toast"></div>

  <div id="title">Left &amp; Right! 👈👉</div>
  <span id="princess-deco">👸</span>
  <div id="question"></div>
  <div id="items-row"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text"></div>
    <div id="celebrate-sub"></div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  // Each round: items array, ask = index of correct item, tier 0/1/2
  // tier 0 (Easy): 2 items, big direction labels shown
  // tier 1 (Medium): 2 items, small labels
  // tier 2 (Hard): 3 items, no labels
  const ROUNDS = [
    { items:['⭐','💖'],       ask:0, tier:0 },
    { items:['🌈','🦋'],       ask:1, tier:0 },
    { items:['👑','🌸'],       ask:0, tier:0 },
    { items:['💜','💛'],       ask:1, tier:1 },
    { items:['🐱','🐰'],       ask:0, tier:1 },
    { items:['🎀','🎵'],       ask:1, tier:1 },
    { items:['🌙','🌟','🦄'], ask:2, tier:2 },
    { items:['🍰','🎠','🌺'], ask:0, tier:2 },
    { items:['💎','🏰','🌊'], ask:2, tier:2 },
  ];

  const TIER_META = [
    { label:'⭐ Easy',    labelClass:''        },
    { label:'⭐⭐ Good',   labelClass:'small'   },
    { label:'⭐⭐⭐ Wow!', labelClass:'hidden'  },
  ];

  const ITEM_NAMES = {
    '⭐':'star','💖':'heart','🌈':'rainbow','🦋':'butterfly',
    '👑':'crown','🌸':'flower','💜':'purple gem','💛':'yellow gem',
    '🐱':'kitty','🐰':'bunny','🎀':'bow','🎵':'music note',
    '🌙':'moon','🌟':'star','🦄':'unicorn','🍰':'cake',
    '🎠':'carousel','🌺':'rose','💎':'gem','🏰':'castle','🌊':'wave',
  };

  function dirName(idx, total){
    if(idx === 0) return 'LEFT 👈';
    if(idx === total-1) return 'RIGHT 👉';
    return 'MIDDLE';
  }

  let round = 0;
  const TOTAL = 9;
  let currentRound = null;

  let audioCtx = null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCorrect(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18),i*90)); }
  function playWrong(){ tone(200,'sawtooth',.2,.09); }
  function playCelebrate(){ [523,587,659,698,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*70)); }

  function sparkleBurst(x,y){
    const emojis=['✨','💫','⭐','🌟','💖','🌸','👑','🎉'];
    for(let i=0;i<14;i++){
      const el=document.createElement('div'); el.className='sparkle';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      const angle=Math.random()*360, dist=50+Math.random()*110;
      el.style.left=(x+Math.cos(angle*Math.PI/180)*dist)+'px';
      el.style.top=(y+Math.sin(angle*Math.PI/180)*dist)+'px';
      el.style.animationDelay=(Math.random()*.3)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),1050);
    }
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<35;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*.5)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),2800);
    }
  }

  function showTierToast(msg){
    const t=document.getElementById('tier-toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1900);
  }

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    if(round >= TOTAL){ endGame(); return; }
    round++;

    if(round===4) showTierToast('Level Up! ⭐⭐ Good!');
    if(round===7) showTierToast('Amazing! ⭐⭐⭐ Wow!');

    document.getElementById('round-counter').textContent=`${round} / ${TOTAL}`;

    const data = ROUNDS[round-1];
    currentRound = data;
    const tier = TIER_META[data.tier];
    document.getElementById('tier-badge').textContent=tier.label;

    const items = data.items;
    const askIdx = data.ask;
    const dir = dirName(askIdx, items.length);
    const askEmoji = items[askIdx];
    const askName = ITEM_NAMES[askEmoji] || askEmoji;

    // Question text: in hard tier show only direction; otherwise name the emoji too
    const q = document.getElementById('question');
    if(data.tier < 2){
      q.textContent = `Tap the ${askEmoji} on the ${dir}!`;
    } else {
      q.textContent = `Tap the ${dir}!`;
    }

    // Build items row
    const row = document.getElementById('items-row');
    row.innerHTML = '';
    items.forEach((emoji, i) => {
      const col = document.createElement('div');
      col.className = 'item-col';

      const btn = document.createElement('button');
      btn.className = 'item-btn';
      btn.textContent = emoji;
      btn.addEventListener('pointerdown', ()=>handleTap(btn, i));
      col.appendChild(btn);

      const lbl = document.createElement('div');
      lbl.className = 'dir-label ' + tier.labelClass;
      lbl.textContent = dirName(i, items.length);
      col.appendChild(lbl);

      row.appendChild(col);
    });
  }

  function handleTap(btn, tappedIdx){
    const correctIdx = currentRound.ask;
    if(tappedIdx === correctIdx){
      btn.classList.add('correct-flash');
      playCorrect();
      const r = btn.getBoundingClientRect();
      sparkleBurst(r.left+r.width/2, r.top+r.height/2);
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        const dir = dirName(correctIdx, currentRound.items.length);
        const msgs=[
          `That's the ${dir}! 🎉`,
          `${dir}! Amazing! ✨`,
          `Yes! ${dir}! 👑`,
          `${dir}! You got it! 💖`,
        ];
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-sub').textContent='';
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      }, 500);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'), 400);
    }
  }

  function endGame(){
    document.getElementById('celebrate-text').textContent='You know LEFT & RIGHT! 👈👉';
    document.getElementById('celebrate-sub').textContent='🎊 Princess Champion! 🎊';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{
      round=0;
      document.getElementById('celebrate-overlay').classList.remove('show');
      nextRound();
    };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  nextRound();
</script>
</body>
</html>
