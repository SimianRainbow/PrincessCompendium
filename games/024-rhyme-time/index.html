<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rhyme Time 🎵</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(155deg, #4a148c 0%, #7b1fa2 50%, #ce93d8 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:Georgia,serif; overflow:hidden; user-select:none;
    }

    #score-row { position:fixed; top:16px; right:20px; font-size:clamp(22px,6vw,32px); z-index:10; }
    #tier-badge {
      position:fixed; top:16px; left:16px;
      background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.5);
      border-radius:20px; padding:4px 14px;
      font-size:clamp(12px,3.2vw,16px); color:#fff; font-weight:bold;
      text-shadow:0 1px 3px rgba(0,0,0,.4); z-index:10;
    }

    #princess-area {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      margin-bottom:clamp(14px,3.5vw,24px); margin-top:52px;
    }
    #princess-face {
      font-size:clamp(48px,13vw,80px); line-height:1;
      animation:float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    #prompt-card {
      background:rgba(255,255,255,.95); border-radius:24px;
      padding:clamp(12px,3.5vw,20px) clamp(18px,5vw,32px);
      display:flex; flex-direction:column; align-items:center; gap:4px;
      box-shadow:0 6px 24px rgba(0,0,0,.25);
      position:relative;
    }
    #prompt-card::before {
      content:''; position:absolute; top:-14px; left:50%; transform:translateX(-50%);
      border:8px solid transparent; border-bottom-color:rgba(255,255,255,.95);
    }
    #prompt-emoji { font-size:clamp(52px,14vw,82px); line-height:1; }
    #prompt-word  {
      font-size:clamp(20px,5.5vw,32px); color:#4a148c; font-weight:bold;
      letter-spacing:3px; text-transform:uppercase;
    }
    #prompt-instruction {
      font-size:clamp(13px,3.3vw,18px); color:#7b1fa2; margin-top:2px;
    }

    .card-pulse { animation:cardPop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes cardPop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }

    #choices-row {
      display:flex; flex-wrap:wrap; justify-content:center;
      gap:clamp(12px,3vw,20px); padding:0 8px;
    }

    .choice-btn {
      width:clamp(100px,24vw,134px); height:clamp(100px,24vw,134px);
      border-radius:22px; border:none; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
      background:rgba(255,255,255,.18);
      box-shadow:0 4px 18px rgba(0,0,0,.3), inset 0 2px 0 rgba(255,255,255,.25);
      transition:transform .1s;
    }
    .choice-btn:active { transform:scale(.9); }
    .choice-btn .c-emoji { font-size:clamp(40px,11vw,62px); line-height:1; }
    .choice-btn .c-word  { font-size:clamp(11px,2.8vw,15px); color:#fff; font-weight:bold; letter-spacing:2px; text-shadow:0 1px 3px rgba(0,0,0,.5); }

    .choice-btn.correct-flash { animation:correctPulse .55s ease-out; }
    @keyframes correctPulse {
      0%  { transform:scale(1); }
      35% { transform:scale(1.22); box-shadow:0 0 40px rgba(255,215,0,.9); background:rgba(255,215,0,.4); }
      100%{ transform:scale(1); }
    }
    .choice-btn.wrong-flash { animation:wrongShake .4s ease-out; }
    @keyframes wrongShake {
      0%,100%{ transform:translateX(0); }
      25%    { transform:translateX(-10px); }
      75%    { transform:translateX(10px); }
    }

    .sparkle {
      position:fixed; font-size:clamp(12px,3.5vw,20px);
      pointer-events:none; z-index:50;
      animation:sparkleFly ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { transform:translate(0,0) scale(1.2); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0.1); opacity:0; }
    }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-icon { font-size:clamp(64px,18vw,110px); }
    #celebrate-text {
      font-size:clamp(26px,7vw,52px); color:#fff;
      text-shadow:0 0 20px #ffd700, 0 2px 8px rgba(0,0,0,.5);
      text-align:center; padding:0 16px;
    }
    #rhyme-pair {
      font-size:clamp(20px,5.5vw,34px); color:#ffd700;
      text-shadow:0 0 12px rgba(255,215,0,.6);
      text-align:center;
    }
    #next-btn {
      margin-top:4px;
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size:clamp(20px,5vw,28px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit;
      box-shadow:0 4px 16px rgba(255,180,0,.5);
    }

    .confetti-piece {
      position:fixed; border-radius:50%;
      animation:confettiFall linear forwards;
      pointer-events:none; z-index:100;
    }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>
  <div id="tier-badge">⭐ Easy</div>
  <div id="score-row"></div>

  <div id="princess-area">
    <div id="princess-face">👸</div>
    <div id="prompt-card">
      <div id="prompt-emoji">🐱</div>
      <div id="prompt-word">CAT</div>
      <div id="prompt-instruction">Tap the word that rhymes!</div>
    </div>
  </div>

  <div id="choices-row"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-icon">🎵</div>
    <div id="celebrate-text">They rhyme!</div>
    <div id="rhyme-pair"></div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const ROUNDS = [
    {
      tier: '⭐ Easy',
      prompt:  { word:'CAT',  emoji:'🐱' },
      correct: { word:'HAT',  emoji:'🎩' },
      wrong:   [{ word:'SUN', emoji:'☀️' }, { word:'DOG', emoji:'🐶' }],
    },
    {
      tier: '⭐ Easy',
      prompt:  { word:'SUN',  emoji:'☀️' },
      correct: { word:'RUN',  emoji:'🏃‍♀️' },
      wrong:   [{ word:'CAT', emoji:'🐱' }, { word:'BEE', emoji:'🐝' }],
    },
    {
      tier: '⭐ Easy',
      prompt:  { word:'BEE',  emoji:'🐝' },
      correct: { word:'TREE', emoji:'🌳' },
      wrong:   [{ word:'SUN', emoji:'☀️' }, { word:'HAT', emoji:'🎩' }],
    },
    {
      tier: '🌟 Medium',
      prompt:  { word:'STAR',  emoji:'⭐' },
      correct: { word:'CAR',   emoji:'🚗' },
      wrong:   [{ word:'BEE',  emoji:'🐝' }, { word:'CAT', emoji:'🐱' }],
    },
    {
      tier: '🌟 Medium',
      prompt:  { word:'FISH',  emoji:'🐟' },
      correct: { word:'DISH',  emoji:'🍽️' },
      wrong:   [{ word:'STAR', emoji:'⭐' }, { word:'DOG', emoji:'🐶' }],
    },
    {
      tier: '🌟 Medium',
      prompt:  { word:'CAKE',  emoji:'🎂' },
      correct: { word:'SNAKE', emoji:'🐍' },
      wrong:   [{ word:'FISH', emoji:'🐟' }, { word:'HAT', emoji:'🎩' }],
    },
    {
      tier: '👑 Hard',
      prompt:  { word:'MOON',  emoji:'🌙' },
      correct: { word:'SPOON', emoji:'🥄' },
      wrong:   [{ word:'CAT',  emoji:'🐱' }, { word:'STAR', emoji:'⭐' }, { word:'BEE', emoji:'🐝' }],
    },
    {
      tier: '👑 Hard',
      prompt:  { word:'ROSE',  emoji:'🌹' },
      correct: { word:'TOES',  emoji:'🦶' },
      wrong:   [{ word:'MOON', emoji:'🌙' }, { word:'CAKE', emoji:'🎂' }, { word:'FISH', emoji:'🐟' }],
    },
    {
      tier: '👑 Hard',
      prompt:  { word:'RING',  emoji:'💍' },
      correct: { word:'KING',  emoji:'👑' },
      wrong:   [{ word:'STAR', emoji:'⭐' }, { word:'BEE', emoji:'🐝' }, { word:'ROSE', emoji:'🌹' }],
    },
  ];

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCorrect(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.2),i*85)); }
  function playWrong(){ tone(200,'sawtooth',.2,.09); }
  function playCelebrate(){ [523,587,659,784,880,1047,1175].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*65)); }
  function playFanfare(){ [330,392,494,523].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.3,.1),i*130)); }

  let score=0, round=0, locked=false;
  const TOTAL=ROUNDS.length;

  function updateScore(){ document.getElementById('score-row').innerHTML=Array.from({length:score},()=>'⭐').join(''); }

  function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    locked=false;
    if(round>=TOTAL){ endGame(); return; }

    const rd=ROUNDS[round++];
    document.getElementById('tier-badge').textContent=rd.tier;

    const card=document.getElementById('prompt-card');
    card.classList.remove('card-pulse');
    void card.offsetWidth;
    card.classList.add('card-pulse');
    document.getElementById('prompt-emoji').textContent=rd.prompt.emoji;
    document.getElementById('prompt-word').textContent=rd.prompt.word;
    playFanfare();

    const choices=shuffle([rd.correct, ...rd.wrong]);
    const row=document.getElementById('choices-row');
    row.innerHTML='';
    choices.forEach(ch=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.innerHTML=`<span class="c-emoji">${ch.emoji}</span><span class="c-word">${ch.word}</span>`;
      btn.addEventListener('pointerdown',()=>handleTap(btn, ch, rd));
      row.appendChild(btn);
    });
  }

  function handleTap(btn, chosen, rd){
    if(locked) return;
    if(chosen.word===rd.correct.word){
      locked=true;
      btn.classList.add('correct-flash');
      playCorrect(); score++; updateScore();
      const rect=btn.getBoundingClientRect();
      sparkleBurst(rect.left+rect.width/2, rect.top+rect.height/2);
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        const msgs=['They rhyme! 🎵','Great ear! 🌟','You got it! 🎀','Magic rhyme! ✨','Superstar! 👑'];
        document.getElementById('celebrate-icon').textContent='🎵';
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('rhyme-pair').textContent=`${rd.prompt.word} ${rd.prompt.emoji} — ${rd.correct.word} ${rd.correct.emoji}`;
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      },550);
    } else {
      btn.classList.add('wrong-flash'); playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'),400);
    }
  }

  function sparkleBurst(cx,cy){
    const icons=['✨','🌸','⭐','💫','🎵','💖'];
    for(let i=0;i<14;i++){
      const el=document.createElement('div'); el.className='sparkle';
      el.textContent=icons[Math.floor(Math.random()*icons.length)];
      const angle=(i/14)*Math.PI*2, dist=60+Math.random()*80;
      el.style.setProperty('--tx',Math.cos(angle)*dist+'px');
      el.style.setProperty('--ty',Math.sin(angle)*dist-20+'px');
      el.style.left=(cx-10)+'px'; el.style.top=(cy-10)+'px';
      el.style.animationDuration=(0.45+Math.random()*0.5)+'s';
      el.style.animationDelay=(Math.random()*0.1)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),1100);
    }
  }

  function endGame(){
    document.getElementById('celebrate-icon').textContent=score>=8?'👑':'🎵';
    document.getElementById('celebrate-text').textContent=score>=8
      ? `Rhyme Queen! ${score}/${TOTAL} ⭐`
      : `You got ${score} rhymes! 🌟`;
    document.getElementById('rhyme-pair').textContent='';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{
      score=0; round=0; updateScore();
      document.getElementById('celebrate-overlay').classList.remove('show');
      nextRound();
    };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#c0a0ff','#00cfff','#7fff00','#ff6347','#fff'];
    for(let i=0;i<36;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      const sz=8+Math.random()*8;
      el.style.width=sz+'px'; el.style.height=sz+'px';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.8)+'s';
      el.style.animationDelay=(Math.random()*.5)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),3000);
    }
  }

  nextRound();
</script>
</body>
</html>
