  // ═══════════════════════════════════════════════════════════════════════
  //  INPUT
  // ═══════════════════════════════════════════════════════════════════════
  function bindInput() {
    const leftBtn  = document.getElementById('steer-left');
    const rightBtn = document.getElementById('steer-right');
    const twirlBtn = document.getElementById('twirl-btn');

    function press(which) { turnInput = which; }
    function release(which) {
      if (which === undefined || turnInput === which) turnInput = 0;
    }

    leftBtn.addEventListener('pointerdown',  e => { e.preventDefault(); leftBtn.classList.add('pressed'); press(+1); });
    leftBtn.addEventListener('pointerup',    e => { e.preventDefault(); leftBtn.classList.remove('pressed'); release(+1); });
    leftBtn.addEventListener('pointerleave', e => { leftBtn.classList.remove('pressed'); release(+1); });
    leftBtn.addEventListener('pointercancel',e => { leftBtn.classList.remove('pressed'); release(+1); });

    rightBtn.addEventListener('pointerdown',  e => { e.preventDefault(); rightBtn.classList.add('pressed'); press(-1); });
    rightBtn.addEventListener('pointerup',    e => { e.preventDefault(); rightBtn.classList.remove('pressed'); release(-1); });
    rightBtn.addEventListener('pointerleave', e => { rightBtn.classList.remove('pressed'); release(-1); });
    rightBtn.addEventListener('pointercancel',e => { rightBtn.classList.remove('pressed'); release(-1); });

    twirlBtn.addEventListener('pointerdown',  e => {
      e.preventDefault(); twirlBtn.classList.add('pressed');
      if (twirlT <= 0) { twirlT = 1.2; playTwirl(); burstSparkles(mermaidX, mermaidY, mermaidZ, 0xff80ab, 40); }
    });
    twirlBtn.addEventListener('pointerup',    e => twirlBtn.classList.remove('pressed'));
    twirlBtn.addEventListener('pointerleave', e => twirlBtn.classList.remove('pressed'));

    window.addEventListener('keydown', e => {
      if (!gameActive) return;
      if (e.key === 'ArrowLeft'  || e.key === 'a') { turnInput = +1; leftBtn.classList.add('pressed'); }
      if (e.key === 'ArrowRight' || e.key === 'd') { turnInput = -1; rightBtn.classList.add('pressed'); }
      if (e.key === ' ' || e.key === 'Enter') {
        if (twirlT <= 0) { twirlT = 1.2; playTwirl(); burstSparkles(mermaidX, mermaidY, mermaidZ, 0xff80ab, 40); }
      }
    });
    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'a') { release(+1); leftBtn.classList.remove('pressed'); }
      if (e.key === 'ArrowRight' || e.key === 'd') { release(-1); rightBtn.classList.remove('pressed'); }
    });
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  ANIMATE
  // ═══════════════════════════════════════════════════════════════════════
  function animate() {
    requestAnimationFrame(animate);
    if (!gameActive) { if (renderer) renderer.render(scene, camera); return; }

    const dt = Math.min(0.05, clock.getDelta());
    swimT  += dt;
    bobT   += dt;
    globalT += dt;
    if (twirlT > 0) twirlT -= dt;

    ambientPad(globalT);

    // Steering
    const targetVel = turnInput * CFG.turnSpeed;
    headingVel += (targetVel - headingVel) * Math.min(1, dt * 8);
    heading += headingVel * dt;
    const twirlSpin = twirlT > 0 ? (twirlT * 12) : 0;

    // Forward motion
    const fx = -Math.sin(heading);
    const fz = -Math.cos(heading);
    mermaidX += fx * CFG.swimSpeed * dt;
    mermaidZ += fz * CFG.swimSpeed * dt;

    const dist = Math.hypot(mermaidX, mermaidZ);
    if (dist > CFG.lagoonRadius) {
      mermaidX = (mermaidX / dist) * CFG.lagoonRadius;
      mermaidZ = (mermaidZ / dist) * CFG.lagoonRadius;
      const angleToCenter = Math.atan2(-mermaidX, -mermaidZ);
      heading = lerpAngle(heading, angleToCenter, 0.09);
    }

    mermaidY = 3 + Math.sin(bobT * 1.5) * 0.35;

    // Ariel — sprite rotates so its back faces the camera (camera is behind her)
    ariel.position.set(mermaidX, mermaidY, mermaidZ);
    ariel.rotation.y = heading + twirlSpin;
    // Frame animation
    const arFrame = Math.floor(swimT * ariel.userData.frameSpeed);
    setFrame(ariel, arFrame);
    // Lean into turns via Z-rot
    ariel.rotation.z = -headingVel * 0.3 + Math.sin(swimT * 1.3) * 0.03;

    // Twirl sparkle trail
    if (twirlT > 0 && Math.random() < 0.6) {
      burstSparkles(
        mermaidX + (Math.random()-.5)*1.5,
        mermaidY + (Math.random()-.5)*1.5,
        mermaidZ + (Math.random()-.5)*1.5,
        [0xff80ab, 0xffeb3b, 0x81d4fa, 0xce93d8][Math.floor(Math.random()*4)],
        3
      );
    }
    // Swim sparkle trail
    if (Math.random() < 0.25) {
      burstSparkles(mermaidX - fx*1.5, mermaidY - 0.3, mermaidZ - fz*1.5, 0xb3e5fc, 1);
    }

    // Camera
    const camDist = 7.5;
    const camH = 3.4;
    const tx = mermaidX + Math.sin(heading) * camDist;
    const tz = mermaidZ + Math.cos(heading) * camDist;
    const ty = mermaidY + camH;
    camera.position.x += (tx - camera.position.x) * Math.min(1, dt*5);
    camera.position.y += (ty - camera.position.y) * Math.min(1, dt*5);
    camera.position.z += (tz - camera.position.z) * Math.min(1, dt*5);
    camera.lookAt(mermaidX + fx*2, mermaidY + 0.3, mermaidZ + fz*2);

    // Pearls
    for (const p of pearlMeshes) {
      if (p.userData.collected) continue;
      p.userData.t += dt;
      p.rotation.y += dt * 1.6;
      p.position.y = p.userData.baseY + Math.sin(p.userData.t * 2.1) * 0.3;
      const d = Math.hypot(p.position.x - mermaidX, p.position.z - mermaidZ);
      if (d < CFG.pearlDist && Math.abs(p.position.y - mermaidY) < 2.5) {
        p.userData.collected = true;
        p.visible = false;
        pearlsCollected++;
        updatePearlCounter();
        playPearl();
        flash('pearl-flash');
        burstSparkles(p.position.x, p.position.y, p.position.z, 0xfff7fa, 12);
      }
    }

    // Friends
    for (const f of friendMeshes) {
      f.userData.t += dt;
      if (f.userData.kind !== 'rapunzel') {
        f.position.y = f.userData.baseY + Math.sin(f.userData.t * 1.2) * 0.22;
      }
      // frame cycle
      setFrame(f, Math.floor(f.userData.t * f.userData.frameSpeed));

      if (!f.userData.found) {
        const d = Math.hypot(f.position.x - mermaidX, f.position.z - mermaidZ);
        const haloOn = d < CFG.findDist * 2.5;
        if (f.userData.halo) {
          const k = Math.max(0, 1 - d / (CFG.findDist * 2.5));
          f.userData.halo.material.opacity = haloOn ? (0.25 + k * 0.45) : 0;
        }
        const wasNear = f.userData.near;
        const isNear = d < CFG.nearFriendDist;
        f.userData.near = isNear;
        const slotEl = document.getElementById('slot-' + f.userData.kind);
        if (slotEl) slotEl.classList.toggle('near', isNear);
        if (isNear && !wasNear) playNearHint();

        if (d < CFG.findDist) {
          f.userData.found = true;
          foundCount++;
          markFriendFound(f.userData.kind);
          showBanner(f.userData.label);
          playFind(f.userData.kind);
          burstSparkles(f.position.x, f.position.y + 1, f.position.z,
            [0xffd700,0xff80ab,0x81d4fa,0xffeb3b][foundCount-1] || 0xfff3b0, 40);
          flash('find-flash');
          if (foundCount >= CFG.friends.length) {
            setTimeout(() => winGame(), 1800);
          }
        }
      } else {
        if (f.userData.halo) {
          f.userData.halo.material.opacity = 0.4 + Math.sin(f.userData.t * 2) * 0.15;
        }
      }
    }

    // Billboard every sprite that's marked bill:true, plus fish facing swim direction
    for (const s of spriteList) {
      if (s.userData.bill) {
        billboardY(s, camera.position);
      }
      if (s.userData.frameSpeed !== undefined && !s.userData.fish) {
        setFrame(s, Math.floor(globalT * s.userData.frameSpeed));
      }
    }

    // Bubbles
    for (const b of bubbleMeshes) {
      b.position.y += b.userData.speed * dt;
      b.position.x += Math.sin(b.userData.drift + bobT) * 0.2 * dt;
      if (b.position.y > 16) {
        b.position.y = -1;
        if (b.userData.origX !== undefined) {
          b.position.x = b.userData.origX + (Math.random()-.5)*1.5;
          b.position.z = b.userData.origZ + (Math.random()-.5)*1.5;
        } else {
          b.position.x = (Math.random()-.5) * 100;
          b.position.z = (Math.random()-.5) * 100;
        }
      }
    }
    // Marine snow
    for (const s of marineSnow) {
      s.position.y += s.userData.vy * dt;
      s.position.x += Math.sin(bobT + s.userData.drift) * 0.05;
      if (s.position.y < -1) {
        s.position.y = 15;
        s.position.x = (Math.random()-.5)*90;
        s.position.z = (Math.random()-.5)*90;
      }
    }

    // Fish — circle around their center, orient sprite to swim direction
    for (const f of fishMeshes) {
      const u = f.userData;
      u.phase += u.speed * dt;
      const x = u.centerX + Math.cos(u.phase) * u.radius;
      const z = u.centerZ + Math.sin(u.phase) * u.radius;
      f.position.set(x, u.y, z);
      // Side view sprite: rotate to face travel direction (tangent)
      const tangX = -Math.sin(u.phase);
      const tangZ =  Math.cos(u.phase);
      // Orient the plane so normal is perpendicular to travel
      f.rotation.y = Math.atan2(tangX, tangZ) + Math.PI/2;
      // Flip horizontally if moving "backward" relative to view — handled by sprite always visible, simple side view is OK
      setFrame(f, Math.floor(u.phase * u.speed * 3 + u.phase*4));
    }

    // Seaweed sways
    for (const s of seaweedMeshes) {
      if (s.userData.simple) {
        s.rotation.z = Math.sin(bobT * 0.9 + s.userData.phase) * 0.22;
      } else {
        const chain = s.userData.chain;
        for (let i=0; i<chain.length; i++) {
          chain[i].rotation.z = Math.sin(bobT*1.1 + s.userData.phase + i*0.35) * 0.14;
          chain[i].rotation.x = Math.cos(bobT*0.9 + s.userData.phase + i*0.35) * 0.08;
        }
      }
    }

    // Caustics drift + pulse
    for (const c of causticMeshes) {
      c.userData.phase += c.userData.speed * dt;
      c.position.x = c.userData.baseX + Math.sin(c.userData.phase) * 3;
      c.position.z = c.userData.baseZ + Math.cos(c.userData.phase*0.8) * 2.5;
      c.material.opacity = c.userData.opBase + Math.sin(c.userData.phase*1.5) * 0.05;
    }
    for (const r of rayMeshes) {
      r.material.opacity = r.userData.baseOp + Math.sin(globalT*1.3 + r.userData.phase)*0.06;
    }
    for (const c of crystalMeshes) {
      c.material.emissiveIntensity = c.userData.baseEmissive + Math.sin(globalT*2 + c.userData.pulsePhase)*0.2;
    }

    // Seahorse bob
    for (const sh of seahorseMeshes) {
      sh.position.y = sh.userData.baseY + Math.sin(globalT*1.5 + sh.userData.phase)*0.4;
    }

    // Crab scuttle
    if (crab) {
      crab.userData.phase += dt * 1.4;
      const r = 14;
      crab.position.x = Math.cos(crab.userData.phase*0.5)*r;
      crab.position.z = -5 + Math.sin(crab.userData.phase*0.5)*r;
      crab.position.y = -0.5 + Math.abs(Math.sin(crab.userData.phase*4))*0.15;
    }

    // Dolphin big arcs
    if (dolphin) {
      dolphin.userData.t += dt * 0.4;
      const loopR = 45;
      const t = dolphin.userData.t;
      const x = Math.cos(t) * loopR;
      const z = Math.sin(t) * loopR;
      const y = 4 + Math.sin(t * 3) * 8;
      dolphin.position.set(x, y, z);
      // Face tangent (sprite side view)
      const tangX = -Math.sin(t);
      const tangZ =  Math.cos(t);
      dolphin.rotation.y = Math.atan2(tangX, tangZ) + Math.PI/2;
      dolphin.rotation.z = Math.cos(t * 3) * 0.35;
    }
    // Whale drifts
    if (whale) {
      whale.userData.t += dt * 0.08;
      const t = whale.userData.t;
      const x = Math.cos(t) * 100;
      const z = Math.sin(t) * 100 - 40;
      whale.position.set(x, 8, z);
      const tangX = -Math.sin(t);
      const tangZ =  Math.cos(t);
      whale.rotation.y = Math.atan2(tangX, tangZ) + Math.PI/2;
    }

    // Octopus gentle hover
    if (octopusSprite) {
      octopusSprite.position.y = octopusSprite.userData.baseY + Math.sin(globalT*0.8)*0.3;
    }

    updateSparkles(dt);
    renderer.render(scene, camera);
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  SPARKLES / CONFETTI
  // ═══════════════════════════════════════════════════════════════════════
  let sparkles = [];
  function burstSparkles(x, y, z, color=0xfff7b0, count=28) {
    for (let i=0; i<count; i++) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent:true });
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.15 + Math.random()*0.12, 6, 4), mat);
      s.position.set(x, y, z);
      const a = Math.random()*Math.PI*2, phi = Math.random()*Math.PI;
      const speed = 3 + Math.random()*3;
      s.userData = {
        vx: Math.sin(phi)*Math.cos(a)*speed,
        vy: Math.cos(phi)*speed,
        vz: Math.sin(phi)*Math.sin(a)*speed,
        life: 1.0,
      };
      scene.add(s);
      sparkles.push(s);
    }
  }
  function updateSparkles(dt) {
    for (let i = sparkles.length-1; i >= 0; i--) {
      const s = sparkles[i];
      s.userData.life -= dt * 1.2;
      if (s.userData.life <= 0) {
        scene.remove(s);
        s.geometry.dispose();
        s.material.dispose();
        sparkles.splice(i,1);
        continue;
      }
      s.position.x += s.userData.vx * dt;
      s.position.y += s.userData.vy * dt;
      s.position.z += s.userData.vz * dt;
      s.userData.vy -= 1.5 * dt;
      s.material.opacity = s.userData.life;
      s.scale.setScalar(s.userData.life * 1.2);
    }
  }

  function spawnConfetti() {
    const colors = ['#ff80ab','#ffd700','#4fc3f7','#ba68c8','#ffca28','#f06292','#7e57c2','#aed581','#26a69a','#ff9800'];
    for (let i=0; i<90; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const size = 8 + Math.random()*14;
      p.style.width  = size + 'px';
      p.style.height = (size * (0.5 + Math.random()*0.8)) + 'px';
      p.style.left   = (Math.random()*100) + 'vw';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.borderRadius = Math.random() < 0.5 ? '50%' : '4px';
      p.style.animationDuration = (2.4 + Math.random()*2.6) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  HELPERS
  // ═══════════════════════════════════════════════════════════════════════
  function lerpAngle(a, b, t) {
    let d = b - a;
    while (d >  Math.PI) d -= Math.PI*2;
    while (d < -Math.PI) d += Math.PI*2;
    return a + d * t;
  }
  function flash(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 320);
  }
  function updatePearlCounter() {
    document.getElementById('pearl-counter').textContent = '🫧 ' + pearlsCollected;
  }
  function markFriendFound(kind) {
    const el = document.getElementById('slot-' + kind);
    if (el) { el.classList.add('got'); el.classList.remove('near'); }
  }
  function showBanner(text) {
    const b = document.getElementById('friend-banner');
    b.textContent = text;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1400);
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  FLOW
  // ═══════════════════════════════════════════════════════════════════════
  function startGame() {
    try { au().resume(); } catch(e) {}
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('pearl-counter').style.display = 'block';
    document.getElementById('steer-left').style.display = 'flex';
    document.getElementById('steer-right').style.display = 'flex';
    document.getElementById('twirl-btn').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';

    if (!renderer) {
      initThree();
      buildWorld();
      ariel = buildAriel();
      scene.add(ariel);
      bindInput();
      animate();
    }
    gameActive = true;
    clock.start();
    [523,659,784,988,1175].forEach((f,i) => tone(f,'sine',0.28,0.12, i*0.08));
  }

  function winGame() {
    gameActive = false;
    document.getElementById('hud').style.display = 'none';
    document.getElementById('pearl-counter').style.display = 'none';
    document.getElementById('steer-left').style.display = 'none';
    document.getElementById('steer-right').style.display = 'none';
    document.getElementById('twirl-btn').style.display = 'none';
    document.getElementById('win-screen').classList.remove('hidden');
    playWin();
    spawnConfetti();
    setTimeout(spawnConfetti, 700);
    setTimeout(spawnConfetti, 1500);
    setTimeout(spawnConfetti, 2400);
  }

  function restartGame() {
    mermaidX = 0; mermaidZ = 0; mermaidY = 3;
    heading = 0; headingVel = 0; turnInput = 0;
    swimT = 0; bobT = 0; twirlT = 0;
    foundCount = 0; pearlsCollected = 0;
    friendMeshes.forEach(f => {
      f.userData.found = false;
      f.userData.near = false;
      if (f.userData.halo) f.userData.halo.material.opacity = 0;
    });
    pearlMeshes.forEach(p => { p.userData.collected = false; p.visible = true; });
    document.querySelectorAll('.friend-slot').forEach(s => { s.classList.remove('got'); s.classList.remove('near'); });
    updatePearlCounter();
    document.getElementById('win-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('pearl-counter').style.display = 'block';
    document.getElementById('steer-left').style.display = 'flex';
    document.getElementById('steer-right').style.display = 'flex';
    document.getElementById('twirl-btn').style.display = 'flex';
    gameActive = true;
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  START-SCREEN BUBBLES + ART
  // ═══════════════════════════════════════════════════════════════════════
  (function(){
    const s = document.getElementById('start-screen');
    for (let i=0; i<16; i++) {
      const b = document.createElement('div');
      b.className = 'start-bubble';
      const size = 12 + Math.random()*44;
      b.style.width = size+'px'; b.style.height = size+'px';
      b.style.left = (Math.random()*100)+'vw';
      b.style.animationDelay = (Math.random()*8)+'s';
      b.style.animationDuration = (6 + Math.random()*6)+'s';
      s.appendChild(b);
    }
    // Draw the painted mermaid on the start art canvas (Rapunzel-style princess preview)
    const artCanvas = document.getElementById('start-art');
    artCanvas.width = 340;
    artCanvas.height = 360;
    // Render a scaled version of Ariel's sprite (front would be nicer, but back read ok)
    // Actually use the mermaid friend (front view) at the right size
    const c = artCanvas.getContext('2d');
    const tmp = makeCanvas(512, 820);
    drawMermaidFriend(tmp.getContext('2d'), 512, 820, 0, 4);
    c.clearRect(0, 0, 340, 360);
    c.drawImage(tmp, 0, 0, 512, 820, 0, 0, 340, (340/512)*820);
  })();
  </script>
</body>
</html>
