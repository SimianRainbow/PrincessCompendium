<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Princess Body Parts 👑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(160deg, #1a0040 0%, #6a1b9a 45%, #f06292 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: clamp(12px,3vw,18px) clamp(14px,3.5vw,22px);
      display: flex; justify-content: space-between; align-items: center;
    }
    #tier-badge {
      font-size: clamp(13px,3.2vw,17px);
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 5px 14px;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.35);
      font-weight: bold;
    }
    #round-counter {
      font-size: clamp(13px,3.2vw,17px);
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    #score-row {
      font-size: clamp(20px, 5.5vw, 28px);
      letter-spacing: 2px;
    }

    /* Princess figure */
    #princess-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 8px;
      margin-top: clamp(60px,15vw,80px);
    }

    #princess-figure {
      font-size: clamp(70px, 18vw, 110px);
      line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
      transition: transform 0.25s;
    }

    #princess-figure.pulse {
      animation: princessPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes princessPulse {
      from { filter: drop-shadow(0 4px 16px rgba(255,200,0,0.3)); }
      to   { filter: drop-shadow(0 0 28px rgba(255,220,80,0.95)); }
    }

    #part-arrow {
      font-size: clamp(28px, 7vw, 42px);
      color: #ffd700;
      text-shadow: 0 0 12px rgba(255,220,0,0.8);
      margin: 2px 0 4px;
      animation: bounce 0.6s ease-in-out infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    #prompt-text {
      font-size: clamp(18px, 5vw, 30px);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
      text-align: center;
      padding: 0 12px;
      margin-bottom: 16px;
    }

    #choices-grid {
      display: grid;
      gap: clamp(12px, 3.5vw, 20px);
      padding: 6px;
    }
    #choices-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    #choices-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

    .choice-btn {
      width: clamp(105px, 26vw, 145px);
      height: clamp(105px, 26vw, 145px);
      border-radius: 28px;
      border: 4px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(4px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: clamp(42px, 10.5vw, 64px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      transition: transform 0.12s;
    }
    .choice-btn .label {
      font-size: clamp(12px, 3vw, 16px);
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      letter-spacing: 0.5px;
    }
    .choice-btn:active { transform: scale(0.91); }

    .choice-btn.correct-flash { animation: correctPulse 0.52s ease-out; }
    .choice-btn.wrong-flash   { animation: wrongShake 0.4s ease-out; }

    @keyframes correctPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); box-shadow: 0 0 44px rgba(255,255,180,0.9); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 98;
      font-size: clamp(16px,4vw,24px);
      animation: sparkleFloat 0.85s ease-out forwards;
    }
    @keyframes sparkleFloat {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
      50%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(0.2); opacity: 0; }
    }

    #celebrate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    #celebrate-overlay.show { opacity: 1; pointer-events: all; }
    #celebrate-text {
      font-size: clamp(30px, 8vw, 58px);
      color: #fff;
      text-shadow: 0 0 20px #ffd700, 0 2px 8px rgba(0,0,0,0.5);
      text-align: center;
      padding: 0 16px;
    }
    #celebrate-part {
      font-size: clamp(26px, 7vw, 50px);
      color: #ffd700;
      font-weight: bold;
      letter-spacing: 3px;
      text-align: center;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
    }
    #stars-row { font-size: clamp(32px, 9vw, 58px); letter-spacing: 4px; }
    #next-btn {
      margin-top: 6px;
      padding: clamp(14px,4vw,20px) clamp(30px,8vw,52px);
      font-size: clamp(20px,5vw,28px);
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ffd700, #ff9800);
      color: #5d2e00;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      font-family: inherit;
      touch-action: manipulation;
    }

    .confetti-piece {
      position: fixed;
      width: 12px; height: 12px;
      border-radius: 50%;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes confettiFall {
      0%   { top: -20px; opacity: 1; }
      100% { top: 110vh; opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="tier-badge">🌸 Easy</div>
    <div id="round-counter">1 / 9</div>
    <div id="score-row"></div>
  </div>

  <div id="princess-wrap">
    <div id="princess-figure">👸</div>
    <div id="part-arrow">👇</div>
  </div>

  <div id="prompt-text">Where is Princess's nose? 👃</div>

  <div id="choices-grid" class="cols-2"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">Amazing! 🌟</div>
    <div id="celebrate-part">👃 NOSE</div>
    <div id="stars-row">⭐⭐⭐</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const PARTS = [
    { name:'nose',   emoji:'👃',    label:'nose'    },
    { name:'ear',    emoji:'👂',    label:'ear'     },
    { name:'eyes',   emoji:'👀',    label:'eyes'    },
    { name:'mouth',  emoji:'👄',    label:'mouth'   },
    { name:'hand',   emoji:'🖐️',   label:'hand'    },
    { name:'foot',   emoji:'🦶',    label:'foot'    },
    { name:'tooth',  emoji:'🦷',    label:'tooth'   },
    { name:'arm',    emoji:'💪',    label:'arm'     },
    { name:'hair',   emoji:'💇‍♀️', label:'hair'    },
    { name:'tongue', emoji:'👅',    label:'tongue'  },
    { name:'knee',   emoji:'🦵',    label:'knee'    },
  ];

  const TIER_CFG = [
    { pool: PARTS.slice(0,4),  choices: 2, cols: 2, label: '🌸 Easy'   },
    { pool: PARTS.slice(0,8),  choices: 3, cols: 3, label: '🌟 Medium' },
    { pool: PARTS,             choices: 4, cols: 2, label: '👑 Hard'   },
  ];
  const TIER_COLS_CLASS = ['cols-2','cols-3','cols-2'];
  const TOTAL_ROUNDS = 9;

  const PROMPT_TEMPLATES = [
    (p, e) => `Where is Princess's ${p}? ${e}`,
    (p, e) => `Can you find the ${p}? ${e}`,
    (p, e) => `Tap the ${p}! ${e}`,
    (p, e) => `Point to the ${p}! ${e}`,
    (p, e) => `Touch the ${p}! ${e}`,
  ];

  let target = null, score = 0, round = 0;

  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, dur, vol) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function playCorrect() {
    playTone(523,'sine',0.12);
    setTimeout(()=>playTone(659,'sine',0.12), 90);
    setTimeout(()=>playTone(784,'sine',0.15), 180);
    setTimeout(()=>playTone(1047,'sine',0.22), 270);
  }
  function playWrong() { playTone(200,'sawtooth',0.2,0.1); }
  function playCelebrate() {
    [523,587,659,698,784,880,1047].forEach((f,i) =>
      setTimeout(() => playTone(f,'sine',0.22,0.17), i*70));
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = 0|Math.random()*(i+1);
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function getTier() {
    if (round <= 3) return 0;
    if (round <= 6) return 1;
    return 2;
  }

  function updateScore() {
    document.getElementById('score-row').innerHTML = '⭐'.repeat(score);
  }

  function sparkleAt(btn) {
    const r = btn.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const icons = ['✨','💫','⭐','🌟','💖','🌸'];
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('span');
      el.className = 'sparkle';
      el.textContent = icons[0|Math.random()*icons.length];
      const angle = (i / 14) * Math.PI * 2;
      const dist  = 48 + Math.random() * 80;
      el.style.left = (cx + Math.cos(angle) * dist) + 'px';
      el.style.top  = (cy + Math.sin(angle) * dist) + 'px';
      el.style.animationDelay = (Math.random() * 0.18) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }
  }

  function nextRound() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    if (round >= TOTAL_ROUNDS) { endGame(); return; }
    round++;

    const tier = getTier();
    const cfg = TIER_CFG[tier];
    document.getElementById('tier-badge').textContent = cfg.label;
    document.getElementById('round-counter').textContent = `${round} / ${TOTAL_ROUNDS}`;

    const shuffledPool = shuffle(cfg.pool);
    target = shuffledPool[0];
    const options = shuffle(shuffledPool.slice(0, cfg.choices));

    const tmpl = PROMPT_TEMPLATES[Math.floor(Math.random() * PROMPT_TEMPLATES.length)];
    document.getElementById('prompt-text').textContent = tmpl(target.label, target.emoji);
    document.getElementById('princess-figure').classList.add('pulse');

    const grid = document.getElementById('choices-grid');
    grid.className = TIER_COLS_CLASS[tier];
    grid.innerHTML = '';
    options.forEach(part => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span>${part.emoji}</span><span class="label">${part.label}</span>`;
      btn.setAttribute('aria-label', part.label);
      btn.addEventListener('pointerdown', () => handleTap(btn, part));
      grid.appendChild(btn);
    });
  }

  function handleTap(btn, part) {
    if (part.name === target.name) {
      btn.classList.add('correct-flash');
      playCorrect();
      sparkleAt(btn);
      document.getElementById('princess-figure').classList.remove('pulse');
      score++;
      updateScore();
      setTimeout(() => {
        btn.classList.remove('correct-flash');
        if (round >= TOTAL_ROUNDS) { endGame(); return; }
        showCelebrate();
      }, 530);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(() => btn.classList.remove('wrong-flash'), 420);
    }
  }

  function showCelebrate() {
    const msgs = ['Amazing! 🌟','Yes!! 🎉','You did it! 💖','Brilliant! ✨','Wow! 🌈','Super! 👑'];
    document.getElementById('celebrate-text').textContent = msgs[0|Math.random()*msgs.length];
    document.getElementById('celebrate-part').textContent = `${target.emoji} ${target.label.toUpperCase()}`;
    document.getElementById('stars-row').textContent = '⭐'.repeat(Math.min(score, 9));
    document.getElementById('next-btn').textContent = 'Next ➡️';
    document.getElementById('next-btn').onclick = nextRound;
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  function endGame() {
    document.getElementById('celebrate-text').textContent = `You got ${score} stars! 👑`;
    document.getElementById('celebrate-part').textContent = '🌟 Body Expert! 🌟';
    document.getElementById('stars-row').textContent = '⭐'.repeat(Math.min(score, 9)) || '🌸';
    document.getElementById('next-btn').textContent = 'Play Again! 🔄';
    document.getElementById('next-btn').onclick = () => { score = 0; round = 0; updateScore(); nextRound(); };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst();
  }

  function confettiBurst() {
    const cols = ['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for (let i = 0; i < 32; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.background = cols[0|Math.random()*cols.length];
      el.style.animationDuration = (1.2+Math.random()*1.6)+'s';
      el.style.animationDelay = (Math.random()*0.4)+'s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2700);
    }
  }

  nextRound();
</script>
</body>
</html>
