<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Royal Animal Homes 🏡</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(160deg, #1b5e20 0%, #2e7d32 35%, #81c784 70%, #f48fb1 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Fredoka One', Georgia, serif;
      overflow: hidden; user-select: none;
      padding-bottom: 12px;
    }

    /* Background floaters */
    .bg-animal {
      position: fixed; pointer-events: none;
      font-size: clamp(24px,6vw,40px);
      color: rgba(255,255,255,0.09);
      animation: bgFloat linear infinite;
      z-index: 0;
    }
    @keyframes bgFloat {
      0%   { transform: translateY(105vh) rotate(0deg); }
      100% { transform: translateY(-15vh) rotate(45deg); }
    }

    /* Header */
    #header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: clamp(12px,3vw,18px) clamp(14px,3.5vw,22px) 0;
      flex-shrink: 0; position: relative; z-index: 1;
    }
    #tier-badge {
      font-size: clamp(13px,3.2vw,17px); padding: 5px 14px; border-radius: 20px;
      color: #fff; font-weight: bold;
      border: 2px solid rgba(255,255,255,0.38);
      transition: background 0.4s;
    }
    #tier-badge.easy { background: linear-gradient(135deg,#2e7d32,#66bb6a); }
    #tier-badge.med  { background: linear-gradient(135deg,#f57f17,#ffca28); color:#3e2000; }
    #tier-badge.hard { background: linear-gradient(135deg,#6a1b9a,#ce93d8); }
    #round-label { font-size: clamp(13px,3.2vw,17px); color: rgba(255,255,255,0.9); position: relative; z-index: 1; }
    #score-row   { font-size: clamp(20px,5vw,28px); letter-spacing: 2px; position: relative; z-index: 1; }

    /* Progress bar */
    #progress-track {
      width: calc(100% - clamp(28px,7vw,44px)); height: 8px;
      background: rgba(255,255,255,0.2); border-radius: 99px;
      margin: clamp(8px,2vw,12px) auto 0;
      overflow: hidden; position: relative; z-index: 1;
    }
    #progress-fill {
      height: 100%; background: linear-gradient(90deg,#ffd700,#ff9800);
      border-radius: 99px; transition: width 0.4s ease; width: 0%;
    }

    /* Animal card */
    #animal-card {
      background: rgba(255,255,255,0.95); border-radius: 32px;
      padding: clamp(12px,3vw,20px) clamp(20px,5vw,36px);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 0 0 4px rgba(255,215,0,0.35);
      margin: clamp(12px,3vw,20px) 0 clamp(8px,2vw,14px);
      flex-shrink: 0; position: relative; z-index: 1;
    }
    #animal-card.pop-in { animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cardPop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
    #animal-emoji { font-size: clamp(70px,18vw,104px); line-height: 1; }
    #animal-name  { font-size: clamp(18px,5vw,28px); color: #1b5e20; font-weight: bold; }

    /* Prompt */
    #prompt {
      font-size: clamp(16px,4.2vw,22px); color: #fff;
      text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      padding: 0 12px; margin-bottom: clamp(8px,2vw,14px);
      flex-shrink: 0; position: relative; z-index: 1;
    }

    /* Home choice buttons */
    #choices {
      display: grid; gap: clamp(10px,2.5vw,14px);
      padding: 0 clamp(12px,3vw,20px); width: 100%;
      position: relative; z-index: 1;
    }
    #choices.cols-2 { grid-template-columns: 1fr 1fr; }
    #choices.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    #choices.cols-4 { grid-template-columns: 1fr 1fr; }

    .home-btn {
      min-height: clamp(90px,22vw,120px);
      border-radius: 22px; border: none; cursor: pointer;
      background: rgba(255,255,255,0.2);
      box-shadow: 0 4px 18px rgba(0,0,0,0.28), inset 0 2px 0 rgba(255,255,255,0.28);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      transition: transform 0.1s; touch-action: manipulation;
    }
    .home-btn:active { transform: scale(0.91); }
    .home-emoji { font-size: clamp(36px,9vw,56px); line-height: 1; }
    .home-label {
      font-size: clamp(13px,3.2vw,18px); color: #fff; font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.45);
    }
    .home-btn.correct-flash { animation: correctPulse 0.5s ease-out; }
    .home-btn.wrong-flash   { animation: wrongShake 0.4s ease-out; }
    @keyframes correctPulse {
      0%  { transform: scale(1); }
      40% { transform: scale(1.14); box-shadow: 0 0 40px rgba(255,215,0,0.8); background: rgba(255,215,0,0.35); }
      100%{ transform: scale(1); }
    }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-10px); }
      60%     { transform: translateX(10px); }
    }

    /* Sparkles */
    .sparkle {
      position: fixed; pointer-events: none; z-index: 98;
      font-size: clamp(16px,4vw,24px);
      animation: sparkleFloat 0.9s ease-out forwards;
    }
    @keyframes sparkleFloat {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
      50%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(0.2); opacity: 0; }
    }

    /* Tier toast */
    #tier-toast {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #tier-toast.show { opacity: 1; pointer-events: all; }
    #toast-icon  { font-size: clamp(60px,16vw,96px); }
    #toast-title { font-size: clamp(26px,7vw,48px); color: #ffd700; text-shadow: 0 0 20px #ff9800; text-align: center; }
    #toast-sub   { font-size: clamp(16px,4.5vw,24px); color: #fff; text-align: center; padding: 0 24px; }
    #toast-btn {
      margin-top: 8px; padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(20px,5vw,28px); border-radius: 50px; border: none;
      background: linear-gradient(135deg,#ffd700,#ff9800);
      color: #5d2e00; font-weight: bold; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      touch-action: manipulation;
    }

    /* Celebration overlay */
    #celebrate-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.58);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #celebrate-overlay.show { opacity: 1; pointer-events: all; }
    #celebrate-animal { font-size: clamp(52px,14vw,84px); line-height: 1; }
    #celebrate-text   { font-size: clamp(18px,5vw,32px); color: #fff; text-shadow: 0 0 20px #ffd700; text-align: center; padding: 0 16px; }
    #celebrate-home   { font-size: clamp(52px,14vw,84px); line-height: 1; }
    #celebrate-label  { font-size: clamp(20px,5.5vw,34px); color: #ffd700; font-weight: bold; letter-spacing: 2px; text-align: center; text-shadow: 0 0 12px rgba(255,215,0,0.5); padding: 0 16px; }
    #next-btn {
      margin-top: 4px;
      padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(20px,5vw,28px); border-radius: 50px; border: none;
      background: linear-gradient(135deg,#ffd700,#ff9800);
      color: #5d2e00; font-weight: bold; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      touch-action: manipulation;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed; border-radius: 50%;
      animation: cfFall linear forwards; pointer-events: none; z-index: 100;
    }
    @keyframes cfFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:0.2} }
  </style>
</head>
<body>

  <div id="bg-animals"></div>

  <div id="header">
    <div id="tier-badge" class="easy">🌸 Easy</div>
    <div id="round-label">1 / 9</div>
    <div id="score-row"></div>
  </div>

  <div id="progress-track"><div id="progress-fill"></div></div>

  <div id="animal-card">
    <div id="animal-emoji">🐦</div>
    <div id="animal-name">Bird</div>
  </div>

  <div id="prompt">✨ Where does Bird live? ✨</div>

  <div id="choices" class="cols-2"></div>

  <div id="tier-toast">
    <div id="toast-icon">🌟</div>
    <div id="toast-title">Moving to Medium!</div>
    <div id="toast-sub">3 home choices now! 🏔🌳🏠</div>
    <button id="toast-btn" onclick="resumeAfterToast()">Keep going! ➡️</button>
  </div>

  <div id="celebrate-overlay">
    <div id="celebrate-animal">🐦</div>
    <div id="celebrate-text">Bird lives in a...</div>
    <div id="celebrate-home">🪺</div>
    <div id="celebrate-label">NEST! ✨</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  // ── Audio ─────────────────────────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(f, type, dur, vol) {
    vol = vol || 0.15;
    try {
      const c = getAudio(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type || 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.start(); o.stop(c.currentTime + dur);
    } catch(e) {}
  }
  function playCorrect()   { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ tone(f,'sine',0.18,0.18); }, i*80); }); }
  function playWrong()     { tone(220,'sawtooth',0.2,0.1); }
  function playCelebrate() { [523,587,659,698,784,880,1047].forEach(function(f,i){ setTimeout(function(){ tone(f,'sine',0.22,0.17); }, i*65); }); }
  function playTierUp()    { [392,494,587,784].forEach(function(f,i){ setTimeout(function(){ tone(f,'sine',0.25,0.18); }, i*100); }); }

  // ── Data ──────────────────────────────────────────────────────────────────
  var HOMES = {
    nest:   { emoji:'🪺', label:'Nest' },
    water:  { emoji:'🌊', label:'Water' },
    hive:   { emoji:'🍯', label:'Hive' },
    house:  { emoji:'🏠', label:'House' },
    cave:   { emoji:'🏔', label:'Cave' },
    tree:   { emoji:'🌳', label:'Tree' },
    burrow: { emoji:'🕳', label:'Burrow' },
    shell:  { emoji:'🐚', label:'Shell' },
    web:    { emoji:'🕸', label:'Web' },
  };

  var EASY = [
    { animal:'🐦', name:'Bird',    home:'nest',   distractors:['house','water'] },
    { animal:'🐟', name:'Fish',    home:'water',  distractors:['nest','house'] },
    { animal:'🐝', name:'Bee',     home:'hive',   distractors:['house','water'] },
    { animal:'🦅', name:'Eagle',   home:'nest',   distractors:['water','tree'] },
    { animal:'🐬', name:'Dolphin', home:'water',  distractors:['nest','tree'] },
    { animal:'🐱', name:'Cat',     home:'house',  distractors:['water','nest'] },
  ];
  var MED = [
    { animal:'🐻', name:'Bear',     home:'cave',   distractors:['tree','house','water'] },
    { animal:'🐿',  name:'Squirrel',home:'tree',   distractors:['house','water','cave'] },
    { animal:'🦉', name:'Owl',      home:'tree',   distractors:['cave','house','water'] },
    { animal:'🦇', name:'Bat',      home:'cave',   distractors:['house','tree','water'] },
    { animal:'🐔', name:'Hen',      home:'house',  distractors:['tree','water','cave'] },
    { animal:'🦊', name:'Fox',      home:'burrow', distractors:['tree','house','water'] },
  ];
  var HARD = [
    { animal:'🐌', name:'Snail',     home:'shell',  distractors:['tree','house','water','burrow'] },
    { animal:'🕷',  name:'Spider',   home:'web',    distractors:['nest','house','tree','cave'] },
    { animal:'🐇', name:'Rabbit',    home:'burrow', distractors:['tree','water','house','web'] },
    { animal:'🦀', name:'Crab',      home:'water',  distractors:['shell','nest','burrow','tree'] },
    { animal:'🦔', name:'Hedgehog',  home:'burrow', distractors:['shell','house','tree','web'] },
    { animal:'🦋', name:'Butterfly', home:'tree',   distractors:['water','house','web','burrow'] },
  ];

  var TIERS = [
    { label:'🌸 Easy',   cssClass:'easy', pool:EASY, choices:2 },
    { label:'🌟 Medium', cssClass:'med',  pool:MED,  choices:3,
      enterToast:{ icon:'🌟', title:'Moving to Medium!', sub:'3 choices now! 🏔🌳🏠' } },
    { label:'👑 Hard',   cssClass:'hard', pool:HARD, choices:4,
      enterToast:{ icon:'👑', title:'Almost There!', sub:'4 choices — you\'ve got this! 💪' } },
  ];
  var TOTAL = 9;

  var score = 0, round = 0, current = null, locked = false;
  var usedAnimals = [new Set(), new Set(), new Set()];

  function shuffle(a) {
    var b = a.slice();
    for (var i = b.length-1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i+1));
      var t = b[i]; b[i] = b[j]; b[j] = t;
    }
    return b;
  }

  function getTierIdx(r) {
    if (r <= 3) return 0;
    if (r <= 6) return 1;
    return 2;
  }

  function updateScore() {
    document.getElementById('score-row').textContent = '⭐'.repeat(score);
  }

  function updateProgress() {
    document.getElementById('progress-fill').style.width = ((round / TOTAL) * 100) + '%';
    document.getElementById('round-label').textContent = round + ' / ' + TOTAL;
  }

  // ── Background floaters ───────────────────────────────────────────────────
  var BG_ITEMS = ['🐦','🌳','🌿','🪺','🍃','🌸','🐝','🌊','🏠','🌱'];
  (function initBg() {
    var cont = document.getElementById('bg-animals');
    for (var i = 0; i < 10; i++) {
      var el = document.createElement('span');
      el.className = 'bg-animal';
      el.textContent = BG_ITEMS[i % BG_ITEMS.length];
      el.style.left = (Math.random() * 100) + 'vw';
      el.style.animationDuration = (9 + Math.random() * 14) + 's';
      el.style.animationDelay    = -(Math.random() * 22) + 's';
      cont.appendChild(el);
    }
  })();

  function nextRound() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    if (round >= TOTAL) { endGame(); return; }

    var prevTierIdx = getTierIdx(round);
    round++;
    locked = false;
    updateProgress();

    var tIdx = getTierIdx(round);
    if (round > 1 && tIdx !== prevTierIdx) {
      showTierToast(tIdx);
      return;
    }
    showQuestion();
  }

  function showTierToast(tIdx) {
    var data = TIERS[tIdx].enterToast;
    document.getElementById('toast-icon').textContent  = data.icon;
    document.getElementById('toast-title').textContent = data.title;
    document.getElementById('toast-sub').textContent   = data.sub;
    document.getElementById('tier-toast').classList.add('show');
    playTierUp();
    confettiBurst(42);
  }

  function resumeAfterToast() {
    document.getElementById('tier-toast').classList.remove('show');
    showQuestion();
  }

  function showQuestion() {
    var tIdx  = getTierIdx(round);
    var tier  = TIERS[tIdx];

    var badge = document.getElementById('tier-badge');
    badge.textContent = tier.label;
    badge.className   = tier.cssClass;

    var pool  = tier.pool;
    var used  = usedAnimals[tIdx];
    var available = pool.filter(function(a){ return !used.has(a.name); });
    var source    = available.length > 0 ? available : pool;
    current = source[Math.floor(Math.random() * source.length)];
    used.add(current.name);

    var card = document.getElementById('animal-card');
    card.classList.remove('pop-in');
    void card.offsetWidth;
    card.classList.add('pop-in');
    document.getElementById('animal-emoji').textContent = current.animal;
    document.getElementById('animal-name').textContent  = current.name;
    document.getElementById('prompt').textContent = '✨ Where does ' + current.name + ' live? ✨';

    var homeKey      = current.home;
    var distKeys     = shuffle(current.distractors).slice(0, tier.choices - 1);
    var allKeys      = shuffle([homeKey].concat(distKeys));

    var grid = document.getElementById('choices');
    grid.className = tier.choices === 4 ? 'cols-4' : 'cols-' + tier.choices;
    grid.innerHTML = '';
    allKeys.forEach(function(key) {
      var h   = HOMES[key];
      var btn = document.createElement('button');
      btn.className = 'home-btn';
      btn.innerHTML = '<span class="home-emoji">' + h.emoji + '</span><span class="home-label">' + h.label + '</span>';
      btn.addEventListener('pointerdown', (function(k){ return function(){ handleTap(btn, k); }; })(key));
      grid.appendChild(btn);
    });
  }

  function handleTap(btn, key) {
    if (locked) return;
    if (key === current.home) {
      locked = true;
      btn.classList.add('correct-flash');
      playCorrect();
      score++;
      updateScore();
      var r = btn.getBoundingClientRect();
      sparkleBurst(r.left + r.width/2, r.top + r.height/2);
      setTimeout(function() {
        btn.classList.remove('correct-flash');
        var h    = HOMES[current.home];
        var msgs = ['Amazing! 🌟','Brilliant! ✨','You know it! 👑','Wonderful! 🌈','Great job! 💖','Yes! 🎀'];
        document.getElementById('celebrate-animal').textContent = current.animal;
        document.getElementById('celebrate-text').textContent   = current.name + ' lives in a...';
        document.getElementById('celebrate-home').textContent   = h.emoji;
        document.getElementById('celebrate-label').textContent  = h.label.toUpperCase() + '! ' + msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate();
        confettiBurst(42);
      }, 500);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(function(){ btn.classList.remove('wrong-flash'); }, 400);
    }
  }

  function endGame() {
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('celebrate-animal').textContent = score >= 7 ? '🏡' : '🌸';
    document.getElementById('celebrate-text').textContent   = score + ' / ' + TOTAL + ' ⭐ You know where they live!';
    document.getElementById('celebrate-home').textContent   = '🎉';
    document.getElementById('celebrate-label').textContent  = 'Nature Explorer! 🌿';
    var btn = document.getElementById('next-btn');
    btn.textContent = 'Play Again 🔄';
    btn.onclick = function() {
      score = 0; round = 0;
      usedAnimals.forEach(function(s){ s.clear(); });
      updateScore();
      btn.textContent = 'Next ➡️';
      btn.onclick = nextRound;
      document.getElementById('celebrate-overlay').classList.remove('show');
      nextRound();
    };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate();
    confettiBurst(60);
    setTimeout(function(){ confettiBurst(40); }, 500);
  }

  function sparkleBurst(cx, cy) {
    var icons = ['✨','💫','⭐','🌟','💖','🌿','🌸','🪺','🍃'];
    for (var i = 0; i < 14; i++) {
      var el = document.createElement('span');
      el.className = 'sparkle';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      var angle = (i / 14) * Math.PI * 2;
      var dist  = 50 + Math.random() * 85;
      el.style.left = (cx + Math.cos(angle) * dist) + 'px';
      el.style.top  = (cy + Math.sin(angle) * dist) + 'px';
      el.style.animationDelay = (Math.random() * 0.15) + 's';
      document.body.appendChild(el);
      setTimeout(function(e){ return function(){ e.remove(); }; }(el), 1100);
    }
  }

  function confettiBurst(count) {
    count = count || 42;
    var cols = ['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6','#fff'];
    for (var i = 0; i < count; i++) {
      var el = document.createElement('div');
      el.className = 'confetti-piece';
      var sz = 8 + Math.random() * 8;
      el.style.width  = sz + 'px';
      el.style.height = sz + 'px';
      el.style.left   = Math.random() * 100 + 'vw';
      el.style.background = cols[Math.floor(Math.random() * cols.length)];
      el.style.animationDuration = (1.2 + Math.random() * 1.6) + 's';
      el.style.animationDelay    = (Math.random() * 0.4) + 's';
      document.body.appendChild(el);
      setTimeout(function(e){ return function(){ e.remove(); }; }(el), 2900);
    }
  }

  updateScore();
  nextRound();
</script>
</body>
</html>
