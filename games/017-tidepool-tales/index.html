<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tidepool Tales 🐚</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#001a3a; overflow:hidden; touch-action:none;
           font-family:'Courier New', monospace; color:#fff; }
    canvas {
      display:block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      width:100vw; height:100vh;
    }

    .screen {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:clamp(12px,3vw,22px);
      z-index:20;
    }
    .screen.hidden { display:none; }

    #start-screen {
      background:
        linear-gradient(180deg, #1565c0 0%, #0d47a1 40%, #002850 100%);
    }
    #start-art {
      width:clamp(180px, 55vw, 280px);
      height:clamp(180px, 55vw, 280px);
      image-rendering: pixelated;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.5));
      animation:bob 2.6s ease-in-out infinite;
    }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    #start-tag {
      font-size:clamp(12px,3vw,18px); color:#ffe082;
      background:rgba(0,0,0,.4); padding:6px 16px; border-radius:4px;
      letter-spacing:3px; text-transform:uppercase;
      border:2px solid #ffe082;
      box-shadow:0 0 0 2px #000, 4px 4px 0 #000;
    }
    #start-title {
      font-size:clamp(26px,7.5vw,54px); color:#fff;
      text-shadow:3px 3px 0 #b71c1c, 6px 6px 0 #000;
      text-align:center; padding:0 16px;
      letter-spacing:2px; font-weight:bold;
    }
    #start-sub {
      font-size:clamp(13px,3.4vw,20px); color:#b3e5fc;
      text-align:center; padding:0 16px; max-width:92vw;
      text-shadow:2px 2px 0 #000;
      line-height:1.4;
    }
    #start-btn, #play-again-btn {
      padding:clamp(12px,4vw,18px) clamp(30px,9vw,56px);
      font-size:clamp(20px,5.5vw,32px);
      background:#e91e63; color:#fff;
      font-weight:bold; cursor:pointer; font-family:inherit;
      border:none;
      box-shadow:
        0 0 0 4px #000,
        6px 6px 0 #000,
        inset 3px 3px 0 #f48fb1,
        inset -3px -3px 0 #ad1457;
      letter-spacing:2px; text-transform:uppercase;
      transition:transform .12s ease;
    }
    #start-btn:active, #play-again-btn:active {
      transform:translate(3px,3px);
      box-shadow:0 0 0 4px #000, 3px 3px 0 #000, inset 3px 3px 0 #f48fb1, inset -3px -3px 0 #ad1457;
    }
    @keyframes btnPulse {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-4px)}
    }
    #start-btn { animation:btnPulse 1.4s ease-in-out infinite; }

    /* HUD */
    #hud {
      position:fixed; top:0; left:0; right:0; z-index:10;
      display:flex; justify-content:center; align-items:center;
      padding:clamp(8px,2vw,14px);
      pointer-events:none; gap:clamp(6px,2vw,12px);
    }
    .friend-slot {
      font-size:clamp(26px,7vw,40px);
      filter:grayscale(1) brightness(.45);
      transition:filter .3s ease, transform .4s ease, background .3s ease, border-color .3s ease;
      background:#1a237e;
      width:clamp(50px,12vw,68px);
      height:clamp(50px,12vw,68px);
      display:flex; align-items:center; justify-content:center;
      border:3px solid #000;
      box-shadow:3px 3px 0 #000, inset 2px 2px 0 rgba(255,255,255,.2);
      image-rendering: pixelated;
    }
    .friend-slot.near {
      filter:grayscale(.4) brightness(.85);
      background:#0277bd;
      animation:nearPulse 1.1s ease-in-out infinite;
    }
    @keyframes nearPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .friend-slot.got {
      filter:none;
      background:#ffb300;
      border-color:#fff;
      animation:pop .75s ease;
    }
    @keyframes pop { 0%{transform:scale(1)} 30%{transform:scale(1.7)} 60%{transform:scale(.92)} 100%{transform:scale(1)} }

    #pearl-counter {
      position:fixed; top:clamp(70px,16vw,96px); right:clamp(8px,2vw,14px); z-index:10;
      font-size:clamp(16px,4.5vw,26px); color:#fff;
      pointer-events:none;
      background:#1a237e;
      padding:4px 12px;
      border:3px solid #000;
      box-shadow:3px 3px 0 #000;
      font-family:'Courier New', monospace;
      letter-spacing:1px;
    }

    #hint {
      position:fixed; bottom:clamp(12px,3vw,24px); left:0; right:0;
      text-align:center; color:#fff;
      font-size:clamp(13px,3.6vw,20px); z-index:10; pointer-events:none;
      text-shadow:2px 2px 0 #000;
      animation:hintFade 9s ease-in-out 5s forwards;
    }
    @keyframes hintFade { to{opacity:0} }

    #find-flash {
      position:fixed; inset:0; pointer-events:none; z-index:8;
      background:rgba(255,220,120,.55);
      opacity:0; transition:opacity .35s ease;
    }
    #find-flash.show { opacity:1; }
    #pearl-flash {
      position:fixed; inset:0; pointer-events:none; z-index:8;
      background:rgba(255,255,255,.35);
      opacity:0; transition:opacity .2s ease;
    }
    #pearl-flash.show { opacity:1; }

    #friend-banner {
      position:fixed; top:38%; left:50%; transform:translate(-50%,-50%) scale(.6);
      font-size:clamp(24px,6.5vw,48px); color:#fff;
      text-shadow:3px 3px 0 #000, 6px 6px 0 rgba(0,0,0,.4);
      pointer-events:none; z-index:12; opacity:0;
      font-weight:bold; text-align:center; padding:12px 22px;
      background:#ff4081;
      border:4px solid #000;
      box-shadow:8px 8px 0 #000;
      letter-spacing:2px;
      transition:opacity .25s ease, transform .45s cubic-bezier(.2,1.4,.4,1);
    }
    #friend-banner.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

    #win-screen {
      background:
        linear-gradient(180deg, #ff80ab 0%, #c2185b 50%, #3a0020 100%);
    }
    #win-title {
      font-size:clamp(24px,6.5vw,48px); color:#fff;
      text-shadow:3px 3px 0 #ad1457, 6px 6px 0 #000;
      text-align:center; padding:0 16px;
      letter-spacing:2px;
    }
    #win-friends { font-size:clamp(42px,12vw,80px); letter-spacing:6px; animation:wiggle 1.6s ease-in-out infinite; }
    @keyframes wiggle { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }

    .confetti-piece {
      position:fixed; pointer-events:none; z-index:25;
      animation:confettiFall linear forwards;
      image-rendering: pixelated;
    }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:0} }

    #back-btn, #mute-btn {
      position:fixed; top:10px; z-index:25;
      background:#1a237e; color:#fff; border:3px solid #000;
      width:44px; height:44px; font-size:20px; cursor:pointer;
      box-shadow:3px 3px 0 #000;
      font-family:inherit; font-weight:bold;
    }
    #back-btn { left:10px; }
    #mute-btn { right:10px; }
    #mute-btn.muted { background:#6d4c41; color:#999; }

    /* Speech bubble */
    #speech-bubble {
      position:fixed; z-index:14;
      pointer-events:none;
      transform:translate(-50%, -100%);
      opacity:0;
      transition:opacity .18s ease;
      min-width:clamp(120px, 40vw, 260px);
      max-width:clamp(200px, 70vw, 420px);
    }
    #speech-bubble.show { opacity:1; }
    #speech-bubble .bubble-box {
      background:#fff;
      color:#000;
      border:4px solid #000;
      box-shadow:4px 4px 0 #000;
      padding:clamp(8px, 2vw, 14px) clamp(12px, 3vw, 18px);
      font-family:'Courier New', monospace;
      font-size:clamp(14px, 3.6vw, 20px);
      line-height:1.3;
      text-align:center;
    }
    #speech-bubble .bubble-name {
      font-size:clamp(12px, 3vw, 16px);
      color:#c2185b;
      font-weight:bold;
      letter-spacing:1px;
      margin-bottom:4px;
    }
    #speech-bubble .bubble-text {
      font-weight:bold;
      color:#1a237e;
    }
    /* Bubble tail */
    #speech-bubble::after {
      content:'';
      position:absolute;
      left:50%; bottom:-14px;
      transform:translateX(-50%);
      width:0; height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-top:14px solid #000;
    }

    /* Follower happy-bubble (heart pop when animal joins) */
    .heart-pop {
      position:fixed; pointer-events:none; z-index:13;
      font-size:clamp(28px, 7vw, 42px);
      animation:heartPop 1.1s ease-out forwards;
      text-shadow:2px 2px 0 #000;
    }
    @keyframes heartPop {
      0%   { opacity:0; transform:translate(-50%,-20%) scale(.3); }
      30%  { opacity:1; transform:translate(-50%,-80%) scale(1.3); }
      100% { opacity:0; transform:translate(-50%,-180%) scale(1); }
    }

    /* Tap ripple */
    .tap-ring {
      position:fixed; pointer-events:none; z-index:9;
      border:3px solid #fff176;
      box-shadow:0 0 0 3px #000;
      border-radius:0;
      animation:tapFade .7s ease-out forwards;
    }
    @keyframes tapFade {
      0% { opacity:1; transform:translate(-50%,-50%) scale(.2); }
      100% { opacity:0; transform:translate(-50%,-50%) scale(1.6); }
    }
  </style>
</head>
<body>
  <button id="back-btn" onclick="history.length>1?history.back():window.close()">←</button>
  <button id="mute-btn" onclick="toggleMute()" style="display:none">♪</button>

  <div id="start-screen" class="screen">
    <div id="start-tag">A Tiny RPG</div>
    <canvas id="start-art" width="64" height="64"></canvas>
    <div id="start-title">TIDEPOOL TALES</div>
    <div id="start-sub">Swim up to friends and they will say hello! Little sea creatures will join you on your adventure.</div>
    <button id="start-btn" onclick="startGame()">▶ BEGIN</button>
  </div>

  <canvas id="game" style="display:none"></canvas>

  <div id="hud" style="display:none">
    <div class="friend-slot" id="slot-goldie">👸</div>
    <div class="friend-slot" id="slot-bluebell">🧜‍♀️</div>
    <div class="friend-slot" id="slot-sunny">☀️</div>
    <div class="friend-slot" id="slot-pearl">👧</div>
  </div>
  <div id="pearl-counter" style="display:none">🫧 0</div>

  <div id="hint" style="display:none">Tap anywhere to swim ✨ Walk close to say hello!</div>

  <div id="find-flash"></div>
  <div id="pearl-flash"></div>
  <div id="friend-banner"></div>
  <div id="speech-bubble">
    <div class="bubble-box">
      <div class="bubble-name"></div>
      <div class="bubble-text"></div>
    </div>
  </div>

  <div id="win-screen" class="screen hidden">
    <div id="win-title">YOU MADE SO MANY FRIENDS!</div>
    <div id="win-friends">👸🧜‍♀️☀️👧</div>
    <button id="play-again-btn" onclick="restartGame()">▶ PLAY AGAIN</button>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════════════════════
  //  PIXEL ART GAME — top-down, click-and-go
  // ═══════════════════════════════════════════════════════════════════════
  // Virtual "pixel" canvas is small, drawn with integer coords, then scaled
  // up to the viewport with imageSmoothingEnabled=false for crisp pixels.
  //
  //   Virtual viewport: VW × VH
  //   Map:              MAP_W × MAP_H
  //   Scale:            chosen to fill screen, always integer
  //
  // Sprites are drawn from small "grids" of characters, each char = 1 pixel.
  // ═══════════════════════════════════════════════════════════════════════

  // Virtual viewport (portrait-ish)
  const VW = 200;
  const VH = 300;
  // Map is larger — camera scrolls to follow Marina
  const MAP_W = 520;
  const MAP_H = 640;

  // Pixel palette — every letter in sprite strings maps to a color here
  const P = {
    '.': null,                    // transparent
    ' ': null,
    // Skin
    's': '#ffd9b8', 'S': '#e8a478', 'k': '#c68862',
    // Eyes / face
    'e': '#1a1a1a', 'W': '#ffffff', 'M': '#c2185b', 'm': '#ec407a', 'z': '#ff8a80',
    // Red hair (Marina)
    'R': '#b71c1c', 'r': '#e53935', 'h': '#ff7043',
    // Golden hair (Rapunzel)
    'Y': '#f9a825', 'y': '#fdd835', 'J': '#fffde7',
    // Blue hair (mermaid friend)
    'U': '#1565c0', 'u': '#42a5f5', 'V': '#bbdefb',
    // Pink hair (princess girl)
    'N': '#c2185b', 'n': '#f48fb1', 'Q': '#fce4ec',
    // Purple (shell top / clams)
    'P': '#6a1b9a', 'p': '#ab47bc', 'q': '#ce93d8', 'Z': '#f3e5f5',
    // Teal/green tail
    'G': '#00695c', 'g': '#1de9b6', 'c': '#84ffff', 'F': '#4dd0e1',
    // Purple tail (friend)
    'K': '#4a148c', 'j': '#7e57c2',
    // Sun
    'O': '#ff8f00', 'o': '#ffd54f', 'a': '#fff59d',
    // Gold / yellow
    'X': '#fbc02d', 'x': '#ffeb3b',
    // Dress pinks
    'I': '#ad1457', 'i': '#ec407a', 'H': '#f8bbd0',
    // Greens (seaweed)
    'b': '#1b5e20', 'B': '#43a047', 'v': '#66bb6a',
    // Browns (wood, rocks)
    'T': '#5d4037', 't': '#8d6e63', 'w': '#6d4c41',
    // Gray stone
    'D': '#455a64', 'd': '#78909c', 'E': '#b0bec5',
    // Sand
    'L': '#f4d9a4', 'l': '#e8c583', 'A': '#d6b980',
    // Water
    '#': '#0d47a1', '~': '#1565c0', '=': '#1976d2', '-': '#42a5f5',
    '*': '#90caf9', '+': '#b3e5fc',
    // Misc
    '0': '#000000', '1': '#ffffff',
    '2': '#ef5350', '3': '#c62828', // crab
    '4': '#ffab00', '5': '#ffd54f', // seahorse yellow

    ".......ggGgcgGgGggg.....",

  const MARINA_UP_A = [
    "........rrrrrrrrr.......",

  ];
  const MARINA_UP_B = MARINA_UP_A; // simple, same
  const MARINA_SIDE_A = [
    ".......rrrrrrrrrr.......",
    "......rRRRRRRRRRRrr.....",
    ".....rRRRRRRRRRRRRr.....",
    ".....rRRRRssssssRRRr....",
    "....rRRRssssssssRRRr....",

    ".....FFFFFFFFFFFFFFF....",
    "...FFFF............FF...",
    "..FF.................F..",

  // ── HAPPY FACE (SUN) 32×32 — front view, animated rays ──
  function makeSun(spin) {
    const ray = (i) => {
      // Rays at 8 cardinal-ish positions; alternate length
      const arr = Array.from({length: 32}, () => '.'.repeat(32).split(''));
      const cx = 16, cy = 16;
      for (let a = 0; a < 8; a++) {
        const ang = (a / 8) * Math.PI * 2 + spin * Math.PI / 16;
        const len = (a % 2 === 0) ? 15 : 12;
        for (let d = 10; d <= len; d++) {
          const rx = Math.round(cx + Math.cos(ang) * d);
          const ry = Math.round(cy + Math.sin(ang) * d);
          if (rx >= 0 && rx < 32 && ry >= 0 && ry < 32) {
            arr[ry][rx] = d > len - 2 ? 'O' : 'o';
          }
        }
      }
      // Sun body (circle radius 7)
      for (let y = 0; y < 32; y++) {
        for (let x = 0; x < 32; x++) {
          const dx = x - cx, dy = y - cy;
          const r2 = dx*dx + dy*dy;
          if (r2 <= 49) {
            if (r2 >= 42) arr[y][x] = 'O';  // rim
            else if (r2 >= 30) arr[y][x] = 'o';
            else arr[y][x] = 'x';
          }
        }
      }
      // Face — eyes, cheeks, smile
      arr[13][12] = 'e'; arr[13][13] = 'e';
      arr[13][18] = 'e'; arr[13][19] = 'e';
      arr[14][12] = 'W'; arr[14][19] = 'W';
      arr[17][14] = 'e'; arr[17][15] = 'e'; arr[17][16] = 'e'; arr[17][17] = 'e';
      arr[18][13] = 'e'; arr[18][18] = 'e';
      arr[19][14] = 'z'; arr[19][15] = 'z'; arr[19][16] = 'z'; arr[19][17] = 'z';
      // Cheeks
      arr[16][10] = 'z'; arr[16][21] = 'z';
      return arr.map(r => r.join(''));
    };
    return ray();
  }
  const SUN_A = makeSun(0);
  const SUN_B = makeSun(1);

  function drawSprite(ctx, sprite, x, y) {
    const W = sprite[0].length;
    const H = sprite.length;
    for (let j = 0; j < H; j++) {
      const row = sprite[j];
      for (let i = 0; i < W; i++) {
        const c = row[i];
        if (!c || c === '.' || c === ' ') continue;
        const col = P[c];
        if (!col) continue;
        ctx.fillStyle = col;
        ctx.fillRect(x + i, y + j, 1, 1);
      }
    }
  }

  // Draw a sprite mirrored (for left-facing from right-facing)
  function drawSpriteFlipped(ctx, sprite, x, y) {
    const W = sprite[0].length;
    const H = sprite.length;
    for (let j = 0; j < H; j++) {
      const row = sprite[j];
      for (let i = 0; i < W; i++) {
        const c = row[W - 1 - i];
        if (!c || c === '.' || c === ' ') continue;
        const col = P[c];
        if (!col) continue;
        ctx.fillStyle = col;
        ctx.fillRect(x + i, y + j, 1, 1);
      }
    }
  }

  // Fish with custom colors (C=dark, c=light)
  function drawFish(ctx, x, y, frame, darkCol, lightCol, flip) {
    const sprite = [
      frame ? "....CCCC.." : "...CCCCC..",
      frame ? ".CCccCCCCc" : ".CCccCCCCc",
      ".CCcccCCCC",
      "CCCWeCCCcc",
      "CCCcccCCCc",
      "CCccccccCC",
      ".ccCCccCC.",
      "..CCCCCCC.",
    ];
    const W = sprite[0].length, H = sprite.length;
    for (let j = 0; j < H; j++) {
      for (let i = 0; i < W; i++) {
        const ci = flip ? (W - 1 - i) : i;
        const c = sprite[j][ci];
        if (c === '.' || c === ' ') continue;
        let col;
        if (c === 'C') col = darkCol;
        else if (c === 'c') col = lightCol;
        else if (c === 'W') col = '#fff';
        else if (c === 'e') col = '#000';
        if (!col) continue;
        ctx.fillStyle = col;
        ctx.fillRect(x + i, y + j, 1, 1);
      }
    }
  }

  // Seahorse with color
  function drawSeahorseColored(ctx, sprite, x, y, mainCol, liteCol) {
    const W = sprite[0].length, H = sprite.length;
    for (let j = 0; j < H; j++) {
      for (let i = 0; i < W; i++) {
        const c = sprite[j][i];
        if (c === '.' || c === ' ') continue;
        let col;
        if (c === 'X') col = mainCol;
        else if (c === 'x') col = liteCol;
        else if (c === 'e') col = '#000';
        if (!col) continue;
        ctx.fillStyle = col;
        ctx.fillRect(x + i, y + j, 1, 1);
      }
    }
  }

  let shells = [];    // {type, x, y}
  let stars = [];     // starfishes
  let octopus = { x: 80, y: 520 };
  let crab = { x: 150, y: 440, phase: 0 };
  let tower = { x: 380, y: 90 };
  let castle = { x: 260, y: 50 };

  // Main canvas + back buffer
  let canvas, ctx, back, bctx;
  let scale = 2;

  // ═══════════════════════════════════════════════════════════════════════
  //  AUDIO (Web Audio API only)
  // ═══════════════════════════════════════════════════════════════════════
  let audioCtx = null;
  function au() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f, type, d, v=0.14, when=0) {
    try {
      const c=au(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type||'square'; o.frequency.value=f;
      const t0 = c.currentTime + when;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(v, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + d);
      o.start(t0); o.stop(t0 + d + 0.02);
    } catch(e) {}
  }
  // Chippy 8-bit tap sound
  function playTap() { tone(880, 'square', 0.06, 0.08); tone(1320, 'square', 0.04, 0.06, 0.04); }
  function playPearl() { tone(1320,'square',0.10,0.08); tone(1760,'square',0.08,0.06, 0.05); tone(2093,'square',0.06,0.05, 0.1); }
  function playFind(kind) {
    const scales = {
      goldie:   [523,659,784,988,1175],
      bluebell: [587,740,880,1175,1397],
      sunny:    [659,784,988,1319,1568],
      pearl:    [523,698,880,1047,1319],
    };
    const notes = scales[kind] || scales.goldie;
    notes.forEach((f,i) => tone(f,'square',0.18,0.1, i*0.07));
    [1760,1976,2349].forEach((f,i)=>tone(f,'triangle',0.1,0.05, 0.15 + i*0.04));
  }
  function playNearHint() { tone(1046,'square',0.08,0.05); }
  function playWin() {
    const melody = [523,659,784,1047,988,1175,1319,1568,1760,2093];
    melody.forEach((f,i) => tone(f,'square',0.22,0.1, i*0.1));
    [131,196,262,330,392].forEach((f,i) => tone(f,'triangle',0.35,0.08, i*0.2));
  }
  // ═══════════════════════════════════════════════════════════════════════
  //  UNDERSEA AMBIENT CHIPTUNE
  //  Slow i-VI-III-v7 drift in A minor: Am7 → Fmaj7 → Cmaj7 → Em7.
  //  Lowpass filter on the whole music bus gives the underwater muffle.
  //  Each note has slight random detune + scheduled echoes for watery reverb.
  //  Layers: sustained pad, triangle bass, whale sub-swells, square arpeggio,
  //  random sparkle twinkles, and a gentle bell chime on downbeats.
  // ═══════════════════════════════════════════════════════════════════════
  const MUSIC = {
    enabled: true,
    bpm: 72,
    barsScheduled: 0,
    nextBarTime: 0,
    timerId: null,
    masterVol: 0.9,
    busFilter: null,
    busGain: null,
    graphReady: false,
  };

  function ensureMusicGraph() {
    if (MUSIC.graphReady) return;
    const c = au();
    // Lowpass gives the "underwater" muffle; resonance nudges it toward dreamy
    MUSIC.busFilter = c.createBiquadFilter();
    MUSIC.busFilter.type = 'lowpass';
    MUSIC.busFilter.frequency.value = 2200;
    MUSIC.busFilter.Q.value = 0.7;
    MUSIC.busGain = c.createGain();
    MUSIC.busGain.gain.value = 0.0001;
    MUSIC.busFilter.connect(MUSIC.busGain);
    MUSIC.busGain.connect(c.destination);
    MUSIC.graphReady = true;
  }

  function beatDur() { return 60 / MUSIC.bpm / 2; }   // 8th note
  function barDur()  { return beatDur() * 8; }

  // Route a single note through the music bus (filtered)
  function musicTone(f, type, d, v, whenAbs, attack=0.04) {
    try {
      const c = au();
      const o = c.createOscillator();
      const g = c.createGain();
      o.detune.value = (Math.random() - 0.5) * 6; // watery pitch wobble
      o.connect(g);
      g.connect(MUSIC.busFilter);
      o.type = type || 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, whenAbs);
      g.gain.exponentialRampToValueAtTime(v, whenAbs + attack);
      g.gain.exponentialRampToValueAtTime(0.0001, whenAbs + d);
      o.start(whenAbs);
      o.stop(whenAbs + d + 0.1);
    } catch(e) {}
  }

  // Schedule a note + two decaying echoes — cheap underwater "reverb"
  function musicToneEcho(f, type, d, v, whenAbs, attack) {
    musicTone(f, type, d, v, whenAbs, attack);
    const ed = 60 / MUSIC.bpm * 0.375;   // dotted 8th
    musicTone(f, type, d * 0.7, v * 0.32, whenAbs + ed, attack);
    musicTone(f, type, d * 0.5, v * 0.14, whenAbs + ed * 2, attack);
  }

  // i - VI - III - v in A minor, all with 7ths → floating, unresolved feel
  // Each chord lists [root, ...arpeggio tones from low to high]
  const CHORDS = [
    // Am7:  A3 C4 E4 G4 A4 C5 E5
    { root: 110.00, arp: [220.00, 261.63, 329.63, 392.00, 440.00, 523.25, 659.25] },
    // Fmaj7: F3 A3 C4 E4 F4 A4 C5
    { root:  87.31, arp: [174.61, 220.00, 261.63, 329.63, 349.23, 440.00, 523.25] },
    // Cmaj7: C3 E3 G3 B3 C4 E4 G4
    { root:  65.41, arp: [130.81, 164.81, 196.00, 246.94, 261.63, 329.63, 392.00] },
    // Em7:  E3 G3 B3 D4 E4 G4 B4
    { root:  82.41, arp: [164.81, 196.00, 246.94, 293.66, 329.63, 392.00, 493.88] },
  ];

  // 8-step rolling arpeggio — floats up, dips, undulates back
  const ARP_PATTERN = [0, 2, 4, 6, 4, 3, 5, 2];

  function scheduleBar(chordIdx, barT, phraseBar) {
    const ch = CHORDS[chordIdx];
    const bd = beatDur();
    const duration = barDur();

    // ── Pad: slow sine swell on chord tones ──
    [ch.root, ch.arp[1], ch.arp[3], ch.arp[5]].forEach(f => {
      musicTone(f, 'sine', duration * 1.08, 0.018, barT, 0.8);
    });

    // ── Bass: sustained triangle root + sine octave below ──
    musicTone(ch.root,        'triangle', duration * 0.96, 0.075, barT, 0.2);
    musicTone(ch.root * 0.5,  'sine',     duration * 0.96, 0.045, barT, 0.3);

    // ── Arpeggio: soft square, 8 eighth-notes ──
    for (let step = 0; step < 8; step++) {
      const idx = ARP_PATTERN[step];
      const f   = ch.arp[idx];
      // Second half of 8-bar phrase gets a bit more presence
      const v   = 0.022 + (phraseBar >= 4 ? 0.01 : 0);
      musicTone(f, 'square', bd * 1.8, v, barT + step * bd, 0.015);
    }

    // ── Bell chime every other bar on beat 2 ──
    if (phraseBar % 2 === 0) {
      const bellIdx = 4 + Math.floor(Math.random() * 3);
      const bellNote = ch.arp[bellIdx] * 2;
      musicToneEcho(bellNote, 'sine', 1.4, 0.03, barT + bd * 2, 0.008);
    }

    // ── Random high twinkles — 1-2 per bar at random positions ──
    const sparkleCount = 1 + Math.floor(Math.random() * 2);
    for (let k = 0; k < sparkleCount; k++) {
      const step    = Math.floor(Math.random() * 8);
      const noteIdx = 4 + Math.floor(Math.random() * 3);
      const f       = ch.arp[noteIdx] * 2;
      musicToneEcho(f, 'triangle', 0.7, 0.012, barT + step * bd, 0.006);
    }

    // ── Deep whale-like sub swell every 4 bars ──
    if (phraseBar === 0) {
      musicTone(ch.root * 0.5, 'sine', duration * 4.2, 0.055, barT, 1.4);
    }
  }

  function pumpMusic() {
    if (!audioCtx || !MUSIC.enabled) return;
    ensureMusicGraph();
    const now = audioCtx.currentTime;
    while (MUSIC.nextBarTime < now + 1.8) {
      const chordIdx  = MUSIC.barsScheduled % 4;
      const phraseBar = MUSIC.barsScheduled % 8;
      scheduleBar(chordIdx, MUSIC.nextBarTime, phraseBar);
      MUSIC.nextBarTime += barDur();
      MUSIC.barsScheduled++;
    }
  }

  function startMusic() {
    if (!audioCtx || MUSIC.timerId) return;
    ensureMusicGraph();
    const now = audioCtx.currentTime;
    // Smooth fade-in so it doesn't pop
    MUSIC.busGain.gain.cancelScheduledValues(now);
    MUSIC.busGain.gain.setValueAtTime(MUSIC.busGain.gain.value, now);
    MUSIC.busGain.gain.linearRampToValueAtTime(MUSIC.masterVol, now + 1.8);
    MUSIC.nextBarTime = now + 0.6;
    MUSIC.barsScheduled = 0;
    pumpMusic();
    MUSIC.timerId = setInterval(pumpMusic, 300);
  }
  function stopMusic() {
    if (MUSIC.timerId) { clearInterval(MUSIC.timerId); MUSIC.timerId = null; }
    if (MUSIC.busGain && audioCtx) {
      const now = audioCtx.currentTime;
      MUSIC.busGain.gain.cancelScheduledValues(now);
      MUSIC.busGain.gain.setValueAtTime(MUSIC.busGain.gain.value, now);
      MUSIC.busGain.gain.linearRampToValueAtTime(0.0001, now + 1.0);
    }
  }
  function toggleMute() {
    MUSIC.enabled = !MUSIC.enabled;
    const btn = document.getElementById('mute-btn');
    if (btn) {
      btn.classList.toggle('muted', !MUSIC.enabled);
      btn.textContent = MUSIC.enabled ? '♪' : '𝄽';
    }
    if (MUSIC.enabled) startMusic();
    else               stopMusic();
  }
  window.toggleMute = toggleMute;

  // ═══════════════════════════════════════════════════════════════════════
  //  SPEECH SYNTHESIS — characters speak their lines aloud (TTS).
  //  Voices are picked per-character for personality: higher pitch for the
  //  princess characters, bubbly for small animals, slower/deeper for the
  //  octopus. Speech is gated with a per-character cooldown so characters
  //  don't immediately repeat when the player lingers nearby.
  // ═══════════════════════════════════════════════════════════════════════
  const SPEECH = {
    supported: typeof window.speechSynthesis !== 'undefined',
    voices: [],
    prefVoice: null,
  };
  function loadVoices() {
    if (!SPEECH.supported) return;
    SPEECH.voices = window.speechSynthesis.getVoices();
    // Prefer a female English voice if one is available
    const pickers = [
      v => /female/i.test(v.name) && v.lang.startsWith('en'),
      v => /(samantha|karen|moira|tessa|victoria|serena|allison|ava|susan|fiona|kate)/i.test(v.name),
      v => v.lang.startsWith('en-GB'),
      v => v.lang.startsWith('en'),
      () => true,
    ];
    for (const test of pickers) {
      const v = SPEECH.voices.find(test);
      if (v) { SPEECH.prefVoice = v; break; }
    }
  }
  if (SPEECH.supported) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }

  function speak(text, voiceOpts={}) {
    if (!SPEECH.supported) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate   = voiceOpts.rate   !== undefined ? voiceOpts.rate   : 0.95;
      u.pitch  = voiceOpts.pitch  !== undefined ? voiceOpts.pitch  : 1.2;
      u.volume = voiceOpts.volume !== undefined ? voiceOpts.volume : 1.0;
      if (SPEECH.prefVoice) u.voice = SPEECH.prefVoice;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }

  // Per-character voice personalities + friendly display names + dialogue pools
  const CHARACTERS = {
    goldie: {
      name: 'Goldie',
      voice: { pitch: 1.55, rate: 0.9 },

      ],
    },
    bluebell: {

      ],
    },
    sunny: {

    pearl: {

    finn: {

    ollie: {

  // ═══════════════════════════════════════════════════════════════════════
  //  SPEECH BUBBLE — tracks the currently-speaking character each frame.
  // ═══════════════════════════════════════════════════════════════════════
  let currentBubbleOwner = null;  // the entity currently showing a bubble
  let bubbleHideTimer = null;

  function showSpeechBubble(character, text) {
    const bubble = document.getElementById('speech-bubble');
    bubble.querySelector('.bubble-name').textContent = character.displayName;
    bubble.querySelector('.bubble-text').textContent = text;
    bubble.classList.add('show');
    currentBubbleOwner = character;
    if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
    // Auto-hide after a duration based on text length (1.3s + 60ms per char)
    const duration = Math.max(1800, 1300 + text.length * 60);
    bubbleHideTimer = setTimeout(() => hideSpeechBubble(), duration);
  }
  function hideSpeechBubble() {
    const bubble = document.getElementById('speech-bubble');
    bubble.classList.remove('show');
    currentBubbleOwner = null;
    if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
  }
  function updateBubblePosition() {
    if (!currentBubbleOwner || !canvas) return;
    const rect = canvas.getBoundingClientRect();
    const sx = (currentBubbleOwner.x - camX) * scale + rect.left;
    const sy = (currentBubbleOwner.y - camY - 44) * scale + rect.top;
    const bubble = document.getElementById('speech-bubble');
    bubble.style.left = sx + 'px';
    bubble.style.top  = sy + 'px';
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  DIALOGUE TRIGGER — called when player walks near a character.
  // ═══════════════════════════════════════════════════════════════════════
  function triggerDialogue(character) {
    const def = CHARACTERS[character.kind];
    if (!def) return;
    // Pick the next line in rotation
    const lineIdx = character.lineIdx || 0;
    const line = def.lines[lineIdx % def.lines.length];
    character.lineIdx = lineIdx + 1;
    character.displayName = def.name;
    showSpeechBubble(character, line);
    speak(line, def.voice);
    // Handle becoming a follower — after the first greeting
    if (def.canFollow && !character.following && lineIdx === 0) {
      // Will flip to follower mode after first line finishes
      setTimeout(() => addFollower(character), 1600);
    }
    // Princess friends — mark as "found" on first approach
    if (!def.canFollow && !character.found) {
      character.found = true;
      foundCount++;
      markFriendFound(character.kind);
      playFind(character.kind);
      spawnSparkle(character.x, character.y, '#ffd700', 20);
      if (foundCount >= friends.length) {
        setTimeout(() => winGame(), 4200);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  FOLLOWERS — sea creatures join the player and trail behind in a chain.
  //  Each follower targets a point on the player's recent trail so the line
  //  naturally curves through whatever path the player has walked.
  // ═══════════════════════════════════════════════════════════════════════
  let followers = [];
  let playerTrail = [];   // array of {x,y}; head = most recent position
  const TRAIL_SPACING = 14;   // px per follower along the trail

  function addFollower(entity) {
    if (entity.following) return;
    entity.following = true;
    entity.slot = followers.length;
    followers.push(entity);
    // Celebratory heart pop + sound
    const rect = canvas.getBoundingClientRect();
    const sx = (entity.x - camX) * scale + rect.left;
    const sy = (entity.y - camY) * scale + rect.top;
    spawnHeart(sx, sy);
    tone(880,'square',0.12,0.08); tone(1320,'square',0.1,0.06, 0.08);
  }
  function spawnHeart(cx, cy) {
    const h = document.createElement('div');
    h.className = 'heart-pop';
    h.textContent = '♥';
    h.style.color = '#ff4081';
    h.style.left = cx + 'px';
    h.style.top  = cy + 'px';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1200);
  }
  function updateFollowers(dt) {
    // Push current player position into trail
    if (playerTrail.length === 0 ||
        Math.hypot(playerTrail[0].x - marina.x, playerTrail[0].y - marina.y) > 2) {
      playerTrail.unshift({ x: marina.x, y: marina.y });
      if (playerTrail.length > 400) playerTrail.length = 400;
    }
    // Each follower tracks a point along the trail
    for (let i = 0; i < followers.length; i++) {
      const f = followers[i];
      const trailIdx = Math.min(playerTrail.length - 1, (i + 1) * TRAIL_SPACING);
      const target = playerTrail[trailIdx];
      if (!target) continue;
      // Smoothly lerp follower toward target
      const lerp = 1 - Math.exp(-dt * 5);
      f.x += (target.x - f.x) * lerp;
      f.y += (target.y - f.y) * lerp;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  WORLD BUILDING
  // ═══════════════════════════════════════════════════════════════════════
  function rng(seed) { let s = seed; return () => { s = (s*1664525 + 1013904223) % 4294967296; return s / 4294967296; }; }

  function buildWorld() {
    const r = rng(42);
    friends = [
      { kind: 'goldie',   x: 386, y: 108, label: 'Goldie!',   t:0, found:false, near:false, isFriend:true, w: 28, h: 36 },
      { kind: 'bluebell', x:  95, y: 350, label: 'Bluebell!', t:0, found:false, near:false, isFriend:true, w: 24, h: 36 },
      { kind: 'sunny',    x: 430, y: 430, label: 'Sunny!',    t:0, found:false, near:false, isFriend:true, w: 32, h: 32 },
      { kind: 'pearl',    x: 140, y: 140, label: 'Pearl!',    t:0, found:false, near:false, isFriend:true, w: 32, h: 40 },
    ];
    // Pearls — scattered in safe spots
    pearls = [];
    for (let i = 0; i < 14; i++) {
      pearls.push({
        x: 40 + r() * (MAP_W - 80),
        y: 40 + r() * (MAP_H - 80),
        t: r() * Math.PI * 2,
        collected: false,
      });
    }
    // Fish (circling)
    const fishPalettes = [
      ['#ff6f00', '#ffca28'],
      ['#6a1b9a', '#ce93d8'],
      ['#0277bd', '#81d4fa'],
      ['#2e7d32', '#aed581'],
      ['#c2185b', '#f8bbd0'],
      ['#f57f17', '#fff176'],
      ['#00838f', '#80deea'],
    ];
    fish = [];
    for (let i = 0; i < 22; i++) {
      const fi = {
        cx: 40 + r() * (MAP_W - 80),
        cy: 40 + r() * (MAP_H - 80),
        radius: 14 + r() * 24,
        speed: 0.3 + r() * 0.5,
        phase: r() * Math.PI * 2,
        pal: fishPalettes[Math.floor(r() * fishPalettes.length)],
      };
      // Current circle position (derived) — start at resting pos
      fi.x = fi.cx + Math.cos(fi.phase) * fi.radius;
      fi.y = fi.cy + Math.sin(fi.phase) * fi.radius;
      fish.push(fi);
    }
    // Name the first fish "Finn" — he can talk and become a follower
    if (fish.length > 0) {
      const finn = fish[0];
      finn.kind = 'finn';
      finn.cx = 260; finn.cy = 300; finn.radius = 10;
      finn.pal = ['#ff6f00', '#ffca28'];
      finn.x = finn.cx + finn.radius;
      finn.y = finn.cy;
    }
    // Seahorses
    const shPalettes = [
      ['#ffb300', '#fff176'],
      ['#ec407a', '#f8bbd0'],
      ['#29b6f6', '#b3e5fc'],
      ['#ab47bc', '#ce93d8'],
      ['#66bb6a', '#c5e1a5'],
    ];
    seahorses = [];
    for (let i = 0; i < 6; i++) {
      seahorses.push({
        x: 30 + r() * (MAP_W - 60),
        y: 30 + r() * (MAP_H - 60),
        baseY: 0,
        phase: r() * Math.PI * 2,
        pal: shPalettes[i % shPalettes.length],
      });
      seahorses[i].baseY = seahorses[i].y;
    }
    // Name the first seahorse "Sprout" — he talks and can follow
    if (seahorses.length > 0) {
      const sprout = seahorses[0];
      sprout.kind = 'sprout';
      sprout.x = 220; sprout.y = 420;
      sprout.baseY = sprout.y;
    }
    // Octopus and crab become named characters too
    octopus.kind = 'ollie';
    crab.kind = 'pinchy';
    // Corals (scattered on sandy edges + middle)
    corals = [];
    for (let i = 0; i < 26; i++) {
      corals.push({
        type: Math.floor(r() * 3),
        x: 20 + r() * (MAP_W - 40),
        y: 30 + r() * (MAP_H - 40),
      });
    }
    // Seaweed patches
    seaweeds = [];
    for (let i = 0; i < 30; i++) {
      seaweeds.push({
        x: 15 + r() * (MAP_W - 30),
        y: 20 + r() * (MAP_H - 40),
        phase: r() * Math.PI * 2,
      });
    }
    // Rocks
    rocks = [];
    for (let i = 0; i < 14; i++) {
      rocks.push({
        type: Math.floor(r() * 2),
        x: 30 + r() * (MAP_W - 60),
        y: 30 + r() * (MAP_H - 60),
      });
    }
    // Shells
    shells = [];
    for (let i = 0; i < 30; i++) {
      shells.push({
        type: Math.floor(r() * 2),
        x: 15 + r() * (MAP_W - 30),
        y: 15 + r() * (MAP_H - 30),
      });
    }
    // Starfishes
    stars = [];
    for (let i = 0; i < 12; i++) {
      stars.push({
        x: 15 + r() * (MAP_W - 30),
        y: 15 + r() * (MAP_H - 30),
      });
    }
    // Bubbles
    bubbles = [];
    for (let i = 0; i < 30; i++) {
      bubbles.push({
        x: r() * MAP_W,
        y: r() * MAP_H,
        speed: 12 + r() * 24,
        drift: r() * Math.PI * 2,
      });
    }
    // ── Build the unified list of characters the player can talk to ──
    talkables = [];
    for (const f of friends) talkables.push(f);
    for (const f of fish) if (f.kind) talkables.push(f);
    for (const s of seahorses) if (s.kind) talkables.push(s);
    talkables.push(octopus);
    talkables.push(crab);
  }
  let talkables = [];

  // ═══════════════════════════════════════════════════════════════════════
  //  CAMERA
  // ═══════════════════════════════════════════════════════════════════════
  let camX = 0, camY = 0;
  function updateCamera() {
    const tx = Math.round(marina.x - VW / 2);
    const ty = Math.round(marina.y - VH / 2);
    camX += (tx - camX) * 0.16;
    camY += (ty - camY) * 0.16;
    camX = Math.max(0, Math.min(MAP_W - VW, camX));
    camY = Math.max(0, Math.min(MAP_H - VH, camY));
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  INPUT (click/tap-to-move)
  // ═══════════════════════════════════════════════════════════════════════
  function bindInput() {
    const onTap = (e) => {
      if (!gameActive) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const cx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
      const cy = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
      // Map screen coords to virtual coords, then to map coords
      const vx = (cx / rect.width) * VW;
      const vy = (cy / rect.height) * VH;
      const mx = Math.round(vx + camX);
      const my = Math.round(vy + camY);
      marina.targetX = Math.max(12, Math.min(MAP_W - 12, mx));
      marina.targetY = Math.max(20, Math.min(MAP_H - 20, my));
      playTap();
      spawnTapRing(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
    };
    canvas.addEventListener('pointerdown', onTap);
  }

  function spawnTapRing(cx, cy) {
    const r = document.createElement('div');
    r.className = 'tap-ring';
    const s = 38;
    r.style.left = cx + 'px';
    r.style.top = cy + 'px';
    r.style.width = s + 'px';
    r.style.height = s + 'px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 720);
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  DRAW WORLD
  // ═══════════════════════════════════════════════════════════════════════
  function drawTileFloor() {
    // Deep-water dither pattern underneath everything (map-space, static)
    const c = bctx;
    // Fill with base water color
    c.fillStyle = '#0d47a1';
    c.fillRect(0, 0, VW, VH);
    // Draw animated water shimmer overlay in viewport space
    const t = globalT * 1.4;
    c.fillStyle = '#1565c0';
    for (let y = 0; y < VH; y += 6) {
      for (let x = 0; x < VW; x += 6) {
        const n = Math.sin((x + camX) * 0.18 + t) + Math.cos((y + camY) * 0.2 + t * 0.8);
        if (n > 0.5) c.fillRect(x, y, 1, 1);
      }
    }
    c.fillStyle = '#42a5f5';
    for (let y = 0; y < VH; y += 4) {
      for (let x = 0; x < VW; x += 4) {
        const n = Math.sin((x + camX) * 0.24 + t * 1.4) * Math.cos((y + camY) * 0.18 + t);
        if (n > 0.7) c.fillRect(x, y, 1, 1);
      }
    }
    c.fillStyle = '#90caf9';
    for (let y = 0; y < VH; y += 8) {
      for (let x = 0; x < VW; x += 8) {
        const n = Math.sin((x + camX) * 0.3 + t * 1.8) + Math.cos((y + camY) * 0.25 + t * 0.9);
        if (n > 1.5) c.fillRect(x, y, 1, 1);
      }
    }

    // Sandy patches — larger, with dithered edges
    c.fillStyle = '#f4d9a4';
    const sandBlobs = [
      { x: 80,  y: 520, rx: 70, ry: 40 },
      { x: 380, y: 440, rx: 80, ry: 50 },
      { x: 200, y: 260, rx: 100, ry: 55 },
      { x: 450, y: 120, rx: 50, ry: 40 },
      { x: 140, y: 560, rx: 60, ry: 40 },
      { x: 60,  y: 150, rx: 60, ry: 40 },
    ];
    for (const b of sandBlobs) {
      const sx = b.x - camX, sy = b.y - camY;
      // Rough elliptical blob
      for (let dy = -b.ry; dy <= b.ry; dy++) {
        for (let dx = -b.rx; dx <= b.rx; dx++) {
          const n = (dx*dx)/(b.rx*b.rx) + (dy*dy)/(b.ry*b.ry);
          if (n < 1) {
            c.fillRect(sx + dx, sy + dy, 1, 1);
          } else if (n < 1.1) {
            // Dither edge
            if ((dx + dy) % 2 === 0) c.fillRect(sx + dx, sy + dy, 1, 1);
          }
        }
      }
      // Darker sand flecks
      c.fillStyle = '#e8c583';
      for (let k = 0; k < 12; k++) {
        const dx = (Math.floor(Math.sin(k*7.1 + b.x)*100) % b.rx) - b.rx/2;
        const dy = (Math.floor(Math.cos(k*7.1 + b.y)*100) % b.ry) - b.ry/2;
        c.fillRect(sx + dx, sy + dy, 1, 1);
      }
      c.fillStyle = '#f4d9a4';
    }

    // Ground shadows under heavy structures
    c.fillStyle = 'rgba(0,0,0,0.2)';
    c.fillRect(tower.x - camX - 2, tower.y - camY + 18, 18, 3);
    c.fillRect(castle.x - camX - 2, castle.y - camY + 20, 24, 3);
  }

  function drawProps() {
    // Layer order: back-to-front by Y
    const items = [];
    for (const r of rocks)     items.push({ y: r.y, kind: 'rock', data: r });
    for (const c of corals)    items.push({ y: c.y, kind: 'coral', data: c });
    for (const s of seaweeds)  items.push({ y: s.y + 14, kind: 'seaweed', data: s });
    for (const sh of shells)   items.push({ y: sh.y, kind: 'shell', data: sh });
    for (const st of stars)    items.push({ y: st.y, kind: 'star', data: st });
    items.push({ y: tower.y + 20, kind: 'tower', data: tower });
    items.push({ y: castle.y + 22, kind: 'castle', data: castle });
    items.push({ y: octopus.y + 24, kind: 'octopus', data: octopus });
    items.push({ y: crab.y + 10, kind: 'crab', data: crab });
    for (const f of friends)   items.push({ y: f.y + f.h, kind: 'friend', data: f });
    for (const s of seahorses) items.push({ y: s.y + 18, kind: 'seahorse', data: s });
    for (const f of fish)      items.push({ y: f.y + 8, kind: 'fish', data: f });
    for (const p of pearls)    items.push({ y: p.y + 6, kind: 'pearl', data: p });
    // Marina
    items.push({ y: marina.y + 32, kind: 'marina', data: marina });

    items.sort((a,b) => a.y - b.y);

    for (const it of items) drawProp(it);
  }

  function drawProp(it) {
    const c = bctx;
    const d = it.data;
    const sx = Math.round(d.x - camX);
    const sy = Math.round(d.y - camY);
    // Skip off-screen
    if (sx < -60 || sx > VW + 60 || sy < -60 || sy > VH + 60) return;

    switch (it.kind) {
      case 'rock': {
        const sprite = d.type === 0 ? ROCK_SMALL : ROCK_BIG;
        drawSprite(c, sprite, sx - sprite[0].length/2 | 0, sy - sprite.length + 3);
        break;
      }
      case 'coral': {
        const sprites = [CORAL_PINK, CORAL_ORANGE, CORAL_PURPLE];
        const sprite = sprites[d.type];
        drawSprite(c, sprite, sx - 7, sy - 13);
        break;
      }
      case 'seaweed': {
        const sway = Math.sin(globalT * 1.2 + d.phase) > 0;
        drawSprite(c, sway ? SEAWEED_A : SEAWEED_B, sx - 3, sy - 16);
        break;
      }
      case 'shell': {
        drawSprite(c, d.type ? SHELL_WHITE : SHELL_PINK, sx - 3, sy - 4);
        break;
      }
      case 'star': {
        drawSprite(c, STARFISH, sx - 4, sy - 7);
        break;
      }
      case 'tower': {
        drawSprite(c, TOWER, sx - 7, sy - 20);
        break;
      }
      case 'castle': {
        drawSprite(c, CASTLE, sx - 10, sy - 22);
        break;
      }
      case 'octopus': {
        const frame = Math.floor(globalT * 2) % 2;
        drawSprite(c, frame ? OCTOPUS_B : OCTOPUS_A, sx - 12, sy - 24);
        break;
      }
      case 'crab': {
        const frame = Math.floor(globalT * 4) % 2;
        drawSprite(c, frame ? CRAB_B : CRAB_A, sx - 8, sy - 10);
        break;
      }
      case 'friend': {
        drawFriend(c, d, sx, sy);
        break;
      }
      case 'seahorse': {
        const bob = Math.sin(globalT * 1.5 + d.phase) * 3;
        const frame = Math.floor(globalT * 3 + d.phase) % 2;
        drawSeahorseColored(c, frame ? SEAHORSE_B : SEAHORSE_A,
          sx - 5, sy - 18 + bob, d.pal[0], d.pal[1]);
        break;
      }
      case 'fish': {
        const fx = Math.round(d.x - camX);
        const fy = Math.round(d.y - camY);
        // Face direction of movement (works both for circling and trailing)
        const flip = (d.prevX !== undefined)
          ? (d.x < d.prevX)
          : (Math.cos(globalT * d.speed + d.phase) < 0);
        const frame = Math.floor(globalT * 6 + (d.phase || 0)) % 2;
        drawFish(c, fx - 5, fy - 4, frame, d.pal[0], d.pal[1], flip);
        break;
      }
      case 'pearl': {
        if (d.collected) break;
        const frame = Math.floor(globalT * 3) % 2;
        const bob = Math.sin(globalT * 2 + d.t) * 1;
        drawSprite(c, frame ? PEARL_B : PEARL_A, sx - 3, sy - 4 + bob);
        break;
      }
      case 'marina': {
        drawMarina(c, sx, sy);
        break;
      }
    }
  }

  function drawFriend(ctx, f, sx, sy) {
    const frame = Math.floor(globalT * 2) % 2;
    let sprite, ox = 0, oy = 0;
    if (f.kind === 'goldie') {
      sprite = frame ? RAPUNZEL_B : RAPUNZEL_A;
      ox = 14; oy = 36;
    } else if (f.kind === 'bluebell') {
      sprite = frame ? MERMAID_B : MERMAID_A;
      ox = 12; oy = 36;
    } else if (f.kind === 'sunny') {
      sprite = frame ? SUN_B : SUN_A;
      ox = 16; oy = 32;
    } else if (f.kind === 'pearl') {
      sprite = frame ? GIRL_B : GIRL_A;
      ox = 16; oy = 40;
    }
    // Found halo — pulsing yellow ring
    if (f.found || f.near) {
      const t = Math.sin(globalT * 4) * 0.5 + 0.5;
      const haloSize = 2 + Math.floor(t * 2);
      ctx.fillStyle = f.found ? '#fff59d' : 'rgba(255,245,157,0.4)';
      // Draw a ring of pixels around
      const cx = sx, cy = sy - oy / 2;
      const rad = Math.max(f.w, f.h) / 2 + haloSize;
      for (let a = 0; a < Math.PI * 2; a += 0.3) {
        ctx.fillRect(cx + Math.round(Math.cos(a) * rad), cy + Math.round(Math.sin(a) * rad), 1, 1);
      }
    }
    drawSprite(ctx, sprite, sx - ox, sy - oy);
  }

  function drawMarina(ctx, sx, sy) {
    const frame = Math.floor(marina.frameT * 6) % 2;
    let sprite;
    let flip = false;
    if (marina.dir === 'down')  sprite = frame ? MARINA_DOWN_B : MARINA_DOWN_A;
    else if (marina.dir === 'up')    sprite = frame ? MARINA_UP_B : MARINA_UP_A;
    else if (marina.dir === 'left')  { sprite = frame ? MARINA_SIDE_B : MARINA_SIDE_A; }
    else if (marina.dir === 'right') { sprite = frame ? MARINA_SIDE_B : MARINA_SIDE_A; flip = true; }
    if (flip) drawSpriteFlipped(ctx, sprite, sx - 12, sy - 32);
    else      drawSprite(ctx, sprite, sx - 12, sy - 32);
  }

  function drawBubbles() {
    const c = bctx;
    for (const b of bubbles) {
      const sx = Math.round(b.x - camX);
      const sy = Math.round(b.y - camY);
      if (sx < -6 || sx > VW + 6 || sy < -6 || sy > VH + 6) continue;
      drawSprite(c, BUBBLE_SMALL, sx - 2, sy - 2);
    }
  }

  // Sparkles
  let sparkles = [];
  function spawnSparkle(x, y, color='#fff59d', count=8) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 20 + Math.random() * 40;
      sparkles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 10,
        life: 0.8 + Math.random() * 0.4,
        color,
      });
    }
  }
  function drawSparkles(dt) {
    const c = bctx;
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const s = sparkles[i];
      s.life -= dt;
      if (s.life <= 0) { sparkles.splice(i, 1); continue; }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 40 * dt;
      const sx = Math.round(s.x - camX);
      const sy = Math.round(s.y - camY);
      if (sx < 0 || sx > VW || sy < 0 || sy > VH) continue;
      const size = s.life > 0.5 ? 2 : 1;
      c.fillStyle = s.color;
      c.fillRect(sx, sy, size, size);
      c.fillStyle = '#fff';
      c.fillRect(sx, sy, 1, 1);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  GAME LOOP
  // ═══════════════════════════════════════════════════════════════════════
  let lastT = 0;
  function animate(now) {
    requestAnimationFrame(animate);
    if (!gameActive) return;
    const dt = Math.min(0.05, (now - lastT) / 1000 || 0);
    lastT = now;
    globalT += dt;
    marina.frameT += dt;

    // ── Move Marina toward target ──
    if (marina.targetX !== null) {
      const dx = marina.targetX - marina.x;
      const dy = marina.targetY - marina.y;
      const d = Math.hypot(dx, dy);
      if (d < 1.5) {
        marina.targetX = null;
        marina.targetY = null;
      } else {
        const vx = dx / d * CFG.swimSpeed * dt;
        const vy = dy / d * CFG.swimSpeed * dt;
        marina.x += vx;
        marina.y += vy;
        // Face direction
        if (Math.abs(dx) > Math.abs(dy)) {
          marina.dir = dx > 0 ? 'right' : 'left';
        } else {
          marina.dir = dy > 0 ? 'down' : 'up';
        }
      }
    }
    marina.x = Math.max(12, Math.min(MAP_W - 12, marina.x));
    marina.y = Math.max(20, Math.min(MAP_H - 20, marina.y));

    // Camera follow
    updateCamera();

    // ── Bubbles rise ──
    for (const b of bubbles) {
      b.y -= b.speed * dt;
      b.x += Math.sin(globalT + b.drift) * 4 * dt;
      if (b.y < -6) {
        b.y = MAP_H + 10;
        b.x = Math.random() * MAP_W;
      }
    }

    // ── Crab scuttle (only when not following the player) ──
    if (!crab.following) {
      crab.phase += dt * 0.8;
      crab.x = 150 + Math.cos(crab.phase) * 40;
      crab.y = 470 + Math.sin(crab.phase * 0.5) * 20;
    }

    // ── Update fish circle positions (for collision/sort/draw) ──
    for (const f of fish) {
      if (f.following) continue;
      f.prevX = f.x;
      const angle = globalT * f.speed + f.phase;
      f.x = f.cx + Math.cos(angle) * f.radius;
      f.y = f.cy + Math.sin(angle) * f.radius;
    }
    // ── Update seahorse bob ──
    for (const s of seahorses) {
      if (s.following) continue;
      s.y = s.baseY + Math.sin(globalT * 1.5 + s.phase) * 3;
    }

    // ── Followers track the player trail; bubble pos updates each frame ──
    updateFollowers(dt);
    updateBubblePosition();

    // ── Pearls pickup ──
    for (const p of pearls) {
      if (p.collected) continue;
      p.t += dt;
      const d = Math.hypot(p.x - marina.x, p.y - marina.y);
      if (d < CFG.pearlDist) {
        p.collected = true;
        pearlsCollected++;
        updatePearlCounter();
        playPearl();
        flash('pearl-flash');
        spawnSparkle(p.x, p.y, '#fff', 12);
      }
    }

    // ── Dialogue triggers: walk within range of any talkable character ──
    for (const f of talkables) {
      f.t = (f.t || 0) + dt;
      const d = Math.hypot(f.x - marina.x, f.y - marina.y);
      const wasClose = f.wasClose || false;
      const isClose  = d < CFG.findDist;
      const isNear   = d < CFG.nearFriendDist;
      f.wasClose = isClose;
      // HUD "near" highlight for princess friends
      if (f.found === false || f.isFriend) {
        const slot = document.getElementById('slot-' + f.kind);
        if (slot) slot.classList.toggle('near', isNear && !f.found);
        if (isNear && !f.wasNear) playNearHint();
        f.wasNear = isNear;
      }
      // Trigger dialogue when we first enter range — and not while another
      // character is already speaking. Re-triggers if you leave + come back.
      if (isClose && !wasClose && !currentBubbleOwner) {
        triggerDialogue(f);
      }
    }

    // ── RENDER ──
    bctx.clearRect(0, 0, VW, VH);
    drawTileFloor();
    drawProps();
    drawBubbles();
    drawSparkles(dt);

    // Blit to main canvas (nearest-neighbor scaled)
    ctx.imageSmoothingEnabled = false;
    ctx.mozImageSmoothingEnabled = false;
    ctx.webkitImageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(back, 0, 0, VW, VH, 0, 0, canvas.width, canvas.height);

    // Draw target marker (clicked dest) in screen space on top
    if (marina.targetX !== null) {
      const sx = Math.round(marina.targetX - camX);
      const sy = Math.round(marina.targetY - camY);
      // blink
      if (Math.floor(globalT * 6) % 2 === 0) {
        ctx.fillStyle = '#fff59d';
        ctx.fillRect(sx * scale - 1, sy * scale - 6 * scale, 2 * scale, 2 * scale);
        ctx.fillRect(sx * scale - 6 * scale, sy * scale - 1, 2 * scale, 2 * scale);
        ctx.fillRect(sx * scale - 1, sy * scale + 4 * scale, 2 * scale, 2 * scale);
        ctx.fillRect(sx * scale + 4 * scale, sy * scale - 1, 2 * scale, 2 * scale);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  HELPERS / FLOW
  // ═══════════════════════════════════════════════════════════════════════
  function flash(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 320);
  }
  function updatePearlCounter() {
    document.getElementById('pearl-counter').textContent = '🫧 ' + pearlsCollected;
  }
  function markFriendFound(kind) {
    const el = document.getElementById('slot-' + kind);
    if (el) { el.classList.add('got'); el.classList.remove('near'); }
  }
  function showBanner(text) {
    const b = document.getElementById('friend-banner');
    b.textContent = text;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1400);
  }

  function initCanvas() {
    canvas = document.getElementById('game');
    canvas.style.display = 'block';
    ctx = canvas.getContext('2d');
    back = document.createElement('canvas');
    back.width = VW;
    back.height = VH;
    bctx = back.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
  }
  function resize() {
    // Fit canvas to the viewport while preserving integer scale
    const sw = window.innerWidth;
    const sh = window.innerHeight;
    scale = Math.max(1, Math.min(Math.floor(sw / VW), Math.floor(sh / VH)));
    canvas.width = VW * scale;
    canvas.height = VH * scale;
    canvas.style.width = (VW * scale) + 'px';
    canvas.style.height = (VH * scale) + 'px';
    // Center if smaller than screen
    canvas.style.margin = '0 auto';
    canvas.style.position = 'fixed';
    canvas.style.left = '50%';
    canvas.style.top = '50%';
    canvas.style.transform = 'translate(-50%, -50%)';
  }

  function startGame() {
    try { au().resume(); } catch(e) {}
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('pearl-counter').style.display = 'block';
    document.getElementById('hint').style.display = 'block';
    document.getElementById('mute-btn').style.display = 'block';

    if (!canvas) {
      initCanvas();
      buildWorld();
      marina.x = MAP_W / 2;
      marina.y = MAP_H / 2;
      camX = marina.x - VW / 2;
      camY = marina.y - VH / 2;
      bindInput();
      requestAnimationFrame(animate);
    }
    gameActive = true;
    lastT = performance.now();
    [523,659,784,988,1175].forEach((f,i) => tone(f,'square',0.2,0.1, i*0.07));
    startMusic();
  }

  function winGame() {
    gameActive = false;
    document.getElementById('hud').style.display = 'none';
    document.getElementById('pearl-counter').style.display = 'none';
    document.getElementById('win-screen').classList.remove('hidden');
    stopMusic();
    playWin();
    spawnConfetti();
    setTimeout(spawnConfetti, 700);
    setTimeout(spawnConfetti, 1500);
  }

  function restartGame() {
    foundCount = 0;
    pearlsCollected = 0;
    updatePearlCounter();
    marina.x = MAP_W / 2;
    marina.y = MAP_H / 2;
    marina.targetX = null; marina.targetY = null;
    for (const f of friends) {
      f.found = false; f.near = false; f.t = 0;
      f.wasClose = false; f.wasNear = false; f.lineIdx = 0;
    }
    for (const t of talkables) {
      t.wasClose = false; t.wasNear = false; t.lineIdx = 0; t.following = false;
    }
    // Reset follower chain — animals go back to free-roam
    followers = [];
    playerTrail = [];
    hideSpeechBubble();
    if (SPEECH.supported) { try { window.speechSynthesis.cancel(); } catch(e) {} }
    for (const p of pearls) { p.collected = false; }
    document.querySelectorAll('.friend-slot').forEach(s => { s.classList.remove('got'); s.classList.remove('near'); });
    document.getElementById('win-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('pearl-counter').style.display = 'block';
    gameActive = true;
    lastT = performance.now();
    if (MUSIC.enabled) startMusic();
  }

  function spawnConfetti() {
    const colors = ['#ff80ab','#ffd700','#4fc3f7','#ba68c8','#ffca28','#f06292','#7e57c2','#aed581','#26a69a','#ff9800'];
    for (let i=0; i<70; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const size = 6 + Math.floor(Math.random() * 4) * 3;
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.left   = (Math.random() * 100) + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (2.4 + Math.random() * 2.6) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  START-SCREEN ART (preview Marina sprite)
  // ═══════════════════════════════════════════════════════════════════════
  (function(){
    const artCanvas = document.getElementById('start-art');
    artCanvas.width = 64;
    artCanvas.height = 64;
    const c = artCanvas.getContext('2d');
    c.imageSmoothingEnabled = false;
    // Draw an off-screen mini scene: water bg + Marina sprite
    const off = document.createElement('canvas');
    off.width = 48; off.height = 48;
    const oc = off.getContext('2d');
    // Water
    oc.fillStyle = '#1565c0';
    oc.fillRect(0, 0, 48, 48);
    // Water shimmer
    oc.fillStyle = '#42a5f5';
    for (let i = 0; i < 20; i++) {
      oc.fillRect(Math.floor(Math.random()*48), Math.floor(Math.random()*48), 1, 1);
    }
    oc.fillStyle = '#90caf9';
    for (let i = 0; i < 8; i++) {
      oc.fillRect(Math.floor(Math.random()*48), Math.floor(Math.random()*48), 1, 1);
    }
    // Marina sprite centered
    drawSprite(oc, MARINA_DOWN_A, 12, 8);
    c.drawImage(off, 0, 0, 48, 48, 0, 0, 64, 64);

    // Start-screen bubbles (decorative divs)
    const s = document.getElementById('start-screen');
    for (let i = 0; i < 12; i++) {
      const b = document.createElement('div');
      b.className = 'tap-ring';
      b.style.animation = 'none';
      b.style.border = '2px solid rgba(255,255,255,0.4)';
      b.style.boxShadow = '0 0 0 2px #000';
      const size = 6 + Math.random() * 16;
      b.style.left = (Math.random()*100)+'vw';
      b.style.top = (Math.random()*100)+'vh';
      b.style.width = size+'px';
      b.style.height = size+'px';
      b.style.position = 'absolute';
      b.style.zIndex = '0';
      b.style.transform = 'translate(-50%, -50%)';
      s.appendChild(b);
    }
  })();
  </script>
</body>
