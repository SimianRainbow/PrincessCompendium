<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Animal Friends 🦄</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(160deg, #1b5e20 0%, #388e3c 45%, #a5d6a7 100%);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: Georgia, serif;
      overflow: hidden; user-select: none;
    }
    #prompt { font-size: clamp(20px,5.5vw,32px); color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.4); margin-bottom:16px; text-align:center; padding:0 12px; }
    #target-stage {
      background: rgba(255,255,255,0.18); border-radius:28px;
      border:3px solid rgba(255,255,255,0.3);
      padding: clamp(14px,4vw,24px);
      display:flex; flex-direction:column; align-items:center; gap:8px;
      margin-bottom:28px;
      box-shadow:0 4px 24px rgba(0,0,0,.18);
    }
    #target-emoji { font-size: clamp(72px,20vw,120px); line-height:1; animation: popIn .4s cubic-bezier(.34,1.56,.64,1); }
    #target-label { font-size: clamp(18px,5vw,30px); color:#fff; font-weight:bold; text-shadow:0 1px 4px rgba(0,0,0,.3); letter-spacing:1px; }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

    #animal-grid {
      display:grid; grid-template-columns:repeat(2,1fr);
      gap:clamp(12px,3vw,20px); padding:4px;
    }
    .animal-btn {
      width:clamp(110px,27vw,150px); height:clamp(110px,27vw,150px);
      border-radius:22px; border:none; cursor:pointer;
      background:rgba(255,255,255,0.2);
      box-shadow:0 4px 16px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.2);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      transition:transform .1s;
    }
    .animal-btn:active { transform:scale(.9); }
    .animal-btn .btn-emoji { font-size:clamp(44px,11vw,64px); line-height:1; }
    .animal-btn .btn-label { font-size:clamp(12px,3vw,16px); color:#fff; font-weight:bold; text-shadow:0 1px 3px rgba(0,0,0,.4); }
    .animal-btn.correct-flash { animation:correctPulse .5s ease-out; }
    .animal-btn.wrong-flash { animation:wrongShake .4s ease-out; }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.18);box-shadow:0 0 40px rgba(255,255,255,.7)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-text { font-size:clamp(32px,9vw,64px); color:#fff; text-shadow:0 0 20px #ffd700; text-align:center; padding:0 16px; }
    #celebrate-animal { font-size:clamp(60px,18vw,110px); }
    #next-btn { padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px); border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800); color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit; box-shadow:0 4px 16px rgba(255,180,0,.5); }
    #score-row { position:fixed; top:16px; right:20px; font-size:clamp(22px,6vw,32px); }
    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>
  <div id="score-row"></div>
  <div id="prompt">Find this animal! 🌿</div>
  <div id="target-stage">
    <div id="target-emoji"></div>
    <div id="target-label"></div>
  </div>
  <div id="animal-grid"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">Yes! That's a...</div>
    <div id="celebrate-animal"></div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const ANIMALS = [
    { emoji:'🐶', name:'Dog' },    { emoji:'🐱', name:'Cat' },
    { emoji:'🐰', name:'Bunny' },  { emoji:'🦊', name:'Fox' },
    { emoji:'🐻', name:'Bear' },   { emoji:'🐼', name:'Panda' },
    { emoji:'🐨', name:'Koala' },  { emoji:'🦁', name:'Lion' },
    { emoji:'🐯', name:'Tiger' },  { emoji:'🦄', name:'Unicorn' },
    { emoji:'🐸', name:'Frog' },   { emoji:'🐧', name:'Penguin' },
    { emoji:'🦋', name:'Butterfly'},{ emoji:'🐬', name:'Dolphin' },
  ];

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCorrect(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18),i*90)); }
  function playWrong(){ tone(200,'sawtooth',.2,.09); }
  function playCelebrate(){ [523,587,659,698,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*70)); }

  let target,score=0,round=0;
  const TOTAL=6;

  function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }
  function updateScore(){ document.getElementById('score-row').innerHTML=Array.from({length:score},()=>'⭐').join(''); }

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    if(round>=TOTAL){ endGame(); return; }
    round++;
    const pool=shuffle(ANIMALS);
    target=pool[0];
    const opts=shuffle(pool.slice(0,4));

    document.getElementById('target-emoji').textContent=target.emoji;
    document.getElementById('target-label').textContent=target.name;
    document.getElementById('target-emoji').style.animation='none';
    void document.getElementById('target-emoji').offsetWidth;
    document.getElementById('target-emoji').style.animation='';

    const grid=document.getElementById('animal-grid');
    grid.innerHTML='';
    opts.forEach(a=>{
      const btn=document.createElement('button');
      btn.className='animal-btn';
      btn.innerHTML=`<span class="btn-emoji">${a.emoji}</span><span class="btn-label">${a.name}</span>`;
      btn.addEventListener('pointerdown',()=>handleTap(btn,a));
      grid.appendChild(btn);
    });
  }

  function handleTap(btn,a){
    if(a.name===target.name){
      btn.classList.add('correct-flash'); playCorrect(); score++; updateScore();
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        const msgs=['Yes! That\'s a...','Correct! 🎉','You found it! 💖','Brilliant! ✨'];
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-animal').textContent=target.emoji;
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      },500);
    } else {
      btn.classList.add('wrong-flash'); playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'),400);
    }
  }

  function endGame(){
    document.getElementById('celebrate-text').textContent=`You got ${score} stars! 🌟`;
    document.getElementById('celebrate-animal').textContent=Array.from({length:score},()=>'⭐').join('')||'🌸';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{ score=0;round=0;updateScore();nextRound();document.getElementById('celebrate-overlay').classList.remove('show'); };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<30;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*.4)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    }
  }

  nextRound();
</script>
</body>
</html>
