<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Royal Feast 🥘</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      background: linear-gradient(155deg, #1a0533 0%, #4a1272 50%, #9c4dcc 100%);
      font-family: 'Fredoka One', Georgia, serif;
      display: flex; flex-direction: column; align-items: center;
      overflow: hidden; user-select: none;
    }

    /* Background floating food */
    .bg-food {
      position: fixed; pointer-events: none; z-index: 0;
      animation: floatUp linear infinite; opacity: 0.09;
      font-size: clamp(20px,5vw,36px);
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-15vh) rotate(360deg); }
    }

    /* Header */
    #header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: clamp(10px,3vw,16px) clamp(14px,4vw,22px) 0;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    #tier-badge { font-size: clamp(13px,3.2vw,18px); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    .tier-easy   { background: linear-gradient(135deg,#a5d6a7,#66bb6a); color: #1b5e20; }
    .tier-medium { background: linear-gradient(135deg,#ffe082,#ffd54f); color: #5a3000; }
    .tier-hard   { background: linear-gradient(135deg,#ce93d8,#ab47bc); color: #fff; }
    #round-label { font-size: clamp(13px,3.2vw,17px); color: rgba(255,255,255,0.9); position: relative; z-index: 1; }

    /* Progress bar */
    #progress-wrap { width: 100%; padding: 6px clamp(14px,4vw,22px) 0; position: relative; z-index: 1; flex-shrink: 0; }
    #progress-track { background: rgba(255,255,255,0.18); border-radius: 20px; height: clamp(8px,2vw,12px); overflow: hidden; }
    #progress-fill  { height: 100%; border-radius: 20px; background: linear-gradient(90deg,#ffd700,#e040fb); transition: width .35s ease; width: 0%; box-shadow: 0 0 8px rgba(255,215,0,.45); }

    /* Prompt */
    #prompt {
      font-size: clamp(18px,4.5vw,26px); color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      text-align: center; padding: clamp(8px,2vw,14px) 16px 0;
      position: relative; z-index: 1; flex-shrink: 0;
    }

    /* Food card */
    #food-card {
      background: rgba(255,255,255,0.95); border-radius: 28px;
      padding: clamp(8px,2.5vw,16px) clamp(14px,5vw,30px);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.28), 0 0 0 4px rgba(255,215,0,0.35);
      margin: clamp(8px,2vw,14px) 0 clamp(6px,1.5vw,10px);
      position: relative; z-index: 1; flex-shrink: 0;
    }
    #food-card.pop-in { animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes cardPop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
    #food-emoji { font-size: clamp(68px,18vw,100px); line-height: 1; }
    #food-name  { font-size: clamp(18px,5vw,28px); color: #4a148c; font-weight: bold; }

    /* Basket buttons */
    #baskets {
      display: grid; gap: clamp(10px,2.5vw,16px);
      padding: 0 clamp(12px,3vw,20px) clamp(10px,2vw,16px);
      width: 100%; max-width: 500px;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    #baskets.cols-2 { grid-template-columns: 1fr 1fr; }
    #baskets.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    #baskets.cols-4 { grid-template-columns: 1fr 1fr; }

    .basket-btn {
      min-height: clamp(88px,22vw,118px);
      border-radius: 22px; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 10px 6px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.25);
      transition: transform 0.1s; touch-action: manipulation; position: relative; overflow: hidden;
    }
    .basket-btn:active { transform: scale(0.91); }
    .basket-icon  { font-size: clamp(36px,9vw,54px); line-height: 1; pointer-events: none; }
    .basket-label { font-size: clamp(11px,2.8vw,16px); font-weight: bold; pointer-events: none; line-height: 1.1; text-align: center; }

    .basket-fruit  { background: linear-gradient(145deg,#c8e6c9,#66bb6a); color: #1b5e20; }
    .basket-veggie { background: linear-gradient(145deg,#dcedc8,#558b2f); color: #1b5e20; }
    .basket-grain  { background: linear-gradient(145deg,#fff9c4,#f9a825); color: #4a2000; }
    .basket-treat  { background: linear-gradient(145deg,#f8bbd0,#e91e63); color: #880e4f; }

    .basket-btn.correct-flash { animation: correctPop 0.5s ease-out; }
    .basket-btn.wrong-flash   { animation: wrongShake 0.42s ease-out; }
    @keyframes correctPop { 0%{transform:scale(1)} 40%{transform:scale(1.15);box-shadow:0 0 40px rgba(255,215,0,0.8)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 60%{transform:translateX(12px)} 80%{transform:translateX(-6px)} }

    /* Sparkles */
    .sp    { position: fixed; pointer-events: none; z-index: 50; animation: spOut .75s ease-out forwards; }
    @keyframes spOut { 0%{transform:scale(0);opacity:1} 100%{transform:scale(1.5);opacity:0} }
    .sp-dot { position: fixed; pointer-events: none; z-index: 50; border-radius: 50%; animation: dotFly .8s ease-out forwards; }
    @keyframes dotFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(.1);opacity:0} }

    /* Tier toast */
    #tier-toast {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #tier-toast.show { opacity: 1; pointer-events: all; }
    #toast-icon  { font-size: clamp(60px,16vw,96px); }
    #toast-title { font-size: clamp(24px,6.5vw,44px); color: #ffd700; text-shadow: 0 0 20px #ff9800; text-align: center; }
    #toast-sub   { font-size: clamp(15px,4vw,22px); color: #fff; text-align: center; padding: 0 24px; }
    #toast-btn {
      margin-top: 8px; padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(18px,4.8vw,26px); border-radius: 50px; border: none;
      background: linear-gradient(135deg,#ffd700,#ff9800);
      color: #5d2e00; font-weight: bold; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      touch-action: manipulation;
    }

    /* Celebration overlay */
    #celebrate-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.68);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #celebrate-overlay.show { opacity: 1; pointer-events: all; }
    #celebrate-food   { font-size: clamp(54px,14vw,86px); line-height: 1; }
    #celebrate-arrow  { font-size: clamp(28px,7vw,44px); }
    #celebrate-basket { font-size: clamp(54px,14vw,86px); line-height: 1; }
    #celebrate-label  { font-size: clamp(22px,5.5vw,36px); color: #ffd700; font-weight: bold; text-align: center; text-shadow: 0 0 14px rgba(255,215,0,0.6); padding: 0 16px; }
    #next-btn {
      margin-top: 8px; padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(18px,4.8vw,26px); border-radius: 50px; border: none;
      background: linear-gradient(135deg,#ffd700,#ff9800);
      color: #5d2e00; font-weight: bold; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      touch-action: manipulation;
    }

    /* Win overlay */
    #win-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #win-overlay.show { opacity: 1; pointer-events: all; }
    #win-crown  { font-size: clamp(72px,18vw,110px); line-height: 1; animation: bounce 1.1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    #win-title { font-size: clamp(26px,7vw,46px); color: #ffd700; text-shadow: 0 0 24px #ff9800; text-align: center; }
    #win-sub   { font-size: clamp(15px,4vw,22px); color: #fff; text-align: center; padding: 0 24px; }
    #win-btn {
      padding: clamp(14px,4vw,20px) clamp(36px,9vw,60px);
      font-size: clamp(18px,4.8vw,26px); border-radius: 50px; border: none;
      background: linear-gradient(135deg,#ffd700,#ab47bc);
      color: #fff; font-weight: bold; cursor: pointer;
      font-family: inherit; box-shadow: 0 4px 20px rgba(255,215,0,0.55);
      touch-action: manipulation; margin-top: 8px;
    }

    /* Confetti */
    .confetti {
      position: fixed; pointer-events: none; z-index: 101; border-radius: 3px;
      animation: cfFall linear forwards;
    }
    @keyframes cfFall {
      0%  { top: -20px; opacity: 1; transform: rotate(0deg); }
      100%{ top: 110vh; opacity: .2; transform: rotate(var(--cr,360deg)); }
    }
  </style>
</head>
<body>

  <div id="bg-floaters"></div>

  <div id="header">
    <div id="tier-badge" class="tier-easy">🌸 Easy</div>
    <div id="round-label">1 / 9</div>
  </div>
  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="prompt">Where does this go? 🍽️</div>

  <div id="food-card">
    <div id="food-emoji">🍎</div>
    <div id="food-name">Apple</div>
  </div>

  <div id="baskets" class="cols-2"></div>

  <!-- Tier toast -->
  <div id="tier-toast">
    <div id="toast-icon">🌟</div>
    <div id="toast-title">New Baskets!</div>
    <div id="toast-sub">More food groups to sort! 🧺</div>
    <button id="toast-btn" onclick="resumeAfterToast()">Let's sort! ➡️</button>
  </div>

  <!-- Correct celebration overlay -->
  <div id="celebrate-overlay">
    <div id="celebrate-food">🍎</div>
    <div id="celebrate-arrow">➡️</div>
    <div id="celebrate-basket">🍎</div>
    <div id="celebrate-label">FRUITS! ✨</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay">
    <div id="win-crown">👑</div>
    <div id="win-title">Royal Chef! 🌟</div>
    <div id="win-sub">You sorted all 9 royal foods! 🍎🥦🍰</div>
    <button id="win-btn" onclick="startGame()">Play Again 🌸</button>
  </div>

<script>
'use strict';

// ── Audio ──────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(f, type, dur, vol, delay) {
  delay = delay || 0; vol = vol || 0.15;
  try {
    const c = getAudio(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || 'sine'; o.frequency.value = f;
    const t0 = c.currentTime + delay;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.start(t0); o.stop(t0 + dur);
  } catch(e) {}
}
function playCorrect()   { [523,659,784,1047].forEach((f,i) => tone(f,'sine',0.18,0.18,i*0.07)); }
function playWrong()     { tone(260,'sawtooth',0.18,0.12); setTimeout(() => tone(210,'sawtooth',0.15,0.09), 160); }
function playCelebrate() { [523,587,659,698,784,880,1047].forEach((f,i) => tone(f,'sine',0.22,0.17,i*0.065)); }
function playTierUp()    { [392,494,587,784,1047].forEach((f,i) => tone(f,'triangle',0.22,0.18,i*0.09)); }
function playWin()       { [523,659,784,1047,784,1047,1319].forEach((f,i) => tone(f,'sine',0.28,0.2,i*0.1)); }

// ── Food data ──────────────────────────────────────────────────────────────────
const FOODS = {
  fruit: [
    {e:'🍎',n:'Apple'},     {e:'🍊',n:'Orange'},    {e:'🍇',n:'Grapes'},
    {e:'🍓',n:'Strawberry'},{e:'🫐',n:'Blueberries'},{e:'🍌',n:'Banana'},
    {e:'🍑',n:'Peach'},     {e:'🍒',n:'Cherries'},   {e:'🍍',n:'Pineapple'},
    {e:'🥭',n:'Mango'},     {e:'🍐',n:'Pear'},
  ],
  veggie: [
    {e:'🥕',n:'Carrot'},  {e:'🥦',n:'Broccoli'},{e:'🌽',n:'Corn'},
    {e:'🥬',n:'Lettuce'}, {e:'🍆',n:'Eggplant'},{e:'🥒',n:'Cucumber'},
    {e:'🫑',n:'Pepper'},  {e:'🍅',n:'Tomato'},  {e:'🧅',n:'Onion'},
  ],
  grain: [
    {e:'🍞',n:'Bread'},  {e:'🥐',n:'Croissant'},{e:'🥛',n:'Milk'},
    {e:'🧀',n:'Cheese'}, {e:'🥚',n:'Egg'},      {e:'🍚',n:'Rice'},
    {e:'🥜',n:'Nuts'},
  ],
  treat: [
    {e:'🍰',n:'Cake'},   {e:'🍭',n:'Lollipop'},{e:'🍫',n:'Chocolate'},
    {e:'🍪',n:'Cookie'}, {e:'🍩',n:'Donut'},   {e:'🍦',n:'Ice Cream'},
    {e:'🧁',n:'Cupcake'},{e:'🍮',n:'Pudding'},
  ],
};

const BASKETS = {
  fruit:  { label:'Fruits',        cls:'basket-fruit',  emoji:'🍎' },
  veggie: { label:'Veggies',       cls:'basket-veggie', emoji:'🥦' },
  grain:  { label:'Milk & Grains', cls:'basket-grain',  emoji:'🥛' },
  treat:  { label:'Treats',        cls:'basket-treat',  emoji:'🍰' },
};

// 3 rounds per tier — categories included at each tier
const TIERS = [
  {
    label:'🌸 Easy', cls:'tier-easy', cats:['fruit','treat'], choices:2,
    toast: null,
  },
  {
    label:'🌿 Medium', cls:'tier-medium', cats:['fruit','veggie','treat'], choices:3,
    toast: { icon:'🌿', title:'More Baskets!', sub:'Now sort fruits, veggies & treats! 🥦' },
  },
  {
    label:'👑 Hard', cls:'tier-hard', cats:['fruit','veggie','grain','treat'], choices:4,
    toast: { icon:'👑', title:'Royal Challenge!', sub:'4 baskets! Can you sort them all? 🥛🍞' },
  },
];
const TOTAL = 9;

// ── State ───────────────────────────────────────────────────────────────────────
let round = 0, locked = false, current = null;
let usedFood = { fruit: new Set(), veggie: new Set(), grain: new Set(), treat: new Set() };

// ── Helpers ─────────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getTierIdx(r) { return r <= 3 ? 0 : r <= 6 ? 1 : 2; }
function pickFood(cat) {
  const pool = FOODS[cat];
  const used = usedFood[cat];
  const fresh = pool.filter(f => !used.has(f.n));
  const src = fresh.length > 0 ? fresh : pool;
  return src[Math.floor(Math.random() * src.length)];
}

// ── Background floaters ─────────────────────────────────────────────────────────
(function initBg() {
  const icons = ['🍎','🥦','🍰','🥕','🧀','🍇','🌽','🧁','🍊','🥛','🍓','🍞'];
  const cont = document.getElementById('bg-floaters');
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('span');
    el.className = 'bg-food';
    el.textContent = icons[i % icons.length];
    el.style.left = (2 + Math.random() * 96) + 'vw';
    el.style.animationDuration = (10 + Math.random() * 14) + 's';
    el.style.animationDelay = -(Math.random() * 22) + 's';
    cont.appendChild(el);
  }
})();

// ── Game flow ────────────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('celebrate-overlay').classList.remove('show');
  document.getElementById('tier-toast').classList.remove('show');
  round = 0;
  usedFood = { fruit: new Set(), veggie: new Set(), grain: new Set(), treat: new Set() };
  document.getElementById('progress-fill').style.width = '0%';
  nextRound();
}

function nextRound() {
  document.getElementById('celebrate-overlay').classList.remove('show');
  if (round >= TOTAL) { endGame(); return; }

  const prevTierIdx = getTierIdx(round);
  round++;
  locked = false;
  updateProgress();

  const tIdx = getTierIdx(round);
  if (round > 1 && tIdx !== prevTierIdx) {
    showTierToast(tIdx);
  } else {
    showQuestion();
  }
}

function showTierToast(tIdx) {
  const t = TIERS[tIdx].toast;
  document.getElementById('toast-icon').textContent  = t.icon;
  document.getElementById('toast-title').textContent = t.title;
  document.getElementById('toast-sub').textContent   = t.sub;
  document.getElementById('tier-toast').classList.add('show');
  playTierUp();
  confetti(42);
}

function resumeAfterToast() {
  document.getElementById('tier-toast').classList.remove('show');
  showQuestion();
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = ((round - 1) / TOTAL * 100) + '%';
  document.getElementById('round-label').textContent = round + ' / ' + TOTAL;
}

function showQuestion() {
  const tIdx = getTierIdx(round);
  const tier = TIERS[tIdx];

  // Update tier badge
  const badge = document.getElementById('tier-badge');
  badge.textContent = tier.label;
  badge.className   = tier.cls;

  // Pick a random category for this round, then a food
  const cat  = tier.cats[Math.floor(Math.random() * tier.cats.length)];
  const food = pickFood(cat);
  usedFood[cat].add(food.n);
  current = { food, cat };

  // Animate food card in
  const card = document.getElementById('food-card');
  card.classList.remove('pop-in');
  void card.offsetWidth;
  card.classList.add('pop-in');
  document.getElementById('food-emoji').textContent = food.e;
  document.getElementById('food-name').textContent  = food.n;

  // Build basket buttons in a fixed order
  const basketsEl = document.getElementById('baskets');
  basketsEl.className = tier.choices === 4 ? 'cols-4' : 'cols-' + tier.choices;
  basketsEl.innerHTML = '';
  const catOrder = ['fruit','veggie','grain','treat'].filter(c => tier.cats.includes(c));
  catOrder.forEach(catKey => {
    const b   = BASKETS[catKey];
    const btn = document.createElement('button');
    btn.className = 'basket-btn ' + b.cls;
    btn.innerHTML = `<span class="basket-icon">${b.emoji}</span><span class="basket-label">${b.label}</span>`;
    btn.addEventListener('pointerdown', () => handleTap(btn, catKey));
    basketsEl.appendChild(btn);
  });
}

function handleTap(btn, catKey) {
  if (locked) return;
  if (catKey === current.cat) {
    locked = true;
    btn.classList.add('correct-flash');
    playCorrect();
    sparkleBurst(btn);
    setTimeout(() => {
      btn.classList.remove('correct-flash');
      showCelebrate();
    }, 500);
  } else {
    btn.classList.add('wrong-flash');
    playWrong();
    setTimeout(() => btn.classList.remove('wrong-flash'), 450);
  }
}

function showCelebrate() {
  const b    = BASKETS[current.cat];
  const msgs = ['belongs in', 'goes in the', 'lives in the', 'is sorted into'];
  const msg  = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('celebrate-food').textContent   = current.food.e;
  document.getElementById('celebrate-arrow').textContent  = '➡️';
  document.getElementById('celebrate-basket').textContent = b.emoji;
  document.getElementById('celebrate-label').textContent  = b.label.toUpperCase() + '! ✨';
  document.getElementById('celebrate-overlay').classList.add('show');
  playCelebrate();
  confetti(28);
}

function endGame() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('win-overlay').classList.add('show');
  playWin();
  confetti(60);
  setTimeout(() => confetti(40), 700);
}

// ── Particles ────────────────────────────────────────────────────────────────────
function sparkleBurst(btn) {
  const r  = btn.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top  + r.height / 2;
  const ems  = ['✨','💫','🌟','⭐','💖','🍴','🍽️'];
  const cols = ['#ffd700','#f48fb1','#ce93d8','#80deea','#ffab91','#a5d6a7','#fff176'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'sp';
    el.textContent = ems[i % ems.length];
    el.style.cssText = `font-size:${18+Math.random()*14}px;left:${cx+(Math.random()-.5)*100}px;top:${cy+(Math.random()-.5)*80}px;animation-delay:${Math.random()*.15}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }
  for (let i = 0; i < 18; i++) {
    const el  = document.createElement('div');
    el.className = 'sp-dot';
    const a   = Math.random() * Math.PI * 2;
    const dist = 25 + Math.random() * 75;
    const sz  = 5 + Math.random() * 10;
    el.style.cssText = `width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px;background:${cols[i%cols.length]};--tx:${Math.cos(a)*dist}px;--ty:${Math.sin(a)*dist}px;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
}

function confetti(count) {
  const cols = ['#ffd700','#f48fb1','#ce93d8','#80deea','#ff7043','#a5d6a7','#fff176','#e040fb'];
  for (let i = 0; i < count; i++) {
    const el  = document.createElement('div');
    el.className = 'confetti';
    const dur = 1.4 + Math.random() * 1.8;
    const sz  = 6 + Math.random() * 10;
    el.style.cssText = `left:${Math.random()*100}vw;width:${sz}px;height:${sz*(0.4+Math.random()*0.7)}px;background:${cols[i%cols.length]};animation-duration:${dur}s;animation-delay:${Math.random()*.5}s;--cr:${(Math.random()-.5)*720}deg;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 0.6) * 1000 + 200);
  }
}

// ── Init ────────────────────────────────────────────────────────────────────────
startGame();
</script>
