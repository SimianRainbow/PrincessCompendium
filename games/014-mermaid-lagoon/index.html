<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mermaid Lagoon 🧜‍♀️</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#001a3a; overflow:hidden; touch-action:none; font-family:Georgia,serif; }
    canvas { display:block; }

    .screen {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:clamp(12px,3vw,22px);
      z-index:20;
    }
    .screen.hidden { display:none; }

    /* ── Start ── */
    #start-screen {
      background:
        radial-gradient(ellipse at 50% 28%, #81d4fa 0%, #29b6f6 25%, #0288d1 55%, #01579b 80%, #002850 100%);
    }
    #start-mermaid {
      font-size:clamp(82px,24vw,150px);
      animation:bob 2.8s ease-in-out infinite;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.4));
    }
    @keyframes bob { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-18px) rotate(6deg)} }
    #start-title {
      font-size:clamp(32px,8.5vw,66px); color:#fff;
      text-shadow:
        0 0 24px rgba(255,180,220,.9),
        0 0 40px rgba(200,240,255,.6),
        0 3px 10px rgba(0,0,0,.5);
      text-align:center; padding:0 16px;
      letter-spacing:1px;
    }
    #start-sub {
      font-size:clamp(14px,3.6vw,22px); color:rgba(255,255,255,.92);
      text-align:center; padding:0 16px; max-width:92vw;
      text-shadow:0 2px 6px rgba(0,0,0,.5);
    }
    #start-btn {
      padding:clamp(14px,4vw,22px) clamp(40px,10vw,72px);
      font-size:clamp(20px,5.5vw,32px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ff80ab,#f06292,#ec407a); color:#5a1030;
      font-weight:bold; cursor:pointer; font-family:inherit;
      box-shadow:0 6px 24px rgba(255,128,171,.65);
      animation:btnPulse 1.8s ease-in-out infinite;
    }
    @keyframes btnPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    /* Floating start-screen bubbles */
    .start-bubble {
      position:absolute; border-radius:50%;
      background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.9), rgba(200,240,255,.2) 60%, rgba(180,220,255,0) 90%);
      pointer-events:none;
      animation:riseBubble 8s linear infinite;
    }
    @keyframes riseBubble {
      0%   { transform:translateY(10vh) scale(.4); opacity:0; }
      10%  { opacity:.9; }
      90%  { opacity:.6; }
      100% { transform:translateY(-110vh) scale(1.1); opacity:0; }
    }

    /* ── HUD ── */
    #hud {
      position:fixed; top:0; left:0; right:0; z-index:10;
      display:flex; justify-content:center; align-items:center;
      padding:clamp(8px,2vw,16px);
      pointer-events:none; gap:clamp(10px,3vw,18px);
    }
    .friend-slot {
      font-size:clamp(30px,8vw,46px);
      filter:grayscale(1) brightness(.5);
      transition:filter .3s ease, transform .4s ease, background .3s ease, border-color .3s ease;
      text-shadow:0 2px 8px rgba(0,0,0,.5);
      background:rgba(255,255,255,.12);
      border-radius:50%;
      width:clamp(54px,13vw,76px);
      height:clamp(54px,13vw,76px);
      display:flex; align-items:center; justify-content:center;
      border:3px solid rgba(255,255,255,.25);
      backdrop-filter:blur(4px);
    }
    .friend-slot.near {
      filter:grayscale(.4) brightness(.85);
      border-color:rgba(255,215,100,.7);
      box-shadow:0 0 18px rgba(255,215,100,.55);
      animation:nearPulse 1.1s ease-in-out infinite;
    }
    @keyframes nearPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    .friend-slot.got {
      filter:none;
      background:rgba(255,255,255,.3);
      border-color:#fff0b3;
      box-shadow:0 0 22px rgba(255,240,180,.8);
      animation:pop .75s ease;
    }
    @keyframes pop { 0%{transform:scale(1)} 30%{transform:scale(1.8)} 60%{transform:scale(.92)} 100%{transform:scale(1)} }

    #pearl-counter {
      position:fixed; top:clamp(70px,18vw,100px); right:clamp(10px,3vw,18px); z-index:10;
      font-size:clamp(20px,5.5vw,30px); color:#fff;
      text-shadow:0 0 10px rgba(255,240,255,.8), 0 2px 5px rgba(0,0,0,.5);
      pointer-events:none;
      background:rgba(0,0,0,.25);
      padding:4px 14px; border-radius:22px;
      backdrop-filter:blur(4px);
    }

    /* ── Big steering buttons ── */
    .steer-btn {
      position:fixed; bottom:clamp(18px,5vw,34px);
      width:clamp(118px,26vw,158px); height:clamp(118px,26vw,158px);
      border-radius:50%; border:5px solid rgba(255,255,255,.75);
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.5), rgba(255,128,171,.6) 55%, rgba(236,64,122,.75));
      color:#fff; font-size:clamp(54px,13vw,82px);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; z-index:15;
      box-shadow:0 8px 22px rgba(0,0,0,.4), inset 0 -5px 9px rgba(0,0,0,.22);
      font-family:Arial, sans-serif; font-weight:bold;
      transition:transform .08s ease, background .15s ease, box-shadow .15s ease;
    }
    .steer-btn.pressed {
      transform:scale(.92);
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.8), rgba(255,215,0,.9) 55%, rgba(255,140,0,.95));
      box-shadow:0 4px 14px rgba(255,180,0,.6), inset 0 -4px 6px rgba(0,0,0,.2);
    }
    #steer-left  { left:clamp(14px,4vw,26px); }
    #steer-right { right:clamp(14px,4vw,26px); }

    #twirl-btn {
      position:fixed; bottom:clamp(22px,5.5vw,38px);
      left:50%; transform:translateX(-50%);
      width:clamp(82px,18vw,110px); height:clamp(82px,18vw,110px);
      border-radius:50%; border:4px solid rgba(255,255,255,.75);
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.55), rgba(186,104,200,.65) 55%, rgba(123,31,162,.85));
      color:#fff; font-size:clamp(36px,9vw,54px);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; z-index:15;
      box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 -4px 7px rgba(0,0,0,.2);
      animation:twirlPulse 2.4s ease-in-out infinite;
    }
    @keyframes twirlPulse { 0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 -4px 7px rgba(0,0,0,.2), 0 0 0 0 rgba(186,104,200,.5)} 50%{box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 -4px 7px rgba(0,0,0,.2), 0 0 28px 6px rgba(186,104,200,.35)} }
    #twirl-btn.pressed { transform:translateX(-50%) scale(.9); }

    #hint {
      position:fixed; bottom:clamp(160px,36vw,230px); left:0; right:0;
      text-align:center; color:rgba(255,255,255,.8);
      font-size:clamp(15px,4vw,22px); z-index:10; pointer-events:none;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
      animation:hintFade 7s ease-in-out 5s forwards;
    }
    @keyframes hintFade { to{opacity:0} }

    /* ── Find flash / ripple ── */
    #find-flash {
      position:fixed; inset:0; pointer-events:none; z-index:8;
      background:radial-gradient(circle, rgba(255,220,120,.6) 0%, rgba(255,220,120,0) 60%);
      opacity:0; transition:opacity .35s ease;
    }
    #find-flash.show { opacity:1; }
    #pearl-flash {
      position:fixed; inset:0; pointer-events:none; z-index:8;
      background:radial-gradient(circle, rgba(255,255,255,.4) 0%, rgba(255,255,255,0) 55%);
      opacity:0; transition:opacity .2s ease;
    }
    #pearl-flash.show { opacity:1; }

    /* Friend name banner when found */
    #friend-banner {
      position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(.6);
      font-size:clamp(30px,8vw,58px); color:#fff;
      text-shadow:0 0 20px rgba(255,230,180,1), 0 3px 12px rgba(0,0,0,.6);
      pointer-events:none; z-index:12; opacity:0;
      font-weight:bold; text-align:center; padding:0 16px;
      transition:opacity .25s ease, transform .45s cubic-bezier(.2,1.4,.4,1);
    }
    #friend-banner.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

    /* Vignette to hint depth */
    #vignette {
      position:fixed; inset:0; pointer-events:none; z-index:6;
      background:
        radial-gradient(ellipse at 50% 55%, transparent 45%, rgba(0,30,70,.4) 85%, rgba(0,10,40,.7) 100%);
    }

    /* ── Win ── */
    #win-screen {
      background:
        radial-gradient(ellipse at 50% 28%, #ffe0ee 0%, #ff80ab 35%, #c2185b 72%, #3a0020 100%);
    }
    #win-title {
      font-size:clamp(26px,7vw,54px); color:#fff8dc;
      text-shadow:0 0 24px rgba(255,230,180,.9), 0 3px 10px rgba(0,0,0,.5);
      text-align:center; padding:0 16px;
    }
    #win-friends { font-size:clamp(44px,12vw,84px); letter-spacing:6px; animation:wiggle 1.8s ease-in-out infinite; }
    @keyframes wiggle { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    #play-again-btn {
      padding:clamp(14px,4vw,22px) clamp(40px,10vw,72px);
      font-size:clamp(18px,5vw,28px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ffd700,#ff8c00); color:#5d2e00;
      font-weight:bold; cursor:pointer; font-family:inherit;
      box-shadow:0 6px 24px rgba(255,180,0,.5);
    }

    .confetti-piece {
      position:fixed; pointer-events:none; z-index:25;
      animation:confettiFall linear forwards;
    }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:0} }

    #back-btn {
      position:fixed; top:10px; left:10px; z-index:25;
      background:rgba(0,0,0,.35); color:#fff; border:none; border-radius:50%;
      width:44px; height:44px; font-size:22px; cursor:pointer;
    }
  </style>
</head>
<body>
  <button id="back-btn" onclick="history.length>1?history.back():window.close()">←</button>

  <div id="start-screen" class="screen">
    <div id="start-mermaid">🧜‍♀️</div>
    <div id="start-title">Mermaid Lagoon</div>
    <div id="start-sub">Swim free with Ariel · Meet Rapunzel, a mermaid friend, the happy sun & the princess girl!</div>
    <button id="start-btn" onclick="startGame()">Swim ▶</button>
  </div>

  <div id="hud" style="display:none">
    <div class="friend-slot" id="slot-rapunzel">👸</div>
    <div class="friend-slot" id="slot-mermaid">🧜‍♀️</div>
    <div class="friend-slot" id="slot-happy">😊</div>
    <div class="friend-slot" id="slot-girl">👧</div>
  </div>
  <div id="pearl-counter" style="display:none">🫧 0</div>

  <div id="hint" style="display:none">Hold ◀ or ▶ to steer · Tap ✨ to twirl</div>

  <button id="steer-left"  class="steer-btn" style="display:none">◀</button>
  <button id="steer-right" class="steer-btn" style="display:none">▶</button>
  <button id="twirl-btn"   style="display:none">✨</button>

  <div id="find-flash"></div>
  <div id="pearl-flash"></div>
  <div id="friend-banner"></div>
  <div id="vignette"></div>

  <div id="win-screen" class="screen hidden">
    <div id="win-title">You found all your friends!</div>
    <div id="win-friends">👸🧜‍♀️😊👧</div>
    <button id="play-again-btn" onclick="restartGame()">Swim Again 🔄</button>
  </div>

  <script>
  // Spawn decorative start-screen bubbles
  (function(){
    const s = document.getElementById('start-screen');
    for (let i=0; i<16; i++) {
      const b = document.createElement('div');
      b.className = 'start-bubble';
      const size = 12 + Math.random()*44;
      b.style.width = size+'px'; b.style.height = size+'px';
      b.style.left = (Math.random()*100)+'vw';
      b.style.animationDelay = (Math.random()*8)+'s';
      b.style.animationDuration = (6 + Math.random()*6)+'s';
      s.appendChild(b);
    }
  })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ═══════════════════════════════════════════
  //  CONFIG
  // ═══════════════════════════════════════════
  const CFG = {
    swimSpeed:    5.0,
    turnSpeed:    1.65,
    findDist:     4.2,
    pearlDist:    2.4,
    lagoonRadius: 58,
    nearFriendDist: 11,
    friends: [
      { kind:'rapunzel', x:  32, z:  -4, label:'Rapunzel!' },
      { kind:'mermaid',  x: -22, z:  34, label:'Mermaid friend!' },
      { kind:'happy',    x: -38, z: -24, label:'Happy Face!' },
      { kind:'girl',     x:  16, z:  42, label:'Princess girl!' },
    ],
  };

  // ═══════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════
  let gameActive = false;
  let mermaidX = 0, mermaidZ = 0, mermaidY = 3;
  let heading = 0, headingVel = 0;
  let turnInput = 0;
  let swimT = 0, bobT = 0, globalT = 0;
  let twirlT = 0;
  let foundCount = 0, pearlsCollected = 0;
  let friendMeshes = [], pearlMeshes = [];
  let bubbleMeshes = [], marineSnow = [];
  let fishMeshes = [], seaweedMeshes = [];
  let rayMeshes = [], causticMeshes = [];
  let crystalMeshes = [], tentacleMeshes = [];
  let dolphin, whale, crab, buddyFish, seahorseMeshes = [];
  let ariel = null;
  let arielParts = {}; // named children for animation
  let scene, camera, renderer, clock;
  let ambientMusicT = 0;

  // ═══════════════════════════════════════════
  //  AUDIO (Web Audio API only)
  // ═══════════════════════════════════════════
  let audioCtx = null;
  function au() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f, type, d, v=0.14, when=0) {
    try {
      const c=au(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type||'sine'; o.frequency.value=f;
      const t0 = c.currentTime + when;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(v, t0 + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + d);
      o.start(t0); o.stop(t0 + d + 0.02);
    } catch(e) {}
  }
  function playPearl() {
    tone(1320,'sine',0.18,0.10);
    tone(1760,'sine',0.14,0.08, 0.06);
  }
  function playFind(kind) {
    const scales = {
      rapunzel: [523,659,784,988,1175],
      mermaid:  [587,740,880,1175,1397],
      happy:    [659,784,988,1319,1568],
      girl:     [523,698,880,1047,1319],
    };
    const notes = scales[kind] || scales.rapunzel;
    notes.forEach((f,i) => tone(f,'sine',0.34,0.14, i*0.08));
    // Sparkle overlay
    [1760,1976,2349].forEach((f,i)=>tone(f,'triangle',0.12,0.05, 0.15 + i*0.05));
  }
  function playTwirl() {
    const base = 523;
    for (let i=0; i<8; i++) {
      tone(base * Math.pow(2, i/6), 'sine', 0.22, 0.08, i*0.055);
    }
  }
  function playNearHint() {
    tone(1046,'sine',0.14,0.06);
  }
  function playWin() {
    const melody = [523,659,784,1047,988,1175,1319,1568,1760,2093];
    melody.forEach((f,i) => tone(f,'sine',0.38,0.14, i*0.11));
    [131,196,262,330,392].forEach((f,i) => tone(f,'triangle',0.55,0.10, i*0.22));
    // shimmer
    for (let i=0; i<14; i++) {
      tone(1800 + Math.random()*800, 'sine', 0.10, 0.04, 0.3 + i*0.08);
    }
  }
  // Gentle ambient chord every ~6 seconds to give the world a voice
  function ambientPad(t) {
    if (t - ambientMusicT < 6.5) return;
    ambientMusicT = t;
    const roots = [
      [196, 294, 392, 588],   // G major
      [220, 330, 440, 659],   // A minor
      [175, 262, 349, 523],   // F major
      [246, 370, 494, 659],   // B minor / D chord
    ];
    const chord = roots[Math.floor(Math.random()*roots.length)];
    chord.forEach((f,i) => tone(f,'sine', 2.2, 0.025, i*0.06));
  }

  // ═══════════════════════════════════════════
  //  THREE SETUP
  // ═══════════════════════════════════════════
  function initThree() {
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference:'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a4a82);
    scene.fog = new THREE.Fog(0x0a4a82, 20, 95);

    camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 320);

    scene.add(new THREE.AmbientLight(0xb3e5fc, 0.75));
    const sun = new THREE.DirectionalLight(0xfff5cc, 1.25);
    sun.position.set(8, 28, 6); scene.add(sun);
    const fill = new THREE.DirectionalLight(0x80d8ff, 0.4);
    fill.position.set(-8, 6, -4); scene.add(fill);
    // Caustic light accent from below
    const accent = new THREE.PointLight(0x4fc3f7, 0.5, 60);
    accent.position.set(0, 4, 0); scene.add(accent);

    clock = new THREE.Clock();
    window.addEventListener('resize', onResize);
  }
  function onResize() {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  // ═══════════════════════════════════════════
  //  WORLD
  // ═══════════════════════════════════════════
  function buildWorld() {
    buildFloor();
    buildCaustics();
    buildWaterSurface();
    buildGodRays();
    buildBubbles();
    buildMarineSnow();
    buildCorals();
    buildKelpForest(-48, 18);
    buildKelpForest(40, 22);
    buildCrystalCave(-30, -30);
    buildRapunzelTower(32, -4);
    buildSunkenShip(22, -38);
    buildPinkCastle(0, -78);
    buildScatteredSeaweed();
    buildShells();
    buildStarfishes();
    buildFishSchools();
    buildPearls();
    buildSeahorses();
    buildCrab();
    buildDolphin();
    buildWhale();
    buildFriends();
  }

  function buildFloor() {
    const sandMat = new THREE.MeshLambertMaterial({ color: 0xf4d9a4 });
    const floor = new THREE.Mesh(new THREE.CircleGeometry(85, 64), sandMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.y = -1.5;
    scene.add(floor);
    // Darker sand rings for depth
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xd6b980, transparent:true, opacity:0.5 });
    for (let i=0; i<3; i++) {
      const ring = new THREE.Mesh(new THREE.RingGeometry(28 + i*12, 30 + i*12, 48), ringMat);
      ring.rotation.x = -Math.PI/2;
      ring.position.y = -1.48 + i*0.003;
      scene.add(ring);
    }
  }

  function buildCaustics() {
    // Animated overlapping soft light disks on the floor
    const causMat = new THREE.MeshBasicMaterial({
      color: 0xfff4c2, transparent:true, opacity:0.12, depthWrite:false,
    });
    for (let i=0; i<36; i++) {
      const size = 2 + Math.random()*3.5;
      const c = new THREE.Mesh(new THREE.CircleGeometry(size, 16), causMat.clone());
      c.rotation.x = -Math.PI/2;
      c.position.set((Math.random()-.5)*120, -1.42, (Math.random()-.5)*120);
      c.userData = {
        baseX: c.position.x, baseZ: c.position.z,
        phase: Math.random()*Math.PI*2,
        speed: 0.3 + Math.random()*0.5,
        opBase: 0.08 + Math.random()*0.09,
      };
      scene.add(c);
      causticMeshes.push(c);
    }
  }

  function buildWaterSurface() {
    // Slightly wavy translucent ceiling
    const geo = new THREE.CircleGeometry(95, 64);
    // Displace Z (actually Y after rotation) for wave effect - baseline noise
    const pos = geo.attributes.position;
    for (let i=0; i<pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i);
      pos.setZ(i, Math.sin(x*0.18)*0.25 + Math.cos(y*0.22)*0.25);
    }
    geo.computeVertexNormals();
    const surfMat = new THREE.MeshBasicMaterial({
      color: 0x66d1ff, transparent:true, opacity:0.5, side:THREE.DoubleSide,
    });
    const surf = new THREE.Mesh(geo, surfMat);
    surf.rotation.x = -Math.PI/2;
    surf.position.y = 17;
    scene.add(surf);
    // Sky glow above water
    const skyMat = new THREE.MeshBasicMaterial({
      color: 0xfff8d0, transparent:true, opacity:0.35, side:THREE.DoubleSide,
    });
    const sky = new THREE.Mesh(new THREE.CircleGeometry(90, 32), skyMat);
    sky.rotation.x = -Math.PI/2;
    sky.position.y = 17.2;
    scene.add(sky);
  }

  function buildGodRays() {
    const rayMat = new THREE.MeshBasicMaterial({
      color: 0xfff7c4, transparent:true, opacity:0.14, side:THREE.DoubleSide, depthWrite:false,
    });
    for (let i=0; i<16; i++) {
      const angle = (i / 16) * Math.PI * 2 + Math.random()*0.3;
      const r = 10 + Math.random()*45;

  function buildCorals() {
    for (let i=0; i<48; i++) {

      addCoral(Math.cos(angle)*r, Math.sin(angle)*r);

  function addCoral(x, z) {
    const palette = [0xff80ab, 0xff4081, 0xba68c8, 0xff9800, 0xffb74d, 0xe040fb, 0xf06292, 0xff6e40, 0x9575cd];
    const color = palette[Math.floor(Math.random()*palette.length)];
    const mat = new THREE.MeshLambertMaterial({ color });
    const group = new THREE.Group();
    const type = Math.random();
    if (type < 0.4) {
      // Branching tree coral
      const armCount = 3 + Math.floor(Math.random()*4);
      for (let i=0; i<armCount; i++) {
        const h = 1.5 + Math.random()*3;
        const arm = new THREE.Mesh(
          new THREE.CylinderGeometry(0.16, 0.32, h, 6),
          mat
        );
        arm.position.set((Math.random()-.5)*0.9, h/2 - 1.2, (Math.random()-.5)*0.9);
        arm.rotation.z = (Math.random()-.5)*0.6;
        arm.rotation.x = (Math.random()-.5)*0.6;
        group.add(arm);
        const bobble = new THREE.Mesh(new THREE.SphereGeometry(0.32 + Math.random()*0.18, 8, 6), mat);
        bobble.position.copy(arm.position);
        bobble.position.y += h/2;
        group.add(bobble);
      }
    } else if (type < 0.7) {
      // Brain coral (bumpy dome)
      const dome = new THREE.Mesh(new THREE.SphereGeometry(0.9 + Math.random()*0.8, 10, 7), mat);
      dome.scale.y = 0.55;
      dome.position.y = -0.6;
      group.add(dome);
      for (let i=0; i<6; i++) {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.25, 6, 4), mat);
        const a = (i/6)*Math.PI*2;
        b.position.set(Math.cos(a)*0.55, -0.3, Math.sin(a)*0.55);
        group.add(b);
      }
    } else {
      // Fan coral (flat fan shape)
      const fanMat = new THREE.MeshLambertMaterial({ color, side:THREE.DoubleSide });
      for (let i=0; i<4; i++) {
        const fan = new THREE.Mesh(new THREE.CircleGeometry(0.9 + Math.random()*0.4, 12, 0, Math.PI), fanMat);
        fan.position.y = 0 + i*0.15;
        fan.rotation.y = (i/4) * Math.PI * 2;
        fan.rotation.x = -Math.PI/2 + 0.3;
        group.add(fan);
      }
    }
    group.position.set(x, 0, z);
    group.rotation.y = Math.random()*Math.PI*2;
    scene.add(group);
  }

  function buildKelpForest(cx, cz) {
    for (let i=0; i<14; i++) {
      const x = cx + (Math.random()-.5)*14;
      const z = cz + (Math.random()-.5)*14;
      addTallKelp(x, z);
    }
  }

  function addTallKelp(x, z) {
    const mat = new THREE.MeshLambertMaterial({
      color: Math.random()<0.5 ? 0x388e3c : 0x2e7d32,
      side: THREE.DoubleSide,
    });
    const group = new THREE.Group();
    const segments = 8 + Math.floor(Math.random()*4);
    const chain = [];
    let parent = group;
    for (let i=0; i<segments; i++) {
      const seg = new THREE.Group();
      const leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.55 + Math.random()*0.2, 1.1), mat);
      leaf.position.y = 0.55;
      leaf.rotation.y = Math.random()*Math.PI*2;
      seg.add(leaf);
      if (i > 0) seg.position.y = 1.0;
      parent.add(seg);
      chain.push(seg);
      parent = seg;
    }
    group.position.set(x, -0.8, z);
    group.userData = { phase: Math.random()*Math.PI*2, chain };
    scene.add(group);
    seaweedMeshes.push(group);
  }

  function buildCrystalCave(cx, cz) {
    const rockMat = new THREE.MeshLambertMaterial({ color: 0x4a2c6f });
    // Cave base - large flattish rock cluster
    for (let i=0; i<6; i++) {
      const r = new THREE.Mesh(new THREE.DodecahedronGeometry(1.5 + Math.random()*1.5, 0), rockMat);
      const a = (i/6)*Math.PI*2;
      r.position.set(cx + Math.cos(a)*2.5, 0 + Math.random()*0.5, cz + Math.sin(a)*2.5);
      r.rotation.set(Math.random(),Math.random(),Math.random());
      scene.add(r);
    }
    // Crystals rising from within
    const cryColors = [0xe1bee7, 0xce93d8, 0xb39ddb, 0xf8bbd0, 0x81d4fa, 0xa5d6a7];
    for (let i=0; i<12; i++) {
      const col = cryColors[Math.floor(Math.random()*cryColors.length)];
      const cryMat = new THREE.MeshPhongMaterial({
        color: col, emissive: col, emissiveIntensity:0.35,
        transparent:true, opacity:0.82,
        specular:0xffffff, shininess:120,
      });
      const h = 1.6 + Math.random()*2.2;
      const cry = new THREE.Mesh(new THREE.ConeGeometry(0.32 + Math.random()*0.22, h, 5), cryMat);
      const a = Math.random()*Math.PI*2;
      const r = Math.random()*2.4;
      cry.position.set(cx + Math.cos(a)*r, h/2 - 0.3, cz + Math.sin(a)*r);
      cry.rotation.z = (Math.random()-.5)*0.35;
      cry.rotation.x = (Math.random()-.5)*0.35;
      cry.userData = { pulsePhase: Math.random()*Math.PI*2, baseEmissive: 0.35 };
      scene.add(cry);
      crystalMeshes.push(cry);
    }
    // Octopus inside the cave, waving
    buildOctopus(cx, cz);
  }

  function buildOctopus(x, z) {
    const g = new THREE.Group();
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xba68c8 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.9, 14, 12), bodyMat);
    head.position.y = 1.2;
    head.scale.y = 1.1;
    g.add(head);
    // Eyes
    const eyeW = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const eyeP = new THREE.MeshBasicMaterial({ color: 0x1a237e });
    [-1,1].forEach(sx => {
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 6), eyeW);
      w.position.set(sx*0.32, 1.45, 0.75); g.add(w);
      const p = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), eyeP);
      p.position.set(sx*0.32, 1.45, 0.85); g.add(p);
    });
    const smile = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.04, 6, 10, Math.PI),
      new THREE.MeshBasicMaterial({color:0x4a148c}));
    smile.position.set(0, 1.12, 0.82);
    smile.rotation.z = Math.PI; g.add(smile);
    // 8 tentacles, animated
    const tentacles = [];
    for (let i=0; i<8; i++) {
      const tg = new THREE.Group();
      const a = (i/8)*Math.PI*2;
      tg.position.set(Math.cos(a)*0.55, 0.6, Math.sin(a)*0.55);
      tg.rotation.y = -a;
      const segCount = 4;
      let parent = tg;
      for (let j=0; j<segCount; j++) {
        const s = new THREE.Group();
        const seg = new THREE.Mesh(
          new THREE.CylinderGeometry(0.16 - j*0.025, 0.18 - j*0.025, 0.4, 7),
          bodyMat
        );
        seg.position.y = -0.2;
        s.add(seg);
        if (j > 0) s.position.y = -0.4;
        parent.add(s);
        parent = s;
      }
      g.add(tg);
      tentacles.push({ root: tg, phaseOff: i });
    }
    g.position.set(x, 0.2, z);
    g.userData = { tentacles };
    scene.add(g);
    tentacleMeshes.push(g);
  }

  function buildSunkenShip(x, z) {
    const hullMat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });

    const group = new THREE.Group();

    group.add(deck);
    // Broken mast

    mast.rotation.z = 0.4;
    group.add(mast);
    // Cabin
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.8, 2.4), plankMat);
    cabin.position.set(-2, 2.2, 0);
    group.add(cabin);
    // Treasure chest on deck
    const chestBody = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.9, 1.1),
      new THREE.MeshLambertMaterial({color: 0x795548}));
    chestBody.position.set(2, 1.75, 0);
    group.add(chestBody);
    const chestLid = new THREE.Mesh(new THREE.SphereGeometry(0.9, 10, 6, 0, Math.PI*2, 0, Math.PI/2),

    chestLid.position.set(2, 2.25, 0);
    chestLid.rotation.z = Math.PI/2;
    chestLid.scale.z = 0.6;
    group.add(chestLid);
    // Gold inside chest (sparkle spheres poking out)

    // Tilt the whole ship
    group.rotation.z = 0.25;
    group.rotation.y = -0.5;

    // Bubble column from the ship
    for (let i=0; i<6; i++) {
      const b = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 6),
        new THREE.MeshPhongMaterial({color:0xd1f2ff, transparent:true, opacity:0.65, shininess:90}));
      b.position.set(x + (Math.random()-.5)*1.5, 2 + i*1.5, z + (Math.random()-.5)*1.5);

  function addSeahorse(x, z) {
    const g = new THREE.Group();
    const colors = [0xffb74d, 0xf48fb1, 0x81d4fa, 0xce93d8, 0xaed581];
    const color = colors[Math.floor(Math.random()*colors.length)];
    const mat = new THREE.MeshLambertMaterial({ color });
    // Body (curved cylinder chain)
    const bodySegments = 5;
    let prev = g;
    for (let i=0; i<bodySegments; i++) {
      const sg = new THREE.Group();
      const seg = new THREE.Mesh(new THREE.CylinderGeometry(0.18 - i*0.02, 0.2 - i*0.02, 0.4, 6), mat);
      seg.position.y = 0.2;
      sg.add(seg);
      if (i > 0) {
        sg.position.y = 0.35;
        sg.rotation.z = 0.3;
      }
      prev.add(sg);
      prev = sg;
    }
    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 10, 8), mat);
    head.position.y = 0.5;
    prev.add(head);
    const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.35, 6), mat);
    snout.position.set(0.25, 0.5, 0);
    snout.rotation.z = -Math.PI/2;
    prev.add(snout);
    // Eye
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 4),
      new THREE.MeshBasicMaterial({color:0x222}));
    eye.position.set(0.05, 0.55, 0.2);
    prev.add(eye);
    // Back fin

  // ═══════════════════════════════════════════
  //  ARIEL (the player, much more detail)
  // ═══════════════════════════════════════════
  function buildAriel() {
    const group = new THREE.Group();
    const skin = new THREE.MeshLambertMaterial({ color: 0xffdbac });
    const hairMat = new THREE.MeshLambertMaterial({ color: 0xd32f2f });
    const shellMat = new THREE.MeshLambertMaterial({ color: 0xec407a });

    // ── Head + face ───────────
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 16, 14), skin);
    head.position.y = 1.2;
    group.add(head);
    // Eyes (whites + pupils)
    const eyeWhite = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pupil = new THREE.MeshBasicMaterial({ color: 0x1b3a6b });
    const eyeL = new THREE.Group(); const eyeR = new THREE.Group();
    [eyeL, eyeR].forEach((eg, idx) => {
      const sx = idx === 0 ? -1 : 1;
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), eyeWhite);
      eg.add(w);
      const p = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6), pupil);
      p.position.z = 0.06;
      eg.add(p);
      eg.position.set(sx*0.17, 1.27, 0.42);
      group.add(eg);
    });
    arielParts.eyeL = eyeL; arielParts.eyeR = eyeR;
    // Lashes (tiny curves)
    [-1,1].forEach(sx => {
      const lash = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.012, 4, 8, Math.PI*0.7),
        new THREE.MeshBasicMaterial({color:0x2a1810}));
      lash.position.set(sx*0.17, 1.35, 0.42);
      lash.rotation.x = -0.5;
      lash.rotation.z = sx*0.3;
      group.add(lash);
    });
    // Smile
    const smile = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.025, 6, 12, Math.PI),
      new THREE.MeshBasicMaterial({ color: 0xd81b60 }));
    smile.position.set(0, 1.08, 0.45);
    smile.rotation.x = 0.2; smile.rotation.z = Math.PI;
    group.add(smile);
    arielParts.smile = smile;
    // Cheeks
    [-1,1].forEach(sx => {
      const cheek = new THREE.Mesh(new THREE.SphereGeometry(0.065, 8, 6),
        new THREE.MeshBasicMaterial({color:0xff8a80, transparent:true, opacity:0.8}));
      cheek.position.set(sx*0.3, 1.15, 0.38);
      group.add(cheek);
    });

    // ── Hair ──────────────────
    const hairGroup = new THREE.Group();
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.56, 16, 14, 0, Math.PI*2, 0, Math.PI*0.62), hairMat);
    cap.position.y = 1.32;
    hairGroup.add(cap);
    // Front bangs
    const bangs = new THREE.Mesh(new THREE.SphereGeometry(0.52, 12, 10, 0, Math.PI*2, 0, Math.PI*0.35), hairMat);
    bangs.position.set(0, 1.34, 0.08);
    hairGroup.add(bangs);
    // Side tufts
    [-1,1].forEach(sx => {
      const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.24, 10, 8), hairMat);
      tuft.position.set(sx*0.42, 1.15, -0.05);
      hairGroup.add(tuft);
    });
    // Flowing strands (segmented) — 9 long tresses
    const strands = [];
    const strandCount = 9;
    for (let i=0; i<strandCount; i++) {
      const root = new THREE.Group();
      const angle = (i / strandCount - 0.5) * 1.1;
      root.position.set(Math.sin(angle)*0.4, 1.18, -0.1 - Math.cos(angle)*0.15);
      root.rotation.y = angle;
      const segs = [];
      let parent = root;
      const segCount = 5;
      for (let j=0; j<segCount; j++) {
        const s = new THREE.Group();
        const seg = new THREE.Mesh(
          new THREE.CylinderGeometry(0.14 - j*0.018, 0.11 - j*0.018, 0.45, 7),
          hairMat
        );
        seg.position.y = -0.22;
        seg.rotation.x = -0.3;
        s.add(seg);
        if (j > 0) {
          s.position.y = -0.4;
        }
        parent.add(s);
        segs.push(s);
        parent = s;
        // end bobble
        if (j === segCount-1) {
          const tip = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 6), hairMat);
          tip.position.y = -0.42;
          s.add(tip);
        }
      }
      strands.push({ root, segs, phase: i * 0.35 });
      hairGroup.add(root);
    }
    arielParts.hair = hairGroup;
    arielParts.strands = strands;
    group.add(hairGroup);

    // ── Torso + seashell top ──
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.4, 0.65, 12), skin);
    torso.position.y = 0.5;
    group.add(torso);
    [-1,1].forEach(sx => {
      const cup = new THREE.Mesh(
        new THREE.SphereGeometry(0.24, 12, 10, 0, Math.PI*2, 0, Math.PI/2),
        shellMat
      );
      cup.position.set(sx*0.19, 0.7, 0.26);
      cup.rotation.x = -0.4;
      cup.rotation.z = sx * 0.1;
      group.add(cup);
    });
    // Belly jewel
    const jewel = new THREE.Mesh(new THREE.SphereGeometry(0.07, 10, 8),
      new THREE.MeshPhongMaterial({color:0xffd700, emissive:0x6a4a00, shininess:120}));
    jewel.position.set(0, 0.28, 0.38);
    group.add(jewel);

    // ── Arms (animated swim stroke) ──
    const armLshoulder = new THREE.Group();
    armLshoulder.position.set(-0.38, 0.72, 0);
    const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.75, 8), skin);
    armL.position.y = -0.38;
    armLshoulder.add(armL);
    const handL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8), skin);
    handL.position.y = -0.78;
    armLshoulder.add(handL);
    group.add(armLshoulder);

    const armRshoulder = new THREE.Group();
    armRshoulder.position.set(0.38, 0.72, 0);
    const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.75, 8), skin);
    armR.position.y = -0.38;
    armRshoulder.add(armR);
    const handR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8), skin);
    handR.position.y = -0.78;
    armRshoulder.add(handR);
    group.add(armRshoulder);
    arielParts.armL = armLshoulder; arielParts.armR = armRshoulder;

    // ── Tail (multi-segment with traveling wave) ──
    const tailMat = new THREE.MeshPhongMaterial({
      color: 0x1de9b6, specular: 0xb2ebf2, shininess: 80, emissive: 0x004d40, emissiveIntensity:0.35,
    });
    const finMat = new THREE.MeshLambertMaterial({
      color: 0x80deea, side:THREE.DoubleSide, transparent:true, opacity:0.95,
    });
    // Chain: waist -> T1 -> T2 -> T3 -> Fin
    const waistAttach = new THREE.Group();
    waistAttach.position.y = 0.15;
    group.add(waistAttach);
    const t1 = new THREE.Group();
    const t1mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.32, 0.75, 12), tailMat);
    t1mesh.position.y = -0.37; t1.add(t1mesh);
    // Scale ridges on tail
    for (let i=0; i<3; i++) {
      const ridge = new THREE.Mesh(new THREE.TorusGeometry(0.36 - i*0.03, 0.028, 5, 12),
        new THREE.MeshPhongMaterial({color:0x00bfa5, shininess:80}));
      ridge.rotation.x = Math.PI/2;
      ridge.position.y = -0.15 - i*0.2;
      t1.add(ridge);
    }
    waistAttach.add(t1);

    const t2 = new THREE.Group();
    t2.position.y = -0.75;
    const t2mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.22, 0.65, 12), tailMat);
    t2mesh.position.y = -0.32; t2.add(t2mesh);
    t1.add(t2);

    const t3 = new THREE.Group();
    t3.position.y = -0.65;
    const t3mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.13, 0.55, 10), tailMat);
    t3mesh.position.y = -0.28; t3.add(t3mesh);
    t2.add(t3);

    const finGroup = new THREE.Group();
    finGroup.position.y = -0.55;
    [-1,1].forEach(sx => {
      const fin = new THREE.Mesh(new THREE.ConeGeometry(0.7, 0.9, 5, 1, true), finMat);
      fin.position.set(sx*0.4, -0.1, 0);
      fin.rotation.z = sx * 1.3;
      fin.rotation.x = Math.PI;
      finGroup.add(fin);
      // Shimmer spots on fins
      for (let k=0; k<3; k++) {
        const shim = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 4),
          new THREE.MeshBasicMaterial({color:0xfff59d, transparent:true, opacity:0.8}));
        shim.position.set(sx*(0.2 + k*0.12), -0.3 + k*0.12, 0);
        finGroup.add(shim);
      }
    });
    t3.add(finGroup);

    arielParts.tailSegs = [t1, t2, t3, finGroup];
    arielParts.waistAttach = waistAttach;

    return group;
  }

  // ═══════════════════════════════════════════
  //  FRIENDS (upgraded)
  // ═══════════════════════════════════════════
  function buildFriends() {
    CFG.friends.forEach(cfg => {
      let mesh;
      if (cfg.kind === 'rapunzel') mesh = buildRapunzel();
      else if (cfg.kind === 'mermaid') mesh = buildMermaidFriend();
      else if (cfg.kind === 'happy') mesh = buildHappyFace();
      else if (cfg.kind === 'girl') mesh = buildGirl();
      mesh.position.set(cfg.x, 2.6, cfg.z);
      mesh.userData = Object.assign({}, mesh.userData || {}, {
        kind: cfg.kind, label: cfg.label, found: false,
        t: Math.random()*Math.PI*2, near: false, baseY: 2.6,
      });
      scene.add(mesh);
      friendMeshes.push(mesh);
    });
  }

  function addHalo(group, color=0xfff3b0, size=2.4) {
    const halo = new THREE.Mesh(
      new THREE.SphereGeometry(size, 16, 12),
      new THREE.MeshBasicMaterial({
        color, transparent:true, opacity:0.22, side:THREE.BackSide,
      })
    );
    halo.position.y = 0.3;
    halo.visible = false;
    group.add(halo);
    group.userData = group.userData || {};
    group.userData.halo = halo;
    return halo;
  }

  function buildRapunzel() {
    const g = new THREE.Group();
    // She sits on top of her tower which is at (32,-4). We position the tower in world,
    // and place Rapunzel locally centered — her tower was built at the same coords.
    const skin = new THREE.MeshLambertMaterial({ color: 0xffdbac });
    const dress = new THREE.MeshLambertMaterial({ color: 0x9c27b0 });
    const hair = new THREE.MeshLambertMaterial({ color: 0xffd94a });
    const sash = new THREE.MeshLambertMaterial({ color: 0xe91e63 });

    // Dress (big flared cone)
    const body = new THREE.Mesh(new THREE.ConeGeometry(1.1, 2.2, 12), dress);
    body.position.y = 0.45;
    g.add(body);
    // Layer detail
    const layer = new THREE.Mesh(new THREE.CylinderGeometry(1.15, 1.25, 0.3, 12), dress);
    layer.position.y = -0.55;
    g.add(layer);
    // Sash
    const sashMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.2, 12), sash);
    sashMesh.position.y = 1.2;
    g.add(sashMesh);
    // Torso
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.55, 0.7, 10), dress);
    torso.position.y = 1.55;
    g.add(torso);
    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 16, 14), skin);
    head.position.y = 2.25;
    g.add(head);
    // Eyes
    const eyeW = new THREE.MeshBasicMaterial({color:0xfff});
    const pup = new THREE.MeshBasicMaterial({color:0x2e3b66});
    [-1,1].forEach(sx => {
      const w = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), eyeW);
      w.position.set(sx*0.15, 2.32, 0.42); g.add(w);
      const p = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), pup);
      p.position.set(sx*0.15, 2.32, 0.47); g.add(p);
    });
    const smile = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.022, 6, 12, Math.PI),
      new THREE.MeshBasicMaterial({color:0xc2185b}));
    smile.position.set(0, 2.13, 0.45);
    smile.rotation.z = Math.PI; g.add(smile);
    // Cheeks
    [-1,1].forEach(sx => {
      const ch = new THREE.Mesh(new THREE.SphereGeometry(0.065, 8, 6),
        new THREE.MeshBasicMaterial({color:0xff8a80, transparent:true, opacity:0.8}));
      ch.position.set(sx*0.3, 2.18, 0.35);
      g.add(ch);
    });
    // Arms out slightly
    [-1,1].forEach(sx => {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.8, 8), skin);
      arm.position.set(sx*0.45, 1.5, 0);
      arm.rotation.z = sx*0.5;
      g.add(arm);
    });

    // Hair cap + HUGE cascading golden hair
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.54, 16, 14, 0, Math.PI*2, 0, Math.PI*0.6), hair);
    cap.position.y = 2.38;
    g.add(cap);
    const fringe = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 10, 0, Math.PI*2, 0, Math.PI*0.3), hair);
    fringe.position.set(0, 2.42, 0.1);
    g.add(fringe);
    // Cascading strands — 14 strands flowing down past her feet (6 units long)
    const rapunzelStrands = [];
    for (let i=0; i<14; i++) {
      const root = new THREE.Group();
      const xoff = (i - 6.5) * 0.08;
      root.position.set(xoff, 2.28, -0.42);
      const segs = [];
      let parent = root;
      const segCount = 8;
      for (let j=0; j<segCount; j++) {
        const s = new THREE.Group();
        const seg = new THREE.Mesh(
          new THREE.CylinderGeometry(0.1 - j*0.008, 0.1 - j*0.008, 0.5, 6),
          hair
        );
        seg.position.y = -0.25;
        s.add(seg);
        if (j > 0) s.position.y = -0.5;
        parent.add(s);
        segs.push(s);
        parent = s;
      }
      // Tip sparkle-ish bow on some strands
      if (i % 4 === 2) {
        const bow = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6),
          new THREE.MeshBasicMaterial({color: 0xff4081}));
        bow.position.y = -0.45;
        parent.add(bow);
      }
      rapunzelStrands.push({ root, segs, phase: i * 0.25 });
      g.add(root);
    }
    // Flower crown
    const crownMat = new THREE.MeshBasicMaterial({ color: 0xe91e63 });
    for (let i=0; i<7; i++) {
      const a = (i / 7) * Math.PI;
      const fl = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), crownMat);
      fl.position.set(Math.sin(a - Math.PI/2)*0.5, 2.7, 0.15 + Math.cos(a - Math.PI/2)*0.2);
      g.add(fl);
    }
    const tiara = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.05, 6, 16, Math.PI),
      new THREE.MeshPhongMaterial({color:0xffd700, shininess:100}));
    tiara.position.set(0, 2.72, 0.1);
    tiara.rotation.x = Math.PI/2;
    g.add(tiara);
    g.userData = { rapunzelStrands };

    addHalo(g, 0xfff3a0, 3.2);
    g.position.y = 3.4; // sits on the 3.35m tall tower
    return g;
  }

      const p = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 6),

    });
    const smile = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.025, 6, 10, Math.PI),
      new THREE.MeshBasicMaterial({ color: 0xad1457 }));
    smile.position.set(0, 1.06, 0.45);
    smile.rotation.z = Math.PI; g.add(smile);
    // Cheeks
    [-1,1].forEach(sx => {
      const ch = new THREE.Mesh(new THREE.SphereGeometry(0.065, 8, 6),
        new THREE.MeshBasicMaterial({color:0xff8a80, transparent:true, opacity:0.8}));

    cap.position.y = 1.3; g.add(cap);
    const strands = [];
    for (let i=0; i<8; i++) {
      const root = new THREE.Group();
      const xoff = (i - 3.5) * 0.1;
      root.position.set(xoff, 1.1, -0.4);
      const segs = [];
      let parent = root;
      for (let j=0; j<4; j++) {
        const s = new THREE.Group();
        const seg = new THREE.Mesh(
          new THREE.CylinderGeometry(0.11 - j*0.015, 0.08 - j*0.015, 0.45, 6), hair);
        seg.position.y = -0.22;
        s.add(seg);
        if (j > 0) s.position.y = -0.4;
        parent.add(s);
        segs.push(s); parent = s;
      }
      strands.push({ root, segs, phase: i*0.3 });
      g.add(root);
    }

    // Body
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.38, 0.6, 10), skin);
    torso.position.y = 0.5; g.add(torso);
    [-1,1].forEach(sx => {
      const cup = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 10, 8, 0, Math.PI*2, 0, Math.PI/2), top);
      cup.position.set(sx*0.19, 0.7, 0.27);
      cup.rotation.x = -0.4; g.add(cup);
    });
    // Arms
    [-1,1].forEach(sx => {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.8, 8), skin);
      arm.position.set(sx*0.42, 0.45, 0);
      arm.rotation.z = sx*0.6;
      g.add(arm);
    });
    // Purple tail (multi-segment)
    const t1 = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.24, 1.1, 10), tail);
    t1.position.y = -0.45; g.add(t1);
    const t2 = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.14, 0.85, 10), tail);
    t2.position.y = -1.35; g.add(t2);
    [-1,1].forEach(sx => {

      fin.position.set(sx*0.4, -2.0, 0);
      fin.rotation.z = sx*1.3; fin.rotation.x = Math.PI;
      g.add(fin);
    });

    g.userData = { strands };
    addHalo(g, 0xe1bee7, 2.8);
    return g;
  }

  // ═══════════════════════════════════════════
  //  INPUT
  // ═══════════════════════════════════════════
  function bindInput() {
    const leftBtn  = document.getElementById('steer-left');
    const rightBtn = document.getElementById('steer-right');
    const twirlBtn = document.getElementById('twirl-btn');

    function press(which) { turnInput = which; }
    function release(which) {
      if (which === undefined || turnInput === which) turnInput = 0;
    }

    leftBtn.addEventListener('pointerdown',  e => { e.preventDefault(); leftBtn.classList.add('pressed'); press(+1); });
    leftBtn.addEventListener('pointerup',    e => { e.preventDefault(); leftBtn.classList.remove('pressed'); release(+1); });
    leftBtn.addEventListener('pointerleave', e => { leftBtn.classList.remove('pressed'); release(+1); });
    leftBtn.addEventListener('pointercancel',e => { leftBtn.classList.remove('pressed'); release(+1); });

    rightBtn.addEventListener('pointerdown',  e => { e.preventDefault(); rightBtn.classList.add('pressed'); press(-1); });
    rightBtn.addEventListener('pointerup',    e => { e.preventDefault(); rightBtn.classList.remove('pressed'); release(-1); });
    rightBtn.addEventListener('pointerleave', e => { rightBtn.classList.remove('pressed'); release(-1); });
    rightBtn.addEventListener('pointercancel',e => { rightBtn.classList.remove('pressed'); release(-1); });

    twirlBtn.addEventListener('pointerdown',  e => {
      e.preventDefault(); twirlBtn.classList.add('pressed');
      if (twirlT <= 0) { twirlT = 1.2; playTwirl(); burstSparkles(mermaidX, mermaidY, mermaidZ, 0xff80ab, 40); }
    });
    twirlBtn.addEventListener('pointerup',    e => twirlBtn.classList.remove('pressed'));
    twirlBtn.addEventListener('pointerleave', e => twirlBtn.classList.remove('pressed'));

    window.addEventListener('keydown', e => {
      if (!gameActive) return;
      if (e.key === 'ArrowLeft'  || e.key === 'a') { turnInput = +1; leftBtn.classList.add('pressed'); }
      if (e.key === 'ArrowRight' || e.key === 'd') { turnInput = -1; rightBtn.classList.add('pressed'); }
      if (e.key === ' ' || e.key === 'Enter') {
        if (twirlT <= 0) { twirlT = 1.2; playTwirl(); burstSparkles(mermaidX, mermaidY, mermaidZ, 0xff80ab, 40); }
      }
    });
    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'a') { release(+1); leftBtn.classList.remove('pressed'); }
      if (e.key === 'ArrowRight' || e.key === 'd') { release(-1); rightBtn.classList.remove('pressed'); }
    });
  }

  // ═══════════════════════════════════════════
  //  ANIMATE
  // ═══════════════════════════════════════════
  function animate() {
    requestAnimationFrame(animate);
    if (!gameActive) { if (renderer) renderer.render(scene, camera); return; }

    const dt = Math.min(0.05, clock.getDelta());
    swimT  += dt;
    bobT   += dt;
    globalT += dt;
    if (twirlT > 0) twirlT -= dt;

    ambientPad(globalT);

    // ── Steering ──
    const targetVel = turnInput * CFG.turnSpeed;
    headingVel += (targetVel - headingVel) * Math.min(1, dt * 8);
    heading += headingVel * dt;
    // Twirl spin
    const twirlSpin = twirlT > 0 ? (twirlT * 12) : 0;

    // Forward motion
    const fx = -Math.sin(heading);
    const fz = -Math.cos(heading);
    mermaidX += fx * CFG.swimSpeed * dt;
    mermaidZ += fz * CFG.swimSpeed * dt;

    // Soft boundary
    const dist = Math.hypot(mermaidX, mermaidZ);
    if (dist > CFG.lagoonRadius) {
      mermaidX = (mermaidX / dist) * CFG.lagoonRadius;
      mermaidZ = (mermaidZ / dist) * CFG.lagoonRadius;
      const angleToCenter = Math.atan2(-mermaidX, -mermaidZ);
      heading = lerpAngle(heading, angleToCenter, 0.09);
    }

    mermaidY = 3 + Math.sin(bobT * 1.5) * 0.35;

    // Position Ariel
    ariel.position.set(mermaidX, mermaidY, mermaidZ);
    ariel.rotation.y = heading + twirlSpin;

    // Arms swim stroke
    if (arielParts.armL) arielParts.armL.rotation.x = Math.sin(swimT * 3) * 0.5;
    if (arielParts.armR) arielParts.armR.rotation.x = -Math.sin(swimT * 3) * 0.5;
    // Base arm angle
    if (arielParts.armL) arielParts.armL.rotation.z =  0.35 + Math.sin(swimT * 1.5) * 0.1;
    if (arielParts.armR) arielParts.armR.rotation.z = -0.35 - Math.sin(swimT * 1.5) * 0.1;

    // Tail traveling wave
    if (arielParts.tailSegs) {
      const segs = arielParts.tailSegs;
      for (let i=0; i<segs.length; i++) {
        const amp = 0.25 + i*0.08;
        const phase = i * 0.6;
        segs[i].rotation.x = Math.sin(swimT * 5 - phase) * amp;
      }
    }
    // Waist sway
    if (arielParts.waistAttach) {
      arielParts.waistAttach.rotation.z = Math.sin(swimT * 2.5) * 0.08;
    }
    // Hair strand waves
    if (arielParts.strands) {
      for (const strand of arielParts.strands) {
        for (let i=0; i<strand.segs.length; i++) {
          const amp = 0.18 + i*0.04;
          strand.segs[i].rotation.x = Math.sin(swimT * 2.3 - i*0.5 + strand.phase) * amp;
          strand.segs[i].rotation.z = Math.sin(swimT * 1.8 + i*0.3 + strand.phase) * amp * 0.5;
        }
      }
    }
    // Lean into turns
    const lean = -headingVel * 0.3;
    ariel.rotation.z = lean + Math.sin(swimT * 1.3) * 0.03;
    // Eye look direction — follow nearest friend a bit
    lookAtNearestFriend();

    // Twirl sparkle trail
    if (twirlT > 0 && Math.random() < 0.6) {
      burstSparkles(
        mermaidX + (Math.random()-.5)*1.5,
        mermaidY + (Math.random()-.5)*1.5,
        mermaidZ + (Math.random()-.5)*1.5,
        [0xff80ab, 0xffeb3b, 0x81d4fa, 0xce93d8][Math.floor(Math.random()*4)],
        3
      );
    }
    // Occasional swim sparkle behind her
    if (Math.random() < 0.25) {
      burstSparkles(mermaidX - fx*1.5, mermaidY - 0.3, mermaidZ - fz*1.5, 0xb3e5fc, 1);
    }

    // Camera
    const camDist = 7.5;
    const camH = 3.4;
    const tx = mermaidX + Math.sin(heading) * camDist;
    const tz = mermaidZ + Math.cos(heading) * camDist;
    const ty = mermaidY + camH;
    // Smooth camera
    camera.position.x += (tx - camera.position.x) * Math.min(1, dt*5);
    camera.position.y += (ty - camera.position.y) * Math.min(1, dt*5);
    camera.position.z += (tz - camera.position.z) * Math.min(1, dt*5);
    camera.lookAt(mermaidX + fx*2, mermaidY + 0.3, mermaidZ + fz*2);

    // ── Pearls ──
    for (const p of pearlMeshes) {
      if (p.userData.collected) continue;
      p.userData.t += dt;
      p.rotation.y += dt * 1.6;
      p.position.y = p.userData.baseY + Math.sin(p.userData.t * 2.1) * 0.3;
      const d = Math.hypot(p.position.x - mermaidX, p.position.z - mermaidZ);
      if (d < CFG.pearlDist && Math.abs(p.position.y - mermaidY) < 2.5) {
        p.userData.collected = true;
        p.visible = false;
        pearlsCollected++;
        updatePearlCounter();
        playPearl();
        flash('pearl-flash');
        burstSparkles(p.position.x, p.position.y, p.position.z, 0xfff7fa, 12);
      }
    }

    // ── Friends ──
    for (const f of friendMeshes) {
      f.userData.t += dt;
      // Gentle bob (except Rapunzel on her tower, who stays put)
      if (f.userData.kind !== 'rapunzel') {
        f.position.y = f.userData.baseY + Math.sin(f.userData.t * 1.2) * 0.22;
      }
      // Gentle sway
      if (f.userData.kind === 'mermaid') {
        f.rotation.y = f.userData.t * 0.4; // twirls slowly
        // Animate her hair strands
        const sData = f.userData.strands;
        if (sData) {
          for (const s of sData) {
            for (let i=0; i<s.segs.length; i++) {
              s.segs[i].rotation.x = Math.sin(globalT*2 - i*0.4 + s.phase) * 0.2;
            }
          }
        }
      } else if (f.userData.kind === 'rapunzel') {
        // Sway her massive hair
        const rStrands = f.userData.rapunzelStrands;
        if (rStrands) {
          for (const s of rStrands) {
            for (let i=0; i<s.segs.length; i++) {
              s.segs[i].rotation.x = Math.sin(globalT*1.4 - i*0.3 + s.phase) * 0.12;
              s.segs[i].rotation.z = Math.sin(globalT*1.0 + i*0.2 + s.phase) * 0.08;
            }
          }
        }
      } else if (f.userData.kind === 'happy') {
        if (f.userData.rayGroup) f.userData.rayGroup.rotation.y = globalT * 0.3;
        f.rotation.y = Math.sin(f.userData.t * 0.6) * 0.3;
      } else if (f.userData.kind === 'girl') {
        f.rotation.y = Math.sin(f.userData.t * 0.5) * 0.5;
        // Clamshell gently opens/closes
        if (f.userData.clamTop) {
          const openness = f.userData.found ? 0.9 : (0.1 + Math.sin(f.userData.t * 0.8) * 0.05);
          f.userData.clamTop.position.y = -0.1 + openness * 0.4;
          f.userData.clamTop.rotation.x = -openness * 0.5;
        }
      }

      if (!f.userData.found) {
        const d = Math.hypot(f.position.x - mermaidX, f.position.z - mermaidZ);
        const haloOn = d < CFG.findDist * 2.5;
        if (f.userData.halo) {
          f.userData.halo.visible = haloOn;
          if (haloOn) {
            const k = Math.max(0, 1 - d / (CFG.findDist * 2.5));
            f.userData.halo.material.opacity = 0.2 + k * 0.35;
            f.userData.halo.scale.setScalar(1 + k * 0.3 + Math.sin(globalT*3)*0.05);
          }
        }
        // "Near" HUD hint + chime once
        const wasNear = f.userData.near;
        const isNear = d < CFG.nearFriendDist;
        f.userData.near = isNear;
        const slotEl = document.getElementById('slot-' + f.userData.kind);
        if (slotEl) slotEl.classList.toggle('near', isNear);
        if (isNear && !wasNear) playNearHint();

        if (d < CFG.findDist) {
          f.userData.found = true;
          foundCount++;
          markFriendFound(f.userData.kind);
          showBanner(f.userData.label);
          playFind(f.userData.kind);
          burstSparkles(f.position.x, f.position.y + 1, f.position.z,
            [0xffd700,0xff80ab,0x81d4fa,0xffeb3b][foundCount-1] || 0xfff3b0, 40);
          flash('find-flash');
          if (foundCount >= CFG.friends.length) {
            setTimeout(() => winGame(), 1800);
          }
        }
      } else {
        if (f.userData.halo) {
          f.userData.halo.visible = true;
          f.userData.halo.material.opacity = 0.3 + Math.sin(f.userData.t * 2) * 0.1;
        }
      }
    }

    // ── Bubbles ──
    for (const b of bubbleMeshes) {
      b.position.y += b.userData.speed * dt;
      b.position.x += Math.sin(b.userData.drift + bobT) * 0.2 * dt;
      if (b.position.y > 16) {
        b.position.y = -1;
        if (b.userData.origX !== undefined) {
          b.position.x = b.userData.origX + (Math.random()-.5)*1.5;
          b.position.z = b.userData.origZ + (Math.random()-.5)*1.5;
        } else {
          b.position.x = (Math.random()-.5) * 100;
          b.position.z = (Math.random()-.5) * 100;
        }
      }
    }
    // Marine snow drifts
    for (const s of marineSnow) {
      s.position.y += s.userData.vy * dt;
      s.position.x += Math.sin(bobT + s.userData.drift) * 0.05;
      if (s.position.y < -1) {
        s.position.y = 15;
        s.position.x = (Math.random()-.5)*90;
        s.position.z = (Math.random()-.5)*90;
      }
    }

    // ── Fish schools ──
    for (const f of fishMeshes) {
      const u = f.userData;
      u.phase += u.speed * dt;
      const x = u.centerX + Math.cos(u.phase) * u.radius;
      const z = u.centerZ + Math.sin(u.phase) * u.radius;
      f.position.set(x, u.y, z);
      f.rotation.y = -u.phase + Math.PI/2;
    }

    // Seaweed sways
    for (const s of seaweedMeshes) {
      if (s.userData.simple) {
        s.rotation.z = Math.sin(bobT * 0.9 + s.userData.phase) * 0.22;
      } else {
        // Tall kelp traveling wave
        const chain = s.userData.chain;
        for (let i=0; i<chain.length; i++) {
          chain[i].rotation.z = Math.sin(bobT*1.1 + s.userData.phase + i*0.35) * 0.14;
          chain[i].rotation.x = Math.cos(bobT*0.9 + s.userData.phase + i*0.35) * 0.08;
        }
      }
    }

    // Caustics drift + pulse
    for (const c of causticMeshes) {
      c.userData.phase += c.userData.speed * dt;
      c.position.x = c.userData.baseX + Math.sin(c.userData.phase) * 3;
      c.position.z = c.userData.baseZ + Math.cos(c.userData.phase*0.8) * 2.5;
      c.material.opacity = c.userData.opBase + Math.sin(c.userData.phase*1.5) * 0.05;
    }
    // God rays shimmer
    for (const r of rayMeshes) {
      r.material.opacity = r.userData.baseOp + Math.sin(globalT*1.3 + r.userData.phase)*0.06;
    }
    // Crystals pulse
    for (const c of crystalMeshes) {
      c.material.emissiveIntensity = c.userData.baseEmissive + Math.sin(globalT*2 + c.userData.pulsePhase)*0.2;
    }

    // Seahorses bob
    for (const sh of seahorseMeshes) {
      sh.position.y = sh.userData.baseY + Math.sin(globalT*1.5 + sh.userData.phase)*0.4;
      sh.rotation.z = Math.sin(globalT*2 + sh.userData.phase)*0.1;
    }

    // Crab scuttles around the sandy floor
    if (crab) {
      crab.userData.phase += dt * 1.4;
      const r = 14;
      crab.position.x = Math.cos(crab.userData.phase*0.5)*r;
      crab.position.z = -5 + Math.sin(crab.userData.phase*0.5)*r;
      crab.rotation.y = -crab.userData.phase*0.5 + Math.PI/2;
      crab.position.y = -0.8 + Math.abs(Math.sin(crab.userData.phase*4))*0.15;
    }

    // Dolphin does a big arcing loop around the lagoon, jumping over the surface
    if (dolphin) {
      dolphin.userData.t += dt * 0.4;
      const loopR = 45;
      const t = dolphin.userData.t;
      const x = Math.cos(t) * loopR;
      const z = Math.sin(t) * loopR;
      // Sine in y for arcing jumps
      const y = 4 + Math.sin(t * 3) * 8;
      dolphin.position.set(x, y, z);
      // Face tangent
      dolphin.rotation.y = -t + Math.PI/2;
      // Pitch up/down based on velocity
      dolphin.rotation.z = Math.cos(t * 3) * 0.5;
    }

    // Whale drifts across the deep background
    if (whale) {
      whale.userData.t += dt * 0.08;
      const t = whale.userData.t;
      const x = Math.cos(t) * 100;
      const z = Math.sin(t) * 100 - 40;
      whale.position.set(x, 8, z);
      whale.rotation.y = -t + Math.PI/2;
      whale.rotation.z = Math.sin(t*4)*0.04;
    }

    // Octopus tentacles wave
    for (const oct of tentacleMeshes) {
      const tents = oct.userData.tentacles;
      for (const tn of tents) {
        // Get parent chain by traversing
        let node = tn.root;
        let depth = 0;
        while (node.children.length > 0) {
          const childGroup = node.children.find(c => c.type === 'Group');
          if (!childGroup) break;
          childGroup.rotation.x = Math.sin(globalT*2 + tn.phaseOff*0.5 - depth*0.5)*0.25;
          node = childGroup;
          depth++;
          if (depth > 6) break;
        }
      }
    }

    updateSparkles(dt);
    renderer.render(scene, camera);
  }

  function lookAtNearestFriend() {
    if (!arielParts.eyeL || !arielParts.eyeR) return;
    let best = null, bestD = Infinity;
    for (const f of friendMeshes) {
      if (f.userData.found) continue;
      const d = Math.hypot(f.position.x - mermaidX, f.position.z - mermaidZ);
      if (d < bestD) { bestD = d; best = f; }
    }
    // Default: look forward
    let tx = 0, ty = 0;
    if (best && bestD < 20) {
      // Local direction in Ariel's frame
      const dx = best.position.x - mermaidX;
      const dz = best.position.z - mermaidZ;
      // Convert to local XZ
      const lx =  dx * Math.cos(-heading) - dz * Math.sin(-heading);
      const lz =  dx * Math.sin(-heading) + dz * Math.cos(-heading);
      tx = Math.max(-0.04, Math.min(0.04, lx * 0.01));
      ty = Math.max(-0.02, Math.min(0.02, -lz * 0.003));
    }
    // Move the pupils (child index 1)
    [arielParts.eyeL, arielParts.eyeR].forEach(eg => {
      const pup = eg.children[1];
      if (pup) {
        pup.position.x += (tx - pup.position.x) * 0.15;
        pup.position.y += (ty - pup.position.y) * 0.15;
      }
    });
  }

  // ═══════════════════════════════════════════
  //  SPARKLES / CONFETTI
  // ═══════════════════════════════════════════
  let sparkles = [];
  function burstSparkles(x, y, z, color=0xfff7b0, count=28) {
    for (let i=0; i<count; i++) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent:true });
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.15 + Math.random()*0.12, 6, 4), mat);
      s.position.set(x, y, z);
      const a = Math.random()*Math.PI*2, phi = Math.random()*Math.PI;
      const speed = 3 + Math.random()*3;
      s.userData = {
        vx: Math.sin(phi)*Math.cos(a)*speed,
        vy: Math.cos(phi)*speed,
        vz: Math.sin(phi)*Math.sin(a)*speed,
        life: 1.0,
      };
      scene.add(s);
      sparkles.push(s);
    }
  }
  function updateSparkles(dt) {
    for (let i = sparkles.length-1; i >= 0; i--) {
      const s = sparkles[i];
      s.userData.life -= dt * 1.2;
      if (s.userData.life <= 0) {
        scene.remove(s);
        s.geometry.dispose();
        s.material.dispose();
        sparkles.splice(i,1);
        continue;
      }
      s.position.x += s.userData.vx * dt;
      s.position.y += s.userData.vy * dt;
      s.position.z += s.userData.vz * dt;
      s.userData.vy -= 1.5 * dt;
      s.material.opacity = s.userData.life;
      s.scale.setScalar(s.userData.life * 1.2);
    }
  }

  function spawnConfetti() {
    const colors = ['#ff80ab','#ffd700','#4fc3f7','#ba68c8','#ffca28','#f06292','#7e57c2','#aed581','#26a69a','#ff9800'];
    for (let i=0; i<90; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      const size = 8 + Math.random()*14;
      p.style.width  = size + 'px';
      p.style.height = (size * (0.5 + Math.random()*0.8)) + 'px';
      p.style.left   = (Math.random()*100) + 'vw';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.borderRadius = Math.random() < 0.5 ? '50%' : '4px';
      p.style.animationDuration = (2.4 + Math.random()*2.6) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }
  }

  // ═══════════════════════════════════════════
  //  HELPERS
  // ═══════════════════════════════════════════
  function lerpAngle(a, b, t) {
    let d = b - a;
    while (d >  Math.PI) d -= Math.PI*2;
    while (d < -Math.PI) d += Math.PI*2;
    return a + d * t;
  }
  function flash(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 320);
  }
  function updatePearlCounter() {
    document.getElementById('pearl-counter').textContent = '🫧 ' + pearlsCollected;
  }
  function markFriendFound(kind) {
    const el = document.getElementById('slot-' + kind);
    if (el) { el.classList.add('got'); el.classList.remove('near'); }
  }
  function showBanner(text) {
    const b = document.getElementById('friend-banner');
    b.textContent = text;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 1400);
  }

  // ═══════════════════════════════════════════
  //  FLOW
  // ═══════════════════════════════════════════
  function startGame() {
    try { au().resume(); } catch(e) {}
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('pearl-counter').style.display = 'block';
    document.getElementById('steer-left').style.display = 'flex';
    document.getElementById('steer-right').style.display = 'flex';
    document.getElementById('twirl-btn').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';

    if (!renderer) {
      initThree();
      buildWorld();
      ariel = buildAriel();
      scene.add(ariel);
      bindInput();
      animate();
    }
    gameActive = true;
    clock.start();
    [523,659,784,988,1175].forEach((f,i) => tone(f,'sine',0.28,0.12, i*0.08));
  }

  function winGame() {
    gameActive = false;
    document.getElementById('hud').style.display = 'none';
    document.getElementById('pearl-counter').style.display = 'none';
    document.getElementById('steer-left').style.display = 'none';
    document.getElementById('steer-right').style.display = 'none';
    document.getElementById('twirl-btn').style.display = 'none';
    document.getElementById('win-screen').classList.remove('hidden');
    playWin();
    spawnConfetti();
    setTimeout(spawnConfetti, 700);
    setTimeout(spawnConfetti, 1500);
    setTimeout(spawnConfetti, 2400);
  }

  function restartGame() {
    mermaidX = 0; mermaidZ = 0; mermaidY = 3;
    heading = 0; headingVel = 0; turnInput = 0;
    swimT = 0; bobT = 0; twirlT = 0;
    foundCount = 0; pearlsCollected = 0;
    friendMeshes.forEach(f => {
      f.userData.found = false;
      f.userData.near = false;
      if (f.userData.halo) { f.userData.halo.visible = false; f.userData.halo.material.opacity = 0.22; }
    });
    pearlMeshes.forEach(p => { p.userData.collected = false; p.visible = true; });
    document.querySelectorAll('.friend-slot').forEach(s => { s.classList.remove('got'); s.classList.remove('near'); });
    updatePearlCounter();
    document.getElementById('win-screen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('pearl-counter').style.display = 'block';
    document.getElementById('steer-left').style.display = 'flex';
    document.getElementById('steer-right').style.display = 'flex';
    document.getElementById('twirl-btn').style.display = 'flex';
    gameActive = true;
  }
  </script>
