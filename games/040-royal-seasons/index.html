<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Royal Seasons 🍂</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --spring-bg: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 40%, #e1bee7 100%);
      --summer-bg: linear-gradient(160deg, #fff9c4 0%, #ffe082 40%, #ffcc02 100%);
      --autumn-bg: linear-gradient(160deg, #fff3e0 0%, #ffcc80 40%, #ff8a65 100%);
      --winter-bg: linear-gradient(160deg, #e3f2fd 0%, #b3e5fc 40%, #ce93d8 100%);
    }

    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      font-family: 'Fredoka One', 'Georgia', sans-serif;
      overflow-x: hidden; overflow-y: auto;
      user-select: none;
      background: linear-gradient(160deg, #fce4ec 0%, #e1bee7 100%);
      transition: background 0.8s ease;
      padding-bottom: 20px;
    }

    /* ── Back button ── */
    #back-btn {
      position: fixed; top: 12px; left: 12px; z-index: 200;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.7);
      border: none; cursor: pointer;
      font-size: 20px; font-family: 'Fredoka One', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      display: flex; align-items: center; justify-content: center;
      color: #7b1fa2;
    }

    /* ── HUD ── */
    #hud {
      position: relative;
      width: 100%; max-width: 480px;
      padding: clamp(10px,3vw,18px) 14px 0 60px;
      margin-bottom: 4px;
    }
    #tier-badge {
      display: inline-block;
      background: rgba(255,255,255,0.55);
      border-radius: 22px;
      padding: 5px 14px;
      font-size: clamp(12px, 3.2vw, 15px);
      color: #6a1b9a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .tier-easy   { background: linear-gradient(135deg,#a5d6a7,#66bb6a) !important; color: #1b5e20 !important; }
    .tier-medium { background: linear-gradient(135deg,#ffe082,#ffd54f) !important; color: #5a3000 !important; }
    .tier-hard   { background: linear-gradient(135deg,#ce93d8,#ab47bc) !important; color: #fff !important; }

    /* Progress bar */
    #progress-bar-wrap {
      width: min(95vw, 460px);
      margin: 4px auto 0;
    }
    #progress-track {
      background: rgba(255,255,255,0.28); border-radius: 20px;
      height: clamp(8px,2vw,12px); overflow: hidden;
    }
    #progress-fill {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg,#ffd700,#e040fb);
      transition: width .35s ease; width: 0%;
      box-shadow: 0 0 8px rgba(255,215,0,.45);
    }

    /* ── Scene canvas wrapper ── */
    #scene-wrap {
      width: min(95vw, 460px);
      position: relative;
      margin: 8px auto 0;
    }
    #scene-canvas {
      width: 100%;
      height: clamp(280px, 52vw, 340px);
      border-radius: 28px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.18);
      display: block;
    }

    /* ── Prompt ── */
    #prompt-text {
      text-align: center;
      font-size: clamp(17px, 4.5vw, 22px);
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.35);
      margin: 10px 14px 6px;
      min-height: 28px;
    }

    /* ── Season buttons ── */
    #buttons-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(8px, 2.5vw, 14px);
      width: min(95vw, 460px);
      margin: 8px auto 0;
    }
    .season-btn {
      min-height: clamp(90px, 22vw, 115px);
      border-radius: 22px;
      border: 3px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.55);
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.13);
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .season-btn:active { transform: scale(0.95); }
    .season-btn .btn-icon { font-size: clamp(32px, 9vw, 46px); line-height: 1; }
    .season-btn .btn-label {
      font-size: clamp(13px, 3.5vw, 17px);
      color: #5d1a6e;
      text-shadow: 0 1px 3px rgba(255,255,255,0.8);
    }

    /* Season button colours */
    .btn-spring { background: rgba(252,228,236,0.75); }
    .btn-summer { background: rgba(255,249,196,0.75); }
    .btn-autumn { background: rgba(255,243,224,0.75); }
    .btn-winter { background: rgba(227,242,253,0.75); }

    .btn-spring:hover { background: rgba(248,187,208,0.9); }
    .btn-summer:hover { background: rgba(255,241,118,0.9); }
    .btn-autumn:hover { background: rgba(255,204,128,0.9); }
    .btn-winter:hover { background: rgba(179,229,252,0.9); }

    /* Wobble animation */
    @keyframes wobble {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-10px) rotate(-4deg); }
      40%  { transform: translateX(10px) rotate(4deg); }
      60%  { transform: translateX(-7px) rotate(-2deg); }
      80%  { transform: translateX(7px) rotate(2deg); }
      100% { transform: translateX(0); }
    }
    .wobble { animation: wobble 0.45s ease; }

    /* Wrong flash */
    @keyframes wrongFlash {
      0%,100% { background: rgba(255,100,100,0.18); }
      50%      { background: rgba(255,80,80,0.38); }
    }
    .wrong-flash { animation: wrongFlash 0.45s ease; }

    /* ── Overlay (celebration / tier-change / win) ── */
    #overlay {
      position: fixed; inset: 0; z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(120,0,180,0.55);
      backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #overlay.show { opacity: 1; pointer-events: all; }
    #overlay-box {
      background: rgba(255,255,255,0.92);
      border-radius: 32px;
      padding: clamp(22px,6vw,40px) clamp(24px,7vw,52px);
      text-align: center;
      box-shadow: 0 8px 40px rgba(100,0,160,0.25);
      max-width: 88vw;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.5) rotate(-8deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #overlay-emoji { font-size: clamp(56px,15vw,84px); line-height: 1; }
    #overlay-title {
      font-size: clamp(24px,7vw,38px);
      color: #6a1b9a; margin-top: 8px;
    }
    #overlay-sub {
      font-size: clamp(14px,3.8vw,20px);
      color: #8e24aa; margin-top: 6px;
    }
    #overlay-btn {
      margin-top: 18px;
      padding: 14px 34px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ce93d8, #9c27b0);
      color: #fff;
      font-family: 'Fredoka One', sans-serif;
      font-size: clamp(16px,4.5vw,22px);
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(100,0,160,0.3);
      transition: transform 0.15s;
    }
    #overlay-btn:active { transform: scale(0.95); }

    /* ── Sparkle particles ── */
    .sparkle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: sparkleFly 0.9s ease-out forwards;
      z-index: 400;
    }
    @keyframes sparkleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      border-radius: 3px;
      animation: confettiFall var(--dur) ease-in forwards;
      z-index: 400;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translate(0,0) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--cx),var(--cy)) rotate(var(--cr)); }
    }

    /* ── Correct button highlight ── */
    @keyframes correctPulse {
      0%   { box-shadow: 0 0 0 0 rgba(100,220,100,0.8); }
      50%  { box-shadow: 0 0 0 14px rgba(100,220,100,0); }
      100% { box-shadow: 0 0 0 0 rgba(100,220,100,0); }
    }
    .correct-highlight {
      background: rgba(144,238,144,0.65) !important;
      animation: correctPulse 0.6s ease;
    }
  </style>
</head>
<body>

  <button id="back-btn" onclick="history.length>1?history.back():window.close()">←</button>

  <div id="hud">
    <span id="tier-badge">⭐ Round 1/9 · Curious Sprite</span>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="scene-wrap">
    <canvas id="scene-canvas"></canvas>
  </div>

  <div id="prompt-text">Which season is this? 🌟</div>

  <div id="buttons-row">
    <button class="season-btn btn-spring" data-season="spring">
      <span class="btn-icon">🌸</span>
      <span class="btn-label">Spring</span>
    </button>
    <button class="season-btn btn-summer" data-season="summer">
      <span class="btn-icon">☀️</span>
      <span class="btn-label">Summer</span>
    </button>
    <button class="season-btn btn-autumn" data-season="autumn">
      <span class="btn-icon">🍂</span>
      <span class="btn-label">Autumn</span>
    </button>
    <button class="season-btn btn-winter" data-season="winter">
      <span class="btn-icon">❄️</span>
      <span class="btn-label">Winter</span>
    </button>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <div id="overlay-box">
      <div id="overlay-emoji">🎉</div>
      <div id="overlay-title">Amazing!</div>
      <div id="overlay-sub"></div>
      <button id="overlay-btn" onclick="overlayAction()">Next ➜</button>
    </div>
  </div>

<script>
'use strict';

// ─────────────── Audio ───────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, type, duration, vol = 0.18, startDelay = 0) {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type || 'sine';
    o.frequency.value = freq;
    const t0 = ctx.currentTime + startDelay;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    o.start(t0); o.stop(t0 + duration);
  } catch(e) {}
}
function playCorrect() {
  // 4-note ascending arpeggio
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => tone(f, 'sine', 0.22, 0.2, i * 0.12));
}
function playWrong() {
  tone(300, 'triangle', 0.12, 0.18, 0);
  tone(220, 'triangle', 0.18, 0.14, 0.13);
}
function playRoundWin() {
  // 6-note cheerful melody
  const melody = [523, 659, 784, 659, 784, 1047];
  melody.forEach((f, i) => tone(f, 'sine', 0.28, 0.22, i * 0.14));
}
function playTierFanfare() {
  const fanfare = [392, 523, 659, 784, 1047, 784];
  fanfare.forEach((f, i) => tone(f, 'triangle', 0.22, 0.2, i * 0.12));
}
function playWinJingle() {
  const win = [523, 659, 784, 1047, 784, 659, 523, 659, 1047];
  win.forEach((f, i) => tone(f, 'sine', 0.28, 0.22, i * 0.13));
}

// ─────────────── Round data ───────────────
// Each round: { season, drawFn, hint }
// drawFn(ctx, W, H) draws the scene
// hint is a short emoji description shown in prompt

const ROUNDS = [
  // ── TIER 1: Easy / Obvious ──────────────────────────
  {
    season: 'winter',
    tier: 1,
    hint: 'Brr! ⛄',
    draw(ctx, W, H) {
      // Sky: icy blue
      grad(ctx, W, H, '#b3e5fc', '#e3f2fd');
      // Snow ground
      snowGround(ctx, W, H);
      // Snowman
      drawSnowman(ctx, W * 0.5, H * 0.7, 54);
      // Falling snowflakes
      snowflakes(ctx, W, H, 22);
      // Princess in winter gear
      drawPrincess(ctx, W * 0.82, H * 0.72, 'winter');
      // Title cue
      sceneCue(ctx, W, '❄️ Winter ❄️', W/2, 32, '#1565c0');
    }
  },
  {
    season: 'summer',
    tier: 1,
    hint: 'Beach time! 🏖️',
    draw(ctx, W, H) {
      // Sky: golden blue
      gradV(ctx, W, H, '#87ceeb', '#e0f7fa');
      // Sun
      bigSun(ctx, W * 0.82, 68, 46);
      // Sand
      sand(ctx, W, H);
      // Waves
      waves(ctx, W, H);
      // Beach umbrella
      umbrella(ctx, W * 0.35, H * 0.58);
      // Princess with sunhat
      drawPrincess(ctx, W * 0.7, H * 0.72, 'summer');
      sceneCue(ctx, W, '☀️ Summer ☀️', W/2, 32, '#e65100');
    }
  },
  {
    season: 'spring',
    tier: 1,
    hint: 'Flowers blooming! 🌸',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#e1f5fe', '#f8bbd0');
      // Green meadow
      meadow(ctx, W, H);
      // Lots of flowers
      for (let i = 0; i < 9; i++) {
        flower(ctx, W * (0.08 + i * 0.1), H * 0.7 + Math.sin(i)*10, 22 + (i%3)*5, FLOWER_COLORS[i%5]);
      }
      // Rainbow
      rainbow(ctx, W, H);
      // Princess with flower crown
      drawPrincess(ctx, W * 0.75, H * 0.71, 'spring');
      sceneCue(ctx, W, '🌸 Spring 🌸', W/2, 32, '#880e4f');
    }
  },
  {
    season: 'autumn',
    tier: 1,
    hint: 'Coloured leaves! 🍁',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#fff3e0', '#ffccbc');
      // Ground with leaves
      autumnGround(ctx, W, H);
      // Trees with orange leaves
      autumnTree(ctx, W * 0.2, H * 0.65, 55);
      autumnTree(ctx, W * 0.75, H * 0.65, 48);
      // Falling leaves
      fallingLeaves(ctx, W, H, 16);
      // Princess with leaf crown
      drawPrincess(ctx, W * 0.5, H * 0.71, 'autumn');
      sceneCue(ctx, W, '🍂 Autumn 🍂', W/2, 32, '#bf360c');
    }
  },
  // ── TIER 2: Medium ──────────────────────────────────
  {
    season: 'autumn',
    tier: 2,
    hint: 'Harvest time! 🎃',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#fff8e1', '#ffe082');
      autumnGround(ctx, W, H);
      // Pumpkins
      pumpkin(ctx, W*0.22, H*0.76, 30);
      pumpkin(ctx, W*0.45, H*0.79, 24);
      pumpkin(ctx, W*0.62, H*0.77, 28);
      // Basket of apples
      basket(ctx, W*0.78, H*0.75);
      // Scarecrow-style tree
      autumnTree(ctx, W*0.15, H*0.62, 42);
      fallingLeaves(ctx, W, H, 10);
      drawPrincess(ctx, W*0.5, H*0.71, 'autumn');
      sceneCue(ctx, W, '🍎 Harvest Season', W/2, 32, '#bf360c');
    }
  },
  {
    season: 'summer',
    tier: 2,
    hint: 'Butterflies & sunshine! 🦋',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#fff9c4', '#fff59d');
      bigSun(ctx, W*0.85, 60, 52);
      meadow(ctx, W, H);
      // Butterflies
      butterfly(ctx, W*0.22, H*0.38, 26);
      butterfly(ctx, W*0.6, H*0.3, 20);
      butterfly(ctx, W*0.42, H*0.5, 18);
      // Flowers in meadow
      for (let i = 0; i < 7; i++) {
        flower(ctx, W*(0.07+i*0.13), H*0.72 + (i%2)*8, 16+i%3*4, FLOWER_COLORS[i%5]);
      }
      drawPrincess(ctx, W*0.72, H*0.71, 'summer');
      sceneCue(ctx, W, '🦋 Sunny Summer', W/2, 32, '#e65100');
    }
  },
  {
    season: 'winter',
    tier: 2,
    hint: 'Cozy fire & icicles! 🔥',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#cfd8dc', '#eceff1');
      snowGround(ctx, W, H);
      // Cozy fireplace / fire inside cottage
      cottage(ctx, W*0.28, H*0.55, 80);
      // Icicles from top
      icicles(ctx, W, H);
      snowflakes(ctx, W, H, 14);
      drawPrincess(ctx, W*0.72, H*0.72, 'winter');
      sceneCue(ctx, W, '🔥 Cozy Winter', W/2, 32, '#1565c0');
    }
  },
  // ── TIER 3: Hard / Subtle ───────────────────────────
  {
    season: 'spring',
    tier: 3,
    hint: 'Kite in the breeze! 🪁',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#e8f5e9', '#f3e5f5');
      meadow(ctx, W, H);
      // Kite
      kite(ctx, W*0.55, H*0.12, 34);
      // Baby bird nest
      birdNest(ctx, W*0.22, H*0.5);
      // A couple small flowers
      flower(ctx, W*0.15, H*0.72, 18, '#f48fb1');
      flower(ctx, W*0.82, H*0.75, 15, '#ce93d8');
      // Light breeze lines
      breezeLines(ctx, W, H);
      drawPrincess(ctx, W*0.6, H*0.72, 'spring');
      sceneCue(ctx, W, '🪁 Breezy Spring', W/2, 32, '#880e4f');
    }
  },
  {
    season: 'summer',
    tier: 3,
    hint: 'Sandcastle! 🏰',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#e0f7fa', '#80deea');
      // Sky
      ctx.fillStyle = '#81d4fa';
      ctx.fillRect(0, 0, W, H*0.55);
      sand(ctx, W, H);
      waves(ctx, W, H);
      // Sandcastle
      sandcastle(ctx, W*0.32, H*0.6, 56);
      // Seashells
      seashell(ctx, W*0.7, H*0.77, 14);
      seashell(ctx, W*0.78, H*0.8, 10);
      bigSun(ctx, W*0.15, 55, 38);
      drawPrincess(ctx, W*0.72, H*0.68, 'summer');
      sceneCue(ctx, W, '🏰 Sandcastle Day', W/2, 32, '#e65100');
    }
  },
  {
    season: 'autumn',
    tier: 3,
    hint: 'Apple picking! 🍎',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#fbe9e7', '#ffccbc');
      autumnGround(ctx, W, H);
      // Apple tree
      appleTree(ctx, W*0.38, H*0.58, 60);
      // Basket of apples
      basket(ctx, W*0.7, H*0.76);
      // A few leaves drifting
      fallingLeaves(ctx, W, H, 7);
      drawPrincess(ctx, W*0.72, H*0.71, 'autumn');
      sceneCue(ctx, W, '🍎 Apple Picking', W/2, 32, '#bf360c');
    }
  },
  // extra winter hard round (cocoa)
  {
    season: 'winter',
    tier: 3,
    hint: 'Hot cocoa! ☕',
    draw(ctx, W, H) {
      gradV(ctx, W, H, '#e8eaf6', '#ce93d8');
      snowGround(ctx, W, H);
      // Window with curtains (indoors hint)
      window_(ctx, W*0.5 - 40, H*0.18, 80, 70);
      // Hot cocoa mug on table
      cocoa(ctx, W*0.35, H*0.64);
      // Small table
      table(ctx, W*0.5, H*0.72, 110);
      snowflakes(ctx, W, H, 8);
      drawPrincess(ctx, W*0.74, H*0.71, 'winter');
      sceneCue(ctx, W, '☕ Warm Winter', W/2, 32, '#1565c0');
    }
  },
];

// pick 9 rounds (first 9 defined above; we have exactly 9)
const ALL_ROUNDS = ROUNDS.slice(0, 9);
const TIER_NAMES = ['Curious Sprite', 'Royal Explorer', 'Princess Master'];
let tierHideLabel = false; // hide scene text label for Medium & Hard tiers

// ─────────────── Drawing Helpers ───────────────
const FLOWER_COLORS = ['#f48fb1','#ce93d8','#ffab91','#80deea','#fff176'];

function grad(ctx, W, H, c1, c2) {
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}
function gradV(ctx, W, H, top, bot) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, top); g.addColorStop(1, bot);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}
function sceneCue(ctx, W, text, x, y, color) {
  if (tierHideLabel) return;
  ctx.save();
  ctx.font = 'bold 15px Fredoka One, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  const m = ctx.measureText(text);
  ctx.fillRect(x - m.width/2 - 8, y - 16, m.width + 16, 24);
  ctx.fillStyle = color || '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y - 4);
  ctx.restore();
}

// ── Snow ──
function snowGround(ctx, W, H) {
  ctx.save();
  ctx.fillStyle = '#e3f2fd';
  ctx.beginPath();
  ctx.ellipse(W/2, H, W*0.8, H*0.22, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(W/2, H, W*0.6, H*0.15, 0, Math.PI, 0);
  ctx.fill();
  ctx.restore();
}

  // cross
  ctx.strokeStyle = '#efebe9'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w/2,y+h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y+h/2); ctx.lineTo(x+w,y+h/2); ctx.stroke();
  ctx.restore();
}

// ── Princess character ──
function drawPrincess(ctx, cx, cy, season) {
  ctx.save();
  const r = 22;
  // dress
  const dressColors = {
    spring: '#f48fb1', summer: '#fff176', autumn: '#ffb74d', winter: '#b3e5fc'
  };
  ctx.fillStyle = dressColors[season] || '#f48fb1';
  ctx.beginPath();
  ctx.moveTo(cx - r, cy);
  ctx.quadraticCurveTo(cx - r*1.4, cy + r*1.8, cx - r*0.7, cy + r*2.4);
  ctx.lineTo(cx + r*0.7, cy + r*2.4);
  ctx.quadraticCurveTo(cx + r*1.4, cy + r*1.8, cx + r, cy);
  ctx.fill();
  // arms
  ctx.strokeStyle = '#ffcc80'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx-r*0.8, cy+r*0.3); ctx.lineTo(cx-r*1.5, cy+r*0.9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+r*0.8, cy+r*0.3); ctx.lineTo(cx+r*1.5, cy+r*0.9); ctx.stroke();
  // body
  ctx.fillStyle = '#ffcc80';
  ctx.beginPath(); ctx.ellipse(cx, cy-r*0.1, r*0.7, r*0.85, 0, 0, Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle = '#ffe0b2';
  ctx.beginPath(); ctx.arc(cx, cy-r*1.5, r*0.88, 0, Math.PI*2); ctx.fill();
  // hair
  ctx.fillStyle = season === 'winter' ? '#c8a06e' : '#8d6039';
  ctx.beginPath(); ctx.arc(cx, cy-r*1.5, r*0.88, Math.PI*1.05, Math.PI*0.05, false); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx-r*0.75, cy-r*1.0, r*0.25, r*0.65, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+r*0.75, cy-r*1.0, r*0.25, r*0.65,  0.3, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#5d4037';
  ctx.beginPath(); ctx.arc(cx-r*0.3, cy-r*1.55, r*0.14, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*0.3, cy-r*1.55, r*0.14, 0, Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy-r*1.4, r*0.3, 0.1, Math.PI-0.1); ctx.stroke();
  // season accessory
  if (season === 'winter') {
    // scarf
    ctx.fillStyle = '#ef5350';
    ctx.fillRect(cx-r*0.8, cy-r*0.55, r*1.6, r*0.3);
    // hat
    ctx.fillStyle = '#1565c0';
    ctx.beginPath(); ctx.ellipse(cx, cy-r*2.32, r*0.82, r*0.22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(cx-r*0.55, cy-r*2.9, r*1.1, r*0.62);
    ctx.fillStyle = '#fff'; ctx.fillRect(cx-r*0.55, cy-r*2.32, r*1.1, r*0.14);
  } else if (season === 'spring') {
    // flower crown
    const fc = ['#f06292','#ce93d8','#fff176','#80deea','#ffab91'];
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2 - Math.PI/2;
      ctx.fillStyle = fc[i];
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r*0.82, cy-r*2.28+Math.sin(a)*r*0.18, r*0.22, 0, Math.PI*2); ctx.fill();
    }
  } else if (season === 'summer') {
    // sun hat
    ctx.fillStyle = '#ffe082';
    ctx.beginPath(); ctx.ellipse(cx, cy-r*2.42, r*1.2, r*0.26, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(cx-r*0.65, cy-r*2.9, r*1.3, r*0.5);
    ctx.fillStyle = '#ff7043';
    ctx.fillRect(cx-r*0.65, cy-r*2.4, r*1.3, r*0.1);
  } else {
    // leaf crown (autumn)
    const lc = ['#ff7043','#ff8f00','#e53935'];
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2 - Math.PI*0.6;
      ctx.fillStyle = lc[i%3];
      ctx.save(); ctx.translate(cx+Math.cos(a)*r*0.82, cy-r*2.28+Math.sin(a)*r*0.18);
      ctx.rotate(a+Math.PI/2);
      ctx.beginPath(); ctx.ellipse(0, 0, r*0.22, r*0.12, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  // crown (always)
  ctx.fillStyle = '#ffd700';
  const crownBase = cy - r*2.82;
  ctx.beginPath();
  ctx.moveTo(cx-r*0.55, crownBase+r*0.3);
  ctx.lineTo(cx-r*0.55, crownBase);
  ctx.lineTo(cx-r*0.2, crownBase+r*0.2);
  ctx.lineTo(cx, crownBase-r*0.22);
  ctx.lineTo(cx+r*0.2, crownBase+r*0.2);
  ctx.lineTo(cx+r*0.55, crownBase);
  ctx.lineTo(cx+r*0.55, crownBase+r*0.3);
  ctx.closePath(); ctx.fill();
  // gems on crown
  ctx.fillStyle = '#e91e63';
  ctx.beginPath(); ctx.arc(cx, crownBase-r*0.12, r*0.11, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#7b1fa2';
  ctx.beginPath(); ctx.arc(cx-r*0.36, crownBase+r*0.1, r*0.08, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*0.36, crownBase+r*0.1, r*0.08, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─────────────── Game State ───────────────
let currentRound = 0;
let locked = false;
let overlayMode = null; // 'correct'|'tier'|'win'

const canvas = document.getElementById('scene-canvas');
const ctx2d = canvas.getContext('2d');
const tierBadge = document.getElementById('tier-badge');
const promptText = document.getElementById('prompt-text');
const overlay = document.getElementById('overlay');
const overlayEmoji = document.getElementById('overlay-emoji');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const overlayBtn = document.getElementById('overlay-btn');
const buttons = document.querySelectorAll('.season-btn');

function resizeCanvas() {
  const wrap = document.getElementById('scene-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = canvas.clientHeight;
}

function renderRound() {
  resizeCanvas();
  const r = ALL_ROUNDS[currentRound];
  const W = canvas.width, H = canvas.height;

  const tierIdx = Math.floor(currentRound / 3);
  tierHideLabel = tierIdx >= 1; // set BEFORE draw so sceneCue can check it

  ctx2d.clearRect(0,0,W,H);
  r.draw(ctx2d, W, H);

  const TIER_LABELS = ['🌸 Easy', '🌿 Medium', '👑 Hard'];
  const TIER_CLASSES = ['tier-easy', 'tier-medium', 'tier-hard'];
  tierBadge.textContent = `Round ${currentRound+1}/9 · ${TIER_LABELS[tierIdx]}`;
  tierBadge.className = TIER_CLASSES[tierIdx];
  document.getElementById('progress-fill').style.width = (currentRound / 9 * 100) + '%';
  promptText.textContent = 'Which season is this? 🌟';
  locked = false;
  buttons.forEach(b => {
    b.style.pointerEvents = '';
    b.classList.remove('wobble','wrong-flash','correct-highlight');
  });
}

function overlayAction() {
  hideOverlay();
  if (overlayMode === 'win') {
    restartGame();
    return;
  }
  currentRound++;
  if (currentRound >= ALL_ROUNDS.length) {
    showWin();
    return;
  }
  // Check if tier change
  const prevTier = Math.floor((currentRound-1) / 3);
  const newTier = Math.floor(currentRound / 3);
  if (newTier > prevTier && overlayMode !== 'tier') {
    showTierChange(newTier);
  } else {
    renderRound();
  }
}

function showOverlay(emoji, title, sub, btnLabel) {
  overlayEmoji.textContent = emoji;
  overlayTitle.textContent = title;
  overlaySub.textContent = sub;
  overlayBtn.textContent = btnLabel;
  overlay.classList.add('show');
}
function hideOverlay() {
  overlay.classList.remove('show');
  overlayMode = null;
}

function showCorrect(season) {
  overlayMode = 'correct';
  const labels = { spring:'Spring 🌸', summer:'Summer ☀️', autumn:'Autumn 🍂', winter:'Winter ❄️' };
  const emojis = { spring:'🌸', summer:'☀️', autumn:'🍂', winter:'❄️' };
  playRoundWin();
  burst(canvas);
  setTimeout(() => {
    showOverlay(emojis[season], `✨ ${labels[season]}! ✨`, 'Great job, Princess! 👸', 'Next Round ➜');
  }, 150);
}

function showTierChange(tierIdx) {
  overlayMode = 'tier';
  const msgs = [
    ['🌟', 'Royal Explorer!', 'Getting harder — you can do it!'],
    ['👑', 'Princess Master!', 'Final tier — show your royal wisdom!']
  ];
  const [em, ti, su] = msgs[tierIdx - 1] || ['🌟','New Tier!','Keep going!'];
  playTierFanfare();
  showOverlay(em, ti, su, 'Let\'s Go! 🌟');
}

function showWin() {
  overlayMode = 'win';
  document.getElementById('progress-fill').style.width = '100%';
  playWinJingle();
  bigConfetti();
  setTimeout(() => {
    showOverlay('🎉', 'You know ALL the seasons!', '🌸 Spring ☀️ Summer 🍂 Autumn ❄️ Winter', 'Play Again! 🎊');
  }, 300);
}

function restartGame() {
  currentRound = 0;
  document.getElementById('progress-fill').style.width = '0%';
  renderRound();
}

// ─────────────── Button handlers ───────────────
buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    if (locked) return;
    const chosen = btn.dataset.season;
    const correct = ALL_ROUNDS[currentRound].season;
    if (chosen === correct) {
      locked = true;
      buttons.forEach(b => b.style.pointerEvents = 'none');
      btn.classList.add('correct-highlight');
      playCorrect();
      sparkles(btn);
      setTimeout(() => showCorrect(correct), 400);
    } else {
      btn.classList.remove('wobble','wrong-flash');
      void btn.offsetWidth; // reflow
      btn.classList.add('wobble','wrong-flash');
      playWrong();
      btn.addEventListener('animationend', () => {
        btn.classList.remove('wobble','wrong-flash');
      }, { once: true });
    }
  });
});

// ─────────────── Particles ───────────────
function sparkles(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const colors = ['#f48fb1','#fff176','#ce93d8','#80deea','#ffab91','#ffd700'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 6 + Math.random()*10;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${cx - size/2}px; top:${cy - size/2}px;
      background:${colors[i%colors.length]};
      --dx:${(Math.random()-0.5)*130}px;
      --dy:${(Math.random()-0.5)*130}px;
      animation-duration:${0.6+Math.random()*0.4}s;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1100);
  }
}

function burst(canvasEl) {
  const rect = canvasEl.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const colors = ['#f48fb1','#fff176','#ce93d8','#80deea','#ffab91','#ffd700','#ff7043','#b2dfdb'];
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 8 + Math.random()*14;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${cx - size/2}px; top:${cy - size/2}px;
      background:${colors[i%colors.length]};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      --dx:${(Math.random()-0.5)*200}px;
      --dy:${(Math.random()-0.5)*200}px;
      animation-duration:${0.7+Math.random()*0.5}s;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  }
}

function bigConfetti() {
  const colors = ['#f48fb1','#fff176','#ce93d8','#80deea','#ff7043','#ffd700','#b2dfdb','#ef5350','#7986cb'];
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'confetti-piece';
    const size = 6 + Math.random()*10;
    const startX = Math.random() * window.innerWidth;
    const startY = -20 - Math.random()*60;
    const dur = 1.2 + Math.random()*1.4;
    s.style.cssText = `
      width:${size}px; height:${size * (0.4+Math.random()*0.8)}px;
      left:${startX}px; top:${startY}px;
      background:${colors[i%colors.length]};
      --cx:${(Math.random()-0.5)*60}px;
      --cy:${window.innerHeight + 60}px;
      --cr:${(Math.random()-0.5)*720}deg;
      --dur:${dur}s;
      animation-delay:${Math.random()*0.6}s;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), (dur + 0.6)*1000 + 200);
  }
}

// ─────────────── Init ───────────────
window.addEventListener('resize', () => {
  if (!overlay.classList.contains('show')) renderRound();
});
renderRound();
</script>
