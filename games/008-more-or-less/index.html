<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>More or Less ⚖️</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #e65100 0%, #f57c00 50%, #ffcc80 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:Georgia,serif; overflow:hidden; user-select:none;
    }

    #header {
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; align-items:center; justify-content:space-between;
      padding:clamp(8px,2vw,12px) 16px;
      background:rgba(0,0,0,.18);
    }
    #tier-badge {
      font-size:clamp(12px,3.5vw,18px);
      background:rgba(255,255,255,.28); border-radius:20px;
      padding:3px 12px; color:#fff; font-weight:bold;
      text-shadow:0 1px 3px rgba(0,0,0,.4);
    }
    #round-label { font-size:clamp(12px,3vw,17px); color:rgba(255,255,255,.9); font-weight:bold; text-shadow:0 1px 3px rgba(0,0,0,.3); }
    #score-row { font-size:clamp(18px,4.5vw,26px); min-width:30px; text-align:right; }

    #prompt {
      font-size:clamp(22px,6vw,36px); color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.4);
      margin-bottom:clamp(14px,3.5vw,26px); text-align:center;
      padding:0 12px; margin-top:clamp(52px,12vw,68px);
    }

    #sides {
      display:flex; gap:clamp(10px,3vw,20px); align-items:stretch;
    }

    .side {
      width:clamp(140px,38vw,210px);
      min-height:clamp(155px,37vw,215px);
      background:rgba(255,255,255,.18);
      border:4px solid rgba(255,255,255,.35);
      border-radius:28px;
      display:flex; flex-wrap:wrap;
      align-content:center; justify-content:center;
      gap:clamp(4px,1.5vw,8px);
      padding:clamp(10px,2.5vw,18px);
      cursor:pointer;
      box-shadow:0 4px 20px rgba(0,0,0,.2), inset 0 2px 0 rgba(255,255,255,.2);
      transition:transform .1s;
    }
    .side:active { transform:scale(.95); }
    .side.correct-flash { animation:correctPulse .5s ease-out; }
    .side.wrong-flash   { animation:wrongShake .4s ease-out; }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.1);box-shadow:0 0 40px rgba(255,255,255,.7)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

    .item { font-size:clamp(26px,7vw,40px); line-height:1; animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

    #vs-badge {
      display:flex; align-items:center; justify-content:center;
      width:clamp(42px,10vw,58px); height:clamp(42px,10vw,58px);
      background:rgba(255,255,255,.25); border-radius:50%;
      font-size:clamp(16px,4.5vw,24px); color:#fff; font-weight:bold;
      text-shadow:0 1px 4px rgba(0,0,0,.3); flex-shrink:0;
      align-self:center;
    }

    /* Sparkle particles */
    .sparkle-p { position:fixed; pointer-events:none; z-index:50; font-size:clamp(14px,3.5vw,20px); animation:sparklePop .7s ease-out forwards; }
    @keyframes sparklePop { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-text { font-size:clamp(28px,8vw,56px); color:#fff; text-shadow:0 0 20px #ffd700; text-align:center; padding:0 16px; }
    #celebrate-nums { font-size:clamp(34px,9vw,60px); color:#ffd700; }
    #next-btn { padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px); border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800); color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit; }
    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>
  <div id="header">
    <div id="tier-badge">Easy 🌸</div>
    <div id="round-label">1 / 9</div>
    <div id="score-row"></div>
  </div>

  <div id="prompt">Which side has MORE? 👀</div>
  <div id="sides">
    <div class="side" id="side-left"></div>
    <div id="vs-badge">VS</div>
    <div class="side" id="side-right"></div>
  </div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">More! 🎉</div>
    <div id="celebrate-nums"></div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const ITEMS = ['👑','🌸','💎','⭐','🦋','🌈','🎀','🍭','🌟','🐝','🏰','🦄'];

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCorrect(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.2),i*80)); }
  function playWrong(){ tone(200,'sawtooth',.25,.1); }
  function playCelebrate(){ [523,587,659,698,784,880,988,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.25),i*70)); }

  const TIERS = [
    { label:'Easy 🌸',   maxVal:4, minGap:2, modes:['more'] },
    { label:'Medium 🌟', maxVal:6, minGap:1, modes:['more','less'] },
    { label:'Hard 👑',   maxVal:9, minGap:1, modes:['more','less'] },
  ];

  let leftCount=0, rightCount=0, score=0, round=0, mode='more', locked=false;
  const TOTAL=9;

  function getTier(r){ return r<=3 ? TIERS[0] : r<=6 ? TIERS[1] : TIERS[2]; }
  function updateScore(){ document.getElementById('score-row').innerHTML=Array.from({length:score},()=>'⭐').join(''); }

  function getCounts(tier){
    let a,b;
    do {
      a=1+Math.floor(Math.random()*tier.maxVal);
      b=1+Math.floor(Math.random()*tier.maxVal);
    } while(Math.abs(a-b)<tier.minGap);
    return [a,b];
  }

  function renderSide(el, count, emoji){
    el.innerHTML='';
    for(let i=0;i<count;i++){
      const span=document.createElement('span');
      span.className='item'; span.textContent=emoji;
      span.style.animationDelay=(i*40)+'ms';
      el.appendChild(span);
    }
  }

  function sparkleBurst(el){
    const r=el.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const sparks=['✨','⭐','💫','🌟','💖'];
    for(let i=0;i<10;i++){
      const s=document.createElement('div'); s.className='sparkle-p';
      s.textContent=sparks[i%sparks.length];
      s.style.left=cx+'px'; s.style.top=cy+'px';
      const angle=Math.random()*Math.PI*2, dist=50+Math.random()*80;
      s.style.setProperty('--tx',Math.cos(angle)*dist+'px');
      s.style.setProperty('--ty',Math.sin(angle)*dist+'px');
      s.style.animationDelay=Math.random()*.15+'s';
      document.body.appendChild(s); setTimeout(()=>s.remove(),950);
    }
  }

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    if(round>=TOTAL){ endGame(); return; }
    round++; locked=false;

    const tier=getTier(round);
    document.getElementById('tier-badge').textContent=tier.label;
    document.getElementById('round-label').textContent=round+' / '+TOTAL;

    mode=tier.modes[Math.floor(Math.random()*tier.modes.length)];
    document.getElementById('prompt').textContent=mode==='more'
      ? 'Which side has MORE? 👀'
      : 'Which side has LESS? 🤔';

    [leftCount,rightCount]=getCounts(tier);
    const emoji=ITEMS[Math.floor(Math.random()*ITEMS.length)];
    const leftEl=document.getElementById('side-left');
    const rightEl=document.getElementById('side-right');
    renderSide(leftEl, leftCount, emoji);
    renderSide(rightEl, rightCount, emoji);

    leftEl.onclick=()=>handleTap(leftEl, leftCount, rightCount);
    rightEl.onclick=()=>handleTap(rightEl, rightCount, leftCount);
  }

  function handleTap(el, myCount, otherCount){
    if(locked) return;
    const correct=(mode==='more' && myCount>otherCount)||(mode==='less' && myCount<otherCount);
    if(correct){
      locked=true;
      sparkleBurst(el);
      el.classList.add('correct-flash'); playCorrect(); score++; updateScore();
      setTimeout(()=>{
        el.classList.remove('correct-flash');
        const lo=Math.min(leftCount,rightCount), hi=Math.max(leftCount,rightCount);
        const msgs=mode==='more'
          ? ['More! 🎉','Yes! '+myCount+' is more! 🌟','Correct! ✨','You got it! 💖']
          : ['Less! 🎉','Yes! '+myCount+' is less! 🌟','Correct! ✨','Well done! 💖'];
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-nums').textContent=lo+' VS '+hi;
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      },500);
    } else {
      el.classList.add('wrong-flash'); playWrong();
      setTimeout(()=>el.classList.remove('wrong-flash'),400);
    }
  }

  function endGame(){
    document.getElementById('celebrate-text').textContent=`${score} stars! 🌟 Amazing! 👑`;
    document.getElementById('celebrate-nums').textContent=Array.from({length:Math.min(score,9)},()=>'⭐').join('')||'🌸';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{ score=0;round=0;updateScore();nextRound();document.getElementById('celebrate-overlay').classList.remove('show'); };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<32;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*.4)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),2800);
    }
  }

  updateScore();
  nextRound();
</script>
</body>
</html>
