<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Letter Bubbles 🔤</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #00695c 0%, #26a69a 50%, #b2dfdb 100%);
      min-height:100vh; width:100vw; overflow:hidden;
      font-family:Georgia,serif; user-select:none; position:relative;
    }

    #top-bar {
      position:fixed; top:0; left:0; right:0; z-index:10;
      padding:clamp(12px,3vw,20px) clamp(16px,4vw,24px);
      display:flex; align-items:center; justify-content:space-between;
    }
    #score-row { font-size:clamp(22px,6vw,32px); }
    #prompt-box {
      background:rgba(255,255,255,.2); border:3px solid rgba(255,255,255,.4);
      border-radius:20px; padding:clamp(8px,2vw,14px) clamp(16px,4vw,28px);
      display:flex; flex-direction:column; align-items:center; gap:2px;
    }
    #prompt-label { font-size:clamp(11px,2.8vw,16px); color:rgba(255,255,255,.8); }
    #prompt-letter {
      font-size:clamp(48px,12vw,72px); color:#fff; font-weight:bold; line-height:1;
      text-shadow:0 2px 12px rgba(0,0,0,.3);
    }

    /* Floating bubbles */
    .bubble {
      position:absolute;
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(30px,8vw,52px); font-weight:bold; color:#fff;
      text-shadow:0 2px 6px rgba(0,0,0,.25);
      cursor:pointer;
      border:4px solid rgba(255,255,255,.5);
      box-shadow:inset 0 -6px 12px rgba(0,0,0,.1), inset 0 6px 12px rgba(255,255,255,.3), 0 4px 16px rgba(0,0,0,.2);
      animation: floatUp linear forwards;
      transition: transform .08s;
    }
    .bubble:active { transform:scale(.9); }
    .bubble.pop-correct { animation: popCorrect .35s ease-out forwards !important; }
    .bubble.pop-wrong   { animation: popWrong   .3s  ease-out forwards !important; }

    @keyframes floatUp {
      0%   { bottom:-120px; opacity:0; }
      8%   { opacity:1; }
      92%  { opacity:1; }
      100% { bottom:105vh; opacity:0; }
    }
    @keyframes popCorrect {
      0%   { transform:scale(1); opacity:1; }
      40%  { transform:scale(1.5); opacity:.8; }
      100% { transform:scale(0); opacity:0; }
    }
    @keyframes popWrong {
      0%   { transform:scale(1); }
      30%  { transform:scale(1.1) rotate(-8deg); }
      60%  { transform:scale(1.1) rotate(8deg); }
      100% { transform:scale(1) rotate(0); }
    }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-text { font-size:clamp(32px,9vw,64px); color:#fff; text-shadow:0 0 20px #ffd700; text-align:center; padding:0 16px; }
    #celebrate-letter {
      font-size:clamp(80px,22vw,130px); color:#ffd700;
      text-shadow:0 0 30px rgba(255,215,0,.8); font-weight:bold;
    }
    #next-btn { padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px); border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800); color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit; }
    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="score-row"></div>
    <div id="prompt-box">
      <div id="prompt-label">Find the letter</div>
      <div id="prompt-letter">A</div>
    </div>
    <div style="width:60px"></div>
  </div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">You found it! ✨</div>
    <div id="celebrate-letter">A</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  // Letters grouped by difficulty — unlock more as rounds progress
  const SETS = [
    ['A','B','C','D','E'],         // rounds 1-4
    ['A','B','C','D','E','F','G','H','I','J'],   // rounds 5-8
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),      // rounds 9+
  ];

  const BUBBLE_COLOURS = [
    '#e53935','#1e88e5','#43a047','#8e24aa','#f57c00','#00838f','#c2185b','#0288d1',
  ];

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playPop(){ tone(880,'sine',.1); setTimeout(()=>tone(1100,'sine',.1),80); }
  function playWrong(){ tone(220,'sawtooth',.18,.09); }
  function playCelebrate(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.2),i*80)); }

  let target='A', score=0, round=0;
  const TOTAL=10;
  let spawnTimer=null, activeRound=true;

  function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }
  function updateScore(){ document.getElementById('score-row').innerHTML=Array.from({length:score},()=>'⭐').join(''); }

  function getLetterPool(){
    if(round<=4) return SETS[0];
    if(round<=8) return SETS[1];
    return SETS[2];
  }

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    clearAllBubbles();
    if(round>=TOTAL){ endGame(); return; }
    round++;
    activeRound=true;

    const pool=getLetterPool();
    target=pool[Math.floor(Math.random()*pool.length)];
    document.getElementById('prompt-letter').textContent=target;

    // Spawn bubbles continuously
    spawnBubble(); // immediate first
    spawnTimer=setInterval(spawnBubble, 1800 - Math.min(round*80, 900));
  }

  function clearAllBubbles(){
    clearInterval(spawnTimer);
    document.querySelectorAll('.bubble').forEach(b=>b.remove());
  }

  function spawnBubble(){
    if(!activeRound) return;
    const pool=getLetterPool();
    // 40% chance of correct letter, 60% decoy
    const isCorrect=Math.random()<0.4;
    const letter = isCorrect ? target : (() => {
      const decoys=pool.filter(l=>l!==target);
      return decoys[Math.floor(Math.random()*decoys.length)]||target;
    })();

    const size=Math.round(clamp(80, window.innerWidth*0.18, 110));
    const el=document.createElement('div');
    el.className='bubble';
    el.textContent=letter;
    el.dataset.letter=letter;

    const maxLeft=window.innerWidth-size-10;
    el.style.left=Math.random()*maxLeft+'px';
    el.style.width=size+'px'; el.style.height=size+'px';
    el.style.background=BUBBLE_COLOURS[Math.floor(Math.random()*BUBBLE_COLOURS.length)];

    const duration=clamp(4000, 6500-round*200, 7000);
    el.style.animationDuration=duration+'ms';

    el.addEventListener('pointerdown',()=>handleBubbleTap(el,letter));
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>{ if(el.parentNode) el.remove(); });
  }

  function clamp(min,val,max){ return Math.max(min,Math.min(max,val)); }

  function handleBubbleTap(el, letter){
    if(!activeRound) return;
    if(letter===target){
      activeRound=false;
      clearInterval(spawnTimer);
      el.classList.add('pop-correct');
      playPop(); score++; updateScore();
      setTimeout(()=>{
        el.remove();
        document.getElementById('celebrate-letter').textContent=target;
        const msgs=['You found it! ✨','Yes! '+target+'! 🌟','Amazing! 💫','Brilliant! 👑'];
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      },350);
    } else {
      el.classList.add('pop-wrong');
      playWrong();
      setTimeout(()=>el.classList.remove('pop-wrong'),300);
    }
  }

  function endGame(){
    document.getElementById('celebrate-text').textContent=`${score} stars! Great reading! 📚`;
    document.getElementById('celebrate-letter').textContent=Array.from({length:Math.min(score,5)},()=>'⭐').join('')||'🌸';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{ score=0;round=0;updateScore();nextRound();document.getElementById('celebrate-overlay').classList.remove('show'); };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<30;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*.5)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),2800);
    }
  }

  nextRound();
</script>
</body>
</html>
