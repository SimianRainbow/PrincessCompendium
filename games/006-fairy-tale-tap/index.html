<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fairy Tale Tap 📖</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #0d47a1 0%, #1976d2 45%, #90caf9 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:Georgia,serif; overflow:hidden; user-select:none;
      transition: background 1s;
    }

    #story-card {
      background: rgba(255,255,255,.15); border:3px solid rgba(255,255,255,.3);
      border-radius:32px; padding:clamp(20px,5vw,36px);
      max-width: min(90vw, 480px); width:100%;
      display:flex; flex-direction:column; align-items:center; gap:clamp(14px,3.5vw,22px);
      box-shadow:0 8px 32px rgba(0,0,0,.25);
      animation: cardIn .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes cardIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }

    #scene {
      font-size:clamp(72px,20vw,120px); line-height:1.1;
      text-align:center;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));
    }

    #story-text {
      font-size:clamp(17px,4.5vw,26px);
      color:#fff; text-align:center;
      text-shadow:0 1px 6px rgba(0,0,0,.4);
      line-height:1.5; padding:0 4px;
    }

    /* Tap-to-continue pages */
    #tap-hint {
      font-size:clamp(14px,3.5vw,20px); color:rgba(255,255,255,.7);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* Choice buttons */
    #choices { display:flex; flex-direction:column; gap:12px; width:100%; }
    .choice-btn {
      padding:clamp(14px,3.5vw,20px) clamp(16px,4vw,24px);
      border-radius:20px; border:none; cursor:pointer;
      font-size:clamp(16px,4vw,22px); font-family:Georgia,serif;
      background:rgba(255,255,255,.2);
      color:#fff; font-weight:bold;
      box-shadow:0 3px 12px rgba(0,0,0,.2), inset 0 2px 0 rgba(255,255,255,.2);
      transition:transform .1s, background .1s;
      display:flex; align-items:center; gap:12px;
      text-shadow:0 1px 4px rgba(0,0,0,.3);
    }
    .choice-btn:active { transform:scale(.96); background:rgba(255,255,255,.35); }
    .choice-emoji { font-size:clamp(26px,7vw,38px); }

    /* Progress dots */
    #progress { display:flex; gap:8px; }
    .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.35); transition:background .3s; }
    .dot.done { background:#ffd700; }
    .dot.current { background:#fff; }

    /* End screen */
    #end-screen {
      display:none; flex-direction:column; align-items:center; gap:20px;
      text-align:center;
    }
    #end-scene { font-size:clamp(80px,22vw,130px); }
    #end-text { font-size:clamp(22px,6vw,38px); color:#fff; text-shadow:0 0 20px #ffd700; padding:0 12px; }
    #replay-btn { padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px); border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800); color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit; box-shadow:0 4px 16px rgba(255,180,0,.5); }

    .confetti-piece { position:fixed; width:10px; height:10px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>

<div id="story-card">
  <div id="progress"></div>
  <div id="scene"></div>
  <div id="story-text"></div>
  <div id="choices"></div>
  <div id="tap-hint">Tap to continue ✨</div>
  <div id="end-screen">
    <div id="end-scene"></div>
    <div id="end-text"></div>
    <button id="replay-btn" onclick="startStory()">Read Again 📖</button>
  </div>
</div>

<script>
  // The story is a tree of pages.
  // type: 'page' = tap to continue, 'choice' = two buttons, 'end' = ending screen
  const STORY = [
    {
      id:0, type:'page', bg:'linear-gradient(160deg,#0d47a1,#1976d2,#90caf9)',
      scene:'👸✨', text:'Once upon a time, Princess Jet found a magical door in the garden.',
      next:1
    },
    {
      id:1, type:'page', bg:'linear-gradient(160deg,#1a237e,#5c6bc0,#9fa8da)',
      scene:'🚪🌟', text:'The door glowed pink and gold. Where should Jet go?',
      next:'choice-1'
    },
    {
      id:'choice-1', type:'choice',
      scene:'🌈', text:'Which door does Jet open?',
      choices:[
        { emoji:'🏰', label:'The Magic Castle', next:2 },
        { emoji:'🌊', label:'The Mermaid Sea', next:10 },
      ]
    },

    // --- Castle path ---
    {
      id:2, type:'page', bg:'linear-gradient(160deg,#4a148c,#7b1fa2,#ce93d8)',
      scene:'🏰👑', text:'Jet stepped into a sparkling castle full of dancing butterflies!',
      next:3
    },
    {
      id:3, type:'choice',
      scene:'🦋💃', text:'A fairy appears! What does Jet do?',
      choices:[
        { emoji:'🎵', label:'Dance together', next:4 },
        { emoji:'🧁', label:'Share a cupcake', next:5 },
      ]
    },
    {
      id:4, type:'page', bg:'linear-gradient(160deg,#880e4f,#c2185b,#f48fb1)',
      scene:'👸🦋🎵', text:'Jet and the fairy danced and danced until the whole castle filled with golden light!',
      next:'end-castle'
    },
    {
      id:5, type:'page', bg:'linear-gradient(160deg,#e65100,#f57c00,#ffcc80)',
      scene:'👸🧁🌟', text:'They shared the cupcake and the fairy gave Jet a magical crown!',
      next:'end-castle'
    },
    {
      id:'end-castle', type:'end',
      scene:'👸👑🏰✨',
      text:'Jet is the princess of the Magic Castle!\nThe End 🌟'
    },

    // --- Sea path ---
    {
      id:10, type:'page', bg:'linear-gradient(160deg,#006064,#0097a7,#80deea)',
      scene:'🌊🐚', text:'Jet dived into a sparkling sea full of colourful fish!',
      next:11
    },
    {
      id:11, type:'choice',
      scene:'🧜‍♀️🐠', text:'A mermaid swims up! What does Jet do?',
      choices:[
        { emoji:'🐚', label:'Find treasure', next:12 },
        { emoji:'🐬', label:'Ride a dolphin', next:13 },
      ]
    },
    {
      id:12, type:'page', bg:'linear-gradient(160deg,#1a237e,#283593,#7986cb)',
      scene:'💎🐚✨', text:'They found a treasure chest filled with rainbow pearls and a golden tiara!',
      next:'end-sea'
    },
    {
      id:13, type:'page', bg:'linear-gradient(160deg,#006064,#00838f,#4dd0e1)',
      scene:'👸🐬🌊', text:'Jet rode the dolphin all the way to a secret island made of pink sand!',
      next:'end-sea'
    },
    {
      id:'end-sea', type:'end',
      scene:'👸🧜‍♀️🌊💎',
      text:'Jet is the Princess of the Deep Sea!\nThe End 🌟'
    },
  ];

  const storyMap = {};
  STORY.forEach(p => storyMap[p.id] = p);

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.13){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playTap(){ tone(660,'sine',.12); }
  function playChoice(){ [440,554].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18),i*80)); }
  function playCelebrate(){ [523,587,659,698,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*70)); }

  let visitedIds = [];
  let currentId = 0;

  // Progress tracking — count tappable pages visited
  const PAGE_IDS = STORY.filter(p=>p.type==='page').map(p=>p.id);

  function updateProgress(){
    const prog=document.getElementById('progress');
    prog.innerHTML='';
    PAGE_IDS.forEach(id=>{
      const dot=document.createElement('div');
      dot.className='dot' + (visitedIds.includes(id)?' done':'') + (id===currentId?' current':'');
      prog.appendChild(dot);
    });
  }

  function showPage(id){
    currentId=id;
    if(!visitedIds.includes(id)) visitedIds.push(id);
    const page=storyMap[id];
    if(!page){ console.error('Missing page',id); return; }

    // Update background
    document.body.style.background=page.bg||'';

    // Re-animate card
    const card=document.getElementById('story-card');
    card.style.animation='none'; void card.offsetWidth; card.style.animation='cardIn .4s cubic-bezier(.34,1.56,.64,1)';

    document.getElementById('scene').textContent=page.scene||'';
    document.getElementById('story-text').textContent=page.text||'';
    document.getElementById('choices').innerHTML='';
    document.getElementById('end-screen').style.display='none';
    document.getElementById('tap-hint').style.display='none';
    updateProgress();

    if(page.type==='page'){
      document.getElementById('tap-hint').style.display='block';
      card.onclick=()=>{ card.onclick=null; playTap(); showPage(page.next); };
    } else if(page.type==='choice'){
      playChoice();
      const choiceDiv=document.getElementById('choices');
      page.choices.forEach(ch=>{
        const btn=document.createElement('button');
        btn.className='choice-btn';
        btn.innerHTML=`<span class="choice-emoji">${ch.emoji}</span>${ch.label}`;
        btn.addEventListener('pointerdown',()=>{ playTap(); card.onclick=null; showPage(ch.next); });
        choiceDiv.appendChild(btn);
      });
    } else if(page.type==='end'){
      document.getElementById('story-text').textContent='';
      document.getElementById('scene').textContent='';
      const es=document.getElementById('end-screen');
      es.style.display='flex';
      document.getElementById('end-scene').textContent=page.scene;
      document.getElementById('end-text').textContent=page.text;
      playCelebrate(); confettiBurst(); confettiBurst();
    }
  }

  function startStory(){
    visitedIds=[];
    document.getElementById('progress').innerHTML='';
    showPage(0);
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<25;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.4+Math.random()*1.8)+'s';
      el.style.animationDelay=(Math.random()*.6)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),3000);
    }
  }

  startStory();
</script>
</body>
</html>
