<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fairy Tale Tap 📖</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg,#0d47a1,#1976d2,#90caf9);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Fredoka One',Georgia,serif;
      overflow:hidden; user-select:none;
      transition: background 0.8s;
    }

    #header {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 18px; z-index:10;
    }
    #tier-badge {
      font-size:clamp(13px,3.5vw,18px); color:#fff;
      background:rgba(255,255,255,0.2); padding:5px 14px; border-radius:20px;
      text-shadow:0 1px 4px rgba(0,0,0,0.3);
    }
    #story-counter {
      font-size:clamp(13px,3.2vw,17px); color:rgba(255,255,255,0.85);
      text-shadow:0 1px 4px rgba(0,0,0,0.3);
    }

    #story-card {
      background:rgba(255,255,255,.15); border:3px solid rgba(255,255,255,.3);
      border-radius:32px; padding:clamp(18px,5vw,34px);
      max-width:min(90vw,480px); width:100%;
      display:flex; flex-direction:column; align-items:center; gap:clamp(12px,3.5vw,20px);
      box-shadow:0 8px 32px rgba(0,0,0,.25);
      animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);
      margin-top:64px;
    }
    @keyframes cardIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }

    #scene {
      font-size:clamp(64px,18vw,110px); line-height:1.1; text-align:center;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));
    }
    #story-text {
      font-size:clamp(17px,4.5vw,25px); color:#fff; text-align:center;
      text-shadow:0 1px 6px rgba(0,0,0,.4); line-height:1.5; padding:0 4px;
    }
    #tap-hint {
      font-size:clamp(14px,3.5vw,20px); color:rgba(255,255,255,.7);
      animation:pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    #choices { display:flex; flex-direction:column; gap:10px; width:100%; }
    .choice-btn {
      padding:clamp(14px,3.8vw,20px) clamp(14px,4vw,22px);
      border-radius:20px; border:2px solid rgba(255,255,255,0.4); cursor:pointer;
      font-size:clamp(16px,4vw,22px); font-family:'Fredoka One',Georgia,serif;
      background:rgba(255,255,255,.18); color:#fff; font-weight:bold;
      box-shadow:0 3px 12px rgba(0,0,0,.2),inset 0 2px 0 rgba(255,255,255,.2);
      transition:transform .1s,background .1s;
      display:flex; align-items:center; gap:12px;
      text-shadow:0 1px 4px rgba(0,0,0,.3);
      min-height:clamp(70px,18vw,90px);
    }
    .choice-btn:active { transform:scale(.96); background:rgba(255,255,255,.32); }
    .choice-emoji { font-size:clamp(28px,7vw,40px); }

    #progress { display:flex; gap:8px; }
    .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.35); transition:background .3s; }
    .dot.done { background:#ffd700; }
    .dot.current { background:#fff; }

    #end-screen {
      display:none; flex-direction:column; align-items:center; gap:20px; text-align:center;
    }
    #end-scene { font-size:clamp(72px,20vw,120px); }
    #end-text {
      font-size:clamp(20px,5.5vw,36px); color:#fff;
      text-shadow:0 0 20px #ffd700; padding:0 12px;
      white-space:pre-line; text-align:center;
    }
    #next-story-btn {
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size:clamp(20px,5vw,28px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer;
      font-family:'Fredoka One',Georgia,serif;
      box-shadow:0 4px 16px rgba(255,180,0,.5);
    }

    .sparkle {
      position:fixed; font-size:clamp(14px,3.5vw,22px);
      pointer-events:none; z-index:50;
      animation:sparkleFly ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { transform:translate(0,0) scale(1.2); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0.1); opacity:0; }
    }

    .confetti-piece {
      position:fixed; border-radius:50%;
      animation:confettiFall linear forwards; pointer-events:none; z-index:100;
    }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }

    #tier-toast {
      position:fixed; top:64px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-size:clamp(16px,4vw,22px);
      font-family:'Fredoka One',Georgia,serif;
      padding:10px 28px; border-radius:40px;
      box-shadow:0 4px 20px rgba(255,180,0,.6);
      z-index:200; opacity:0; transition:opacity 0.4s;
      pointer-events:none; white-space:nowrap;
    }
    #tier-toast.show { opacity:1; }
  </style>
</head>
<body>

  let storyIndex = 0;
  let pageMap = {};
  let visitedIds = [];
  let currentId = 0;

  let audioCtx = null;
  function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.13) {
    try {
      const c=getAudio(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=t||'sine'; o.frequency.value=f;
      g.gain.setValueAtTime(v, c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, c.currentTime+d);
      o.start(); o.stop(c.currentTime+d);
    } catch(e) {}
  }
  function playTap()          { tone(660,'sine',.12); }
  function playChoice()       { [440,554].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18),i*80)); }
  function playChoiceSelect() { [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.15),i*80)); }
  function playCelebrate()    { [523,587,659,698,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*70)); }

  function startStory(idx) {
    storyIndex = idx;
    const story = STORIES[idx];
    pageMap = {};
    story.pages.forEach(p => pageMap[p.id] = p);
    visitedIds = [];
    currentId = 0;

    document.getElementById('tier-badge').textContent = story.title;
    document.getElementById('story-counter').textContent = `Story ${idx+1} / ${STORIES.length}`;
    document.body.style.background = story.bg;

    const btn = document.getElementById('next-story-btn');
    if (idx + 1 < STORIES.length) {
      btn.textContent = 'Next Story ➡️';
      btn.onclick = () => { showTierToast(STORIES[idx+1].label); setTimeout(() => startStory(idx+1), 700); };
    } else {
      btn.textContent = 'Read All Again 🔄';
      btn.onclick = () => startStory(0);
    }
    showPage(0);
  }

  function updateProgress() {
    const pageIds = STORIES[storyIndex].pages.filter(p => p.type==='page').map(p => p.id);
    const prog = document.getElementById('progress');
    prog.innerHTML = '';
    pageIds.forEach(id => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (visitedIds.includes(id)?' done':'') + (id===currentId?' current':'');
      prog.appendChild(dot);
    });
  }

  function showPage(id) {
    currentId = id;
    if (!visitedIds.includes(id)) visitedIds.push(id);
    const page = pageMap[id];
    if (!page) { console.error('Missing page', id); return; }

    document.body.style.background = page.bg || STORIES[storyIndex].bg;

    const card = document.getElementById('story-card');
    card.style.animation = 'none'; void card.offsetWidth;
    card.style.animation = 'cardIn .4s cubic-bezier(.34,1.56,.64,1)';

    document.getElementById('scene').textContent = page.scene || '';
    document.getElementById('story-text').textContent = page.text || '';
    document.getElementById('choices').innerHTML = '';
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('tap-hint').style.display = 'none';
    updateProgress();

    if (page.type === 'page') {
      document.getElementById('tap-hint').style.display = 'block';
      card.onclick = () => { card.onclick = null; playTap(); showPage(page.next); };
    } else if (page.type === 'choice') {
      playChoice();
      const choiceDiv = document.getElementById('choices');
      page.choices.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-emoji">${ch.emoji}</span>${ch.label}`;
        btn.addEventListener('pointerdown', () => {
          playChoiceSelect();
          const rect = btn.getBoundingClientRect();
          sparkleBurst(rect.left + rect.width/2, rect.top + rect.height/2);
          card.onclick = null;
          setTimeout(() => showPage(ch.next), 220);
        });
        choiceDiv.appendChild(btn);
      });
    } else if (page.type === 'end') {
      document.getElementById('story-text').textContent = '';
      document.getElementById('scene').textContent = '';
      const es = document.getElementById('end-screen');
      es.style.display = 'flex';
      document.getElementById('end-scene').textContent = page.scene;
      document.getElementById('end-text').textContent = page.text;
      playCelebrate();
      sparkleBurst(window.innerWidth/2, window.innerHeight * 0.45);
      confettiBurst(); confettiBurst();
    }
  }

  function sparkleBurst(cx, cy) {
    const icons = ['✨','🌸','⭐','💫','💖','🌟'];
    for (let i = 0; i < 16; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      const angle = (i / 16) * Math.PI * 2;
      const dist  = 60 + Math.random() * 90;
      el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * dist - 20 + 'px');
      el.style.left = (cx - 12) + 'px';
      el.style.top  = (cy - 12) + 'px';
      el.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
      el.style.animationDelay    = (Math.random() * 0.1) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }
  }

  function showTierToast(msg) {
    const t = document.getElementById('tier-toast');
    t.textContent = '✨ ' + msg + ' ✨';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function confettiBurst() {
    const cols = ['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div'); el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.width = el.style.height = (8 + Math.random() * 8) + 'px';
      el.style.background = cols[Math.floor(Math.random() * cols.length)];
      el.style.animationDuration = (1.4 + Math.random() * 1.8) + 's';
      el.style.animationDelay    = (Math.random() * 0.6) + 's';
      document.body.appendChild(el); setTimeout(() => el.remove(), 3200);
    }
  }

  startStory(0);
</script>
</body>
</html>
