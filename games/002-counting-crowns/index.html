<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Counting Crowns 👑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(160deg, #1a237e 0%, #5c6bc0 50%, #f8bbd0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    /* Tier badge */
    #tier-bar {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    #tier-label {
      font-size: clamp(14px, 3.5vw, 20px);
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      letter-spacing: 1px;
    }
    #tier-stars {
      font-size: clamp(16px, 4vw, 22px);
    }

    #score-row {
      position: fixed;
      top: 14px;
      right: 20px;
      display: flex;
      gap: 3px;
      font-size: clamp(20px, 5.5vw, 30px);
      z-index: 10;
    }

    #prompt {
      font-size: clamp(20px, 5.5vw, 32px);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 16px;
      text-align: center;
      padding: 0 12px;
      margin-top: 56px;
    }

    #crowns-stage {
      background: rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: clamp(14px, 3.5vw, 24px);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: clamp(4px, 1.5vw, 10px);
      max-width: 390px;
      width: 92vw;
      min-height: clamp(90px, 22vw, 150px);
      margin-bottom: 22px;
      border: 3px solid rgba(255,255,255,0.25);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      position: relative;
    }

    .crown-item {
      font-size: clamp(36px, 9.5vw, 58px);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    #number-row {
      display: flex;
      gap: clamp(8px, 2.5vw, 16px);
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 8px;
    }

    .num-btn {
      width: clamp(66px, 17vw, 96px);
      height: clamp(66px, 17vw, 96px);
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: clamp(28px, 7.5vw, 46px);
      font-weight: bold;
      font-family: 'Georgia', serif;
      color: #fff;
      background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.08));
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.2);
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .num-btn:active { transform: scale(0.9); }

    .num-btn.correct-flash { animation: numCorrect 0.55s ease-out forwards; }
    .num-btn.wrong-flash   { animation: numWrong 0.4s ease-out; }

    @keyframes numCorrect {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.28); background: linear-gradient(135deg, #ffd700, #ff9800); box-shadow: 0 0 36px rgba(255,200,0,0.7); }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    @keyframes numWrong {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* Sparkle particle */
    .sparkle {
      position: fixed;
      font-size: clamp(14px, 4vw, 22px);
      pointer-events: none;
      z-index: 50;
      animation: sparkleFly ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
    }

    #celebrate-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 99; opacity: 0; pointer-events: none;
      transition: opacity 0.35s;
    }
    #celebrate-overlay.show { opacity: 1; pointer-events: all; }

    #celebrate-text {
      font-size: clamp(30px, 8.5vw, 60px);
      color: #fff;
      text-shadow: 0 0 20px #ffd700, 0 2px 8px rgba(0,0,0,0.5);
      text-align: center; padding: 0 16px;
    }
    #celebrate-big-num {
      font-size: clamp(56px, 17vw, 104px);
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255,215,0,0.8);
      animation: numBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes numBounce {
      from { transform: scale(0.2); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    #next-btn {
      margin-top: 8px;
      padding: clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size: clamp(20px,5vw,28px);
      border-radius: 50px; border: none;
      background: linear-gradient(135deg, #ffd700, #ff9800);
      color: #5d2e00; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,180,0,0.5);
      font-family: inherit;
    }

    .confetti-piece {
      position: fixed; border-radius: 50%;
      animation: confettiFall linear forwards;
      pointer-events: none; z-index: 100;
    }
    @keyframes confettiFall {
      0%   { top: -20px; opacity: 1; }
      100% { top: 110vh; opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div id="tier-bar">
    <div id="tier-label">Easy</div>
    <div id="tier-stars">⭐</div>
  </div>

  <div id="score-row"></div>
  <div id="prompt">How many crowns? 👑</div>
  <div id="crowns-stage"></div>
  <div id="number-row"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">Yes! It's...</div>
    <div id="celebrate-big-num">3</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  // ── Audio ──────────────────────────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTone(freq, type, dur, vol) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function playCorrect() {
    [523, 659, 784].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.18), i*90));
  }
  function playWrong() { playTone(200,'sawtooth',0.2,0.09); }

  // Celebration melody gets richer with higher tier
  function playCelebrate(tier) {
    const melodies = [
      [523,659,784,1047],
      [523,587,659,698,784,880,1047],
      [523,587,659,698,784,880,1047,1175,1319],
    ];
    const notes = melodies[Math.min(tier-1, 2)];
    notes.forEach((f,i) => setTimeout(() => playTone(f,'sine',0.22,0.17), i*65));
  }

  // Count beeps: ascending pitch per crown
  function playCount(n) {
    for (let i = 0; i < n; i++) {
      setTimeout(() => playTone(440 + i * 35, 'sine', 0.14, 0.13), i * 240);
    }
  }

  // ── Game state ─────────────────────────────────────────────────────────────
  // 9 rounds across 3 tiers
  // Tier 1 (rounds 1-3): count 1-5
  // Tier 2 (rounds 4-6): count 1-8
  // Tier 3 (rounds 7-9): count 1-10
  let target = 0, score = 0, round = 0;
  const TOTAL_ROUNDS = 9;
  const TIERS = [
    { label: 'Easy',   stars: '⭐',      max: 5 },
    { label: 'Middle', stars: '⭐⭐',    max: 8 },
    { label: 'Hard',   stars: '⭐⭐⭐', max: 10 },
  ];

  function getTier(r) {
    if (r <= 3) return 0;
    if (r <= 6) return 1;
    return 2;
  }

  function updateTierBadge(tierIdx) {
    document.getElementById('tier-label').textContent = TIERS[tierIdx].label;
    document.getElementById('tier-stars').textContent  = TIERS[tierIdx].stars;
  }

  function updateScore() {
    document.getElementById('score-row').innerHTML = Array.from({length: score}, () => '⭐').join('');
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function buildNumbers(correct, max) {
    // Include correct answer + 2 wrong distractors; 3 choices total
    const pool = [];
    for (let i = 1; i <= max; i++) if (i !== correct) pool.push(i);
    const wrong = shuffle(pool).slice(0, 2);
    return shuffle([correct, ...wrong]);
  }

  function nextRound() {
    document.getElementById('celebrate-overlay').classList.remove('show');
    if (round >= TOTAL_ROUNDS) { endGame(); return; }
    round++;

    const tierIdx = getTier(round);
    const max = TIERS[tierIdx].max;
    updateTierBadge(tierIdx);

    target = Math.ceil(Math.random() * max);

    // Render crowns
    const stage = document.getElementById('crowns-stage');
    stage.innerHTML = '';
    for (let i = 0; i < target; i++) {
      const el = document.createElement('span');
      el.className = 'crown-item';
      el.textContent = '👑';
      el.style.animationDelay = (i * 100) + 'ms';
      stage.appendChild(el);
    }

    // Play count audio with slight delay to let crowns appear
    setTimeout(() => playCount(target), 350);

    // Render number buttons
    const row = document.getElementById('number-row');
    row.innerHTML = '';
    buildNumbers(target, max).forEach(n => {
      const btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.textContent = n;
      btn.addEventListener('pointerdown', () => handleTap(btn, n));
      row.appendChild(btn);
    });
  }

  function handleTap(btn, n) {
    if (n === target) {
      btn.classList.add('correct-flash');
      playCorrect();
      score++;
      updateScore();

      // Sparkle burst from the button
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      sparkleBurst(cx, cy);

      setTimeout(() => {
        btn.classList.remove('correct-flash');
        const tierIdx = getTier(round);
        const msgs = ['Yes! It\'s...', 'Correct! 🎉', 'Brilliant! ✨', 'Amazing! 🌟', 'You got it! 💖', 'Perfect! 👑'];
        document.getElementById('celebrate-text').textContent = msgs[Math.floor(Math.random()*msgs.length)];
        // Animate the big number in
        const bigNum = document.getElementById('celebrate-big-num');
        bigNum.textContent = target;
        bigNum.style.animation = 'none';
        void bigNum.offsetWidth; // reflow
        bigNum.style.animation = '';
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(tierIdx + 1);
        confettiBurst();
      }, 520);
    } else {
      btn.classList.add('wrong-flash');
      playWrong();
      setTimeout(() => btn.classList.remove('wrong-flash'), 400);
    }
  }

  // ── Sparkle burst ──────────────────────────────────────────────────────────
  function sparkleBurst(cx, cy) {
    const icons = ['✨','⭐','💫','🌟','👑'];
    const count = 10;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.textContent = icons[Math.floor(Math.random()*icons.length)];
      const angle = (i / count) * Math.PI * 2;
      const dist  = 60 + Math.random() * 80;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 30;
      el.style.setProperty('--tx', tx + 'px');
      el.style.setProperty('--ty', ty + 'px');
      el.style.left = (cx - 12) + 'px';
      el.style.top  = (cy - 12) + 'px';
      el.style.animationDuration = (0.5 + Math.random() * 0.4) + 's';
      el.style.animationDelay    = (Math.random() * 0.1) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }
  }

  // ── End game ───────────────────────────────────────────────────────────────
  function endGame() {
    const bigNum = document.getElementById('celebrate-big-num');
    bigNum.textContent = Array.from({length: Math.min(score, 9)}, () => '⭐').join('') || '🌸';
    bigNum.style.fontSize = 'clamp(28px,8vw,48px)';
    document.getElementById('celebrate-text').textContent = score >= 8
      ? `Counting Champion! 👑 ${score}/${TOTAL_ROUNDS}`
      : `You got ${score} stars! 🌟`;
    document.getElementById('next-btn').textContent = 'Play Again 🔄';
    document.getElementById('next-btn').onclick = () => {
      score = 0; round = 0; updateScore();
      bigNum.style.fontSize = '';
      document.getElementById('celebrate-overlay').classList.remove('show');
      nextRound();
    };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(3); confettiBurst();
  }

  // ── Confetti ───────────────────────────────────────────────────────────────
  function confettiBurst() {
    const colours = ['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6','#ffffff'];
    for (let i = 0; i < 36; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const sz = 8 + Math.random() * 8;
      el.style.width  = sz + 'px';
      el.style.height = sz + 'px';
      el.style.left   = Math.random() * 100 + 'vw';
      el.style.background = colours[Math.floor(Math.random()*colours.length)];
      el.style.animationDuration  = (1.2 + Math.random() * 1.6) + 's';
      el.style.animationDelay     = (Math.random() * 0.4) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }
  }

  // ── Start ──────────────────────────────────────────────────────────────────
  nextRound();
</script>
</body>
</html>
