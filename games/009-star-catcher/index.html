<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Star Catcher ⭐</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: radial-gradient(ellipse at 50% 30%, #1a237e 0%, #0d0d2b 100%);
      min-height:100vh; width:100vw; overflow:hidden;
      font-family:Georgia,serif; user-select:none; position:relative;
    }

    /* Twinkling bg stars */
    .bg-star { position:fixed; border-radius:50%; background:#fff; animation:twinkle ease-in-out infinite; pointer-events:none; }
    @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:.8} }

    #hud {
      position:fixed; top:0; left:0; right:0; z-index:10;
      display:flex; justify-content:space-between; align-items:center;
      padding:clamp(10px,2.5vw,18px) clamp(14px,4vw,24px);
    }
    #score-display {
      font-size:clamp(28px,7vw,44px); color:#ffd700;
      text-shadow:0 0 12px rgba(255,215,0,.6), 0 2px 6px rgba(0,0,0,.5);
      font-weight:bold;
    }
    #timer-display {
      font-size:clamp(22px,6vw,36px); color:rgba(255,255,255,.8);
      text-shadow:0 2px 6px rgba(0,0,0,.4);
    }
    #princess-static {
      font-size:clamp(32px,8vw,52px);
      filter:drop-shadow(0 2px 8px rgba(255,215,0,.4));
    }

    /* Falling stars */
    .star {
      position:absolute;
      font-size:clamp(44px,12vw,70px);
      line-height:1;
      cursor:pointer;
      animation:fallDown linear forwards;
      filter:drop-shadow(0 0 12px rgba(255,215,0,.8));
      transition:transform .06s;
    }
    .star:active { transform:scale(.85); }
    .star.caught { animation:starCaught .4s ease-out forwards !important; }
    .star.missed { animation:starMiss .3s ease-out forwards !important; }

    @keyframes fallDown {
      0%   { top:-80px; opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:1; }
      100% { top:110vh; opacity:0; }
    }
    @keyframes starCaught {
      0%   { transform:scale(1); opacity:1; filter:drop-shadow(0 0 12px rgba(255,215,0,.8)); }
      50%  { transform:scale(2.2); opacity:.9; filter:drop-shadow(0 0 30px rgba(255,215,0,1)); }
      100% { transform:scale(0); opacity:0; }
    }
    @keyframes starMiss {
      0%   { opacity:1; }
      100% { opacity:0; transform:translateY(30px) scale(.5); }
    }

    /* Score pop */
    .score-pop {
      position:fixed; font-size:clamp(28px,8vw,48px); color:#ffd700;
      font-weight:bold; text-shadow:0 0 12px rgba(255,215,0,.6);
      pointer-events:none; z-index:50;
      animation:scorePop .8s ease-out forwards;
    }
    @keyframes scorePop { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-80px);opacity:0} }

    /* End screen */
    #end-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.7);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .4s;
    }
    #end-overlay.show { opacity:1; pointer-events:all; }
    #end-princess { font-size:clamp(64px,18vw,110px); }
    #end-title { font-size:clamp(28px,7vw,52px); color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,.7); text-align:center; padding:0 16px; }
    #end-score { font-size:clamp(22px,6vw,36px); color:#fff; }
    #play-again { padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px); font-size:clamp(20px,5vw,28px); border-radius:50px; border:none; background:linear-gradient(135deg,#ffd700,#ff9800); color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit; }

    .confetti-piece { position:fixed; width:12px; height:12px; border-radius:50%; animation:confettiFall linear forwards; pointer-events:none; z-index:100; }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>

  <div id="hud">
    <div id="score-display">⭐ 0</div>
    <div id="princess-static">👸</div>
    <div id="timer-display">30s</div>
  </div>

  <div id="end-overlay">
    <div id="end-princess">👸✨</div>
    <div id="end-title">Amazing catching!</div>
    <div id="end-score"></div>
    <button id="play-again" onclick="startGame()">Play Again ⭐</button>
  </div>

<script>
  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCatch(){ tone(880,'sine',.08); setTimeout(()=>tone(1100,'sine',.1),60); }
  function playEnd(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.25),i*100)); }

  const STAR_EMOJIS = ['⭐','🌟','💫','✨'];
  const GAME_DURATION = 30; // seconds

  let score=0, timeLeft=GAME_DURATION, spawnTimer=null, countdownTimer=null, gameActive=false;

  function makeBgStars(){
    for(let i=0;i<40;i++){
      const s=document.createElement('div'); s.className='bg-star';
      const sz=1+Math.random()*3;
      s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
      document.body.appendChild(s);
    }
  }

  function startGame(){
    document.getElementById('end-overlay').classList.remove('show');
    score=0; timeLeft=GAME_DURATION; gameActive=true;
    updateHUD();
    clearInterval(spawnTimer); clearInterval(countdownTimer);
    document.querySelectorAll('.star').forEach(s=>s.remove());

    // Spawn at increasing rate
    let spawnInterval=1400;
    spawnTimer=setInterval(()=>{
      if(!gameActive) return;
      spawnStar();
      // Gradually speed up
      if(timeLeft<20 && spawnInterval>900){ spawnInterval=900; clearInterval(spawnTimer); spawnTimer=setInterval(()=>{ if(gameActive) spawnStar(); },spawnInterval); }
      if(timeLeft<10 && spawnInterval>650){ spawnInterval=650; clearInterval(spawnTimer); spawnTimer=setInterval(()=>{ if(gameActive) spawnStar(); },spawnInterval); }
    }, spawnInterval);

    countdownTimer=setInterval(()=>{
      timeLeft--;
      updateHUD();
      if(timeLeft<=0){ endGame(); }
    },1000);
  }

  function updateHUD(){
    document.getElementById('score-display').textContent='⭐ '+score;
    document.getElementById('timer-display').textContent=timeLeft+'s';
  }

  function spawnStar(){
    const emoji=STAR_EMOJIS[Math.floor(Math.random()*STAR_EMOJIS.length)];
    const el=document.createElement('div');
    el.className='star'; el.textContent=emoji;

    const size=Math.max(44, Math.min(window.innerWidth*0.14, 70));
    el.style.left=Math.random()*(window.innerWidth-size-10)+'px';

    // Duration: fast=3s, slow=5.5s; varies inversely with timeLeft
    const dur=3000+Math.random()*2500*(timeLeft/GAME_DURATION);
    el.style.animationDuration=dur+'ms';

    el.addEventListener('pointerdown',(e)=>{
      e.stopPropagation();
      catchStar(el, e.clientX, e.clientY);
    });
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>{ if(el.parentNode) el.remove(); });
  }

  function catchStar(el, x, y){
    if(!gameActive || el.classList.contains('caught')) return;
    el.classList.add('caught');
    el.removeEventListener('pointerdown',catchStar);
    playCatch();
    score++;
    updateHUD();

    // Score pop
    const pop=document.createElement('div');
    pop.className='score-pop'; pop.textContent='+1 ⭐';
    pop.style.left=(x-40)+'px'; pop.style.top=(y-30)+'px';
    document.body.appendChild(pop);
    setTimeout(()=>pop.remove(),800);
  }

  function endGame(){
    gameActive=false;
    clearInterval(spawnTimer); clearInterval(countdownTimer);
    document.querySelectorAll('.star').forEach(s=>s.remove());
    playEnd();

    let title='Amazing catching! 👸';
    if(score>=25) title='You\'re a Star Princess! 👑✨';
    else if(score>=15) title='Super catcher! 🌟';
    else if(score>=8)  title='Well done! ⭐';

    document.getElementById('end-title').textContent=title;
    document.getElementById('end-score').textContent='You caught '+score+' stars!';
    document.getElementById('end-overlay').classList.add('show');
    confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#fff','#00cfff','#ff69b4','#7fff00'];
    for(let i=0;i<35;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.5+Math.random()*1.8)+'s';
      el.style.animationDelay=(Math.random()*.5)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),3000);
    }
  }

  makeBgStars();
  startGame();
</script>
</body>
</html>
