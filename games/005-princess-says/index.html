<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Princess Says 🎀</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background: linear-gradient(160deg, #880e4f 0%, #c2185b 45%, #f48fb1 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:Georgia,serif; overflow:hidden; user-select:none;
    }

    #score-row { position:fixed; top:16px; right:20px; font-size:clamp(22px,6vw,32px); z-index:10; }
    #tier-badge {
      position:fixed; top:16px; left:16px;
      background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.5);
      border-radius:20px; padding:4px 14px;
      font-size:clamp(12px,3.2vw,16px); color:#fff; font-weight:bold;
      text-shadow:0 1px 3px rgba(0,0,0,.4); z-index:10;
    }

    #princess-area {
      display:flex; flex-direction:column; align-items:center; gap:8px;
      margin-bottom:16px; margin-top:52px;
    }
    #princess-face {
      font-size:clamp(56px,14vw,88px); line-height:1;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    #speech-bubble {
      background:rgba(255,255,255,.95); border-radius:20px;
      padding:clamp(9px,2.8vw,14px) clamp(14px,4vw,22px);
      position:relative; max-width:clamp(200px,70vw,340px);
      box-shadow:0 4px 16px rgba(0,0,0,.2);
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    #speech-bubble::before {
      content:''; position:absolute; top:-14px; left:50%; transform:translateX(-50%);
      border:8px solid transparent; border-bottom-color:rgba(255,255,255,.95);
    }
    #speech-target { font-size:clamp(36px,9vw,54px); line-height:1; }
    #speech-text { font-size:clamp(14px,3.8vw,21px); color:#880e4f; font-weight:bold; }

    .bubble-pulse { animation: bubblePop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes bubblePop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }

    #items-grid {
      display:grid;
      gap:clamp(10px,2.5vw,16px); padding:4px;
    }
    #items-grid.grid-2 { grid-template-columns:repeat(2,1fr); }
    #items-grid.grid-3 { grid-template-columns:repeat(3,1fr); }

    .item-btn {
      width:clamp(98px,23vw,132px); height:clamp(98px,23vw,132px);
      border-radius:22px; border:none; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      box-shadow:0 4px 16px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.25);
      transition:transform .1s;
    }
    .item-btn:active { transform:scale(.9); }
    .item-btn .item-emoji { font-size:clamp(38px,10vw,60px); line-height:1; }
    .item-btn .item-label { font-size:clamp(11px,2.8vw,15px); font-weight:bold; text-shadow:0 1px 3px rgba(0,0,0,.5); }
    .item-btn.correct-flash { animation:correctPulse .5s ease-out; }
    .item-btn.wrong-flash { animation:wrongShake .4s ease-out; }
    @keyframes correctPulse { 0%{transform:scale(1)} 40%{transform:scale(1.18);box-shadow:0 0 40px rgba(255,255,255,.7)} 100%{transform:scale(1)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }

    .sparkle {
      position:fixed; font-size:clamp(12px,3.5vw,20px);
      pointer-events:none; z-index:50;
      animation:sparkleFly ease-out forwards;
    }
    @keyframes sparkleFly {
      0%   { transform:translate(0,0) scale(1.2); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0.1); opacity:0; }
    }

    #celebrate-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
      z-index:99; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    #celebrate-overlay.show { opacity:1; pointer-events:all; }
    #celebrate-text { font-size:clamp(28px,7.5vw,56px); color:#fff; text-shadow:0 0 20px #ffd700; text-align:center; padding:0 16px; }
    #celebrate-icon { font-size:clamp(60px,18vw,110px); }
    #next-btn {
      padding:clamp(14px,4vw,20px) clamp(32px,8vw,56px);
      font-size:clamp(20px,5vw,28px); border-radius:50px; border:none;
      background:linear-gradient(135deg,#ffd700,#ff9800);
      color:#5d2e00; font-weight:bold; cursor:pointer; font-family:inherit;
      box-shadow:0 4px 16px rgba(255,180,0,.5);
    }
    .confetti-piece {
      position:fixed; width:10px; height:10px; border-radius:50%;
      animation:confettiFall linear forwards; pointer-events:none; z-index:100;
    }
    @keyframes confettiFall { 0%{top:-20px;opacity:1} 100%{top:110vh;opacity:.2} }
  </style>
</head>
<body>
  <div id="tier-badge">⭐ Easy</div>
  <div id="score-row"></div>

  <div id="princess-area">
    <div id="princess-face">👸</div>
    <div id="speech-bubble">
      <span id="speech-target"></span>
      <span id="speech-text">Tap me!</span>
    </div>
  </div>

  <div id="items-grid" class="grid-2"></div>

  <div id="celebrate-overlay">
    <div id="celebrate-text">Princess says well done!</div>
    <div id="celebrate-icon">🎀</div>
    <button id="next-btn" onclick="nextRound()">Next ➡️</button>
  </div>

<script>
  const COLOURS = [
    { emoji:'🔴', label:'Red',    bg:'#e53935' },
    { emoji:'🔵', label:'Blue',   bg:'#1e88e5' },
    { emoji:'🟡', label:'Yellow', bg:'#e6c200', lc:'#fff' },
    { emoji:'🟢', label:'Green',  bg:'#43a047' },
    { emoji:'🟣', label:'Purple', bg:'#8e24aa' },
    { emoji:'🩷', label:'Pink',   bg:'#e91e8c' },
    { emoji:'🟠', label:'Orange', bg:'#ef6c00' },
    { emoji:'⚪', label:'White',  bg:'#9e9e9e' },
  ];
  const ANIMALS = [
    { emoji:'🐱', label:'Cat',       bg:'#f06292' },
    { emoji:'🐶', label:'Dog',       bg:'#8d6e63' },
    { emoji:'🐰', label:'Bunny',     bg:'#ba68c8' },
    { emoji:'🦄', label:'Unicorn',   bg:'#7c4dff' },
    { emoji:'🐸', label:'Frog',      bg:'#4caf50' },
    { emoji:'🦋', label:'Butterfly', bg:'#42a5f5' },
    { emoji:'🐝', label:'Bee',       bg:'#f9a825', lc:'#2e1800' },
    { emoji:'🦊', label:'Fox',       bg:'#bf360c' },
  ];
  const FOODS = [
    { emoji:'🍎', label:'Apple',      bg:'#c62828' },
    { emoji:'🍌', label:'Banana',     bg:'#f9a825', lc:'#3e2700' },
    { emoji:'🍓', label:'Strawberry', bg:'#ad1457' },
    { emoji:'🍇', label:'Grapes',     bg:'#6a1b9a' },
    { emoji:'🌽', label:'Corn',       bg:'#827717', lc:'#fff' },
    { emoji:'🍦', label:'Ice Cream',  bg:'#c2185b' },
    { emoji:'🎂', label:'Cake',       bg:'#e91e63' },
    { emoji:'🍬', label:'Candy',      bg:'#9c27b0' },
  ];

  const TIERS = [
    { label:'⭐ Easy',   pool:COLOURS,                         cols:2, count:4 },
    { label:'🌟 Medium', pool:[...COLOURS,...ANIMALS],          cols:2, count:4 },
    { label:'👑 Hard',   pool:[...COLOURS,...ANIMALS,...FOODS], cols:3, count:6 },
  ];

  let audioCtx=null;
  function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function tone(f,t,d,v=.15){ try{ const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
  function playCorrect(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18),i*90)); }
  function playWrong(){ tone(200,'sawtooth',.2,.09); }
  function playCelebrate(){ [523,587,659,698,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.22),i*70)); }
  function playFanfare(){ [392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,'square',.25,.08),i*120)); }

  let target, score=0, round=0, locked=false;
  const TOTAL=9;

  function updateScore(){ document.getElementById('score-row').innerHTML=Array.from({length:score},()=>'⭐').join(''); }
  function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }

  function nextRound(){
    document.getElementById('celebrate-overlay').classList.remove('show');
    locked=false;
    if(round>=TOTAL){ endGame(); return; }
    round++;

    const tier = round<=3 ? TIERS[0] : round<=6 ? TIERS[1] : TIERS[2];
    document.getElementById('tier-badge').textContent=tier.label;

    const pool=shuffle(tier.pool);
    target=pool[0];

    let opts=shuffle(pool).slice(0,tier.count);
    if(!opts.find(o=>o.label===target.label)){ opts[0]=target; opts=shuffle(opts); }

    const bubble=document.getElementById('speech-bubble');
    bubble.classList.remove('bubble-pulse');
    void bubble.offsetWidth;
    bubble.classList.add('bubble-pulse');
    document.getElementById('speech-target').textContent=target.emoji;
    document.getElementById('speech-text').textContent=`Tap ${target.label}!`;
    playFanfare();

    const grid=document.getElementById('items-grid');
    grid.className=tier.cols===3?'grid-3':'grid-2';
    grid.innerHTML='';
    opts.forEach(item=>{
      const btn=document.createElement('button');
      btn.className='item-btn';
      btn.style.background=item.bg;
      btn.innerHTML=`<span class="item-emoji">${item.emoji}</span><span class="item-label" style="color:${item.lc||'#fff'}">${item.label}</span>`;
      btn.addEventListener('pointerdown',()=>handleTap(btn,item));
      grid.appendChild(btn);
    });
  }

  function handleTap(btn,item){
    if(locked) return;
    if(item.label===target.label){
      locked=true;
      btn.classList.add('correct-flash'); playCorrect(); score++; updateScore();
      const rect=btn.getBoundingClientRect();
      sparkleBurst(rect.left+rect.width/2, rect.top+rect.height/2);
      setTimeout(()=>{
        btn.classList.remove('correct-flash');
        const msgs=['Princess says well done! 👸','You listened! 🎀','Brilliant! ✨','Yes! 🌟','Amazing! 💖'];
        document.getElementById('celebrate-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
        document.getElementById('celebrate-icon').textContent=target.emoji;
        document.getElementById('celebrate-overlay').classList.add('show');
        playCelebrate(); confettiBurst();
      },500);
    } else {
      btn.classList.add('wrong-flash'); playWrong();
      setTimeout(()=>btn.classList.remove('wrong-flash'),400);
    }
  }

  function sparkleBurst(cx,cy){
    const icons=['✨','🌸','⭐','💫','💖'];
    for(let i=0;i<12;i++){
      const el=document.createElement('div'); el.className='sparkle';
      el.textContent=icons[Math.floor(Math.random()*icons.length)];
      const angle=(i/12)*Math.PI*2, dist=55+Math.random()*75;
      el.style.setProperty('--tx',Math.cos(angle)*dist+'px');
      el.style.setProperty('--ty',Math.sin(angle)*dist-20+'px');
      el.style.left=(cx-10)+'px'; el.style.top=(cy-10)+'px';
      el.style.animationDuration=(0.45+Math.random()*0.45)+'s';
      el.style.animationDelay=(Math.random()*0.08)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
    }
  }

  function endGame(){
    document.getElementById('celebrate-text').textContent=`${score} stars! The princess is so proud! 👑`;
    document.getElementById('celebrate-icon').textContent=Array.from({length:Math.min(score,9)},()=>'⭐').join('')||'🌸';
    document.getElementById('next-btn').textContent='Play Again 🔄';
    document.getElementById('next-btn').onclick=()=>{
      score=0; round=0; updateScore();
      document.getElementById('celebrate-overlay').classList.remove('show');
      nextRound();
    };
    document.getElementById('celebrate-overlay').classList.add('show');
    playCelebrate(); confettiBurst();
  }

  function confettiBurst(){
    const cols=['#ffd700','#ff69b4','#00cfff','#7fff00','#ff6347','#da70d6'];
    for(let i=0;i<32;i++){
      const el=document.createElement('div'); el.className='confetti-piece';
      el.style.left=Math.random()*100+'vw';
      el.style.background=cols[Math.floor(Math.random()*cols.length)];
      el.style.animationDuration=(1.2+Math.random()*1.6)+'s';
      el.style.animationDelay=(Math.random()*.4)+'s';
      document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
    }
  }

  nextRound();
</script>
</body>
</html>
