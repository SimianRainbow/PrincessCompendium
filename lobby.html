<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Princess Compendium</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: linear-gradient(160deg, #3a0068 0%, #9c27b0 45%, #f48fb1 100%);
      min-height: 100vh;
      font-family: 'Georgia', serif;
      user-select: none;
      overflow-x: hidden;
      padding-bottom: 32px;
    }

    header {
      text-align: center;
      padding: 32px 16px 8px;
    }
    header h1 {
      font-size: clamp(26px, 6.5vw, 46px);
      color: #fff;
      text-shadow: 0 0 20px rgba(255,215,0,.5), 0 2px 8px rgba(0,0,0,.4);
      letter-spacing: 2px;
    }
    header p {
      font-size: clamp(15px, 3.8vw, 20px);
      color: rgba(255,255,255,.75);
      margin-top: 5px;
    }

    /* Category section */
    .category-section {
      max-width: 620px;
      margin: 0 auto;
      padding: clamp(14px,3.5vw,22px) clamp(14px,4vw,24px) 4px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: clamp(10px,2.5vw,16px);
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(255,255,255,.2);
    }
    .category-icon { font-size: clamp(20px,5vw,28px); }
    .category-title {
      font-size: clamp(15px,4vw,21px);
      color: rgba(255,255,255,.9);
      font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,.3);
      letter-spacing: .5px;
    }
    .category-count {
      font-size: clamp(11px,2.8vw,14px);
      color: rgba(255,255,255,.5);
      margin-left: auto;
    }

    /* Game cards grid within a section */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(10px,2.5vw,16px);
    }

    .game-card {
      background: rgba(255,255,255,.13);
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 22px;
      padding: clamp(14px,3.5vw,20px) 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      text-decoration: none;
      transition: transform .12s, background .12s;
      box-shadow: 0 3px 16px rgba(0,0,0,.18);
    }
    .game-card:active {
      transform: scale(.93);
      background: rgba(255,255,255,.24);
    }

    .game-icon { font-size: clamp(44px,12vw,72px); line-height: 1; }
    .game-title {
      font-size: clamp(13px,3.5vw,18px);
      color: #fff;
      text-align: center;
      font-weight: bold;
      text-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .game-skill {
      font-size: clamp(10px,2.5vw,13px);
      color: rgba(255,255,255,.65);
      background: rgba(0,0,0,.18);
      border-radius: 20px;
      padding: 2px 9px;
      text-align: center;
    }

    #loading {
      text-align: center;
      color: rgba(255,255,255,.7);
      font-size: 22px;
      padding: 60px 20px;
    }
    #error-msg {
      display: none;
      text-align: center;
      color: #ffcdd2;
      font-size: 18px;
      padding: 40px 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>👑 Princess Compendium</h1>
    <p>Pick a game, Jet! ✨</p>
  </header>

  <div id="lobby-content">
    <div id="loading">Loading games... ✨</div>
    <div id="error-msg">Could not load games. Check your connection! 🌸</div>
  </div>

<script>
  const GAMES_JSON_URL = './games.json';
  const GAMES_BASE_URL = './';

  // Category display order, labels and icons
  const CATEGORIES = [
    { id: 'adventure',     icon: '🏰', label: 'Adventure' },
    { id: 'numbers',       icon: '🔢', label: 'Numbers' },
    { id: 'colours-shapes',icon: '🎨', label: 'Colours & Shapes' },
    { id: 'letters',       icon: '🔤', label: 'Letters' },
    { id: 'animals',       icon: '🐾', label: 'Animals' },
    { id: 'listen',        icon: '👂', label: 'Listen & Follow' },
    { id: 'music',         icon: '🎵', label: 'Music' },
    { id: 'stories',       icon: '📖', label: 'Stories' },
    { id: 'play',          icon: '⭐', label: 'Play' },
  ];

  async function loadGames() {
    try {
      const res = await fetch(GAMES_JSON_URL);
      if (!res.ok) throw new Error('Network response not ok');
      const games = await res.json();
      renderGames(games);
    } catch (err) {
      console.error('Failed to load games:', err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  function renderGames(games) {
    const content = document.getElementById('lobby-content');
    content.innerHTML = '';

    // Group games by category
    const byCategory = {};
    games.forEach(g => {
      const cat = g.category || 'play';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(g);
    });

    // Render in defined order, then any unknown categories at end
    const rendered = new Set();
    CATEGORIES.forEach(catDef => {
      const list = byCategory[catDef.id];
      if (!list || list.length === 0) return;
      rendered.add(catDef.id);
      content.appendChild(buildSection(catDef, list));
    });
    // Any uncategorised leftovers
    Object.entries(byCategory).forEach(([catId, list]) => {
      if (rendered.has(catId)) return;
      content.appendChild(buildSection({ id: catId, icon: '🎮', label: catId }, list));
    });
  }

  function buildSection(catDef, games) {
    const section = document.createElement('div');
    section.className = 'category-section';

    section.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${catDef.icon}</span>
        <span class="category-title">${catDef.label}</span>
        <span class="category-count">${games.length} game${games.length > 1 ? 's' : ''}</span>
      </div>
      <div class="game-grid" id="grid-${catDef.id}"></div>
    `;

    const grid = section.querySelector('.game-grid');
    games.forEach(game => {
      const card = document.createElement('a');
      card.className = 'game-card';
      card.href = GAMES_BASE_URL + game.path;
      card.innerHTML = `
        <div class="game-icon">${game.icon}</div>
        <div class="game-title">${game.title}</div>
        <div class="game-skill">${game.skill}</div>
      `;
      grid.appendChild(card);
    });

    return section;
  }

  loadGames();
</script>
</body>
</html>
