plugins {
    id 'com.android.application'
}

android {
    namespace 'com.princesscompendium'
    compileSdk 34

    defaultConfig {
        applicationId "com.princesscompendium"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core:1.13.1'
}

// Force consistent Kotlin stdlib version across all transitive deps
configurations.all {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.23'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.23'
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.23'
    }
}
